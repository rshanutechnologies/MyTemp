<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match the Following</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root{
  --green:#ff6fb5;
  --light-green:#ffe4f1;

  --blue:#4dd0e1;
  --light-blue:#e0fbff;

  /* 🔥 FLUID FONT SYSTEM */
  --fs-lg: clamp(20px, 2vw + 1vh, 26px);
  --fs-md: clamp(12px, 1.5vw + 0.6vh, 26px);

  /* 🔥 SIZE SYSTEM */
 --item-h: clamp(70px, 10vh, 110px);
  --gap-lg: clamp(20px, 8vw, 150px);
  --gap-md: clamp(10px, 3vw, 15px);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Livvic';
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:clamp(10px,2vw,20px);
}

/* CONTAINER */

.container{
  width:100%;
  max-width:clamp(600px, 90vw, 900px);
  margin-top: clamp(-5px, -1vh, -10px);
}

/* GAME LAYOUT */

.game{
  position:relative;
  display:flex;
  justify-content:center;
  gap:var(--gap-lg);
  align-items:flex-start;
}

/* COLUMN */

.column{
  width:clamp(200px, 35vw, 350px);
  display:flex;
  flex-direction:column;
  gap:var(--gap-md);
  z-index:2;
}

/* ITEM */

.item{
  background:white;
  padding:clamp(10px,2vh,18px);
  border-radius:clamp(10px,2vw,16px);
  cursor:pointer;
  position:relative;
  border:2px solid transparent;
  transition:.3s;
  box-shadow:0 4px 8px rgba(0,0,0,0.08);
  font-size:var(--fs-md);
  color:#2f4f4f;

  height: var(--item-h);
  display:flex;
  align-items:center;
  overflow:hidden;
}

/* LEFT / RIGHT COLORS */

.left .item{
  background:var(--light-green);
  border-left:clamp(4px,0.5vw,6px) solid var(--green);
}

.right .item{
  background:var(--light-blue);
  border-right:clamp(4px,0.5vw,6px) solid var(--blue);
}

/* HOVER */

.item:hover:not(.matched){
  transform:translateY(-3px);
}

/* ACTIVE */

.item.active{
  border-color:var(--green);
  background:white;
}

/* MATCHED */

.item.matched{
  opacity:.6;
  cursor:default;
}

/* ANCHOR */

.anchor{
  width:clamp(6px,1vw,10px);
  height:clamp(6px,1vw,10px);
  background:#cbd5e1;
  border-radius:50%;
  position:absolute;
  top:50%;
  transform:translateY(-50%);
}

.left .anchor{ right:clamp(-10px,-1vw,-15px); }
.right .anchor{ left:clamp(-10px,-1vw,-15px); }

/* SVG */

svg{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

/* LEFT CONTENT */

.left-content{
  display:flex;
  align-items:center;
  gap:clamp(6px,1vw,12px);
}

.left-img{
  width:clamp(28px,3vw,40px);
  height:clamp(28px,3vw,40px);
  object-fit:contain;
}

/* RIGHT SIDE */

.right .item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:clamp(6px,1vw,10px);
}

.right-text{
  font-size:var(--fs-md);
  line-height:1.2;
}

/* OVAL BOX */

.oval-box{
  width:clamp(50px,6vw,80px);
  height:clamp(25px,4vh,40px);
  border:2px dashed #94a3b8;
  border-radius:40px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f8fafc;
  flex-shrink:0;
}

.oval-box img{
  width:clamp(20px,3vw,32px);
  height:clamp(20px,3vw,32px);
  object-fit:contain;
}

/* POPUP */

.popup{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.hidden{
  display:none;
}

.popup-content{
  background:#fef6ff;
  padding:clamp(30px,5vw,60px) clamp(30px,6vw,80px);
  border-radius:30px;
  text-align:center;
  box-shadow:0 20px 45px rgba(0,0,0,0.25);

  min-width:clamp(250px,40vw,350px);
  max-width:clamp(300px,50vw,500px);
}

.popup-emoji{
  font-size:clamp(40px,6vw,60px);
  margin-bottom:15px;
}

.popup-content h2{
  font-size:clamp(20px,2vw,28px);
}

.popup-content p{
  font-size:clamp(16px,1.5vw,20px);
}

.play-again-btn{
  margin-top:20px;
  padding:clamp(10px,2vh,12px) clamp(20px,4vw,28px);
  font-size:clamp(14px,1.2vw,16px);
  border:none;
  border-radius:30px;
  cursor:pointer;
  background:linear-gradient(135deg,#4caf50,#2e7d32);
  color:white;
}

/* MOBILE */

@media(max-width:600px){

  .game{
    gap:clamp(6px,2vw,10px);
  }

  .column{
    width:50%;
  }

  svg{
    display:none;
  }
}

</style>
</head>

<body>

<div class="container">
<header>
 
</header>

<div class="game" id="gameArea">
  <svg id="lines"></svg>

  <div class="column left" id="leftCol"></div>
  <div class="column right" id="rightCol"></div>
</div>
</div>

<!-- Popup -->
<div id="popup" class="popup hidden">
 <div class="popup-content">
  <div id="popupEmoji" class="popup-emoji"></div>
  <h2 id="popupTitle"></h2>
  <p id="popupMessage"></p>

  <button id="playAgainBtn" class="play-again-btn hidden">
    🔄 Play Again
  </button>
</div>
</div>
<script>
const leftData=[
 {text:"1. Frog", match:"d", img:"../images/frog-img.png"},
 {text:"2. Butterfly", match:"c", img:"../images/butterfly.png"},
 {text:"3. Fish", match:"e", img:"../images/fish.png"},
 {text:"4. Cow", match:"b", img:"../images/cow-img.png"},
 {text:"5. Aquatic bird", match:"a", img:"../images/aquatic.png"},
];
const rightData=[
 {text:"a) It swims with its webbed feet.", match:"a"},
 {text:"b) It breathes through its lungs.", match:"b"},
 {text:"c) It has six legs.", match:"c"},
 {text:"d) It breathes through its skin when in water.", match:"d"},
 {text:"e) It breathes through its gills.", match:"e"},
];

let selected=null;
let score=0;
let matched=0;

const leftCol=document.getElementById("leftCol");
const rightCol=document.getElementById("rightCol");
const svg=document.getElementById("lines");


const popup = document.getElementById("popup");
const popupTitle = document.getElementById("popupTitle");
const popupMessage = document.getElementById("popupMessage");
const popupEmoji = document.getElementById("popupEmoji");
const playAgainBtn = document.getElementById("playAgainBtn");
function shuffle(arr){
 return arr.sort(()=>Math.random()-0.5);
}
/* ===== TEXT TO SPEECH (UK) ===== */
function speakText(text){
  if(!('speechSynthesis' in window)) return;

  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-GB";   // 🇬🇧 UK English
  utter.volume = 0.25;     // soft volume
  utter.rate = 1;
  utter.pitch = 1;

  const voices = speechSynthesis.getVoices();
  const ukVoice = voices.find(v => v.lang === "en-GB");
  if(ukVoice){
    utter.voice = ukVoice;
  }

  window.speechSynthesis.speak(utter);
}

window.speechSynthesis.onvoiceschanged = () => {};
function fireConfetti(){

  confetti({
    particleCount: 40,
    spread: 70,
    origin: { y: 0.6 },
    scalar: 0.7
  });

}
function init(){
 leftData.forEach(item=>{
   const div=document.createElement("div");
   div.className="item";
   div.dataset.match=item.match;
  div.innerHTML=`
  <div class="left-content">
    <img src="${item.img}" class="left-img">
    <span>${item.text}</span>
  </div>
  <div class="anchor"></div>
`;
   div.onclick=()=>{
     if(div.classList.contains("matched")) return;
     document.querySelectorAll(".left .item").forEach(i=>i.classList.remove("active"));
     div.classList.add("active");
     selected=div;
   };
   leftCol.appendChild(div);
 });

 rightData.forEach(item=>{
   const div=document.createElement("div");
   div.className="item";
   div.dataset.match=item.match;
   div.innerHTML=`
<div class="anchor"></div>
<span class="right-text">${item.text}</span>
<div class="oval-box"></div>
`;
   div.onclick=()=>{
 if(!selected || div.classList.contains("matched")) return;

 if(selected.dataset.match===div.dataset.match){

    fireConfetti();
    speakText("Correct");
    match(selected,div);

 } else {

    speakText("Wrong");

 }
};
   rightCol.appendChild(div);
 });
}

function match(left,right){

  // Get left image src
  const imgSrc = left.querySelector(".left-img").src;

  // Create new image for right box
  const newImg = document.createElement("img");
  newImg.src = imgSrc;
 newImg.style.width = "55px";
newImg.style.height = "35px";
newImg.style.objectFit = "contain";

  // Insert image inside right item (before text)
 const box = right.querySelector(".oval-box");
box.innerHTML = "";
box.appendChild(newImg);

  left.classList.add("matched");
  right.classList.add("matched");
  left.classList.remove("active");

  drawLine(left,right);

  selected=null;
  score++;
  matched++;

 if(matched===leftData.length){
    setTimeout(()=>{
        popup.classList.add("hidden"); // hide correct popup first
        showResult();                 // then show final popup
    },1200);
}
}

function drawLine(l,r){
 const r1=l.querySelector(".anchor").getBoundingClientRect();
 const r2=r.querySelector(".anchor").getBoundingClientRect();
 const svgRect=svg.getBoundingClientRect();

 const x1=r1.left-svgRect.left;
 const y1=r1.top-svgRect.top;
 const x2=r2.left-svgRect.left;
 const y2=r2.top-svgRect.top;
 const cx=(x1+x2)/2;

 const path=document.createElementNS("http://www.w3.org/2000/svg","path");
 path.setAttribute("d",`M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
 path.setAttribute("stroke","#22c55e");
 path.setAttribute("stroke-width","4");
 path.setAttribute("stroke-dasharray","8,6");  // ⭐ dashed line
 path.setAttribute("fill","none");

 svg.appendChild(path);
}

function showCorrectPopup(){

  popupEmoji.textContent = "🎉";
  popupTitle.textContent = "Correct!";
  popupTitle.style.color = "green";
  popupMessage.textContent = "Great job!";

  speakText("Correct!");   // 🔊 Added

  popup.classList.remove("hidden");

  setTimeout(()=>{
    popup.classList.add("hidden");
  },1200);
}
function showWrongPopup(){

  popupEmoji.textContent = "❌";
  popupTitle.textContent = "Wrong!";
  popupTitle.style.color = "red";
  popupMessage.textContent = "Try again!";

  speakText("Wrong!");   // 🔊 Added

  popup.classList.remove("hidden");

  setTimeout(()=>{
    popup.classList.add("hidden");
  },1200);
}
function showResult(){

  popupEmoji.textContent = "🏆";
  popupTitle.textContent = "Quiz Completed!";

  if(score === leftData.length){
    popupTitle.style.color = "#2e7d32";
    popupMessage.style.color = "#2e7d32";
    popupMessage.textContent = `Score: ${score}/${leftData.length} - Excellent 🌟`;
  }
  else if(score > 3){
    popupTitle.style.color = "#1565c0";
    popupMessage.style.color = "#1565c0";
    popupMessage.textContent = `Score: ${score}/${leftData.length} - Very Good 👏`;
  }
  else if(score < 3){
    popupTitle.style.color = "#c62828";
    popupMessage.style.color = "#c62828";
    popupMessage.textContent = `Score: ${score}/${leftData.length} - Keep Practicing 💪`;
  }
  else{
    popupTitle.style.color = "#ef6c00";
    popupMessage.style.color = "#ef6c00";
    popupMessage.textContent = `Score: ${score}/${leftData.length} - Good 👍`;
  }

  playAgainBtn.classList.remove("hidden");
  popup.classList.remove("hidden");
  confetti({
  particleCount:150,
  spread:120,
  origin:{ y:0.6 }
});

}
window.addEventListener("resize",()=>svg.innerHTML="");

init();
playAgainBtn.addEventListener("click",()=>{
  location.reload();
});
</script>

</body>
</html>
