<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match the Following</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root{
  --green:#ff6fb5;          /* candy pink border */
  --light-green:#ffe4f1;    /* soft pink background */

  --blue:#4dd0e1;           /* aqua border */
  --light-blue:#e0fbff;     /* soft aqua background */
}
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Livvic';
}

body{
  
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:900px;
  margin-top: -10px;
}



.badge{
  display:inline-block;
  background:#86efac;
  padding:5px 18px;
  border-radius:20px;
  margin-left:10px;
  font-size:16px;
  font-weight:600;
  color:#064e3b;
}

.game{
  position:relative;
  display:flex;
  justify-content:center;
  gap:150px;
  align-items:flex-start;
}

.column{
  width:350px;
  display:flex;
  flex-direction:column;
  gap:15px;
  z-index:2;
}
.item{
  background:white;
  padding:18px;
  border-radius:16px;
  cursor:pointer;
  position:relative;
  border:2px solid transparent;
  transition:.3s;
  box-shadow:0 4px 8px rgba(0,0,0,0.08);
  font-size:20px; 
  color: #2f4f4f;
}

.left .item{
  background:var(--light-green);
  border-left:6px solid var(--green);
}

.right .item{
  background:var(--light-blue);
  border-right:6px solid var(--blue);
}

.item:hover:not(.matched){
  transform:translateY(-3px);
}
.left .item{
  background:#ffe4f1;       /* soft pink */
  border-left:6px solid #ff6fb5;
}

.right .item{
  background:#e0fbff;       /* soft aqua */
  border-right:6px solid #4dd0e1;
}
.item.active{
  border-color:var(--green);
  background:white;
}

.item.matched{
  opacity:.6;
  cursor:default;
}

.anchor{
  width:10px;
  height:10px;
  background:#cbd5e1;
  border-radius:50%;
  position:absolute;
  top:50%;
  transform:translateY(-50%);
}

.left .anchor{ right:-15px; }
.right .anchor{ left:-15px; }

svg{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

.popup{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.hidden{
  display:none;
}
.left .item,
.right .item{
  height: 83px;          /* fixed static height */
  display: flex;
  align-items: center;
  overflow: hidden;      /* prevents size change */
}

.popup-content{
  background:#fef6ff;
  padding:60px 80px;
  border-radius:30px;
  text-align:center;
  box-shadow:0 20px 45px rgba(0,0,0,0.25);
  min-width:350px;
  max-width:500px;
  animation:pop 0.3s ease;
}

@keyframes pop{
  from{ transform:scale(0.8); opacity:0; }
  to{ transform:scale(1); opacity:1; }
}

.popup-emoji{
  font-size:60px;
  margin-bottom:15px;
}

.popup-content h2{
  font-size:28px;
  margin-bottom:10px;
}

.popup-content p{
  font-size:20px;
}

.play-again-btn{
  margin-top:20px;
  padding:12px 28px;
  font-size:16px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  background:linear-gradient(135deg,#4caf50,#2e7d32);
  color:white;
  font-weight:600;
  transition:0.3s;
}

#stars{
  font-size:35px;
  margin:10px 0;
}

button{
  padding:10px 25px;
  border:none;
  background:#22c55e;
  color:white;
  border-radius:20px;
  cursor:pointer;
  font-size:16px;
}
.left-content{
  display:flex;
  align-items:center;
  gap:12px;
}

.left-img{
  width:35px;
  height:35px;
  object-fit:contain;
}
.left-img{
  width:40px;      /* increase width */
  height:40px;     /* increase height */
  object-fit:contain;
}
.right .item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.oval-box{
  width:80px;
  height:40px;
  border:2px dashed #94a3b8;
  border-radius:40px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f8fafc;
  flex-shrink:0;
}

.oval-box img{
  width:32px;
  height:32px;
  object-fit:contain;
}
/* RESPONSIVE */
@media(max-width:900px){
  .game{ gap:150px; }
  .column{ width:55%; }
}
@media(max-width:600px){

  body{
    align-items:flex-start;
    padding:10px;
  }

  .container{
    max-width:100%;
    margin-top: 70px;
  }

  /* 🔥 KEEP LEFT-RIGHT LAYOUT */
  .game{
    flex-direction:row;
    gap:10px;
    align-items:flex-start;
  }

  /* ✅ EQUAL WIDTH COLUMNS */
  .column{
    width:50%;
    gap:10px;
  }

  /* ✅ FLEXIBLE ITEM (NO FIXED HEIGHT) */
  .item{
    font-size:13px;
    padding:10px;
    border-radius:12px;
  }

  /* LEFT SIDE */
  .left-content{
    gap:6px;
    align-items:center;
  }

  .left-img{
    width:28px;
    height:28px;
  }

  .left-content span{
    font-size:13px;
    line-height:1.2;
  }

  /* RIGHT SIDE */
  .right .item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
  }

  .right-text{
    font-size:12px;
    line-height:1.2;
    flex:1;
    word-break:break-word;
  }

  /* OVAL BOX */
  .oval-box{
    width:50px;
    height:28px;
    flex-shrink:0;
  }

  .oval-box img{
    width:22px;
    height:22px;
  }

  /* 🔥 SMALL ANCHOR FIX */
  .anchor{
    width:6px;
    height:6px;
  }

  .left .anchor{ right:-8px; }
  .right .anchor{ left:-8px; }

  svg{
  display:none;   /* ❌ hide lines */
}

}
.right .item{
  display:flex;
  align-items:center;
  gap:10px;
}

</style>
</head>

<body>

<div class="container">
<header>
 
</header>

<div class="game" id="gameArea">
  <svg id="lines"></svg>

  <div class="column left" id="leftCol"></div>
  <div class="column right" id="rightCol"></div>
</div>
</div>

<!-- Popup -->
<div id="popup" class="popup hidden">
 <div class="popup-content">
  <div id="popupEmoji" class="popup-emoji"></div>
  <h2 id="popupTitle"></h2>
  <p id="popupMessage"></p>

  <button id="playAgainBtn" class="play-again-btn hidden">
    🔄 Play Again
  </button>
</div>
</div>
<script>
const leftData=[
 {text:"1. Frog", match:"d", img:"../images/frog-img.png"},
 {text:"2. Butterfly", match:"c", img:"../images/butterfly.png"},
 {text:"3. Fish", match:"e", img:"../images/fish.png"},
 {text:"4. Cow", match:"b", img:"../images/cow-img.png"},
 {text:"5. Aquatic bird", match:"a", img:"../images/aquatic.png"},
];
const rightData=[
 {text:"a) It swims with its webbed feet.", match:"a"},
 {text:"b) It breathes through its lungs.", match:"b"},
 {text:"c) It has six legs.", match:"c"},
 {text:"d) It breathes through its skin when in water.", match:"d"},
 {text:"e) It breathes through its gills.", match:"e"},
];

let selected=null;
let score=0;
let matched=0;

const leftCol=document.getElementById("leftCol");
const rightCol=document.getElementById("rightCol");
const svg=document.getElementById("lines");


const popup = document.getElementById("popup");
const popupTitle = document.getElementById("popupTitle");
const popupMessage = document.getElementById("popupMessage");
const popupEmoji = document.getElementById("popupEmoji");
const playAgainBtn = document.getElementById("playAgainBtn");
function shuffle(arr){
 return arr.sort(()=>Math.random()-0.5);
}
/* ===== TEXT TO SPEECH (UK) ===== */
function speakText(text){
  if(!('speechSynthesis' in window)) return;

  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-GB";   // 🇬🇧 UK English
  utter.volume = 0.25;     // soft volume
  utter.rate = 1;
  utter.pitch = 1;

  const voices = speechSynthesis.getVoices();
  const ukVoice = voices.find(v => v.lang === "en-GB");
  if(ukVoice){
    utter.voice = ukVoice;
  }

  window.speechSynthesis.speak(utter);
}

window.speechSynthesis.onvoiceschanged = () => {};
function fireConfetti(){

  confetti({
    particleCount: 40,
    spread: 70,
    origin: { y: 0.6 },
    scalar: 0.7
  });

}
function init(){
 leftData.forEach(item=>{
   const div=document.createElement("div");
   div.className="item";
   div.dataset.match=item.match;
  div.innerHTML=`
  <div class="left-content">
    <img src="${item.img}" class="left-img">
    <span>${item.text}</span>
  </div>
  <div class="anchor"></div>
`;
   div.onclick=()=>{
     if(div.classList.contains("matched")) return;
     document.querySelectorAll(".left .item").forEach(i=>i.classList.remove("active"));
     div.classList.add("active");
     selected=div;
   };
   leftCol.appendChild(div);
 });

 rightData.forEach(item=>{
   const div=document.createElement("div");
   div.className="item";
   div.dataset.match=item.match;
   div.innerHTML=`
<div class="anchor"></div>
<span class="right-text">${item.text}</span>
<div class="oval-box"></div>
`;
   div.onclick=()=>{
 if(!selected || div.classList.contains("matched")) return;

 if(selected.dataset.match===div.dataset.match){

    fireConfetti();
    speakText("Correct");
    match(selected,div);

 } else {

    speakText("Wrong");

 }
};
   rightCol.appendChild(div);
 });
}

function match(left,right){

  // Get left image src
  const imgSrc = left.querySelector(".left-img").src;

  // Create new image for right box
  const newImg = document.createElement("img");
  newImg.src = imgSrc;
 newImg.style.width = "55px";
newImg.style.height = "35px";
newImg.style.objectFit = "contain";

  // Insert image inside right item (before text)
 const box = right.querySelector(".oval-box");
box.innerHTML = "";
box.appendChild(newImg);

  left.classList.add("matched");
  right.classList.add("matched");
  left.classList.remove("active");

  drawLine(left,right);

  selected=null;
  score++;
  matched++;

 if(matched===leftData.length){
    setTimeout(()=>{
        popup.classList.add("hidden"); // hide correct popup first
        showResult();                 // then show final popup
    },1200);
}
}

function drawLine(l,r){
 const r1=l.querySelector(".anchor").getBoundingClientRect();
 const r2=r.querySelector(".anchor").getBoundingClientRect();
 const svgRect=svg.getBoundingClientRect();

 const x1=r1.left-svgRect.left;
 const y1=r1.top-svgRect.top;
 const x2=r2.left-svgRect.left;
 const y2=r2.top-svgRect.top;
 const cx=(x1+x2)/2;

 const path=document.createElementNS("http://www.w3.org/2000/svg","path");
 path.setAttribute("d",`M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
 path.setAttribute("stroke","#22c55e");
 path.setAttribute("stroke-width","4");
 path.setAttribute("stroke-dasharray","8,6");  // ⭐ dashed line
 path.setAttribute("fill","none");

 svg.appendChild(path);
}

function showCorrectPopup(){

  popupEmoji.textContent = "🎉";
  popupTitle.textContent = "Correct!";
  popupTitle.style.color = "green";
  popupMessage.textContent = "Great job!";

  speakText("Correct!");   // 🔊 Added

  popup.classList.remove("hidden");

  setTimeout(()=>{
    popup.classList.add("hidden");
  },1200);
}
function showWrongPopup(){

  popupEmoji.textContent = "❌";
  popupTitle.textContent = "Wrong!";
  popupTitle.style.color = "red";
  popupMessage.textContent = "Try again!";

  speakText("Wrong!");   // 🔊 Added

  popup.classList.remove("hidden");

  setTimeout(()=>{
    popup.classList.add("hidden");
  },1200);
}
function showResult(){

  popupEmoji.textContent = "🏆";
  popupTitle.textContent = "Quiz Completed!";

  if(score === leftData.length){
    popupTitle.style.color = "#2e7d32";
    popupMessage.style.color = "#2e7d32";
    popupMessage.textContent = `Score: ${score}/${leftData.length} - Excellent 🌟`;
  }
  else if(score > 3){
    popupTitle.style.color = "#1565c0";
    popupMessage.style.color = "#1565c0";
    popupMessage.textContent = `Score: ${score}/${leftData.length} - Very Good 👏`;
  }
  else if(score < 3){
    popupTitle.style.color = "#c62828";
    popupMessage.style.color = "#c62828";
    popupMessage.textContent = `Score: ${score}/${leftData.length} - Keep Practicing 💪`;
  }
  else{
    popupTitle.style.color = "#ef6c00";
    popupMessage.style.color = "#ef6c00";
    popupMessage.textContent = `Score: ${score}/${leftData.length} - Good 👍`;
  }

  playAgainBtn.classList.remove("hidden");
  popup.classList.remove("hidden");
  confetti({
  particleCount:150,
  spread:120,
  origin:{ y:0.6 }
});

}
window.addEventListener("resize",()=>svg.innerHTML="");

init();
playAgainBtn.addEventListener("click",()=>{
  location.reload();
});
</script>

</body>
</html>
