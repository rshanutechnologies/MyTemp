<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fill in the Blanks</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root{
  --main:#166534;
  --bg:#ecfdf5;
  --correct:#16a34a;
  --wrong:#dc2626;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:"Livvic";
}

body{
 
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* ===== FIXED MAIN CONTAINER ===== */
.container{
  width:650px;              /* FIXED WIDTH */
  height:640px;             /* FIXED HEIGHT */
 
  border-radius:30px;
 
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* ===== FIXED QUESTION BOX ===== */
.question{
  width:100%;
  height:120px;             /* Bigger fixed height */
  font-size:30px;
  color:#2f4f4f;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  
}

/* ===== FIXED IMAGE BOX ===== */
.image-box{
  width:100%;
  height:250px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.image-box img{
  width:220px;
  height:220px;
  object-fit:contain;
}

/* ===== FIXED INPUT AREA ===== */
.input-area{
  width:100%;
  height:80px;              /* FIXED */
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
}

input{
  width:400px;
  height:50px;
  padding:10px;
  border-radius:10px;
  border:2px solid #ccc;
  font-size:22px;
}

/* ===== FIXED BUTTON ROW ===== */
.buttons{
  width:100%;
  height:90px;              /* FIXED */
  display:flex;
  justify-content:center;   /* CENTERED */
  align-items:center;
  gap:30px;   
   padding:15px 35px;
  border:none;
  border-radius:50px;
   font-size:22px;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
 
  color:white;
  font-family:'Livvic';              /* STATIC GAP */
}

/* Fixed button sizes */
#prevBtn,
#nextBtn{
  width:150px;
  height:50px;
}

#checkBtn1,
#checkBtn2{
  width:170px;
  height:50px;
}

/* Base button style */
button{
  border:none;
  cursor:pointer;
  border-radius:30px;
  font-size:22px;
  font-weight:500;
  transition:0.3s;
}



#prevBtn:hover{
  background:linear-gradient(135deg,#607d8b,#455a64);
  color:white;
}

/* Next */
#nextBtn{
  background:linear-gradient(135deg,#ff9800,#f57c00);
  color:white;
 
}

button:disabled{
  background:#ccc !important;
  cursor:not-allowed;
  box-shadow:none;
}
/* Check default pastel */
#checkBtn1,
#checkBtn2{
  background:#bbf7d0;
  color:#166534;
}

/* Active green */
#checkBtn1.active,
#checkBtn2.active{
  background:#16a34a;
  color:white;
  box-shadow:0 6px 18px rgba(22,163,74,0.4);
}

/* ===== POPUP ===== */
.popup{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.hidden{
  display:none;
}

.popup-content{
  background:#fef6ff;
  padding:60px 80px;
  border-radius:30px;
  text-align:center;
  box-shadow:0 20px 45px rgba(0,0,0,0.25);
  min-width:350px;
  max-width:500px;
}
@keyframes pop{
  from{ transform:scale(0.8); opacity:0; }
  to{ transform:scale(1); opacity:1; }
}

.popup-emoji{
  font-size:60px;
  margin-bottom:15px;
}

.popup-content h2{
  font-size:28px;
  margin-bottom:10px;
}

.popup-content p{
  font-size:20px;
}

.play-again-btn{
  margin-top:20px;
  padding:12px 28px;
  font-size:16px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  background:linear-gradient(135deg,#4caf50,#2e7d32);
  color:white;
  font-weight:600;
  transition:0.3s;
}

.play-again-btn:hover{
  transform:translateY(-3px);
}

/* When only one check button */
.buttons.single-check{
  justify-content: center;
}

.buttons.single-check #checkBtn1{
  order: 2;
}

.buttons.single-check #prevBtn{
  order: 1;
}

.buttons.single-check #nextBtn{
  order: 3;
}

.buttons.single-check #checkBtn2{
  display: none;   /* REMOVE space completely */
}
#prevBtn:disabled{
  cursor:not-allowed;
  color: white;
}

/* ================================= */
/* ✅ MOBILE RESPONSIVE ADDITION ONLY */
/* ================================= */

@media (max-width:768px){

  body{
    height:auto;
    overflow:auto;
    padding:20px 10px;
    align-items:flex-start;
  }

  .container{
    width:100%;
    height:auto;
    min-height:100vh;
    padding:25px 15px;
    border-radius:20px;
  }

  .question{
    height:auto;
    font-size:22px;
    line-height:1.4;
    margin-top: -30px;
   
  }

  .image-box{
    height:auto;
  }

  .image-box img{
    width:140px;
    height:auto;
  }

  .input-area{
    height:auto;
    flex-direction:column;
    gap:12px;
  }

  input{
    width:100%;
    font-size:18px;
  }

  .buttons{
    height:auto;
    flex-direction:column;
    gap:15px;
    margin-top:10px;
  }

  #prevBtn,
  #nextBtn,
  #checkBtn1,
  #checkBtn2{
    width:100%;
  }

  .popup-content{
    padding:30px 20px;
    min-width:auto;
    width:90%;
  }

  .popup-emoji{
    font-size:45px;
  }

  .popup-content h2{
    font-size:22px;
  }

  .popup-content p{
    font-size:16px;
  }
}


/* Extra Small Phones */
@media (max-width:480px){

  .question{
    font-size:18px;
    margin-top: 10px;
  }

  .image-box img{
    width:100px;
    height: 130px;
    
  }
.buttons{
  margin-top: -10px;
font-size: 12px;
}
}

</style>
</head>
<body>

<div class="container">

 
  <div class="question" id="questionText"></div>

  <div class="image-box">
    <img id="questionImg">
  </div>

  <div class="input-area" id="inputArea"></div>

  <div class="buttons">
 <button id="prevBtn" onclick="prevQuestion()" disabled>Previous</button>

  <button id="checkBtn1" onclick="checkAnswerSingle(0)">Check</button>
  <button id="checkBtn2" onclick="checkAnswerSingle(1)">Check</button>

  <button id="nextBtn" onclick="nextQuestion()" disabled>Next</button>
</div>
  <p id="result"></p>

</div>
<!-- Popup -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <div id="popupEmoji" class="popup-emoji"></div>
    <h2 id="popupTitle"></h2>
    <p id="popupMessage"></p>

    <button id="playAgainBtn" class="play-again-btn hidden">
      🔄 Play Again
    </button>
  </div>
</div>
<script>

const questions = [
  {
    q: "Q1.Human beings have a pair of ________ to breathe.",
    answers: ["lungs"],
    img: "../images/human.png"
  },
  {
    q: "Q2.Living things have ________ in them.",
    answers: ["life"],
    img: "../images/mango.png"
  },
  {
    q: "Q3.Rabbits ________ or ________ using their limbs.",
    answers: ["run","jump"],
    img: "../images/rabbit.png"
  },
  {
    q: "Q4.Earthworms use their ________ to slide or crawl.",
    answers: ["muscles"],
    img: "../images/earthwarm-img.png"
  },
  {
    q: "Q5.Fishes use their ________ to swim.",
    answers: ["fins"],
    img: "../images/fish.png"
  }
];

let index = 0;
let userAnswers = Array(questions.length).fill(null);
let answeredCorrectly = Array(questions.length).fill(false);

const qText = document.getElementById("questionText");
const qImg = document.getElementById("questionImg");
const inputArea = document.getElementById("inputArea");
const result = document.getElementById("result");

const nextBtn = document.getElementById("nextBtn");

const popup = document.getElementById("popup");
const popupTitle = document.getElementById("popupTitle");
const popupMessage = document.getElementById("popupMessage");
const popupEmoji = document.getElementById("popupEmoji");
const playAgainBtn = document.getElementById("playAgainBtn");



// Make Check button green when user types something
document.addEventListener("input", function(){

  const inputs = document.querySelectorAll("#inputArea input");
  const btn1 = document.getElementById("checkBtn1");
  const btn2 = document.getElementById("checkBtn2");

  inputs.forEach((input, i)=>{
    const value = input.value.trim();

    if(i === 0 && btn1){
      if(value !== ""){
        btn1.classList.add("active");
      }else{
        btn1.classList.remove("active");
      }
    }

    if(i === 1 && btn2){
      if(value !== ""){
        btn2.classList.add("active");
      }else{
        btn2.classList.remove("active");
      }
    }
  });

});

/* ===== TEXT TO SPEECH (UK) ===== */
function speakText(text){
  if(!('speechSynthesis' in window)) return;

  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-GB";     // UK English
  utter.volume = 0.25;      // Low volume
  utter.rate = 1;
  utter.pitch = 1;

  const voices = speechSynthesis.getVoices();
  const ukVoice = voices.find(voice => voice.lang === "en-GB");

  if(ukVoice){
    utter.voice = ukVoice;
  }

  window.speechSynthesis.speak(utter);
}

window.speechSynthesis.onvoiceschanged = () => {};
function fireConfetti(){

  confetti({
    particleCount: 40,   // small confetti
    spread: 70,
    origin: { y: 0.6 },
    scalar: 0.7
  });

}

function loadQuestion() {

  const current = questions[index];

  // Set question text & image
  qText.innerText = current.q;
  qImg.src = current.img;

  result.innerText = "";

  // Enable Next only if already answered correctly
  nextBtn.disabled = !answeredCorrectly[index];
  document.getElementById("prevBtn").disabled = index === 0;

  // Clear old inputs
  inputArea.innerHTML = "";

  // Create inputs
  current.answers.forEach((ans, i) => {

    const input = document.createElement("input");
    input.type = "text";
    input.id = "input" + i;
    input.placeholder = "Enter answer";

    // Restore saved answer if exists
    if (userAnswers[index] && userAnswers[index][i]) {
      input.value = userAnswers[index][i];
    }

if (answeredCorrectly[index] && userAnswers[index] && userAnswers[index][i]) {
  input.style.borderColor = "green";
  input.disabled = true;
}

    inputArea.appendChild(input);
  });
const btn1 = document.getElementById("checkBtn1");
const btn2 = document.getElementById("checkBtn2");
const buttonsContainer = document.querySelector(".buttons");

// Reset buttons completely
btn1.classList.remove("active");
btn2.classList.remove("active");
btn2.style.display = "none";
buttonsContainer.classList.add("single-check");

// ONLY for Q3
if(index === 2){
  btn2.style.display = "inline-block";
  buttonsContainer.classList.remove("single-check");
}
}
function checkAnswerSingle(inputIndex){

  const current = questions[index];
  const inputField = document.getElementById("input"+inputIndex);
  const userAns = inputField.value.trim().toLowerCase();

  // Save answer
  if(!userAnswers[index]){
    userAnswers[index] = [];
  }
  userAnswers[index][inputIndex] = userAns;

  let correctAnswer = current.answers[inputIndex];

// For Q3 allow both answers in any blank
if(index === 2){
  if(userAns === "run" || userAns === "jump"){
    correctAnswer = userAns;
  }
}

if(userAns === correctAnswer){
  fireConfetti(); // 🎉 small confetti

  speakText("Correct!");
    inputField.style.borderColor = "green";
    inputField.disabled = true;

    popupEmoji.textContent = "🎉";
    popupTitle.textContent = "Correct!";
    popupTitle.style.color = "green";
    popupMessage.textContent = "Good job!";
    popup.classList.remove("hidden");

    setTimeout(()=>{
      popup.classList.add("hidden");
    },1000);

    // ===== Q3 (Two answers case) =====
    if(index === 2){

      const input0 = document.getElementById("input0").disabled;
      const input1 = document.getElementById("input1").disabled;

      // Only mark question correct when BOTH are correct
      if(input0 && input1){
        answeredCorrectly[index] = true;
        nextBtn.disabled = false;

        // ✅ Show final popup if this is last question
        if(index === questions.length - 1){
          setTimeout(()=>{
            showFinalPopup();
          },1000);
        }
      }

    } 
    // ===== Single answer questions =====
    else{

      answeredCorrectly[index] = true;
      nextBtn.disabled = false;

      // ✅ Show final popup if last question
      if(index === questions.length - 1){
        setTimeout(()=>{
          showFinalPopup();
        },1000);
      }
    }

  } else {

    speakText("Wrong!");
    inputField.style.borderColor = "red";
    inputField.value = "";

    popupEmoji.textContent = "❌";
    popupTitle.textContent = "Wrong!";
    popupTitle.style.color = "red";
    popupMessage.textContent = "Try again!";
    popup.classList.remove("hidden");

    setTimeout(()=>{
      popup.classList.add("hidden");
    },1000);
  }
}
function checkAnswer(){
  const current = questions[index];
  let correct = true;
  let tempAnswers = [];

  current.answers.forEach((ans,i)=>{
    const inputField = document.getElementById("input"+i);
    const userAns = inputField.value.trim().toLowerCase();

    tempAnswers.push(userAns);

    if(userAns !== ans){
      correct = false;
      inputField.value = "";
    }
  });

  userAnswers[index] = tempAnswers;

  if(correct){
  fireConfetti(); // 🎉 confetti effect
    speakText("Correct!");

    popupEmoji.textContent = "🎉";
    popupTitle.textContent = "Correct!";
    popupTitle.style.color = "green";
    popupMessage.textContent = "Great job!";
    popup.classList.remove("hidden");

    answeredCorrectly[index] = true;
    nextBtn.disabled = false;

    setTimeout(()=>{
      popup.classList.add("hidden");

      // If last question → show final popup
      if(index === questions.length-1){
        showFinalPopup();
      }

    },1200);

  }else{
speakText("Wrong!.");
    popupEmoji.textContent = "❌";
    popupTitle.textContent = "Wrong!";
    popupTitle.style.color = "red";
    popupMessage.textContent = "Try again!";
    popup.classList.remove("hidden");

    setTimeout(()=>{
      popup.classList.add("hidden");
    },1200);
  }
}
function saveCurrentInputs(){
  const inputs = document.querySelectorAll("#inputArea input");
  userAnswers[index] = [];

  inputs.forEach(input=>{
    userAnswers[index].push(input.value.trim());
  });
}
function nextQuestion(){
  saveCurrentInputs();

  if(index < questions.length-1){
    index++;
    loadQuestion();
  }else{
    qText.innerText = "🎉 Quiz Completed!";
    qImg.style.display = "none";
    inputArea.style.display = "none";
    document.querySelector(".buttons").style.display = "none";
    result.innerText = "";
  }
}

function prevQuestion(){
  saveCurrentInputs();   // ✅ Save before going back

  if(index > 0){
    index--;
    loadQuestion();
  }
}
function showFinalPopup(){

  let score = 0;

  questions.forEach((q,i)=>{
    if(answeredCorrectly[i]) score++;
  });

  popupEmoji.textContent = "🏆";
  popupTitle.textContent = "Quiz Completed!";

  if(score === questions.length){
    popupTitle.style.color = "#2e7d32";
    popupMessage.style.color = "#2e7d32";
    popupMessage.textContent = `Score: ${score}/${questions.length} - Excellent 🌟`;
  }
  else if(score > 3){
    popupTitle.style.color = "#1565c0";
    popupMessage.style.color = "#1565c0";
    popupMessage.textContent = `Score: ${score}/${questions.length} - Very Good 👏`;
  }
  else{
    popupTitle.style.color = "#c62828";
    popupMessage.style.color = "#c62828";
    popupMessage.textContent = `Score: ${score}/${questions.length} - Keep Practicing 💪`;
  }

  playAgainBtn.classList.remove("hidden");
  popup.classList.remove("hidden");

  confetti({
    particleCount:150,
    spread:120,
    origin:{y:0.6}
  });
}
playAgainBtn.addEventListener("click",()=>{

  index = 0;
  userAnswers = Array(questions.length).fill(null);
  answeredCorrectly = Array(questions.length).fill(false);

  popup.classList.add("hidden");
  playAgainBtn.classList.add("hidden");

  nextBtn.disabled = true;
  loadQuestion();
});

loadQuestion();

</script>

</body>
</html>
