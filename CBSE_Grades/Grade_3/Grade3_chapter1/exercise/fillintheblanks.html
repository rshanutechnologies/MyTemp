<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fill in the Blanks</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root{
  --main:#166534;
  --bg:#ecfdf5;
  --correct:#16a34a;
  --wrong:#dc2626;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:"Livvic";
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* ✅ CONTAINER */
.container{
  width: clamp(320px, 80vw, 650px);
  height: clamp(520px, 85vh, 640px);
  border-radius: clamp(20px, 2vw, 30px);
  padding: clamp(20px, 4vw, 40px);

  display:flex;
  flex-direction:column;
  justify-content:space-between;
  margin:0 auto;
}

/* ✅ QUESTION */
.question{
  width:100%;
  height: clamp(90px, 12vh, 110px);
  font-size: clamp(24px, 2vw + 1vh, 30px); /* 🔥 max 30px */
  color:#2f4f4f;

  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* ✅ IMAGE */
.image-box{
  width:100%;
  height: clamp(180px, 28vh, 250px);

  display:flex;
  justify-content:center;
  align-items:center;
}

.image-box img{
  width: clamp(140px, 18vw, 200px);
  height: clamp(140px, 18vw, 200px);
  object-fit:contain;
}

.input-area{
  width:100%;
  height: clamp(70px, 10vh, 80px);

  display:flex;
  justify-content:center;
  align-items:center;
  gap: clamp(10px, 2vw, 15px);

  flex-wrap: wrap;   /* 🔥 KEY FIX */
}
input{
  width: clamp(140px, 40vw, 220px);  /* 🔥 reduced */

  height: clamp(42px, 6vh, 50px);
  padding:10px;
  border-radius:10px;
  border:2px solid #ccc;

  font-size: clamp(18px, 2vw, 26px);
  text-align:center; 
}

/* ✅ BUTTON AREA */
.buttons{
  width:100%;
  height: clamp(80px, 12vh, 90px);

  display:flex;
  justify-content:center;
  align-items:center;
  gap: clamp(10px, 2vw, 20px);
}

/* ✅ BUTTON SIZE */
#prevBtn,
#nextBtn{
  width: clamp(120px, 20vw, 150px);
  height: clamp(42px, 6vh, 50px);
}

#checkBtn1,
#checkBtn2{
  width: clamp(140px, 22vw, 170px);
  height: clamp(42px, 6vh, 50px);
}

/* ✅ BUTTON TEXT */
button{
  border:none;
  cursor:pointer;
  border-radius:30px;
  font-size: clamp(16px, 1.5vw, 22px);
  font-weight:500;
  transition:0.3s;
}

/* Hover */
#prevBtn:hover{
  background:linear-gradient(135deg,#607d8b,#455a64);
  
}

/* Next */
#nextBtn{
  background:linear-gradient(135deg,#ff9800,#f57c00);
 
}

button:disabled{
 background:#e0e0e0 !important;
  color:#9e9e9e;
  cursor:not-allowed;
}

/* Check */
#checkBtn1,
#checkBtn2{
  background:#bbf7d0;
  color:#166534;
}

#checkBtn1.active,
#checkBtn2.active{
  background:#16a34a;
  color:white;
  box-shadow:0 6px 18px rgba(22,163,74,0.4);
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.hidden{
  display:none;
}

.popup-content{
  background:#fef6ff;
  padding: clamp(30px, 5vw, 60px) clamp(30px, 6vw, 80px);
  border-radius:30px;
  text-align:center;
  box-shadow:0 20px 45px rgba(0,0,0,0.25);
  min-width: clamp(250px, 40vw, 350px);
  max-width: clamp(300px, 50vw, 500px);
}

.popup-emoji{
  font-size: clamp(40px, 6vw, 60px);
  margin-bottom:15px;
}

.popup-content h2{
  font-size: clamp(20px, 2vw, 28px);
}

.popup-content p{
  font-size: clamp(16px, 1.5vw, 20px);
}

.play-again-btn{
  margin-top:20px;
  padding:12px 28px;
  font-size: clamp(14px, 1.2vw, 16px);
  border:none;
  border-radius:30px;
  cursor:pointer;
  background:linear-gradient(135deg,#4caf50,#2e7d32);
  color:white;
}
@media (max-width:600px){
   
  .question{
    margin-top: 40px;
    font-size:clamp(20px,3vw,22px);
  }
  
.input-area{
    margin-bottom: 10px;   /* space below inputs */
  }

  .buttons{
    margin-top: 10px;      /* space above buttons */
  }
 
    
    
 }


/* From 700px and above = Desktop */
@media (min-width: 700px) {
  .question {
    font-size: 30px;
  }
}

</style>
</head>
<body>

<div class="container">

 
  <div class="question" id="questionText"></div>

  <div class="image-box">
    <img id="questionImg">
  </div>

  <div class="input-area" id="inputArea"></div>

  <div class="buttons">
 <button id="prevBtn" onclick="prevQuestion()" disabled>Previous</button>

 <button id="checkBtn1" onclick="checkAnswer()" disabled>Check</button>

  <button id="nextBtn" onclick="nextQuestion()" disabled>Next</button>
</div>
  <p id="result"></p>

</div>
<!-- Popup -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <div id="popupEmoji" class="popup-emoji"></div>
    <h2 id="popupTitle"></h2>
    <p id="popupMessage"></p>

    <button id="playAgainBtn" class="play-again-btn hidden">
      🔄 Play Again
    </button>
  </div>
</div>
<script>
const questions = [
  {
    q: "Q1.Human beings have a pair of ________ to breathe.",
    answers: ["lungs"],
    img: "../images/human.png"
  },
  {
    q: "Q2.Living things have ________ in them.",
    answers: ["life"],
    img: "../images/Mango.png"
  },
  {
    q: "Q3.Rabbits ________ or ________ using their limbs.",
    answers: ["run","jump"],
    img: "../images/rabbit.png"
  },
  {
    q: "Q4.Earthworms use their ________ to slide or crawl.",
    answers: ["muscles"],
    img: "../images/earthwarm-img.png"
  },
  {
    q: "Q5.Fishes use their ________ to swim.",
    answers: ["fins"],
    img: "../images/fish.png"
  }
];

let index = 0;
let userAnswers = Array(questions.length).fill(null);
let answeredCorrectly = Array(questions.length).fill(false);

// ✅ NEW (for step checking)
let q3Step = 0;
let q3UsedWords = [];

const qText = document.getElementById("questionText");
const qImg = document.getElementById("questionImg");
const inputArea = document.getElementById("inputArea");
const result = document.getElementById("result");

const nextBtn = document.getElementById("nextBtn");

const popup = document.getElementById("popup");
const popupTitle = document.getElementById("popupTitle");
const popupMessage = document.getElementById("popupMessage");
const popupEmoji = document.getElementById("popupEmoji");
const playAgainBtn = document.getElementById("playAgainBtn");
document.addEventListener("input", function(){
  const inputs = document.querySelectorAll("#inputArea input");
  const btn1 = document.getElementById("checkBtn1");

  let allFilled = true;

  inputs.forEach((input)=>{
    if(input.value.trim() === ""){
      allFilled = false;
    }
  });

  if(allFilled){
    btn1.classList.add("active");
    btn1.disabled = false;   // ✅ enable
  } else {
    btn1.classList.remove("active");
    btn1.disabled = true;    // ✅ disable
  }
});
// SPEECH
function speakText(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-GB";
  utter.volume = 0.25;

  window.speechSynthesis.speak(utter);
}

// CONFETTI
function fireConfetti(){
  confetti({
    particleCount: 40,
    spread: 70,
    origin: { y: 0.6 },
    scalar: 0.7
  });
}

function loadQuestion() {

  const current = questions[index];

  qText.innerText = current.q;
  qImg.src = current.img;
  result.innerText = "";

  nextBtn.disabled = !answeredCorrectly[index];
  document.getElementById("prevBtn").disabled = index === 0;

  inputArea.innerHTML = "";

  // ✅ RESET Q3 STEP
  if(index === 2){
    q3Step = 0;
    q3UsedWords = [];
  }

  current.answers.forEach((ans, i) => {

    const input = document.createElement("input");
    input.type = "text";
    input.id = "input" + i;
    input.placeholder = "Enter answer";

    if (userAnswers[index] && userAnswers[index][i]) {
      input.value = userAnswers[index][i];
    }

    if (answeredCorrectly[index] && userAnswers[index] && userAnswers[index][i]) {
      input.style.borderColor = "green";
      input.disabled = true;
    }

    inputArea.appendChild(input);
  });

  // ✅ CHECK BUTTON RESET (IMPORTANT)
  const btn1 = document.getElementById("checkBtn1");

  btn1.classList.remove("active");

  // 👉 ALWAYS disable initially
  btn1.disabled = true;

  // 👉 If already answered correctly, keep disabled
  if(answeredCorrectly[index]){
    btn1.disabled = true;
  }
}
// ✅ CHECK ANSWER
function checkAnswer(){

  const current = questions[index];
  let correct = true;

  let tempAnswers = [];

  current.answers.forEach((ans,i)=>{
    const inputField = document.getElementById("input"+i);
    const userAns = inputField.value.trim().toLowerCase();
    tempAnswers.push(userAns);
  });

  userAnswers[index] = tempAnswers;

  // ✅ ===== Q3 STEP LOGIC =====
  if(index === 2){

    const validWords = ["run", "jump"];
    const inputField = document.getElementById("input" + q3Step);
    const value = inputField.value.trim().toLowerCase();

    if(value === ""){
      correct = false;
    }
    else if(!validWords.includes(value)){
      correct = false;
      inputField.style.borderColor = "red";
    }
    else if(q3UsedWords.includes(value)){
      correct = false;
      inputField.style.borderColor = "red";
    }
    else{

      inputField.style.borderColor = "green";
      inputField.disabled = true;

      q3UsedWords.push(value);
      q3Step++;

      fireConfetti();
      speakText("Correct!");

      if(q3Step === 2){

  answeredCorrectly[index] = true;
  nextBtn.disabled = false;

  // ✅ SHOW POPUP ONLY AFTER BOTH CORRECT
  popupEmoji.textContent = "🎉";
  popupTitle.textContent = "Correct!";
  popupTitle.style.color = "green";
  popupMessage.textContent = "Great job!";
  popup.classList.remove("hidden");

  setTimeout(()=>{
    popup.classList.add("hidden");

    if(index === questions.length-1){
      showFinalPopup();
    }

  },1200);

} else {
  nextBtn.disabled = true;
}

return;
    }
  }

  // NORMAL QUESTIONS
  else{
    current.answers.forEach((ans,i)=>{
      const inputField = document.getElementById("input"+i);

      if(tempAnswers[i] !== ans){
        correct = false;
        inputField.value = "";
        inputField.style.borderColor = "red";
      }
    });
  }

  // RESULT
  if(correct){

    fireConfetti();
    speakText("Correct!");

    current.answers.forEach((ans, i)=>{
      const input = document.getElementById("input"+i);
      input.style.borderColor = "green";
      input.disabled = true;
    });

    popupEmoji.textContent = "🎉";
    popupTitle.textContent = "Correct!";
    popupTitle.style.color = "green";
    popupMessage.textContent = "Great job!";
    popup.classList.remove("hidden");

    answeredCorrectly[index] = true;
    nextBtn.disabled = false;

    setTimeout(()=>{
      popup.classList.add("hidden");
      if(index === questions.length-1){
        showFinalPopup();
      }
    },1200);

  } else {

    speakText("Wrong!");

    popupEmoji.textContent = "❌";
    popupTitle.textContent = "Wrong!";
    popupTitle.style.color = "red";
    popupMessage.textContent = "Try again!";
    popup.classList.remove("hidden");

    setTimeout(()=>{
      popup.classList.add("hidden");
    },1200);
  }
}

// باقي same (no change)
function saveCurrentInputs(){
  const inputs = document.querySelectorAll("#inputArea input");
  userAnswers[index] = [];

  inputs.forEach(input=>{
    userAnswers[index].push(input.value.trim());
  });
}

function nextQuestion(){
  saveCurrentInputs();

  if(index < questions.length-1){
    index++;
    loadQuestion();
  }else{
    qText.innerText = "🎉 Quiz Completed!";
    qImg.style.display = "none";
    inputArea.style.display = "none";
    document.querySelector(".buttons").style.display = "none";
    result.innerText = "";
  }
}

function prevQuestion(){
  saveCurrentInputs();

  if(index > 0){
    index--;
    loadQuestion();
  }
}

function showFinalPopup(){
  let score = 0;

  questions.forEach((q,i)=>{
    if(answeredCorrectly[i]) score++;
  });

  popupEmoji.textContent = "🏆";
  popupTitle.textContent = "Quiz Completed!";

  popupMessage.textContent = `Score: ${score}/${questions.length}`;

  playAgainBtn.classList.remove("hidden");
  popup.classList.remove("hidden");
}

playAgainBtn.addEventListener("click",()=>{
  index = 0;
  userAnswers = Array(questions.length).fill(null);
  answeredCorrectly = Array(questions.length).fill(false);

  popup.classList.add("hidden");
  playAgainBtn.classList.add("hidden");

  nextBtn.disabled = true;
  loadQuestion();
});

loadQuestion();

</script>

</body>
</html>
