
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>True False Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

/* ===== BASE ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Livvic';
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* ===== CONTAINER ===== */

.quiz-container{
width:100%;
max-width:clamp(600px, 90vw, 900px);

padding:clamp(20px,4vw,40px) clamp(15px,3vw,30px) clamp(80px,12vh,120px);
text-align:center;
position:relative;
}

/* ===== QUESTION ===== */

.question{
font-size: clamp(20px, 3vw, 30px);
margin-top:clamp(-30px, -3vh, -40px);
color:#2f4f4f;
}

/* ===== IMAGE ===== */
.image{
  display:flex;
  justify-content:center;
  align-items:center;

  height: clamp(250px, 35vh, 380px); /* 🔥 increased container height */
  margin-bottom:clamp(20px,4vh,35px);
}

.image img{
  width: clamp(220px, 22vw, 380px);  /* 🔥 bigger width */
  height: clamp(220px, 28vh, 350px); /* 🔥 bigger height */
  object-fit: contain;
}

.options{
display:flex;
justify-content:center;
gap:clamp(20px,5vw,50px);
margin-top:clamp(5px,2vh,10px);
}

/* ===== OPTION BUTTON ===== */

.option-btn{
display:flex;
align-items:center;
justify-content:center;
gap:clamp(8px,2vw,12px);

padding:clamp(12px,2vh,18px) clamp(25px,5vw,50px);

font-size:clamp(20px,2vw,28px);
font-weight:700;

border-radius:60px;
cursor:pointer;
color:white;
position:relative;
transition:0.25s;

box-shadow:0 clamp(8px,2vh,12px) clamp(12px,3vh,20px) rgba(0,0,0,0.2);
}

/* INNER SHINE */

.option-btn::after{
content:"";
position:absolute;
top:4px;
left:8px;
right:8px;
height:45%;
border-radius:60px;
background:linear-gradient(rgba(255,255,255,0.6),rgba(255,255,255,0));
pointer-events:none;
}

/* HOVER */

.option-btn:hover{
transform:translateY(-4px);
}

/* TRUE */

.true-btn{
background:linear-gradient(180deg,#8edb7f,#8be88b);
box-shadow:
inset 0 2px 6px rgba(255,255,255,0.6),
0 clamp(8px,2vh,12px) clamp(12px,3vh,18px) rgba(0,0,0,0.2);
}

/* FALSE */

.false-btn{
background:linear-gradient(180deg,#ff8e8e,#e07171);
box-shadow:
inset 0 2px 6px rgba(255,255,255,0.6),
0 clamp(8px,2vh,12px) clamp(12px,3vh,18px) rgba(0,0,0,0.2);
}

/* SELECTED */

.selected{
transform:scale(1.05);
box-shadow:
0 0 0 4px rgba(98, 239, 107, 0.6),
0 clamp(10px,3vh,22px) clamp(15px,4vh,22px) rgba(0,0,0,0.25);
}

/* ===== NAV BUTTON ===== */

.nav-btn{
position:absolute;

width:clamp(120px,20vw,150px);
height:clamp(42px,6vh,50px);

bottom:clamp(20px,4vh,35px);

padding:clamp(10px,2vh,12px) clamp(25px,4vw,35px);

font-size:clamp(16px,1.5vw,22px);
font-weight:500;

border:none;
border-radius:40px;
cursor:pointer;
color:white;

display:flex;
align-items:center;
justify-content:center;

transition:0.3s;
}

/* LEFT / RIGHT */

#prevBtn{
left:clamp(15px,3vw,30px);
background:linear-gradient(135deg,#607d8b,#455a64);
}

#nextBtn{
right:clamp(15px,3vw,30px);
background:linear-gradient(135deg,#ff9800,#f57c00);
}

/* DISABLED */

.nav-btn:disabled{
background:#ccc !important;
color:#777;
cursor:not-allowed;
}

/* ===== POPUP ===== */

.popup{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.hidden{
display:none;
}

.popup-content{
background:#fef6ff;
padding:clamp(30px,6vw,60px) clamp(30px,7vw,80px);
border-radius:30px;
text-align:center;
box-shadow:0 20px 45px rgba(0,0,0,0.25);

min-width:clamp(250px,40vw,350px);
max-width:clamp(300px,60vw,500px);
}

.popup-emoji{
 font-size:clamp(30px,6vw,60px);
margin-bottom:15px;
}

.popup-content h2{
font-size:clamp(20px,2vw,28px);
margin-bottom:10px;
}

.popup-content p{
font-size:clamp(14px,2vw,20px);
}

.popup-emoji{
  font-size:clamp(30px,6vw,60px);
  margin-bottom:15px;
}

.popup-content h2{
  font-size:clamp(18px,3vw,28px);
}


.play-again-btn{
margin-top:20px;
  padding:10px 25px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  background:linear-gradient(135deg,#4caf50,#2e7d32);
  color:white;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

.question{
font-size:clamp(20px,2vw,26px);
}

.image img{
max-width:clamp(140px,40vw,180px);
}

.options{
gap:clamp(15px,4vw,20px);
}

.option-btn{
font-size:clamp(18px,2vw,22px);
padding:clamp(12px,2vh,15px) clamp(20px,4vw,35px);
}

}

@media(max-width:600px){

body{
overflow:auto;
align-items:flex-start;
padding-top:clamp(20px,4vh,30px);
margin-top: 70px;
}

.question{
font-size:20px;
}

.image img{
max-width:clamp(120px,35vw,180px);
}

.options{
gap:clamp(15px,4vw,20px);
}

.option-btn{
font-size:clamp(18px,2vw,22px);
padding:clamp(12px,2vh,15px) clamp(20px,4vw,35px);
}

.nav-btn{
width:clamp(90px,25vw,100px);
height:clamp(40px,6vh,50px);
font-size:clamp(14px,2vw,18px);
}

}

/* From 700px and above = Desktop */
@media (min-width: 700px) {
  .question {
    font-size: 30px;
  }
}
/* ✅ Desktop only bigger image */
@media (min-width: 900px){
  .image img{
    width: clamp(260px, 20vw, 380px);  /* 🔥 increased size */
  }
}

/* ============================= */
/* Desktop / Monitor (1025px–1440px) */
/* ============================= */
@media screen and (min-width:1025px) and (max-width:1440px){

  .quiz-container{
    max-width:1000px;
  }

  /* QUESTION */
  .question{
    font-size:38px;
  }

  
  /* IMAGE */
  .image{
    height:320px;
  }

  .image img{
    width:340px;
    height:320px;
  }


  /* TRUE / FALSE BUTTON */
  .options{
    gap:60px;
  }

  .option-btn{
    font-size:34px;        /* 🔥 big text */
    padding:25px 70px;     /* 🔥 big size */
    border-radius:70px;
  }

  /* NAV BUTTON */
  .nav-btn{
     width:180px;
    height:60px;
    font-size:22px;
  }

}

/* ============================= */
/* Large Monitors (1441px–1920px) */
/* ============================= */
@media screen and (min-width:1441px) and (max-width:1920px){

  .quiz-container{
    max-width:1200px;
  }

  /* QUESTION */
  .question{
    font-size:40px;   /* 🔥 bigger */
  }

  /* IMAGE */
  .image{
    height:360px;
  }

  .image img{
    width:340px;
    height:320px;
  }

  /* TRUE / FALSE BUTTON */
  .options{
    gap:60px;
  }

  .option-btn{
    font-size:34px;        /* 🔥 big text */
    padding:25px 70px;     /* 🔥 big size */
    border-radius:70px;
  }

  /* NAV BUTTON */
  .nav-btn{
    width:180px;
    height:60px;
    font-size:22px;
  }

}

/* ============================= */
/* Extra Large Screens / 4K (1921px+) */
/* ============================= */
@media screen and (min-width:1921px){

  .quiz-container{
    max-width:1400px;
  }

  /* QUESTION */
  .question{
    font-size:52px;
  }

  /* IMAGE */
  .image{
    height:420px;
  }

  .image img{
    width:420px;
    height:380px;
  }

  /* TRUE / FALSE BUTTON */
  .options{
    gap:80px;
  }

  .option-btn{
    font-size:40px;
    padding:30px 90px;   /* 🔥 very big */
  }

  /* NAV BUTTON */
  .nav-btn{
    width:200px;
    height:70px;
    font-size:26px;
  }

}
</style>
</head>

<body>

<div class="quiz-container">



<div class="question" id="question"></div>

<div class="image">
<img id="questionImg">
</div>

<div class="options">
<div class="option-btn true-btn" onclick="selectAnswer('T')">✔ TRUE</div>
<div class="option-btn false-btn" onclick="selectAnswer('F')">✖ FALSE</div>
</div>

<button class="nav-btn" id="prevBtn">Previous</button>
<button class="nav-btn" id="nextBtn" disabled>Next</button>

</div>


<!-- POPUP -->

<div id="popup" class="popup hidden">

<div class="popup-content">

<div id="popupEmoji" class="popup-emoji"></div>

<h2 id="popupTitle"></h2>

<p id="popupMessage"></p>

<button id="playAgainBtn" class="play-again-btn hidden">
🔄 Play Again
</button>

</div>

</div>


<script>

const questions = [

{q:"Q1. Insects are non-living things.", img:"../images/insects.png", correct:"F"},

{q:"Q2.  Plants do not respond to stimuli.", img:"../images/plant.png", correct:"F"},

{q:"Q3. Living things don’t die.", img:"../images/Mango.png", correct:"F"},

{q:"Q4. Frogs and insects lay eggs.", img:"../images/mcq2.png", correct:"T"},

{q:"Q5. The lifespan of different living things vary.", img:"../images/tf5.png", correct:"T"}
  
];


let current = 0;

let selectedAnswers = new Array(questions.length).fill(null);


const questionEl = document.getElementById("question");

const imgEl = document.getElementById("questionImg");

const nextBtn = document.getElementById("nextBtn");

const prevBtn = document.getElementById("prevBtn");


const popup = document.getElementById("popup");

const popupTitle = document.getElementById("popupTitle");

const popupMessage = document.getElementById("popupMessage");

const popupEmoji = document.getElementById("popupEmoji");

const playAgainBtn = document.getElementById("playAgainBtn");

const trueBtn = document.querySelector(".true-btn");
const falseBtn = document.querySelector(".false-btn");


/* TEXT TO SPEECH */

function speak(text){

const msg = new SpeechSynthesisUtterance();

msg.text = text;

msg.lang = "en-GB";

msg.volume = 0.25;

speechSynthesis.speak(msg);

}

function fireConfetti(){

  confetti({
    particleCount: 40,
    spread: 70,
    origin: { y: 0.6 },
    scalar: 0.7
  });

}
/* LOAD QUESTION */

function loadQuestion(){

const q = questions[current];

questionEl.textContent = q.q;
imgEl.src = q.img;

trueBtn.classList.remove("selected");
falseBtn.classList.remove("selected");

/* highlight previous answer */

if(selectedAnswers[current] === "T"){
trueBtn.classList.add("selected");
}

if(selectedAnswers[current] === "F"){
falseBtn.classList.add("selected");
}

nextBtn.disabled = selectedAnswers[current] === null;
prevBtn.disabled = current === 0;

}

/* SELECT ANSWER */

function selectAnswer(choice){

if(selectedAnswers[current] !== null) return;

const correctAnswer = questions[current].correct;


if(choice === correctAnswer){
  fireConfetti(); // 🎉 same confetti as MCQ

selectedAnswers[current] = choice;
if(choice === "T"){
trueBtn.classList.add("selected");
}
if(choice === "F"){
falseBtn.classList.add("selected");
}

nextBtn.disabled = false;


popupEmoji.textContent = "🎉";

popupTitle.textContent = "Correct!";

popupTitle.style.color = "green";

popupMessage.textContent = "Great job!";

playAgainBtn.classList.add("hidden");


speak("Correct");


popup.classList.remove("hidden");


if(current === questions.length-1){

setTimeout(()=>{

popup.classList.add("hidden");

showFinalPopup();

},1200);

}

else{

setTimeout(()=>popup.classList.add("hidden"),1200);

}

}

else{

popupEmoji.textContent = "❌";

popupTitle.textContent = "Wrong!";

popupTitle.style.color = "red";

popupMessage.textContent = "Try again!";

playAgainBtn.classList.add("hidden");


speak("Wrong");


popup.classList.remove("hidden");

setTimeout(()=>popup.classList.add("hidden"),1200);

}

}


/* NEXT */

nextBtn.addEventListener("click",()=>{

if(current < questions.length-1){

current++;

loadQuestion();

}

});


/* PREVIOUS */

prevBtn.addEventListener("click",()=>{

if(current > 0){

current--;

loadQuestion();

}

});


/* FINAL SCORE */

function showFinalPopup(){

let score = 0;

questions.forEach((q,i)=>{

if(selectedAnswers[i] === q.correct) score++;

});


popupEmoji.textContent = "🏆";

popupTitle.textContent = "Quiz Completed!";
popupTitle.style.color = "#2e7d32";
    popupMessage.style.color = "#2e7d32";
popupMessage.textContent = `Score: ${score}/5`;

playAgainBtn.classList.remove("hidden");

popup.classList.remove("hidden");
confetti({
  particleCount:150,
  spread:120,
  origin:{ y:0.6 }
});


}


/* PLAY AGAIN */

playAgainBtn.addEventListener("click",()=>{

current = 0;

selectedAnswers = new Array(questions.length).fill(null);

popup.classList.add("hidden");

playAgainBtn.classList.add("hidden");


loadQuestion();

});


loadQuestion();

</script>

</body>
</html>
