    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fill in the blanks</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Livvic',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:clamp(10px,2vw,20px);
overflow: hidden;
}

/* ================= QUIZ CONTAINER ================= */

.quiz{
width:100%;
max-width:1000px;
min-height:clamp(420px,70vh,600px);

display:flex;
flex-direction:column;
justify-content:space-between;

margin:auto;
}

/* ================= QUESTION ================= */

.question{
font-size:clamp(20px,2vw + 1vh,30px);
color:#2f4f4f;
text-align:center;
width:100%;

min-height:clamp(60px,10vh,90px);

display:flex;
align-items:center;
justify-content:center;

line-height:1.3;
padding:0 clamp(10px,2vw,20px);
}

/* ================= IMAGE ================= */

.image{
display:flex;
justify-content:center;
align-items:center;
}

.image img{
width:clamp(90px,12vw,160px);
height:auto;
object-fit:contain;
}

/* ================= ANSWER BOX ================= */

.answerBox{
display:flex;
justify-content:center;
gap:clamp(6px,1vw,12px);
margin:clamp(10px,2vh,20px) auto;
flex-wrap:wrap;
min-height:50px;
}

.letterBox{
width:clamp(34px,5vw,50px);
height:clamp(34px,5vw,50px);

background:#fff7d6;
border:2px solid #f3d27a;

border-radius:12px;
display:flex;
align-items:center;
justify-content:center;

font-size:clamp(18px,2vw,28px);
font-weight:700;
color:#2f4f4f;

box-shadow:0 6px 12px rgba(0,0,0,0.15);
}

/* ================= KEYBOARD ================= */

.keyboard{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:clamp(6px,1vw,10px);

margin:auto;
padding:clamp(10px,2vw,20px);

max-width:700px;
}

.key{
width:clamp(34px,5vw,50px);
height:clamp(34px,5vw,50px);

background:#f1b64c;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:clamp(18px,2vw,26px);
font-weight:700;

cursor:pointer;
box-shadow:0 6px 12px rgba(0,0,0,0.25);
transition:0.2s;
}

.key:hover{
transform:translateY(-4px);
}

.key:active{
transform:scale(0.9);
}

/* ================= BUTTONS ================= */

.buttons{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
margin-top:auto;
gap:clamp(6px,1vw,12px);
}

button{
padding:clamp(8px,1vw,14px) clamp(16px,2vw,28px);
border:none;
border-radius:40px;

font-size:clamp(16px,1.5vw,22px);
font-weight:600;

cursor:pointer;
color:white;
}

/* colors */
.prev{background:linear-gradient(135deg,#607d8b,#455a64);}
.check.active{background:linear-gradient(135deg,#4caf50,#2e7d32);}
.next{background:linear-gradient(135deg,#ff9800,#f57c00);}

button:disabled{
background:#cccccc !important;
cursor:not-allowed;
}

/* ================= POPUP ================= */

.popup{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.hidden{
display:none;
}

.popup-content{
background:#fef6ff;
padding:clamp(25px,4vw,60px) clamp(20px,5vw,80px);
border-radius:30px;
text-align:center;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
min-width:260px;
max-width:90%;
animation:pop 0.3s ease;
}

@keyframes pop{
from{ transform:scale(0.8); opacity:0; }
to{ transform:scale(1); opacity:1; }
}

.popup-emoji{
font-size:clamp(35px,5vw,60px);
margin-bottom:15px;
}

.popup-content h2{
font-size:clamp(18px,2vw,28px);
margin-bottom:10px;
}

.popup-content p{
font-size:clamp(14px,1.5vw,20px);
}

.play-again-btn{
margin-top:20px;
padding:clamp(10px, 1vw, 14px) clamp(26px, 3.5vw, 42px);

  font-size: clamp(16px, 1.5vw, 22px);
border:none;
border-radius:30px;
cursor:pointer;
background:linear-gradient(135deg,#4caf50,#2e7d32);
color:white;
font-weight:600;
}
.key.disabled{
  pointer-events:none;
  opacity:0.5;
}
@media (min-width:700px){

  .question{
    font-size: 30px;
  }

}


    </style>
    </head>

    <body>

    <div class="quiz">

    <div class="question" id="question"></div>

    <div class="image">
   <img id="qImage">
    </div>

    <div class="answerBox" id="answer"></div>

    <div class="keyboard" id="keyboard"></div>

    <div class="buttons">
    <button class="prev" onclick="prevQ()">Previous</button>
    <button class="check" onclick="checkAnswer()">Check</button>
    <button class="next" onclick="nextQ()">Next</button>
    </div>

    <div class="result" id="result"></div>

    </div>
    <!-- Popup -->
    <div id="popup" class="popup hidden">
    <div class="popup-content">
    <div id="popupEmoji" class="popup-emoji"></div>
    <h2 id="popupTitle"></h2>
    <p id="popupMessage"></p>

    <button id="playAgainBtn" class="play-again-btn hidden">
        🔄 Play Again
    </button>
    </div>
    </div>

<script>

const quizData=[
{
q:"________ do not have a main root.",
a:"FIBROUSROOTS",
img:"../images/roots.png"
},
{
q:"Leaves are usually ______ in colour.",
a:"GREEN",
img:"../images/leaf.png"
},
{
q:"The thinner roots have white hair-like structures on them called the ______.",
a:"ROOTHairs".toUpperCase(),
img:"../images/fb1.png"
},
{
q:"The process by which a seed grows into a new plant is called ______.",
a:"GERMINATION",
img:"../images/seed.png"
},
{
q:"______ fixes the plant firmly in the soil.",
a:"ROOT",
img:"../images/fb5.png"
}
]

let current=0
let userAnswers=new Array(quizData.length).fill("")
let user=""
let usedButtons=[]
let locked=false

const question=document.getElementById("question")
const answer=document.getElementById("answer")
const result=document.getElementById("result")

const popup=document.getElementById("popup")
const popupTitle=document.getElementById("popupTitle")
const popupMessage=document.getElementById("popupMessage")
const popupEmoji=document.getElementById("popupEmoji")
const playAgainBtn=document.getElementById("playAgainBtn")

function generateLetters(ans){

const alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("")
let letters=ans.split("")

let extra=Math.floor(Math.random()*2)+1

while(letters.length<ans.length+extra){

let rand=alphabet[Math.floor(Math.random()*alphabet.length)]

if(!letters.includes(rand)){
letters.push(rand)
}

}

letters.sort(()=>Math.random()-0.5)

return letters
}

function loadQ(){
    playAgainBtn.classList.add("hidden")
question.innerText="Q"+(current+1)+". "+quizData[current].q

document.getElementById("qImage").src=quizData[current].img

user=userAnswers[current]||""
result.innerText=""
usedButtons=[]

const checkBtn=document.querySelector(".check")
checkBtn.disabled=true
checkBtn.classList.remove("active")

document.querySelector(".prev").disabled = current === 0

const nextBtn = document.querySelector(".next")

if(userAnswers[current] === quizData[current].a){
    nextBtn.disabled = false
}else{
    nextBtn.disabled = true
}
if(userAnswers[current] === quizData[current].a){
    nextBtn.disabled = false
}else{
    nextBtn.disabled = true
}

/* create answer boxes */

answer.innerHTML=""
let len=quizData[current].a.length

for(let i=0;i<len;i++){

let box=document.createElement("div")
box.className="letterBox"
box.innerText=user[i]||""

answer.appendChild(box)

}

/* create keyboard */

const keyboard=document.getElementById("keyboard")
keyboard.innerHTML=""

let letters=generateLetters(quizData[current].a)

letters.forEach(letter=>{

let btn=document.createElement("div")
btn.className="key"
btn.innerText=letter

/* restore disabled letters if user already typed */
if(user.includes(letter)){
btn.style.pointerEvents="none"
btn.classList.add("used")
usedButtons.push(btn)
}

btn.onclick=()=>{
    if(locked) return

    if(user.length < len){

        user += letter
        userAnswers[current] = user

        usedButtons.push(btn)

        // ✅ DISABLE CLICKED BUTTON
        btn.style.pointerEvents = "none"
        btn.style.opacity = "0.5"

        updateBoxes()

        if(user.length === len){
    checkBtn.disabled = false
    checkBtn.classList.add("active")
} else {
    checkBtn.disabled = true
    checkBtn.classList.remove("active")
}
    }
}

keyboard.appendChild(btn)

})
let back=document.createElement("div")
back.className="key"
back.innerText="⌫"

back.onclick=()=>{

if(locked) return

if(user.length>0){

user=user.slice(0,-1)
userAnswers[current]=user

updateBoxes()
let lastBtn = usedButtons.pop()

if(lastBtn){
  lastBtn.style.pointerEvents = "auto"
  lastBtn.style.opacity = "1"
}
if(user.length === len){
  checkBtn.disabled = false
  checkBtn.classList.add("active")
} else {
  checkBtn.disabled = true
  checkBtn.classList.remove("active")
}

}


}

keyboard.appendChild(back)

}

function updateBoxes(){

const boxes=document.querySelectorAll(".letterBox")

boxes.forEach((box,i)=>{
box.innerText=user[i]||""
})

}

loadQ()

function speakText(text){

if(!('speechSynthesis' in window)) return

window.speechSynthesis.cancel()

const utter=new SpeechSynthesisUtterance(text)

utter.lang="en-GB"
utter.volume=0.25

speechSynthesis.speak(utter)

}
function fireConfetti(){

  confetti({
    particleCount: 40,
    spread: 70,
    origin: { y: 0.6 },
    scalar: 0.7
  });

}

function checkAnswer(){

if(user===quizData[current].a){
fireConfetti();
popupEmoji.textContent="🎉"
popupTitle.textContent="Correct!"
popupTitle.style.color="green"
popupMessage.textContent="Great job!"

// ✅ ADD HERE
document.querySelectorAll(".key").forEach(key=>{
  key.style.pointerEvents="none"
  key.style.opacity="0.5"
});

document.querySelector(".check").disabled=true

speakText("Correct!")

popup.classList.remove("hidden")
setTimeout(()=>{
  popup.classList.add("hidden")

  // ✅ clear answer
  user = ""
  userAnswers[current] = ""
  updateBoxes()

  // ✅ ENABLE ALL LETTERS AGAIN
  document.querySelectorAll(".key").forEach(key=>{
    key.style.pointerEvents = "auto"
    key.style.opacity = "1"
  })

  // ✅ reset used buttons
  usedButtons = []

  // ✅ disable check button again
  const checkBtn = document.querySelector(".check")
  checkBtn.disabled = true
  checkBtn.classList.remove("active")

},1200)
}
else{

popupEmoji.textContent="❌"
popupTitle.textContent="Wrong!"
popupTitle.style.color="red"
popupMessage.textContent="Try again!"

speakText("Wrong!")

popup.classList.remove("hidden")
setTimeout(()=>{
  popup.classList.add("hidden")

  // ✅ clear answer
  user = ""
  userAnswers[current] = ""
  updateBoxes()

  // ✅ ENABLE ALL LETTER BUTTONS AGAIN
  document.querySelectorAll(".key").forEach(key=>{
    key.style.pointerEvents = "auto"
    key.style.opacity = "1"
  })

  // ✅ reset used buttons
  usedButtons = []

  // ✅ disable check button again
  const checkBtn = document.querySelector(".check")
  checkBtn.disabled = true
  checkBtn.classList.remove("active")

},1200)
}

}
function nextQ(){

if(current<quizData.length-1){

current++
locked=false
loadQ()

}else{

showFinalPopup()

}

}

function prevQ(){

if(current>0){

current--
locked=true
loadQ()

}

}
function fireFinalConfetti(){

  const duration = 2500;
  const animationEnd = Date.now() + duration;

  const interval = setInterval(function () {

    if (Date.now() > animationEnd) {
      clearInterval(interval);
      return;
    }

    confetti({
      particleCount: 60,
      spread: 120,
      startVelocity: 45,
      scalar: 1.1,
      origin: { x: Math.random(), y: Math.random() - 0.2 }
    });

  }, 250);

}
function showFinalPopup(){

let score=0

quizData.forEach((q,i)=>{
if(userAnswers[i]===q.a) score++
})

fireFinalConfetti()

setTimeout(()=>{

popupEmoji.textContent="🏆"
popupTitle.textContent="Quiz Completed!"
popupTitle.style.color="#2e7d32"

popupMessage.textContent=`Score: ${score}/${quizData.length}`

playAgainBtn.classList.remove("hidden")

popup.classList.remove("hidden")

},800)   // delay so confetti appears first

}
playAgainBtn.onclick=()=>{

confetti.reset()   // ✅ stop previous confetti

current=0
userAnswers=new Array(quizData.length).fill("")
user=""

popup.classList.add("hidden")

loadQ()

}

</script>
    </body>
    </html>
