<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>True False Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Livvic',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:clamp(10px,2vw,20px);

  overflow:hidden;
}

/* ================= CONTAINER (FTB STYLE) ================= */

.quiz-container{
  width:100%;
  max-width:1000px;
  min-height:clamp(420px,70vh,650px);

  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* ================= QUESTION ================= */

.question{
  font-size:clamp(20px,2vw + 1vh,30px);
  min-height:clamp(60px,10vh,90px);

  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;

  color:#2f4f4f;
  padding:0 clamp(10px,2vw,20px);
}

/* ================= MIDDLE ================= */

.row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:clamp(20px,3vw,40px);
  flex:1;
}

/* ================= IMAGE ================= */

.image{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.image img{
  width:clamp(140px,20vw,300px);
  height:auto;
}

/* ================= RIGHT ================= */

.right{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:clamp(20px,3vw,30px);
}

/* ================= OPTIONS ================= */

.options{
  display:flex;
  gap:clamp(20px,3vw,40px);
}

.option-box{
  width:clamp(70px,9vw,110px);
  height:clamp(70px,9vw,110px);

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:clamp(26px,3vw,42px);
  font-weight:700;

  border-radius:25px;
  cursor:pointer;
  transition:0.25s ease;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.option-box:hover{
  transform:translateY(-6px) scale(1.05);
}

/* COLORS */
.true-box{
  background:linear-gradient(145deg,#c8f7c5,#a5e6a2);
  color:#0a7a0a;
  border:3px solid #0a7a0a;
}

.false-box{
  background:linear-gradient(145deg,#ffd6d6,#ffb3b3);
  color:#c40000;
  border:3px solid #c40000;
}

/* ================= ANSWER ================= */

.answer-box{
  width:clamp(200px,28vw,320px);
  height:clamp(50px,8vh,75px);

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:clamp(22px,2vw,34px);
  font-weight:700;

  border-radius:20px;
  border:3px dashed #8fa8ff;

  background:linear-gradient(145deg,#ffffff,#e9f0ff);
}

.answer-box:not(:empty){
  border:3px solid #4caf50;
  background:linear-gradient(145deg,#e8fbe8,#c8f7c5);
  color:#0a7a0a;
  transform:scale(1.05);
}

/* ================= BUTTONS (FTB STYLE) ================= */

.buttons{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:auto;
  gap:clamp(6px,1vw,12px);
}

button{
  padding:clamp(10px, 1vw, 14px) clamp(26px, 3.5vw, 42px);

  font-size: clamp(16px, 1.5vw, 22px);
  border:none;
  border-radius:40px;

  font-size:clamp(16px,1.5vw,22px);
  font-weight:600;

  cursor:pointer;
  color:white;
}

/* colors */
.prev{background:linear-gradient(135deg,#607d8b,#455a64);}
.next{background:linear-gradient(135deg,#ff9800,#f57c00);}

button:disabled{
  background:#cccccc !important;
  cursor:not-allowed;
}

/* ================= POPUP ================= */

.popup{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.hidden{
display:none;
}

.popup-content{
background:#fef6ff;
padding:clamp(25px,4vw,60px) clamp(20px,5vw,80px);
border-radius:30px;
text-align:center;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
min-width:260px;
max-width:90%;
animation:pop 0.3s ease;
}

@keyframes pop{
from{ transform:scale(0.8); opacity:0; }
to{ transform:scale(1); opacity:1; }
}

.popup-emoji{
font-size:clamp(35px,5vw,60px);
margin-bottom:15px;
}

.popup-content h2{
font-size:clamp(18px,2vw,28px);
margin-bottom:10px;
}

.popup-content p{
font-size:clamp(14px,1.5vw,20px);
}

.play-again-btn{
margin-top:20px;
padding:clamp(10px, 1vw, 14px) clamp(26px, 3.5vw, 42px);

  font-size: clamp(16px, 1.5vw, 22px);
border:none;
border-radius:30px;
cursor:pointer;
background:linear-gradient(135deg,#4caf50,#2e7d32);
color:white;
font-weight:600;
}

/* ================= MOBILE FIX ================= */

@media (max-width:600px){

  .row{
    flex-direction:column;   /* 🔥 stack vertically */
    gap:clamp(20px,4vh,40px);
  }

  .right{
    gap:clamp(15px,3vh,25px);
  }

  .options{
    gap:clamp(15px,4vw,30px);
  }

  .answer-box{
    margin-top:10px;   /* 🔥 prevent overlap */
  }

}

@media (min-width:700px){

  .question{
    font-size: 30px;
  }

}
</style>
</head>

<body>

<div class="quiz-container">

  <div class="question" id="question"></div>

  <div class="row">
    <div class="image">
      <img id="questionImg">
    </div>

    <div class="right">
      <div class="options">
        <div class="option-box true-box" onclick="selectAnswer('T')">T</div>
        <div class="option-box false-box" onclick="selectAnswer('F')">F</div>
      </div>

      <div class="answer-box" id="answerBox"></div>
    </div>
  </div>
<div class="buttons">
  <button class="prev" id="prevBtn">Previous</button>
  <button class="next" id="nextBtn" disabled>Next</button>
</div>

</div>

<!-- Popup -->
<div id="popup" class="popup hidden">
 <div class="popup-content">
  <div id="popupEmoji" class="popup-emoji"></div>
  <h2 id="popupTitle"></h2>
  <p id="popupMessage"></p>

  <button id="playAgainBtn" class="play-again-btn hidden">
    🔄 Play Again
  </button>
 </div>
</div>

<script>
const questions = [
  {
    q:"Q1. All roots are of the same type.",
    img:"../images/roots.png",
    correct:"F"
  },
  {
    q:"Q2. The shoot is the underground part of a plant.",
    img:"../images/shoot.png",
    correct:"F"
  },
  {
    q:"Q3. The stem grows above the ground.",
    img:"../images/stems.png",
    correct:"T"
  },
  {
    q:"Q4. Fibrous roots have a main root.",
    img:"../images/fbroot.png",
    correct:"F"
  },
  { 
    q:"Q5. Seeds of all the plants can be eaten.",
    img:"../images/seeds.png",
    correct:"F"
  }
];
let current = 0;
let selectedAnswers = new Array(questions.length).fill(null);

const questionEl = document.getElementById("question");
const imgEl = document.getElementById("questionImg");
const answerBox = document.getElementById("answerBox");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");

const popup = document.getElementById("popup");
const popupTitle = document.getElementById("popupTitle");
const popupMessage = document.getElementById("popupMessage");
const popupEmoji = document.getElementById("popupEmoji");
const playAgainBtn = document.getElementById("playAgainBtn");

/* ===== UK TEXT TO SPEECH ===== */
function speakText(text){
  if(!('speechSynthesis' in window)) return;

  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-GB";
  utter.volume = 0.25;

  const voices = speechSynthesis.getVoices();
  const ukVoice = voices.find(v => v.lang === "en-GB");
  if(ukVoice) utter.voice = ukVoice;

  window.speechSynthesis.speak(utter);
}
function fireConfetti(){

  confetti({
    particleCount: 40,
    spread: 70,
    origin: { y: 0.6 },
    scalar: 0.7
  });

}
function loadQuestion(){
  confetti.reset();
  const q = questions[current];
  questionEl.textContent = q.q;
  imgEl.src = q.img;

  answerBox.textContent = selectedAnswers[current] || "";

  // ✅ FIXED LINE
  nextBtn.disabled = selectedAnswers[current] === null;

  prevBtn.disabled = current === 0;
}

function selectAnswer(choice){

  if(selectedAnswers[current] !== null) return;

  const correctAnswer = questions[current].correct;

 if(choice === correctAnswer){

  setTimeout(()=>fireConfetti(),100);

  selectedAnswers[current] = choice;
  answerBox.textContent = choice;
  nextBtn.disabled = false;
fireConfetti();

    selectedAnswers[current] = choice;
    answerBox.textContent = choice;
    nextBtn.disabled = false;

    popupEmoji.textContent = "🎉";
    popupTitle.textContent = "Correct!";
    popupTitle.style.color = "green";
    popupMessage.textContent = "Great job!";
    playAgainBtn.classList.add("hidden");

    speakText("Correct!");

    popup.classList.remove("hidden");

    if(current === questions.length - 1){
      setTimeout(()=>{
        popup.classList.add("hidden");
        showFinalPopup();
      },900);
    } else {
      setTimeout(()=> popup.classList.add("hidden"),1200);
    }

  } else {

    popupEmoji.textContent = "❌";
    popupTitle.textContent = "Wrong!";
    popupTitle.style.color = "red";
    popupMessage.textContent = "Try again!";
    playAgainBtn.classList.add("hidden");

    speakText("Wrong!");

    popup.classList.remove("hidden");
    setTimeout(()=> popup.classList.add("hidden"),1200);
  }
}

nextBtn.addEventListener("click",()=>{
  if(current < questions.length-1){
    current++;
    loadQuestion();
  }
});

prevBtn.addEventListener("click",()=>{
  if(current > 0){
    current--;
    loadQuestion();
  }
});
function fireFinalConfetti(){

const duration = 2500;
const animationEnd = Date.now() + duration;

finalConfettiInterval = setInterval(function(){

if(Date.now() > animationEnd){
clearInterval(finalConfettiInterval);
return;
}

confetti({
particleCount:60,
spread:120,
startVelocity:45,
scalar:1.1,
origin:{ x:Math.random(), y:Math.random()-0.2 }
});

},250);

}
function showFinalPopup(){

  let score = 0;
  questions.forEach((q,i)=>{
    if(selectedAnswers[i] === q.correct) score++;
  });
fireFinalConfetti();
  popupEmoji.textContent = "🏆";
  popupTitle.textContent = "Quiz Completed!";
  playAgainBtn.classList.remove("hidden");

  if(score === 5){
    popupTitle.style.color = "#2e7d32";
    popupMessage.style.color = "#2e7d32";
    popupMessage.textContent = `Score: ${score}/5 - Excellent 🌟`;
    speakText("");
  }
  else if(score > 3){
    popupTitle.style.color = "#1565c0";
    popupMessage.style.color = "#1565c0";
    popupMessage.textContent = `Score: ${score}/5 - Very Good 👏`;
    speakText("Very good!");
  }
  else if(score < 3){
    popupTitle.style.color = "#c62828";
    popupMessage.style.color = "#c62828";
    popupMessage.textContent = `Score: ${score}/5 - Keep Practicing 💪`;
    speakText("Keep practicing!");
  }
  else{
    popupTitle.style.color = "#ef6c00";
    popupMessage.style.color = "#ef6c00";
    popupMessage.textContent = `Score: ${score}/5 - Good 👍`;
    speakText("Good job!");
  }

  popup.classList.remove("hidden");
}

playAgainBtn.addEventListener("click",()=>{

clearInterval(finalConfettiInterval);  // ⭐ stop interval
confetti.reset();                      // ⭐ clear particles

current = 0;
selectedAnswers = new Array(questions.length).fill(null);

popup.classList.add("hidden");
playAgainBtn.classList.add("hidden");

loadQuestion();

});

loadQuestion();

</script>

</body>
</html>
