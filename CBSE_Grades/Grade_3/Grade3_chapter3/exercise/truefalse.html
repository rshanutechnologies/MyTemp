
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>True False Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Livvic';
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to bottom,#cfefff,#fff6cc);
padding:clamp(10px,2vw,30px);
}

/* CONTAINER */
.quiz-container{
width:min(95%,1100px);
text-align:center;
}

/* QUESTION */
.question{
width:100%;
min-height:clamp(60px,8vh,100px);

margin-bottom:clamp(15px,3vh,30px);

display:flex;
align-items:center;
justify-content:flex-start;

text-align:left;

 font-size: clamp(20px, 2vw + 1.5vh, 34px);
font-weight:500;
color:#2f4f4f;

padding:clamp(8px,1vh,12px) clamp(10px,2vw,20px);
}

/* CONTENT */
.content{
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
gap:clamp(20px,5vw,60px);
}

/* IMAGE BOX */
.image-box{
width:clamp(240px,30vw,380px);
height:clamp(180px,25vh,260px);
margin:auto;

display:flex;
align-items:center;
justify-content:center;

background:white;
border-radius:clamp(12px,2vw,18px);
border:2px solid #56a1ec;

box-shadow:0 10px 25px rgba(0,0,0,0.2);
padding:clamp(8px,1vw,10px);
}

.image-box img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* OPTIONS */
.options{
display:flex;
justify-content:center;
align-items:center;
gap:clamp(15px,3vw,35px);
flex-wrap:wrap;
}

/* BUTTON */
.option{
width:clamp(140px,18vw,220px);
height:clamp(110px,14vh,160px);

font-size:clamp(16px,1.6vw + 0.6vh,26px);

border-radius:clamp(18px,2vw,28px);
border:none;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;


font-weight:700;

cursor:pointer;

transition:0.25s;

box-shadow:
0 8px 0 rgba(0,0,0,0.15),
0 20px 30px rgba(0,0,0,0.25);

animation:float 3s ease-in-out infinite;
}

/* TRUE */
.trueBtn{
background:linear-gradient(135deg,#a8ffd6,#45e090);
color:#064d2a;
}

/* FALSE */
.falseBtn{
background:linear-gradient(135deg,#ffd6d6,#ff6b6b);
color:#5a0000;
animation-delay:0.4s;
}

/* ICON */
.option span{
font-size:clamp(30px,4vw,50px);
margin-bottom:clamp(6px,1.5vh,12px);
}

/* HOVER */
.option:hover{
transform:translateY(-10px) scale(1.08);
}

/* NAV BUTTONS */
.nav-buttons{
margin-top:clamp(15px,3vh,30px);
display:flex;
justify-content:center;
gap:clamp(15px,3vw,40px);
flex-wrap:wrap;
}

.nav-buttons button{
padding:clamp(8px,1vh,12px) clamp(18px,2vw,35px);
font-size: clamp(15px, 1.2vw + 0.6vh, 20px);
border:none;
border-radius:25px;
cursor:pointer;
color:white;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.prev{background:#55c3d6;}
.next{background:#ff9c55;}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.popup-content{
background:white;
padding:clamp(25px,4vw,55px);
border-radius:25px;
text-align:center;
width:min(90%,480px);
animation:bounce 0.4s;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.popup-content h2{
font-size:clamp(20px,2vw,28px);
}

#stars{
font-size:clamp(20px,2vw,30px);
color:#ffcc00;
margin-top:10px;
}

#finalScore{
font-size:clamp(20px,2vw,28px);
font-weight:600;
margin-top:15px;
color:#2f4f4f;
}

.popup-content button{
margin-top:20px;
padding:clamp(8px,1vh,12px) clamp(18px,2vw,30px);
border:none;
border-radius:30px;
background:#ff9c55;
color:white;
font-size:clamp(14px,1vw,18px);
cursor:pointer;
}
/* SMALLER width for Correct / Wrong popup */
#popup .popup-content{
  width: min(80%, 300px);   /* smaller than before */
  padding: clamp(20px,3vw,35px);
}
/* ANIMATION */
@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0px);}
}

@keyframes bounce{
0%{transform:scale(0.6);}
70%{transform:scale(1.1);}
100%{transform:scale(1);}
}
/* MOBILE FIX */
@media (max-width:768px){
body{
  overflow: hidden;
}
  .content{
    grid-template-columns:1fr;   /* stack layout */
    gap:clamp(20px,4vh,30px);
  }

  /* center image */
  .image-box{
    margin:auto;
  }

  /* stack buttons vertically */
  .options{
    flex-direction:column;
    gap:clamp(12px,2vh,20px);
  }
.option{
  width:clamp(140px,60%,220px);
  height:clamp(80px,10vh,110px);
}
  /* 🔥 MAKE QUESTION IMAGE SMALLER */
  .image-box{
    width:clamp(180px, 50vw, 240px);
    height:clamp(120px, 18vh, 180px);
  }

}

/* ============================= */
/* Desktop / Monitor (1025px–1440px) */
/* ============================= */
@media screen and (min-width:1025px) and (max-width:1440px){

  .quiz-container{
    max-width:1100px;
  }

  /* QUESTION */
  .question{
    font-size:30px;
  }

  /* IMAGE */
  .image-box{
    width:320px;
    height:220px;
  }

  /* OPTIONS */
  .options{
    gap:25px;
  }

  .option{
    width:200px;
    height:140px;
    font-size:22px;
  }

  .option span{
    font-size:40px;
  }

  /* NAV BUTTONS */
  .nav-buttons button{
    font-size:18px;
    padding:10px 28px;
  }

}

/* ============================= */
/* Large Monitors (1441px–1920px) */
/* ============================= */
@media screen and (min-width:1441px) and (max-width:1920px){

  .quiz-container{
    max-width:1300px;
  }

  /* QUESTION */
  .question{
    font-size:40px;
  }

  /* CONTENT GAP */
  .content{
    gap:80px;
  }

  /* IMAGE */
  .image-box{
    width:400px;
    height:280px;
  }

  /* OPTIONS */
  .options{
    gap:40px;
  }

  .option{
    width:200px;
    height:150px;
    font-size:28px;
  }

  .option span{
    font-size:50px;
  }

  /* NAV BUTTONS */
  .nav-buttons button{
    font-size:22px;
    padding:14px 36px;
  }

}

/* ============================= */
/* Extra Large Screens / 4K (1921px+) */
/* ============================= */
@media screen and (min-width:1921px){

  .quiz-container{
    max-width:1500px;
  }

  /* QUESTION */
  .question{
    font-size:52px;
  }

  /* CONTENT GAP */
  .content{
    gap:100px;
  }

  /* IMAGE */
  .image-box{
    width:500px;
    height:340px;
  }

  /* OPTIONS */
  .options{
    gap:50px;
  }

  .option{
    width:280px;
    height:200px;
    font-size:34px;
  }

  .option span{
    font-size:60px;
  }

  /* NAV BUTTONS */
  .nav-buttons button{
    font-size:26px;
    padding:16px 42px;
  }

}
</style>
</head>

<body>

<div class="quiz-container">

<div class="question" id="question"></div>

<div class="content">

<div class="image-box">
<img id="quizImage">
</div>

<div class="options">

<button class="option trueBtn" onclick="selectOption(true)">
<span>✔</span>
TRUE
</button>

<button class="option falseBtn" onclick="selectOption(false)">
<span>✖</span>
FALSE
</button>

</div>

</div>

<div class="nav-buttons">
<button class="prev" onclick="prevQuestion()">← Prev</button>
<button class="next" onclick="nextQuestion()">Next →</button>
</div>

</div>

<!-- RESULT POPUP -->

<div id="popup" class="popup">
<div class="popup-content">
<h2 id="popupText"></h2>
<div id="stars"></div>
</div>
</div>

<!-- FINAL SCORE -->

<div id="scorePopup" class="popup">
<div class="popup-content">
<h2>🎉 Quiz Finished!</h2>
<p id="finalScore"></p>
<button onclick="restartQuiz()">Play Again</button>
</div>
</div>

<script>

let questions=[

{
q:"Animals can prepare their own food.",
img:"../images/animal.png",
correct:false
},

{
q:"Many animals eat only plants.",
img:"../images/animals.png",
correct:true
},

{
q:"Frogs chew their prey.",
img:"../images/frog-img.png",
correct:false
},

{
q:"Animals that spend most of their time in the air are called aerial animals.",
img:"../images/aerial.png",
correct:true
},

{
q:"Animals that gnaw their food have sharp teeth only in the lower jaw.",
img:"../images/rat.png",
correct:true
}

];

let current=0;
let score=0;
let answered=false;
let userAnswers=new Array(questions.length).fill(null);

function loadQuestion(){
  confetti.reset(); 
document.getElementById("question").innerText =
"Q"+(current+1)+". "+questions[current].q;

document.getElementById("quizImage").src =
questions[current].img;

let buttons = document.querySelectorAll(".option");

buttons.forEach(btn => btn.style.border = "none");

if(userAnswers[current] !== null){

highlightAnswer(userAnswers[current]);

if(userAnswers[current] === questions[current].correct){
answered = true;
}else{
answered = false;
}

}else{
answered = false;
}

}

/* VOICE */

function speak(text){

let speech=new SpeechSynthesisUtterance(text);

speech.lang="en-GB";
speech.volume=0.25;
speech.rate=1;

window.speechSynthesis.speak(speech);

}
function selectOption(ans){

if(answered) return;

userAnswers[current] = ans;

if(ans === questions[current].correct){

score++;
answered = true;

speak("Correct");

highlightAnswer(ans);

showPopup("✅ Correct!", current+1);


confetti({
particleCount:60,
spread:80,
origin:{y:0.6}
});

/* CHECK IF LAST QUESTION */

if(current === questions.length - 1){

setTimeout(()=>{
document.getElementById("popup").style.display = "none";
showFinalScore();
},1200);

}else{

setTimeout(()=>{
document.getElementById("popup").style.display = "none";
},1200);

}

}else{

speak("Wrong");

highlightAnswer(ans);

showPopup("❌ Wrong!",0);

setTimeout(()=>{
document.getElementById("popup").style.display = "none";
},1200);

}

}

function fireFinalConfetti(){

  const duration = 2500;
  const animationEnd = Date.now() + duration;

  finalConfettiInterval = setInterval(function () {

    if (Date.now() > animationEnd) {
      clearInterval(finalConfettiInterval);
      return;
    }

    confetti({
      particleCount: 30,
      spread: 70,
      startVelocity: 35,
      scalar: 1.1,
      origin: { x: Math.random(), y: Math.random() - 0.2 }
    });

  }, 250);

}
function showPopup(text,stars){
   

document.getElementById("popupText").innerText=text;

let starText="";

for(let i=0;i<stars;i++){
starText+="⭐";
}

document.getElementById("stars").innerText=starText;

document.getElementById("popup").style.display="flex";

}
function nextQuestion(){

confetti.reset();   // ⭐ stop previous confetti

if(!answered) return;

if(current<questions.length-1){

current++;
loadQuestion();

}else{

showFinalScore();

}

}

function prevQuestion(){

if(current>0){
current--;
loadQuestion();
}

}

/* FINAL SCORE */

function showFinalScore(){
   fireFinalConfetti();   


document.getElementById("finalScore").innerText=
"Your Score: "+score+" / "+questions.length;

document.getElementById("scorePopup").style.display="flex";

}
function restartQuiz(){

clearInterval(finalConfettiInterval);  // ⭐ stop interval
confetti.reset();                      // ⭐ clear particles

score=0;
current=0;
answered=false;

userAnswers.fill(null);

document.getElementById("scorePopup").style.display="none";

loadQuestion();

}
function highlightAnswer(ans){

let buttons = document.querySelectorAll(".option");

/* reset borders */

buttons.forEach(btn => btn.style.border = "none");

/* TRUE button = index 0
   FALSE button = index 1 */

if(ans === true){

if(ans === questions[current].correct){
buttons[0].style.border = "4px solid #2ecc71";   // green
}else{
buttons[0].style.border = "4px solid #ff4d4d";   // red
}

}else{

if(ans === questions[current].correct){
buttons[1].style.border = "4px solid #2ecc71";   // green
}else{
buttons[1].style.border = "4px solid #ff4d4d";   // red
}

}

}
loadQuestion();

</script>

</body>
</html>
