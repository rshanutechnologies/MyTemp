
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>True False Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Livvic';
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to bottom,#cfefff,#fff6cc);
}

/* MAIN CONTAINER */

.quiz-container{
width:950px;
text-align:center;
}
.question{
width:850px;        /* fixed width */
height:90px;        /* fixed height */

margin:0 auto 30px;

display:flex;
align-items:center;
justify-content:flex-start;   /* start from left */

text-align:left;

font-size:30px;
font-weight:500;
color:#2f4f4f;

padding:10px 20px;
}

/* CONTENT LAYOUT */

.content{
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
gap:60px;
}

.image-box{
width:300px;
height:200px;
margin:auto;

display:flex;
align-items:center;
justify-content:center;

background:white;
border-radius:18px;
border:2px solid #56a1ec;   /* 2px border */

box-shadow:0 10px 25px rgba(0,0,0,0.2);

padding:10px;
}

/* IMAGE */

.image-box img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* TRUE FALSE BUTTONS */

.options{
display:flex;
justify-content:center;
align-items:center;
gap:35px;
}

/* BUTTON BASE */

.option{
width:190px;
height:130px;

border-radius:28px;
border:none;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

font-size:24px;
font-weight:700;

cursor:pointer;

transition:0.25s;

box-shadow:
0 8px 0 rgba(0,0,0,0.15),
0 20px 30px rgba(0,0,0,0.25);

animation:float 3s ease-in-out infinite;
}

/* TRUE BUTTON */

.trueBtn{
background:linear-gradient(135deg,#a8ffd6,#45e090);
color:#064d2a;
}

/* FALSE BUTTON */

.falseBtn{
background:linear-gradient(135deg,#ffd6d6,#ff6b6b);
color:#5a0000;
animation-delay:0.4s;
}

/* ICON */

.option span{
font-size:48px;
margin-bottom:8px;
}

/* HOVER */

.option:hover{
transform:translateY(-10px) scale(1.08);
}

/* CLICK */

.option:active{
transform:translateY(4px);
}

/* FLOATING ANIMATION */

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0px);}
}

/* NAV BUTTONS */

.nav-buttons{
margin-top:30px;
display:flex;
justify-content:center;
gap:40px;
}

.nav-buttons button{
padding:12px 35px;
font-size:18px;
border:none;
border-radius:25px;
cursor:pointer;
color:white;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.prev{background:#55c3d6;}
.next{background:#ff9c55;}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.popup-content{
background:white;
padding:50px;
border-radius:25px;
text-align:center;
width:340px;
animation:bounce 0.4s;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.popup-content h2{
font-size:28px;
}

#stars{
font-size:30px;
color:#ffcc00;
margin-top:10px;
}

@keyframes bounce{
0%{transform:scale(0.6);}
70%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* FINAL POPUP */

#scorePopup .popup-content{
width:450px;
}
#finalScore{
font-size:28px;
font-weight:600;
margin-top:15px;
color:#2f4f4f;
}
#scorePopup .popup-content{
width:480px;   /* increase width only for final popup */
padding:55px;
}
/* ANIMATION */

.popup-content button{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:30px;
background:#ff9c55;
color:white;
font-size:18px;
cursor:pointer;
}
/* MOBILE RESPONSIVE */

@media (max-width:768px){

body{
height:auto;
align-items:flex-start;
padding:40px 15px;
}

/* container */

.quiz-container{
width:100%;
}

/* question */

.question{
width:100%;
height:auto;
font-size:22px;
margin-bottom:20px;
padding:10px;
}

/* layout becomes vertical */

.content{
grid-template-columns:1fr;
gap:25px;
}

/* image */

.image-box{
width:100%;
height:200px;
}

/* true false buttons */

.options{
gap:20px;
flex-wrap:wrap;
}

.option{
width:140px;
height:100px;
font-size:18px;
}

/* icons */

.option span{
font-size:36px;
}

/* navigation buttons */

.nav-buttons{
gap:20px;
margin-top:30px;
}

.nav-buttons button{
padding:10px 25px;
font-size:16px;
}

/* popup */

.popup-content{
width:90%;
padding:35px;
}

#scorePopup .popup-content{
width:90%;
}

}
@media (max-width:600px){

  body{
    height:auto;
    align-items:flex-start;
    padding:15px 10px;
    overflow:auto;
  }

  /* CONTAINER */
  .quiz-container{
    width:100%;
  }

  /* QUESTION */
  .question{
    width:100%;
    height:auto;
    font-size:18px;
    line-height:1.3;
    padding:10px;
    margin-bottom:15px;
  }

  /* STACK LAYOUT */
  .content{
    grid-template-columns:1fr;
    gap:20px;
  }

  /* IMAGE */
  .image-box{
    width:100%;
    height:160px;
    border-radius:14px;
  }

  .image-box img{
    max-width:90%;
    max-height:90%;
  }

  /* TRUE / FALSE BUTTONS */
  .options{
    gap:15px;
    justify-content:center;
  }

  .option{
    width:120px;
    height:90px;
    font-size:16px;
    border-radius:20px;
  }

  .option span{
    font-size:28px;
  }

  /* NAV BUTTONS */
  .nav-buttons{
    gap:15px;
    margin-top:20px;
  }

  .nav-buttons button{
    padding:10px 18px;
    font-size:14px;
  }

  /* POPUP */
  .popup-content{
    width:90%;
    padding:25px;
  }

  #scorePopup .popup-content{
    width:90%;
  }

}
</style>
</head>

<body>

<div class="quiz-container">

<div class="question" id="question"></div>

<div class="content">

<div class="image-box">
<img id="quizImage">
</div>

<div class="options">

<button class="option trueBtn" onclick="selectOption(true)">
<span>✔</span>
TRUE
</button>

<button class="option falseBtn" onclick="selectOption(false)">
<span>✖</span>
FALSE
</button>

</div>

</div>

<div class="nav-buttons">
<button class="prev" onclick="prevQuestion()">← Prev</button>
<button class="next" onclick="nextQuestion()">Next →</button>
</div>

</div>

<!-- RESULT POPUP -->

<div id="popup" class="popup">
<div class="popup-content">
<h2 id="popupText"></h2>
<div id="stars"></div>
</div>
</div>

<!-- FINAL SCORE -->

<div id="scorePopup" class="popup">
<div class="popup-content">
<h2>🎉 Quiz Finished!</h2>
<p id="finalScore"></p>
<button onclick="restartQuiz()">Play Again</button>
</div>
</div>

<script>

let questions=[

{
q:"Animals can prepare their own food.",
img:"../images/animal.png",
correct:false
},

{
q:"Many animals eat only plants.",
img:"../images/animals.png",
correct:true
},

{
q:"Frogs chew their prey.",
img:"../images/frog-img.png",
correct:false
},

{
q:"Animals that spend most of their time in the air are called aerial animals.",
img:"../images/aerial.png",
correct:true
},

{
q:"Animals that gnaw their food have sharp teeth only in the lower jaw.",
img:"../images/rat.png",
correct:true
}

];

let current=0;
let score=0;
let answered=false;
let userAnswers=new Array(questions.length).fill(null);

function loadQuestion(){
  confetti.reset(); 
document.getElementById("question").innerText =
"Q"+(current+1)+". "+questions[current].q;

document.getElementById("quizImage").src =
questions[current].img;

let buttons = document.querySelectorAll(".option");

buttons.forEach(btn => btn.style.border = "none");

if(userAnswers[current] !== null){

highlightAnswer(userAnswers[current]);

if(userAnswers[current] === questions[current].correct){
answered = true;
}else{
answered = false;
}

}else{
answered = false;
}

}

/* VOICE */

function speak(text){

let speech=new SpeechSynthesisUtterance(text);

speech.lang="en-GB";
speech.volume=0.25;
speech.rate=1;

window.speechSynthesis.speak(speech);

}
function selectOption(ans){

if(answered) return;

userAnswers[current] = ans;

if(ans === questions[current].correct){

score++;
answered = true;

speak("Correct");

highlightAnswer(ans);

showPopup("✅ Correct!", current+1);


confetti({
particleCount:60,
spread:80,
origin:{y:0.6}
});

/* CHECK IF LAST QUESTION */

if(current === questions.length - 1){

setTimeout(()=>{
document.getElementById("popup").style.display = "none";
showFinalScore();
},1200);

}else{

setTimeout(()=>{
document.getElementById("popup").style.display = "none";
},1200);

}

}else{

speak("Wrong");

highlightAnswer(ans);

showPopup("❌ Wrong!",0);

setTimeout(()=>{
document.getElementById("popup").style.display = "none";
},1200);

}

}

function fireFinalConfetti(){

  const duration = 2500;
  const animationEnd = Date.now() + duration;

  finalConfettiInterval = setInterval(function () {

    if (Date.now() > animationEnd) {
      clearInterval(finalConfettiInterval);
      return;
    }

    confetti({
      particleCount: 30,
      spread: 70,
      startVelocity: 35,
      scalar: 1.1,
      origin: { x: Math.random(), y: Math.random() - 0.2 }
    });

  }, 250);

}
function showPopup(text,stars){
   

document.getElementById("popupText").innerText=text;

let starText="";

for(let i=0;i<stars;i++){
starText+="⭐";
}

document.getElementById("stars").innerText=starText;

document.getElementById("popup").style.display="flex";

}
function nextQuestion(){

confetti.reset();   // ⭐ stop previous confetti

if(!answered) return;

if(current<questions.length-1){

current++;
loadQuestion();

}else{

showFinalScore();

}

}

function prevQuestion(){

if(current>0){
current--;
loadQuestion();
}

}

/* FINAL SCORE */

function showFinalScore(){
   fireFinalConfetti();   


document.getElementById("finalScore").innerText=
"Your Score: "+score+" / "+questions.length;

document.getElementById("scorePopup").style.display="flex";

}
function restartQuiz(){

clearInterval(finalConfettiInterval);  // ⭐ stop interval
confetti.reset();                      // ⭐ clear particles

score=0;
current=0;
answered=false;

userAnswers.fill(null);

document.getElementById("scorePopup").style.display="none";

loadQuestion();

}
function highlightAnswer(ans){

let buttons = document.querySelectorAll(".option");

/* reset borders */

buttons.forEach(btn => btn.style.border = "none");

/* TRUE button = index 0
   FALSE button = index 1 */

if(ans === true){

if(ans === questions[current].correct){
buttons[0].style.border = "4px solid #2ecc71";   // green
}else{
buttons[0].style.border = "4px solid #ff4d4d";   // red
}

}else{

if(ans === questions[current].correct){
buttons[1].style.border = "4px solid #2ecc71";   // green
}else{
buttons[1].style.border = "4px solid #ff4d4d";   // red
}

}

}
loadQuestion();

</script>

</body>
</html>
