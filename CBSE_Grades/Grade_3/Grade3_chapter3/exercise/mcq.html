<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MCQ Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Livvic';
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to bottom,#cfefff,#fff6cc);
padding:clamp(10px,2vw,30px);
overflow: hidden;
}

/* CONTAINER */
.quiz-container{
width:min(95%,1200px);
text-align:center;
}

/* QUESTION */
.question{
 font-size: clamp(20px, 2vw + 1.5vh, 34px);
font-weight:500;
color:#2f4f4f;
padding:0 clamp(5px,1vw,20px);
}
.question-img{
display:flex;
justify-content:center;
align-items:center;

/* ❌ REMOVE fixed height */
/* height:clamp(80px,12vh,140px); */

/* ✅ ADD this */
margin-top: clamp(10px, 2vh, 25px);
margin-bottom: clamp(10px, 2vh, 25px);
}
.question-img img{
width:clamp(90px,10vw,140px);
height:clamp(90px,10vw,140px);
object-fit:contain;

/* ❌ REMOVE this */
/* margin-top:clamp(10px,2vh,30px); */
}

/* OPTIONS */
.options{
display:flex;
justify-content:center;
gap:clamp(10px,2vw,25px);
flex-wrap:wrap;
margin-top: clamp(35px, 7vh, 80px);
}

.option{
width:clamp(110px,12vw,160px);
height:clamp(110px,12vw,160px);

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

gap:clamp(5px,1vh,10px);

border-radius:clamp(15px,2vw,25px);
border:none;
cursor:pointer;

background:rgba(255,255,255,0.25);
backdrop-filter:blur(10px);

transition:0.25s;

box-shadow:
inset 0 3px 6px rgba(255,255,255,0.8),
inset 0 -3px 6px rgba(0,0,0,0.05),
0 6px 12px rgba(0,0,0,0.15);
}

/* gradients */
.option:nth-child(1){background:linear-gradient(135deg,#dff4ff,#bfe9ff);}
.option:nth-child(2){background:linear-gradient(135deg,#fff6cc,#ffe88a);}
.option:nth-child(3){background:linear-gradient(135deg,#d6ffe8,#aef2cc);}
.option:nth-child(4){background:linear-gradient(135deg,#e3e6ff,#c9d0ff);}

/* hover */
.option:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 12px 20px rgba(0,0,0,0.2);
}

/* option image */
.opt-img{
width:clamp(50px,6vw,100px);
height:clamp(50px,6vw,100px);
object-fit:contain;
}

/* option text */
.opt-text{
font-size: clamp(14px, 1.4vw + 0.6vh, 22px);
font-weight:600;
color:#1e4b6d;

padding:clamp(4px,0.8vw,6px) clamp(10px,1.5vw,16px);

border-radius:18px;

background:linear-gradient(
145deg,
rgba(255,255,255,0.85),
rgba(210,240,255,0.7)
);

box-shadow:
inset 0 2px 5px rgba(255,255,255,0.9),
inset 0 -3px 6px rgba(0,0,0,0.05),
0 4px 8px rgba(0,0,0,0.12);

backdrop-filter:blur(6px);
transition:0.25s;
}

.option:hover .opt-text{
transform:scale(1.08);
}

/* NAV BUTTONS */
.nav-buttons{
display:flex;
justify-content:center;
gap:clamp(10px,2vw,30px);
margin-top:clamp(10px,2vh,20px);
flex-wrap:wrap;
}

.nav-buttons button{
padding:clamp(8px,1vh,12px) clamp(18px,2vw,35px);
font-size: clamp(15px, 1.2vw + 0.6vh, 20px);
border:none;
border-radius:25px;
cursor:pointer;
color:white;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.prev{background:#55c3d6;}
.next{background:#ff9c55;}

.selected{
border:3px solid #204a63;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.popup-content{
background:linear-gradient(135deg,#ffffff,#f5fbff);
padding:clamp(25px,4vw,55px);
border-radius:25px;
text-align:center;
width:min(90%,480px);
animation:bounce 0.4s;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
border:4px solid #e8f4ff;
}

.popup-content h2{
font-size:clamp(20px,2vw,28px);
margin-bottom:15px;
}

.popup-content button{
margin-top:20px;
padding:clamp(8px,1vh,12px) clamp(18px,2vw,30px);
border:none;
border-radius:30px;
background:linear-gradient(135deg,#ffb347,#ff8c42);
color:white;
font-size:clamp(14px,1vw,18px);
cursor:pointer;
}

#finalScore{
font-size:clamp(20px,2vw,28px);
font-weight:600;
margin-top:15px;
color:#2f4f4f;
}
/* SMALLER width for Correct / Wrong popup */
#popup .popup-content{
  width: min(80%, 300px);   /* smaller than before */
  padding: clamp(20px,3vw,35px);
}
/* ANIMATION */
@keyframes bounce{
0%{transform:scale(0.6);}
70%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* STARS */
#stars{
margin-top:10px;
font-size:clamp(20px,2vw,28px);
color:#ffcc00;
}
@media (max-width: 600px){
   .options{
    display: grid;
    grid-template-columns: repeat(2, max-content); /* 🔥 FIX */
    justify-content: center;  /* 🔥 CENTER horizontally */
    gap: 10px;
  }

  .option{
    width: 100%;
    max-width: 120px;
    aspect-ratio: 1/1;
    padding: 6px;
  }

  .opt-img{
    width: 40px;        /* 🔽 smaller image */
    height: 40px;
  }

  .opt-text{
    font-size: 13px;    /* 🔽 slightly smaller text */
  }
}



/* ============================= */
/* Desktop / Monitor (1025px–1440px) */
/* ============================= */
@media screen and (min-width:1025px) and (max-width:1440px){

  .quiz-container{
    max-width:1100px;
  }

  /* QUESTION */
  .question{
    font-size:30px;
  }

  /* IMAGE */
  .image-box{
    width:320px;
    height:220px;
  }

  /* OPTIONS */
  .options{
    gap:25px;
    margin-top: -10px;
  }

  .option{
    width:200px;
    height:140px;
    font-size:22px;
  }

  .option span{
    font-size:22px;
  }

  /* NAV BUTTONS */
  .nav-buttons button{
    font-size:18px;
    padding:10px 28px;
  }

}
/* ============================= */
/* Large Monitors (1441px–1920px) */
/* ============================= */
@media screen and (min-width:1441px) and (max-width:1920px){

  .quiz-container{
    max-width:1300px;
  }

  /* QUESTION */
  .question{
    font-size:40px;
  }

  /* CONTENT GAP */
  .content{
    gap:80px;
  }

  /* IMAGE */
  .image-box{
    width:420px;
    height:300px;
  }

  /* OPTIONS */
  .options{
    gap:40px;
  }

  .option{
    width:240px;
    height:170px;
    font-size:28px;
  }

  .option span{
    font-size:25px;
  }

  /* NAV BUTTONS */
  .nav-buttons button{
    font-size:22px;
    padding:14px 36px;
  }

}

/* ============================= */
/* Extra Large Screens / 4K (1921px+) */
/* ============================= */
@media screen and (min-width:1921px){

  .quiz-container{
    max-width:1500px;
  }

  /* QUESTION */
  .question{
    font-size:44px;
  }

  /* CONTENT GAP */
  .content{
    gap:100px;
  }

  /* IMAGE */
  .image-box{
    width:500px;
    height:340px;
  }

  /* OPTIONS */
  .options{
    gap:15px;
  }

  .option{
    width:280px;
    height:200px;
    font-size:34px;
  }

  .option span{
    font-size:40px;
  }

  /* NAV BUTTONS */
  .nav-buttons button{
    font-size:26px;
    padding:16px 42px;
  }

}

</style>
</head>

<body>

<div class="quiz-container">

<div class="question" id="question"></div>

<div class="question-img">
<img id="qImage">
</div>

<div class="options">

<button class="option" onclick="selectOption(0)">
<img class="opt-img">
<span class="opt-text"></span>
</button>

<button class="option" onclick="selectOption(1)">
<img class="opt-img">
<span class="opt-text"></span>
</button>

<button class="option" onclick="selectOption(2)">
<img class="opt-img">
<span class="opt-text"></span>
</button>

<button class="option" onclick="selectOption(3)">
<img class="opt-img">
<span class="opt-text"></span>
</button>

</div>

<div class="nav-buttons">
<button class="prev" onclick="prevQuestion()">← Prev</button>
<button class="next" onclick="nextQuestion()">Next →</button>
</div>

</div>

<!-- RESULT POPUP -->

<div id="popup" class="popup">
  <div class="popup-content">
      <h2 id="popupText"></h2>
      <div id="stars"></div>
  </div>
</div>

<!-- FINAL SCORE POPUP -->

<div id="scorePopup" class="popup">
  <div class="popup-content">
      <h2>🎉 Quiz Finished!</h2>
      <p id="finalScore"></p>
      <button onclick="restartQuiz()">Play Again</button>
  </div>
</div>

<script>

let questions = [

{
q:"Animals that spend most of their time in air are called ______.",
qImg:"../images/aerial.png",
options:["Terrestrial","Aerial","Arboreal","Aquatic"],
imgOptions:[
"../images/lion-img.png",
"../images/sparrow.png",
"../images/monkey.png",
"../images/aquatic.png"
],
correct:1
},

{
q:"A butterfly ______ nectar.",
qImg:"../images/butterfly.png",
options:["Swallows","Chews","Sucks","Drinks"],
imgOptions:[
"../images/swallows.png",
"../images/chew.png",
"../images/sucks.png",
"../images/drink.png"
],
correct:2
},

{
q:"A ______ does not kill other animals for food.",
qImg:"../images/mcq3.png",
options:["Tiger","Bear","Fox","Zebra"],
imgOptions:[
"../images/tiger.png",
"../images/bear.png",
"../images/fox.png",
"../images/zebra.png"
],
correct:3
},

{
q:"A monkey is an ______ animal.",
qImg:"../images/monkey_img.png",
options:["Aerial","Arboreal","Terrestrial","Aquatic"],
imgOptions:[
"../images/aerial.png",
"../images/monkey.png",
"../images/lion-img.png",
"../images/aquatic.png"
],
correct:1
},

{
q:"______ have the ability to sharpen their teeth.",
qImg:"../images/mcq5.png",
options:["Snakes","Rats","Cows","Cats"],
imgOptions:[
"../images/swallows.png",
"../images/rat.png",
"../images/chew.png",
"../images/cat.png"
],
correct:1
}

];

let current = 0;
let score = 0;
let answered = false;
let userAnswers = new Array(questions.length).fill(null);

function loadQuestion(){

answered = userAnswers[current] === questions[current].correct;

document.getElementById("question").innerText =
"Q"+(current+1)+". "+questions[current].q;

/* ADD THIS LINE */
document.getElementById("qImage").src =
questions[current].qImg;

let options=document.querySelectorAll(".option");

options.forEach((btn,i)=>{

btn.querySelector(".opt-text").innerText =
questions[current].options[i];

btn.querySelector(".opt-img").src =
questions[current].imgOptions[i];

btn.style.background="";
btn.classList.remove("selected");

if(userAnswers[current]!==null){

if(i===questions[current].correct){
btn.style.background="#7be495";
}

if(i===userAnswers[current] && i!==questions[current].correct){
btn.style.background="#ff8a8a";
}

if(i===userAnswers[current]){
btn.classList.add("selected");
}

}

});

}

function speak(text){

let speech = new SpeechSynthesisUtterance(text);

speech.lang = "en-GB";
speech.volume = 0.25;
speech.rate = 1;
speech.pitch = 1;

window.speechSynthesis.speak(speech);

}

function selectOption(i){

if(answered) return;

let options=document.querySelectorAll(".option");

userAnswers[current] = i;

options.forEach(btn=>btn.classList.remove("selected"));
options[i].classList.add("selected");

if(i===questions[current].correct){

answered = true;

options[i].style.background="#7be495";

score++;

speak("Correct");

showPopup("✅ Correct!", current+1);

confetti({
particleCount:60,
spread:80,
origin:{y:0.6}
});

if(current === questions.length-1){
setTimeout(()=>{showFinalScore();},1200);
}

}else{

options[i].style.background="#ff8a8a";

speak("Wrong");

showPopup("❌ Wrong!",0);

}

setTimeout(()=>{
document.getElementById("popup").style.display="none";
},1200);

}

function showPopup(text,starCount){

document.getElementById("popupText").innerText=text;

let stars="";

for(let i=0;i<starCount;i++){
stars+="⭐";
}

document.getElementById("stars").innerText=stars;

document.getElementById("popup").style.display="flex";

}

function nextQuestion(){

confetti.reset();   // ⭐ stop previous confetti

if(userAnswers[current] !== questions[current].correct){
return;
}

if(current < questions.length-1){

current++;
loadQuestion();

}else{

showFinalScore();

}

}
function prevQuestion(){

if(current>0){
current--;
loadQuestion();
}

}
let finalConfettiInterval;

function fireFinalConfetti(){

  const duration = 2500;
  const animationEnd = Date.now() + duration;

  finalConfettiInterval = setInterval(function () {

    if (Date.now() > animationEnd) {
      clearInterval(finalConfettiInterval);
      return;
    }

    confetti({
      particleCount: 30,
      spread: 70,
      startVelocity: 35,
      scalar: 1.1,
      origin: { x: Math.random(), y: Math.random() - 0.2 }
    });

  }, 250);

}
function showFinalScore(){
fireFinalConfetti();   

document.getElementById("finalScore").innerText =
"Your Score: "+score+" / "+questions.length;

document.getElementById("scorePopup").style.display="flex";

}
function restartQuiz(){

score = 0;
current = 0;

clearInterval(finalConfettiInterval); 
confetti.reset();                     // ⭐ stop all confetti

document.getElementById("scorePopup").style.display="none";

userAnswers = new Array(questions.length).fill(null);

loadQuestion();

}
loadQuestion();

</script>

</body>
</html>
