<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grade3_Lesson3</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Baloo 2',cursive;
}

body{
height:100vh;
background:linear-gradient(to bottom,#cfefff,#fff6cc);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* TOP BAR */

.header{
display:flex;
align-items:center;
justify-content:center;
position:relative;
margin-top:15px;
}

.menu-btn{
position:absolute;

top:calc(10px + env(safe-area-inset-top));
left:15px;

font-size:26px;
background:white;
border:none;
border-radius:10px;
padding:6px 10px;
cursor:pointer;

display:none;

box-shadow:0 3px 10px rgba(0,0,0,0.15);
}
/* NAV */

.top-nav{
margin:10px auto;
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

/* PLAYFUL BUTTON */

.quiz-btn{
position:relative;
border:none;
padding:12px 24px;
border-radius:30px;
font-size:19px;
font-weight:700;
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
color:#444;
transition:.25s;

box-shadow:
0 4px 0 rgba(0,0,0,0.15),
0 10px 20px rgba(0,0,0,0.08);
}

/* DOT */

.quiz-btn::before{
content:"";
position:absolute;
width:12px;
height:12px;
border-radius:50%;
top:-6px;
right:-6px;
background:white;
box-shadow:0 0 0 4px rgba(255,255,255,0.5);
}

/* ICON */

.quiz-btn .icon{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:white;
font-size:18px;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
}

/* COLORS */

.mcq{
background:linear-gradient(135deg,#5fd2ff,#b7f1ff);
border:3px solid #48bfff;
}

.tf{
background:linear-gradient(135deg,#7df3a1,#d6ffd9);
border:3px solid #56d37d;
}

.match{
background:linear-gradient(135deg,#ff94ae,#ffd2db);
border:3px solid #ff6f94;
}

/* HOVER */

.quiz-btn:hover{
transform:translateY(-3px) scale(1.04);
box-shadow:
0 6px 0 rgba(0,0,0,0.18),
0 14px 24px rgba(0,0,0,0.12);
}

/* ACTIVE */

.quiz-btn.active{
outline:4px solid #ffffff;
transform:scale(1.05);
}

/* MAIN AREA */

.main{
flex:1;
width:100%;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* OFFCANVAS */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100%;
background:white;
padding:20px;
box-shadow:5px 0 20px rgba(0,0,0,0.15);
transition:.3s;
z-index:1000;

display:flex;
flex-direction:column;
gap:20px;
}

.sidebar.show{
left:0;
}

/* OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
display:none;
z-index:999;
}

.overlay.show{
display:block;
}

/* MOBILE */
/* HIDE SIDEBAR ON DESKTOP */

@media (min-width:769px){

.sidebar{
display:none;
}

.overlay{
display:none !important;
}

}

@media(max-width:768px){
.main{
margin-top:60px;
}
.menu-btn{
display:block;
}

.top-nav{
display:none;
}

.quiz-btn{
font-size:16px;
padding:10px 16px;
}

}
@media(max-width:768px){

  .sidebar{
    left:auto !important;
    right:-260px !important;
  }

  .sidebar.show{
    left:auto !important;
    right:0 !important;
  }

  .menu-btn{
    left:auto !important;
    right:15px;
  }

}
</style>
</head>

<body>

<div class="header">
<button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>

<!-- OFFCANVAS SIDEBAR -->

<div class="sidebar" id="sidebar">

<button class="quiz-btn mcq active" data-file="./exercise/mcq.html">
<span class="icon">🧠</span>
Choose Answer
</button>

<button class="quiz-btn tf" data-file="./exercise/truefalse.html">
<span class="icon">🤔</span>
True / False
</button>

<button class="quiz-btn match" data-file="./exercise/matching.html">
<span class="icon">🧩</span>
Picture Match
</button>

</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- DESKTOP NAV -->

<div class="top-nav">

<button class="quiz-btn mcq active" data-file="./exercise/mcq.html">
<span class="icon">🧠</span>
Choose Answer
</button>

<button class="quiz-btn tf" data-file="./exercise/truefalse.html">
<span class="icon">🤔</span>
True / False
</button>

<button class="quiz-btn match" data-file="./exercise/matching.html">
<span class="icon">🧩</span>
Picture Match
</button>

</div>

<div class="main">
<iframe id="quizFrame" src="./exercise/mcq.html"></iframe>
</div>

<script>

const buttons=document.querySelectorAll(".quiz-btn")
const frame=document.getElementById("quizFrame")

buttons.forEach(btn=>{

btn.addEventListener("click",()=>{

buttons.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

const file=btn.dataset.file

if(file){
frame.src=file
}

toggleMenu()

})

})

function toggleMenu(){

if(window.innerWidth <= 768){

document.getElementById("sidebar").classList.toggle("show")
document.getElementById("overlay").classList.toggle("show")

}

}

</script>

</body>
</html>
