<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>True False Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
font-family:'Livvic',sans-serif;
background:linear-gradient(135deg,#d7ecff,#cde7ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.quiz-box{
width:900px;
text-align:center;
}
.question{
font-size:30px;
color:#2f4f4f;

height:80px;              /* fixed height for all questions */
display:flex;
align-items:center;
justify-content:center;
text-align:center;

margin-bottom:20px;
padding:0 20px;
}
.question-img img{
width:220px;
height:130px;          /* fixed height */
object-fit:contain;    /* keeps full image visible */
margin-bottom:35px;
}
/* SIDE BY SIDE BUTTONS */

.options{
display:flex;
justify-content:center;
gap:40px;
}

/* WATER BUTTON */

.water-btn{

width:300px;
height:90px;

border-radius:50px;

display:flex;
align-items:center;
justify-content:center;

font-size:26px;
font-weight:600;

cursor:pointer;

border:3px solid rgba(255,255,255,0.9);

color:white;

box-shadow:
0 10px 25px rgba(0,0,0,0.2),
inset 0 6px 10px rgba(255,255,255,0.35),
inset 0 -8px 12px rgba(0,0,0,0.15);

transition:0.3s;

position:relative;
overflow:hidden;
}

/* water shine */

.water-btn::before{

content:"";

position:absolute;

top:-50%;
left:-40%;

width:180%;
height:200%;

background:linear-gradient(
120deg,
transparent 30%,
rgba(255,255,255,0.45),
transparent 70%
);

transform:rotate(25deg);

transition:0.6s;

}

.water-btn:hover::before{
left:100%;
}

.water-btn:hover{
transform:translateY(-6px) scale(1.03);
}

/* TRUE */

.true-btn{
background:linear-gradient(180deg,#8ec5ff,#4a9df5);
}

/* FALSE */

.false-btn{
background:linear-gradient(180deg,#ff9a9a,#ff5252);
}

.icon{
margin-right:10px;
font-size:28px;
}

/* NAV */

.nav{
margin-top:40px;
display:flex;
justify-content:center;
gap:40px;
}

button{
border:none;
padding:14px 35px;
font-size:18px;
border-radius:40px;
cursor:pointer;
color:white;
}

.prev{
background:#ccc;
color:#333;
}

.prev:enabled{
background:linear-gradient(45deg,#5c6bc0,#7986cb);
color:white;
}

.next{
background:linear-gradient(45deg,#7f5ae0,#b388ff);
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

/* POPUP */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);

background:white;
padding:25px;
border-radius:25px;

font-size:26px;
min-width:260px;

box-shadow:0 20px 40px rgba(0,0,0,0.2);

text-align:center;

transition:.3s;
}

.popup.show{
transform:translate(-50%,-50%) scale(1);
}

.popup-stars{
font-size:26px;
color:#f7b500;
margin-top:10px;
}

/* RESULT */


.result-box{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:#fff;
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
z-index:1000;
transition:.4s;
}

.result-box.show{
transform:translate(-50%,-50%) scale(1);
}

.result-box h2{
font-size:34px;
margin-bottom:10px;
}

.result-box p{
font-size:24px;
margin-bottom:20px;
}

.play-btn{
background:#4caf50;
border:none;
padding:12px 30px;
font-size:18px;
border-radius:30px;
color:white;
cursor:pointer;
}
/* ================= TABLET ================= */

@media (max-width:900px){

.quiz-box{
width:100%;
}

.question{
font-size:26px;
height:auto;
}

.options{
gap:20px;
}

.water-btn{
width:200px;
height:70px;
font-size:22px;
}

.question-img img{
width:170px;
height:100px;
}

}

/* ================= MOBILE ================= */

@media (max-width:600px){

body{
height:auto;
padding:20px 10px;
align-items:flex-start;
}

.quiz-box{
width:100%;
}
.question{
font-size:20px;

/* ✅ FIXED SIZE */
height:70px;              /* same height for all questions */
max-width:100%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

padding:0 10px;
line-height:1.3;
overflow:hidden;          /* prevents overflow */
}
.question-img{
height:120px;               /* fixed container height */
display:flex;
justify-content:center;
align-items:center;
}

.question-img img{
width:180px;                /* fixed width */
height:120px;               /* fixed height */
object-fit:contain;         /* keeps image ratio */
margin-bottom:0;
}

/* stack buttons */

.options{
flex-direction:column;
align-items:center;
gap:20px;
}

.water-btn{
width:200px;
height:65px;
font-size:20px;
}

.icon{
font-size:22px;
}

/* nav buttons */

.nav{
gap:20px;
margin-top:80px;
}

button{
padding:10px 22px;
font-size:16px;
}
/* POPUP */
  .popup{
    font-size:20px;
    min-width:220px;
    padding:15px;
  }

  .popup-stars{
    font-size:20px;
  }

  /* RESULT BOX */
  .result-box{
    width:90%;
    padding:25px;
  }

  .result-box h2{
    font-size:22px;
  }

  .result-box p{
    font-size:18px;
  }
  .question-img{
height:120px;               /* fixed container height */
display:flex;
justify-content:center;
align-items:center;
}

.question-img img{
width:180px;                /* fixed width */
height:120px;               /* fixed height */
object-fit:contain;         /* keeps image ratio */
margin-bottom:0;
}
}

/* ================= SMALL MOBILE ================= */

@media (max-width:400px){
.question{
font-size:20px;

/* ✅ FIXED SIZE */
height:70px;              /* same height for all questions */
max-width:100%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

padding:0 10px;
line-height:1.3;
overflow:hidden;          /* prevents overflow */
}
.water-btn{
width:170px;
height:60px;
font-size:18px;
}

.question-img img{
width:130px;
height:95px;
}

button{
font-size:15px;
padding:8px 18px;
}
/* POPUP */
  .popup{
    font-size:20px;
    min-width:220px;
    padding:15px;
  }

  .popup-stars{
    font-size:20px;
  }

  /* RESULT BOX */
  .result-box{
    width:90%;
    padding:25px;
  }

  .result-box h2{
    font-size:22px;
  }

  .result-box p{
    font-size:18px;
  }
}
</style>
</head>

<body>

<div class="quiz-box">

<div class="question" id="question"></div>

<div class="question-img">
<img id="qImage">
</div>

<div class="options">

<div class="water-btn true-btn" onclick="selectAnswer(true)">
<span class="icon">✔</span> True
</div>

<div class="water-btn false-btn" onclick="selectAnswer(false)">
<span class="icon">✖</span> False
</div>

</div>

<div class="nav">
<button class="prev" id="prevBtn" onclick="prevQ()" disabled>← Prev</button>
<button class="next" id="nextBtn" onclick="nextQ()" disabled>Next →</button>
</div>

</div>

<div class="popup" id="popup"></div>

<div class="result-box" id="resultBox">
<h2>🎉 Quiz Completed!</h2>
<p id="scoreText"></p>
<button class="play-btn" onclick="location.reload()">Play Again</button>
</div>
<script>

const quiz=[

{
q:"Q1. The intermolecular spaces are same in all the three states of matter.",
img:"../images/tf1.png",
a:false
},

{
q:"Q2. Water vapour is the liquid state of water.",
img:"../images/tf2.png",
a:false
},

{
q:"Q3. Mass is measured in kilograms.",
img:"../images/tf3.png",
a:true
},

{
q:"Q4. Liquids can flow from a lower level to a higher level.",
img:"../images/tf4.png",
a:false
},

{
q:"Q5. Gases have a definite mass.",
img:"../images/tf5.png",
a:true
}

]

let current=0
let score=0
let answered=false
let userAnswers = new Array(quiz.length).fill(null)


/* SPEECH */

function speakText(text){

if(!('speechSynthesis' in window)) return

window.speechSynthesis.cancel()

const utter = new SpeechSynthesisUtterance(text)

utter.lang="en-GB"
utter.volume=0.25
utter.rate=1
utter.pitch=1

const voices=speechSynthesis.getVoices()
const ukVoice=voices.find(v=>v.lang==="en-GB")

if(ukVoice){
utter.voice=ukVoice
}

speechSynthesis.speak(utter)

}


/* CONFETTI */

function correctConfetti(){

confetti({
particleCount:35,
spread:70,
origin:{y:0.6},
scalar:0.7
})

}

function finalConfetti(){

const duration=2000
const end=Date.now()+duration

const interval=setInterval(()=>{

if(Date.now()>end){
clearInterval(interval)
return
}

confetti({
particleCount:50,
spread:120,
startVelocity:40,
scalar:1,
origin:{x:Math.random(),y:Math.random()-0.2}
})

},250)

}


/* POPUP */

function showPopup(text,type){

const popup=document.getElementById("popup")

popup.innerHTML=text

const oldStars = popup.querySelector(".popup-stars")
if(oldStars) oldStars.remove()

if(type==="correct"){

const stars=document.createElement("div")
stars.className="popup-stars"

stars.innerText="⭐".repeat(score)

popup.appendChild(stars)

popup.style.color="#2e7d32"

}

if(type==="wrong"){
popup.style.color="#c62828"
}

popup.classList.add("show")

setTimeout(()=>{
popup.classList.remove("show")
},1200)

}


/* ANSWER */

function selectAnswer(user){

if(answered) return

if(user===quiz[current].a){

answered=true
score++
userAnswers[current] = user

correctConfetti()

showPopup("🎉 Correct! Great Job!","correct")

speakText("Correct")

document.getElementById("nextBtn").disabled=false
const trueBtn = document.querySelector(".true-btn")
const falseBtn = document.querySelector(".false-btn")

if(user===true){
trueBtn.style.boxShadow="0 0 20px #4caf50"
}else{
falseBtn.style.boxShadow="0 0 20px #4caf50"
}

/* AUTO RESULT ON LAST QUESTION */
if(current===quiz.length-1){

document.getElementById("nextBtn").disabled = true;

setTimeout(()=>{
showResult()
},1200)

}

}else{

showPopup("❌ Oops! Try Again","wrong")

speakText("Wrong")

}

}

function loadQuestion(){

answered = userAnswers[current] !== null

document.getElementById("question").innerText = quiz[current].q
document.getElementById("qImage").src = quiz[current].img

document.getElementById("prevBtn").disabled = current === 0
document.getElementById("nextBtn").disabled = !answered

const trueBtn = document.querySelector(".true-btn")
const falseBtn = document.querySelector(".false-btn")

trueBtn.style.boxShadow=""
falseBtn.style.boxShadow=""

if(userAnswers[current] !== null){

if(userAnswers[current] === true){
trueBtn.style.boxShadow="0 0 20px #4caf50"
}

if(userAnswers[current] === false){
falseBtn.style.boxShadow="0 0 20px #4caf50"
}

}

}


/* NAVIGATION */

function nextQ(){

if(!answered) return

if(current<quiz.length-1){
current++
loadQuestion()
}else{
showResult()
}

}

function prevQ(){

if(current>0){
current--
loadQuestion()
}

}


/* RESULT */

function showResult(){

finalConfetti()

document.getElementById("resultBox").classList.add("show")

document.getElementById("scoreText").innerText=
"Your Score: "+score+" / "+quiz.length

}


loadQuestion()

</script>

</body>
</html>
