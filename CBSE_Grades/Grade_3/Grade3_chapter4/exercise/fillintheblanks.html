<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fill in the Blanks Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Livvic';
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#d7ecff,#cde7ff);
overflow: hidden;
}

/* MAIN CONTAINER */

.quiz-container{
width:1000px;
max-width:100%;
height:520px;
border-radius:40px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
padding:40px;
}

/* QUESTION */

.question-card{
font-size:30px;
color:#2f4f4f;
text-align:center;
line-height:1.4;
}

/* CONTENT AREA */

.content-area{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
flex:1;
justify-content:center;
}
.image-wrapper{
width:320px;
height:200px;
display:flex;
justify-content:center;
align-items:center;

background:#fafafa;

border-radius:30px;

border:3px solid #6c8ea4;   /* visible border */

box-shadow:0 10px 25px rgba(0,0,0,0.15);

padding:20px;
}
/* image */

.image-wrapper img{
max-width:100%;
max-height:100%;
object-fit:contain;
}


/* ANSWER */

.answer-input{
width:320px;
padding:16px;
border-radius:40px;
border:none;
background:#c6d6e1;
font-size:20px;
text-align:center;
outline:none;
}

/* RESULT */

.result{
font-size:20px;
font-weight:600;
height:30px;
}

/* BUTTONS */

.buttons{
display:flex;
gap:25px;
}

button{
padding:12px 30px;
border-radius:30px;
border:none;
font-size:18px;
cursor:pointer;
}

.prev{
background:#ddd;
border:2px solid #333;
}

.check{
background:#9bd3b3;
}

.next{
background:linear-gradient(45deg,#7f5ae0,#b388ff);
color:white;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.prev:enabled{
background:linear-gradient(45deg,#5c6bc0,#7986cb);
color:white;
}

/* MOBILE */

@media(max-width:700px){

.quiz-container{
height:auto;
padding:25px;
}

.question-card{
font-size:22px;
}

.image-wrapper{
width:200px;
height:200px;
}

.answer-input{
width:250px;
}

}
/* popup */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
padding:20px 25px;
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
font-size:30px;
font-weight:600;
min-width:280px;
text-align:center;
transition:.3s;
z-index:999;
}

.popup.show{
transform:translate(-50%,-50%) scale(1);
}

.popup-stars{
margin-top:10px;
font-size:28px;
color:#f7b500;
letter-spacing:5px;
}


.result-box{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:#fff;
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
z-index:1000;
transition:.4s;
}

.result-box.show{
transform:translate(-50%,-50%) scale(1);
}

.result-box h2{
font-size:34px;
margin-bottom:10px;
}

.result-box p{
font-size:24px;
margin-bottom:20px;
}

.play-btn{
background:#4caf50;
border:none;
padding:12px 30px;
font-size:18px;
border-radius:30px;
color:white;
cursor:pointer;
}
.image-wrapper{
background:#eef2f5;
border:3px dashed #b6c6d2;
}
.check:disabled{
background:#cfd8dc;
color:#666;
cursor:not-allowed;
}
/* ========================= */
/* TABLET */
/* ========================= */

@media(max-width:700px){

.quiz-container{
height:auto;
padding:25px;
}

.question-card{
font-size:22px;
}

.image-wrapper{
width:220px;
height:180px;
}

.answer-input{
width:250px;
font-size:18px;
}

}


@media(max-width:480px){

body{
height:auto;
overflow:auto;
padding:10px;
align-items:flex-start;
}

/* container */

.quiz-container{
width:100%;
height:auto;
padding:20px;
gap:15px;
}

/* question */

.question-card{
font-size:20px;
line-height:1.4;
}

/* image */

.image-wrapper{
width:160px;
height:130px;
padding:10px;
}

/* input */

.answer-input{
width:200px;
font-size:16px;
padding:10px;
}

/* buttons */

.buttons{
flex-direction:column;
gap:12px;
}

button{
width:170px;
font-size:15px;
padding:10px;
}

}
/* MOBILE FIX */
/* ============================= */
/* ✅ TABLET / SMALL DESKTOP (≤900px) */
/* ============================= */
@media(max-width:900px){

  body{
    height:100vh;
    overflow:hidden;          /* ❗ no scroll */
    padding:10px;
    align-items:center;
  }

  .quiz-container{
    height:100%;
    padding:15px;
    gap:10px;
    justify-content:space-between;
  }

  /* QUESTION */
  .question-card{
    font-size:26px;
    line-height:1.3;
  }

  /* IMAGE */
  .image-wrapper{
    width:220px;
    height:150px;
    padding:10px;
  }

  .image-wrapper img{
    max-width:100%;
    max-height:100%;
  }

  /* INPUT */
  .answer-input{
    width:220px;
    font-size:16px;
    padding:15px;
    margin-top: 30px;
  }

  /* CONTENT SPACING */
  .content-area{
    gap:12px;
  }

  /* BUTTONS - SAME LINE */
  .buttons{
    flex-direction:row;
    justify-content:center;
    gap:12px;
    margin-top:0;   /* ❗ remove negative margin */
  }

  button{
    width:auto;
    min-width:90px;
    font-size:14px;
    padding:8px 16px;
  }

}

.blur-img{
filter: blur(5px);
transition: filter 0.5s ease;
}

@media(max-width:600px){

  body{
    height:auto;
    overflow:auto;
    align-items:flex-start;
    padding:10px;
  }

  /* CONTAINER */
  .quiz-container{
    width:100%;
    height:100vh;                  /* 🔥 full screen */
    padding:15px;
    gap:10px;

    display:flex;
    flex-direction:column;
    justify-content:space-between; /* 🔥 keep layout stable */
  }

  /* QUESTION (FIXED HEIGHT) */
  .question-card{
    font-size:18px;
    line-height:1.3;
    min-height:60px;               /* 🔒 prevents jumping */
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
  }

  /* CONTENT AREA */
  .content-area{
    flex:1;
    gap:12px;
    justify-content:center;
  }

  /* IMAGE (FIXED SPACE) */
  .image-wrapper{
    width:160px;
    height:120px;
    padding:10px;
  }

  .image-wrapper img{
    max-width:100%;
    max-height:100%;
  }

  /* INPUT */
  .answer-input{
    width:220px;
    font-size:16px;
    padding:13px;
    margin-top: 70px;
  }

  /* RESULT TEXT */
  .result{
    font-size:14px;
    height:20px;
  }

  /* BUTTONS (INLINE, STATIC POSITION) */
  .buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;   /* 👈 moves buttons slightly UP */
  }

  button{
    min-width:80px;
    font-size:14px;
    padding:8px 12px;
  }

  /* POPUP */
  .popup{
    font-size:20px;
    min-width:220px;
    padding:15px;
  }

  .popup-stars{
    font-size:20px;
  }

  /* RESULT BOX */
  .result-box{
    width:90%;
    padding:25px;
  }

  .result-box h2{
    font-size:22px;
  }

  .result-box p{
    font-size:18px;
  }

}
</style>
</head>

<body>

<div class="quiz-container">

<!-- QUESTION -->
<div class="question-card" id="question"></div>

<!-- IMAGE + ANSWER -->
<div class="content-area">

<div class="image-wrapper">
<img id="qImage">
</div>

<input id="answer" class="answer-input" placeholder="Type your answer...">

<div class="result" id="result"></div>

</div>

<!-- BUTTONS -->
<div class="buttons">

<button class="prev" id="prevBtn" onclick="prevQ()" disabled>← Prev</button>

<button class="check" id="checkBtn" onclick="checkAnswer()" disabled>Check</button>

<button class="next" id="nextBtn" onclick="nextQ()" disabled>Next →</button>

</div>

</div>
<div class="popup" id="popup"></div>

<div class="result-box" id="resultBox">
<h2>🎉 Quiz Completed!</h2>
<p id="scoreText"></p>
<button class="play-btn" onclick="location.reload()">Play Again</button>
</div>
<script>
const quiz=[

{
q:"Q1. ______ is the hot gas that is produced when water boils.",
a:"steam",
img:"../images/ftb1.png"
},

{
q:"Q2. The molecules are made up of tiny particles called ______.",
a:"atoms",
img:"../images/ftb2.png"
},

{
q:"Q3. Anything that occupies space and has mass is called ______.",
a:"matter",
img:"../images/matter.png"
},

{
q:"Q4. The amount of substance present in an object is called its ______.",
a:"mass",
img:"../images/mass.png"
},

{
q:"Q5. The empty spaces between the molecules are called ______.",
a:"spaces",
img:"../images/space_img.png"
}

]

let current=0
let score=0
let userAnswers=new Array(quiz.length).fill("")

/* TEXT SPEECH */

function speakText(text){

if(!('speechSynthesis' in window)) return

window.speechSynthesis.cancel()

const utter=new SpeechSynthesisUtterance(text)

utter.lang="en-GB"
utter.volume=0.25
utter.rate=1
utter.pitch=1

speechSynthesis.speak(utter)

}

/* CONFETTI */

function correctConfetti(){

confetti({
particleCount:35,
spread:70,
origin:{y:0.6},
scalar:0.7
})

}

function finalConfetti(){

const duration=2000
const end=Date.now()+duration

const interval=setInterval(()=>{

if(Date.now()>end){
clearInterval(interval)
return
}

confetti({
particleCount:50,
spread:120,
startVelocity:40,
origin:{x:Math.random(),y:Math.random()-0.2}
})

},250)

}

/* POPUP */

function showPopup(text,type){

const popup=document.getElementById("popup")

popup.innerHTML=text

const oldStars=popup.querySelector(".popup-stars")
if(oldStars) oldStars.remove()

if(type==="correct"){

const stars=document.createElement("div")
stars.className="popup-stars"
stars.innerText="⭐".repeat(score)

popup.appendChild(stars)
popup.style.color="#2e7d32"

}

if(type==="wrong"){
popup.style.color="#c62828"
}

popup.classList.add("show")

setTimeout(()=>{
popup.classList.remove("show")
},1200)

}

function loadQ(){

document.getElementById("question").innerText = quiz[current].q

const imgBox = document.getElementById("qImage")
const answerBox = document.getElementById("answer")

answerBox.value = userAnswers[current]
document.getElementById("checkBtn").disabled = true
document.getElementById("prevBtn").disabled = current === 0

// if already answered → show image again
if(userAnswers[current] !== ""){
    imgBox.src = quiz[current].img
    answerBox.disabled = true
    document.getElementById("checkBtn").disabled = true
    document.getElementById("nextBtn").disabled = false
}else{
   imgBox.src = quiz[current].img
imgBox.classList.add("blur-img")
    answerBox.disabled = false
    document.getElementById("nextBtn").disabled = true
}

}
const answerInput = document.getElementById("answer")
const checkBtn = document.getElementById("checkBtn")

answerInput.addEventListener("input", function(){

if(answerInput.value.trim() !== ""){
checkBtn.disabled = false
}else{
checkBtn.disabled = true
}

})
/* CHECK ANSWER */

function checkAnswer(){

let answerBox = document.getElementById("answer")

let user = answerBox.value.toLowerCase().trim()
let correct = quiz[current].a

if(user === correct){

userAnswers[current] = user
document.getElementById("qImage").src = quiz[current].img
document.getElementById("qImage").classList.remove("blur-img")   // ⭐ add here
score++

correctConfetti()

showPopup("🎉 Correct! Great Job!","correct")

speakText("Correct")

document.getElementById("nextBtn").disabled = false

answerBox.disabled = true   // lock answer

// show result if last question
if(current === quiz.length-1){

setTimeout(()=>{
showResult()
},1200)

}

}else{

showPopup("❌ Oops! Try Again","wrong")

speakText("Wrong")

answerBox.value = ""   // ❗ clear wrong answer automatically

}

}
function nextQ(){

if(current<quiz.length-1){

current++
loadQ()

}

}

/* PREV */

function prevQ(){

if(current>0){

current--
loadQ()

}

}

/* FINAL RESULT */

function showResult(){

finalConfetti()

document.getElementById("resultBox").classList.add("show")

document.getElementById("scoreText").innerText=
"Your Score: "+score+" / "+quiz.length

}

loadQ()
</script>

</body>
</html>
