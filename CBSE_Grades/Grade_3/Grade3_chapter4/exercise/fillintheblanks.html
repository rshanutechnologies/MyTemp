<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fill in the Blanks Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
/* ============================= */
/* BASE */
/* ============================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Livvic';
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#d7ecff,#cde7ff);
overflow:hidden;
padding:clamp(10px,2vw,25px);
margin-top: -10px;
}

/* ============================= */
/* CONTAINER */
/* ============================= */
.quiz-container{
width:min(100%,1000px);
 min-height:clamp(460px,75vh,520px);  /* ✅ allow expansion */

border-radius:40px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;

padding:clamp(20px,3vw,40px);
padding-bottom: clamp(20px,4vh,40px);  /* ✅ breathing space */
}

/* ============================= */
/* QUESTION */
/* ============================= */
.question-card{
font-size:clamp(20px,2.5vw + 1.2vh,36px);
color:#2f4f4f;
text-align:center;
line-height:1.4;
}

/* ============================= */
/* CONTENT AREA */
/* ============================= */
.content-area{
display:flex;
flex-direction:column;
align-items:center;
gap:clamp(10px,2vh,20px);
flex:1;
justify-content:center;
}

/* ============================= */
/* IMAGE */
/* ============================= */
.image-wrapper{
width:clamp(260px, 40vw, 450px);   /* bigger width */
  height:clamp(180px, 28vh, 300px);  /* bigger height */

display:flex;
justify-content:center;
align-items:center;

background:#eef2f5;
border-radius:30px;

border:3px dashed #b6c6d2;
box-shadow:0 10px 25px rgba(0,0,0,0.15);

padding:clamp(10px,2vw,20px);
}

.image-wrapper img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* ============================= */
/* INPUT */
/* ============================= */
.answer-input{
width:clamp(200px,28vw,300px);
padding:clamp(12px,1.5vh,16px);

border-radius:40px;
border:none;
background:#c6d6e1;

font-size: clamp(18px,1.8vw,24px);
text-align:center;
outline:none;
margin-top: 10px;
}

/* ============================= */
/* RESULT */
/* ============================= */
.result{
font-size:clamp(16px,1.5vw,20px);
font-weight:600;
height:30px;
}
.buttons{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:clamp(10px,2vw,20px);
  flex-wrap:wrap;   /* ✅ prevents overlap */
  margin-bottom: 40px;
}

/* BUTTON */
button{
  padding:clamp(12px,2vh,18px) clamp(28px,4vw,50px);
  font-size:clamp(16px,1.3vw + 0.6vh,22px);

  min-width:clamp(90px,12vw,130px);   /* ✅ equal width */
  text-align:center;

  border-radius:30px;
  border:none;
  cursor:pointer;
}

.prev{
background:#ddd;

}

.check{
background:#9bd3b3;
}

.next{
background:linear-gradient(45deg,#7f5ae0,#b388ff);
color:white;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.prev:enabled{
background:linear-gradient(45deg,#5c6bc0,#7986cb);
color:white;
}

/* ============================= */
/* POPUP */
/* ============================= */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);

background:white;
padding:clamp(15px,2vw,25px);
border-radius:25px;

box-shadow:0 20px 40px rgba(0,0,0,0.2);

font-size:clamp(20px,2vw,30px);
font-weight:600;

min-width:clamp(200px,30vw,300px);
min-height:clamp(80px,12vh,100px);

z-index:999;
text-align:center;

transition:.3s;
}

.popup.show{
transform:translate(-50%,-50%) scale(1);
}

.popup-stars{
margin-top:10px;
font-size:clamp(18px,2vw,28px);
color:#f7b500;
}


.result-box{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);

background:#fff;
padding:clamp(25px,3vw,40px);
border-radius:30px;
text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,0.25);
transition:.4s;

width:min(90%,400px);
}

.result-box.show{
transform:translate(-50%,-50%) scale(1);
}

.result-box h2{
font-size:clamp(24px,2vw,34px);
margin-bottom: 10px;
}


.result-box p{
font-size:clamp(18px,1.5vw,24px);
margin-bottom: 20px; 
}

.play-btn{
background:#4caf50;
border:none;

width:clamp(140px,20vw,180px);
height:clamp(40px,6vh,50px);

font-size:clamp(14px,1vw,18px);
border-radius:30px;
color:white;
cursor:pointer;

white-space:nowrap;
margin-top: 10px; 
}
.blur-img{
  filter: blur(8px);
  transition: 0.3s ease;
}
@media (max-width:600px){

  .buttons{
    display:flex;
    flex-direction:column;   /* 🔥 stack vertically */
    align-items:center;
    gap:12px;
    width:100%;
    margin-top: -20px;
  }

  .buttons button{
    width:70%;              /* nice centered size */
    max-width:220px;
    padding:12px 0;
    font-size:14px;
  }

  .image-wrapper{
    width:clamp(180px, 60vw, 260px);  /* smaller */
    height:clamp(120px, 18vh, 160px); /* smaller height */
  }



  .result-box{
    width:85%;
    max-width:280px;
    padding:15px;
    border-radius:20px;
  }

  .result-box h2{
    font-size:20px;
  }

  .result-box p{
    font-size:16px;
  }

  .play-btn{
    width:120px;
    height:38px;
    font-size:14px;
  }
  

}



</style>
</head>

<body>

<div class="quiz-container">

<!-- QUESTION -->
<div class="question-card" id="question"></div>

<!-- IMAGE + ANSWER -->
<div class="content-area">

<div class="image-wrapper">
<img id="qImage">
</div>

<input id="answer" class="answer-input" placeholder="Type your answer...">

<div class="result" id="result"></div>

</div>

<!-- BUTTONS -->
<div class="buttons">

<button class="prev" id="prevBtn" onclick="prevQ()" disabled>← Prev</button>

<button class="check" id="checkBtn" onclick="checkAnswer()" disabled>Check</button>

<button class="next" id="nextBtn" onclick="nextQ()" disabled>Next →</button>

</div>

</div>
<div class="popup" id="popup"></div>

<div class="result-box" id="resultBox">
<h2>🎉 Quiz Completed!</h2>
<p id="scoreText"></p>
<button class="play-btn" onclick="location.reload()">Play Again</button>
</div>
<script>
const quiz=[

{
q:"Q1. ______ is the hot gas that is produced when water boils.",
a:"steam",
img:"../images/ftb1.png"
},

{
q:"Q2. The molecules are made up of tiny particles called ______.",
a:"atoms",
img:"../images/ftb2.png"
},

{
q:"Q3. Anything that occupies space and has mass is called ______.",
a:"matter",
img:"../images/Matter.png"
},

{
q:"Q4. The amount of substance present in an object is called its ______.",
a:"mass",
img:"../images/mass.png"
},

{
q:"Q5. The empty spaces between the molecules are called ______.",
a:"spaces",
img:"../images/space_img.png"
}

]

let current=0
let score=0
let userAnswers=new Array(quiz.length).fill("")

/* TEXT SPEECH */

function speakText(text){

if(!('speechSynthesis' in window)) return

window.speechSynthesis.cancel()

const utter=new SpeechSynthesisUtterance(text)

utter.lang="en-GB"
utter.volume=0.25
utter.rate=1
utter.pitch=1

speechSynthesis.speak(utter)

}

/* CONFETTI */

function correctConfetti(){

confetti({
particleCount:35,
spread:70,
origin:{y:0.6},
scalar:0.7
})

}

function finalConfetti(){

const duration=2000
const end=Date.now()+duration

const interval=setInterval(()=>{

if(Date.now()>end){
clearInterval(interval)
return
}

confetti({
particleCount:50,
spread:120,
startVelocity:40,
origin:{x:Math.random(),y:Math.random()-0.2}
})

},250)

}

/* POPUP */

function showPopup(text,type){

const popup=document.getElementById("popup")

popup.innerHTML=text

const oldStars=popup.querySelector(".popup-stars")
if(oldStars) oldStars.remove()

if(type==="correct"){

const stars=document.createElement("div")
stars.className="popup-stars"
stars.innerText="⭐".repeat(score)

popup.appendChild(stars)
popup.style.color="#2e7d32"

}

if(type==="wrong"){
popup.style.color="#c62828"
}

popup.classList.add("show")

setTimeout(()=>{
popup.classList.remove("show")
},1200)

}

function loadQ(){

  document.getElementById("question").innerText = quiz[current].q

  const imgBox = document.getElementById("qImage")
  const answerBox = document.getElementById("answer")

  answerBox.value = userAnswers[current]
  document.getElementById("checkBtn").disabled = true
  document.getElementById("prevBtn").disabled = current === 0

  imgBox.src = quiz[current].img

  // ✅ IF already answered → show CLEAR image
  if(userAnswers[current] !== ""){
    
    imgBox.classList.remove("blur-img")   // 🔥 remove blur
    answerBox.disabled = true
    document.getElementById("nextBtn").disabled = false

  }else{

    // ✅ ONLY first time → blur
    imgBox.classList.add("blur-img")
    answerBox.disabled = false
    document.getElementById("nextBtn").disabled = true

  }

}
const answerInput = document.getElementById("answer")
const checkBtn = document.getElementById("checkBtn")

answerInput.addEventListener("input", function(){

if(answerInput.value.trim() !== ""){
checkBtn.disabled = false
}else{
checkBtn.disabled = true
}

})
/* CHECK ANSWER */

function checkAnswer(){

let answerBox = document.getElementById("answer")

let user = answerBox.value.toLowerCase().trim()
let correct = quiz[current].a

if(user === correct){

userAnswers[current] = user
document.getElementById("qImage").src = quiz[current].img
document.getElementById("qImage").classList.remove("blur-img")   // ⭐ add here
score++

correctConfetti()

showPopup("🎉 Correct! Great Job!","correct")

speakText("Correct")

document.getElementById("nextBtn").disabled = false

answerBox.disabled = true   // lock answer

// show result if last question
if(current === quiz.length-1){

setTimeout(()=>{
showResult()
},1200)

}

}else{

showPopup("❌ Oops! Try Again","wrong")

speakText("Wrong")

answerBox.value = ""   // ❗ clear wrong answer automatically

}

}
function nextQ(){

if(current<quiz.length-1){

current++
loadQ()

}

}

/* PREV */

function prevQ(){

if(current>0){

current--
loadQ()

}

}

/* FINAL RESULT */

function showResult(){

finalConfetti()

document.getElementById("resultBox").classList.add("show")

document.getElementById("scoreText").innerText=
"Your Score: "+score+" / "+quiz.length

}

loadQ()
</script>

</body>
</html>
