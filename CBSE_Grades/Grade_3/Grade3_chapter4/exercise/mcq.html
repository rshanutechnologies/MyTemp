<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image MCQ Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

/* ============================= */
/* BASE */
/* ============================= */
body{
font-family:'Livvic';
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#d7ecff,#cde7ff);
padding:clamp(10px,2vw,25px);
}

/* ============================= */
/* CONTAINER */
/* ============================= */
.quiz-box{
  width:100%;
  max-width:1400px;

  height:100vh;
  padding:clamp(15px,2vw,25px);

  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  gap:clamp(10px,2vh,18px);

  text-align:center;
  margin:auto;
  margin-top:clamp(-10px,-1vh,-20px);
}

/* ============================= */
/* QUESTION */
/* ============================= */
.question{
font-size:clamp(22px,2.5vw + 1.2vh,36px);
margin-bottom:clamp(15px,2vh,30px);
color:#2f4f4f;
}

/* ============================= */
/* OPTIONS */
/* ============================= */
.options{
display:flex;
gap:clamp(20px,3vw,30px);
justify-content:center;
width:100%;
}

/* OPTION (same shape, just fluid size) */
.option{
  width:clamp(100px,10vw,130px);
  height:clamp(120px,14vh,150px);

  clip-path:polygon(
    25% 6%,
    75% 6%,
    100% 50%,
    75% 94%,
    25% 94%,
    0% 50%
  );

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;

  padding:clamp(10px,1.5vh,15px);
}

/* IMAGE INSIDE OPTION */
.option img{
  width:clamp(55px,6vw,70px);
  height:clamp(50px,6vh,60px);
  object-fit:contain;
}
.option p{
  font-size:clamp(15px, 1.5vw + 0.8vh, 24px);
  font-weight:500;
  color:#2f4f4f;
  text-align:center;
  margin-top:5px;
  min-height:22px;
}

/* STATES */
.correct{
background:linear-gradient(#fff4cc,#ffd966);
box-shadow:0 0 20px rgba(255,200,0,0.6);
border:4px solid #ff9800;
}

.selected{
border:4px solid #4caf50;
}

.nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);

  width:min(90%, 500px);

  display:flex;
  justify-content:space-between;
  gap:15px;

  z-index:1000;
}

button{
border:none;
padding:clamp(12px,2vh,18px) clamp(28px,4vw,50px);
  font-size:clamp(16px,1.3vw + 0.6vh,22px);
border-radius:40px;
cursor:pointer;
color:white;
font-weight:600;
}

.prev{
background:#ddd;
}

.next{
background:linear-gradient(45deg,#7f5ae0,#b388ff);
}

button:disabled{
opacity:0.5;
}

/* ============================= */
/* QUESTION IMAGE (STATIC SIZE) */
/* ============================= */
.question-img{
display:flex;
justify-content:center;
}

.question-img img{
width: clamp(120px, 25vw, 200px);
  height: clamp(70px, 15vw, 120px);
  object-fit: contain;
}

/* ============================= */
/* POPUP */
/* ============================= */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);

background:white;
padding:clamp(15px,2vw,25px);
border-radius:25px;

box-shadow:0 20px 40px rgba(0,0,0,0.2);

font-size:clamp(20px,2vw,30px);
font-weight:600;

min-width:clamp(200px,30vw,300px);
min-height:clamp(80px,12vh,100px);

z-index:999;
text-align:center;

transition:.3s;
}

.popup.show{
transform:translate(-50%,-50%) scale(1);
}

.popup-stars{
margin-top:10px;
font-size:clamp(18px,2vw,28px);
color:#f7b500;
}

/* ============================= */
/* RESULT */
/* ============================= */
.result-box{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);

background:#fff;
padding:clamp(25px,3vw,40px);
border-radius:30px;
text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,0.25);
transition:.4s;

width:min(90%,400px);
}

.result-box.show{
transform:translate(-50%,-50%) scale(1);
}

.result-box h2{
font-size:clamp(24px,2vw,34px);
}

.result-box p{
font-size:clamp(18px,1.5vw,24px);
}

.play-btn{
background:#4caf50;
border:none;

width:clamp(140px,20vw,180px);
height:clamp(40px,6vh,50px);

font-size:clamp(14px,1vw,18px);
border-radius:30px;
color:white;
cursor:pointer;

white-space:nowrap;
}

/* POINTER */
.option,
.option *{
cursor:pointer;
}

.prev{
background:#ccc;
color:#333;
}

.prev:enabled{
background:linear-gradient(45deg,#5c6bc0,#7986cb);
color:white;
}

@media (max-width:768px){

  /* ✅ Question font size fixed for mobile */
  .question{
    font-size:20px;
  }

  /* ✅ Options → 2x2 grid */
  .options{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:clamp(10px,2vw,15px);
    justify-items:center;
  }

  /* ✅ Option size adjust */
  .option{
    width:clamp(90px,40vw,130px);
    height:clamp(100px,16vh,140px);
  }
  
button{
border:none;
padding:clamp(10px,1.5vh,15px) clamp(28px,4vw,50px);
  font-size:clamp(14px,1.3vw + 0.6vh,22px);
border-radius:40px;
cursor:pointer;
color:white;
font-weight:600;
}

}
@media (max-width:600px){

  .result-box{
    width:85%;
    max-width:280px;
    padding:15px;
    border-radius:20px;
  }

  .result-box h2{
    font-size:20px;
  }

  .result-box p{
    font-size:16px;
  }

  .play-btn{
    width:120px;
    height:38px;
    font-size:14px;
  }
  .option{
  width:clamp(70px, 28vw, 110px);   /* smaller width */
  height:clamp(85px, 14vh, 120px);  /* smaller height */
}
.nav{
  bottom: 50px;
}

}
</style>
</head>

<body>

<div class="quiz-box">

<div class="question" id="question"></div>

<div class="question-img">
<img id="qImage">
</div>

<div class="options" id="options"></div>

<div class="nav">
<button class="prev" id="prevBtn" onclick="prevQ()" disabled>← Prev</button>
<button class="next" id="nextBtn" onclick="nextQ()" disabled>Next →</button>
</div>

</div>

<div class="popup" id="popup"></div>

<div class="result-box" id="resultBox">
<h2>🎉 Quiz Completed!</h2>
<p id="scoreText"></p>
<button class="play-btn" onclick="location.reload()">Play Again</button>
</div>

<script>

const quiz=[

{
q:"Q1. ______ spread over the entire space they are kept in.",
qImg:"../images/mcq1.png",
options:[
{img:"../images/Solid.png", text:"Solids"},
{img:"../images/Molecules.png", text:"Molecules"},
{img:"../images/Gases.png", text:"Gases"},
{img:"../images/liquid.png", text:"Liquids"}
],
correct:2
},

{
q:"Q2. The amount of substance present in an object is its ______.",
qImg:"../images/Gases.png",
options:[
{img:"../images/Volume.png", text:"Volume"},
{img:"../images/mass.png", text:"Mass"},
{img:"../images/Molecules.png", text:"Molecule"},
{img:"../images/Space.png", text:"Space"}
],
correct:1
},

{
q:"Q3. ______ take the shape of the container they are poured in.",
qImg:"../images/mcq3.png",
options:[
{img:"../images/Solid.png", text:"Solids"},
{img:"../images/Molecules.png", text:"Molecules"},
{img:"../images/Gases.png", text:"Gases"},
{img:"../images/Water.png", text:"Liquids"}
],
correct:3
},

{
q:"Q4. The molecules in liquids are ______ packed.",
qImg:"../images/mcq4.png",
options:[
{img:"../images/Water.png", text:"Loosely"},
{img:"../images/Solid.png", text:"Tightly"},
{img:"../images/Ice.png", text:"Closely"},
{img:"../images/milk.png", text:"Smoothly"}
],
correct:0
},

{
q:"Q5. Water exists in ______ state at room temperature.",
qImg:"../images/mcq5.png",
options:[
{img:"../images/Solid.png", text:"Solid"},
{img:"../images/liquid.png", text:"Liquid"},
{img:"../images/Gases.png", text:"Gas"},
{img:"../images/vapour.png", text:"Vapour"}
],
correct:1
}

]

let current=0
let score=0
let answered=false

let userAnswers=new Array(quiz.length).fill(null)
function speakText(text){

if(!('speechSynthesis' in window)) return

window.speechSynthesis.cancel()

const utter = new SpeechSynthesisUtterance(text)

utter.lang = "en-GB"   // UK English
utter.volume = 0.25    // Low volume
utter.rate = 1
utter.pitch = 1

// Try selecting UK voice if available
const voices = speechSynthesis.getVoices()
const ukVoice = voices.find(v => v.lang === "en-GB")
if(ukVoice){
  utter.voice = ukVoice
}

speechSynthesis.speak(utter)

}

window.speechSynthesis.onvoiceschanged = () => {}
speechSynthesis.getVoices();

function correctConfetti(){

confetti({
particleCount:35,
spread:70,
origin:{y:0.6},
scalar:0.7
})

}


function finalConfetti(){

const duration=2000
const end=Date.now()+duration

const interval=setInterval(()=>{

if(Date.now()>end){
clearInterval(interval)
return
}

confetti({
particleCount:50,
spread:120,
startVelocity:40,
scalar:1,
origin:{x:Math.random(),y:Math.random()-0.2}
})

},250)

}

function showPopup(text,type){

const popup=document.getElementById("popup")

popup.innerHTML=text

// remove old stars
const oldStars = popup.querySelector(".popup-stars")
if(oldStars) oldStars.remove()

// ⭐ show stars for correct answer
if(type==="correct"){

const stars=document.createElement("div")
stars.className="popup-stars"

// stars increase question by question
stars.innerText="⭐".repeat(score)

popup.appendChild(stars)

popup.style.color="#2e7d32"

}

if(type==="wrong"){
popup.style.color="#c62828"
}

popup.classList.add("show")

setTimeout(()=>{
popup.classList.remove("show")
},1200)

}
function loadQuestion(){
    document.getElementById("nextBtn").style.display = "inline-block"
    document.getElementById("nextBtn").disabled = true;
document.getElementById("prevBtn").disabled = current === 0;

answered=false

document.getElementById("question").innerText=quiz[current].q
document.getElementById("qImage").src=quiz[current].qImg

const optionsDiv=document.getElementById("options")
optionsDiv.innerHTML=""

quiz[current].options.forEach((opt,i)=>{

const card=document.createElement("div")
card.classList.add("option")

card.innerHTML=`
<img src="${opt.img}">
<p>${opt.text}</p>
`
if(userAnswers[current]!==null){

answered=true
if(current === quiz.length-1){
document.getElementById("nextBtn").style.display = "none"
}else{
document.getElementById("nextBtn").disabled = false;
}

if(i===quiz[current].correct){
card.classList.add("correct")
}

if(i===userAnswers[current]){
card.classList.add("selected")
}

}

card.onclick=()=>{

if(answered) return

if(i===quiz[current].correct){

answered=true
card.classList.add("correct")

if(userAnswers[current]===null){
userAnswers[current]=i
score++
}

document.getElementById("nextBtn").disabled = false;
correctConfetti()
showPopup("🎉 Correct! Great Job!", "correct")
speakText("Correct")

// ⭐ Automatically show final popup on last question
if(current === quiz.length-1){

setTimeout(()=>{
showResult()
},1200)

}

}else{

showPopup("❌ Oops! Try Again", "wrong")
speakText("Wrong")

}

}


optionsDiv.appendChild(card)

})
}

function nextQ(){

if(!answered){
// showPopup("⚠️ Select correct answer first")
return
}

if(current<quiz.length-1){
current++
loadQuestion()
}else{
showResult()
}

}

function prevQ(){

if(current>0){
current--
loadQuestion()
}

}
function showResult(){

finalConfetti()

document.getElementById("resultBox").classList.add("show")

document.getElementById("scoreText").innerText =
"Your Score: "+score+" / "+quiz.length

// ✅ disable navigation
document.getElementById("nextBtn").disabled = true
document.getElementById("prevBtn").disabled = true

}
loadQuestion()

</script>

</body>
</html>
