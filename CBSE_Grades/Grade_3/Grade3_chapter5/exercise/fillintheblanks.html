<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fill The Blanks Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<!-- CONFETTI (same as MCQ) -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:"Livvic",sans-serif;
}

/* BODY (NO SCROLL LIKE MCQ) */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* MAIN */
.main-container{
  width:100%;
  max-width:1200px;
}

.quiz-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  height:100%;
}

/* QUESTION */
.question-area{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.question-area h2{
  font-size: clamp(20px, 2.5vw + 1vh, 30px);
  font-weight:400;
  color:#2f4f4f;
  text-align:center;
  line-height:1.3;
}

/* IMAGE */
.image-area{
  width:100%;
  display:flex;
  justify-content:center;
  margin: clamp(8px, 2vh, 15px) 0;
}

.image-area img{
  width: clamp(180px, 30vw, 380px);
  height: clamp(130px, 25vw, 250px);
  object-fit:contain;
  border-radius:20px;
  filter:grayscale(70%) brightness(.8);
  transition:.4s;
  padding:10px;
}

.image-area img.reveal{
  filter:none;
  transform:scale(1.05);
}

.input-area{
  width:100%;
  max-width: clamp(280px, 60vw, 700px); /* 🔥 main fix */

  display:flex;
  gap: clamp(10px, 2vw, 15px);
  justify-content:center;
  flex-wrap:wrap;

  margin: 0 auto; /* center */
  margin-bottom: clamp(60px, 10vh, 100px); /* 🔥 space for buttons */
}
.input-box{
  width:100%;
  display:flex;
  align-items:center;

  padding: clamp(6px, 1vw, 10px);

  border-radius:16px;
  border:3px solid #4da5d4;
  background:#ffffff;

  box-shadow:0 4px 10px rgba(0,0,0,0.08);

  overflow:hidden; /* 🔥 IMPORTANT */
}

.input-area .input-box:only-child{
  max-width:420px;
  margin:auto;
}

/* CORRECT */
.input-box.correct{
  border-color:#1fb36b;
  background:#eafff3;
}

/* INPUT FIELD */
.input-box input{
  flex:1;
  height:100%;
  font-size: clamp(16px, 2.2vw, 32px); /* 🔥 FIX */
  border:none;
  outline:none;
  background:transparent;
  color:#2f4f4f;
}
.input-box button{
  flex-shrink:0; /* 🔥 prevents squeezing */

  padding: clamp(6px, 1vw, 10px) clamp(10px, 2vw, 16px);

  font-size: clamp(12px, 1vw, 14px);

  border-radius:14px;
  border:none;

  background:#6bc6f5;
  color:#fff;

  cursor:pointer;

  white-space:nowrap; /* 🔥 keeps text in one line */
}
.input-box button:disabled{
  background:#b9dff5;
  cursor:not-allowed;
}
.nav{
  position:absolute; /* 🔥 fix position */
  bottom:110px;          /* always bottom */
  left:0;
  width:100%;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding-top: clamp(10px, 2vh, 20px);
}

/* BUTTON (MCQ STYLE) */
.nav button{
  border:none;
  padding: clamp(10px, 1.2vw, 14px) clamp(20px, 3vw, 28px);
 font-size: clamp(15px, 1.4vw + 0.6vh, 20px);
  font-weight:600;
  border-radius:50px;
  cursor:pointer;
  transition:all .3s ease;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
 min-width: clamp(100px, 14vw, 150px);
}

/* PREV */
.prev{
  background:linear-gradient(45deg,#ff7a7a,#ffb199);
  color:white;
}

.prev:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* NEXT */
.next{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
}

.next:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* DISABLED */
.nav button:disabled{
  background:#dcdcdc;
  color:#888;
  box-shadow:none;
  cursor:not-allowed;
}

/* POPUP */
.kid-popup{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:3000;
}

.kid-card{
  background:#fff;
    width: clamp(280px, 55vw, 360px); /* 🔥 increase */
  padding: clamp(18px, 2.5vw, 28px);
  border-radius:30px;
  text-align:center;
}

.kid-icon{
  font-size: clamp(3.5em, 7vw, 5em);
  margin-bottom:10px;
}

.kid-card h3{
   font-size: clamp(1.6em, 3vw, 2.2em);
  margin-bottom:8px;
}

.kid-card p{
  font-size: clamp(1.1em, 1.8vw, 1.3em);
  
}

.kid-correct .kid-card{
  background:#e6fffa;
  border:6px solid #38d9a9;
}

.kid-wrong .kid-card{
  background:#fff5f5;
  border:6px solid #ffa8a8;
}

/* FINAL POPUP */
#finalPopup{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:4000;
}

.final-kid-box{
  background:linear-gradient(135deg,#fff7d6,#e6fff5);
  padding: clamp(20px, 3vw, 35px);
  border-radius:35px;
  text-align:center;
  width: clamp(280px, 60vw, 420px);
}

.final-kid-box h2{
  font-size: clamp(1.6em, 3vw, 2.2em);
  color:#2f9e44;
  margin-bottom:10px;
}

.final-kid-box p{
  font-size: clamp(1.1em, 2vw, 1.3em);
  font-weight:600;
}

#stars{
  font-size: clamp(1.5em, 3vw, 2.3em);
  margin:12px 0;
}

.playAgain-btn{
  background:#ffac30;
  color:#fff;
  border:none;
  padding: clamp(10px, 1.5vw, 14px) clamp(20px, 3vw, 34px);
  border-radius:30px;
  font-size: clamp(1em, 1.5vw, 1.1em);
  cursor:pointer;
  margin-top:12px;
}

/* POP ANIMATION */
@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(.4)}
  70%{transform:translate(-50%,-50%) scale(1.1)}
  100%{transform:translate(-50%,-50%) scale(1)}
}

/* ========================= */
/* Desktop / Monitor */
/* ========================= */
@media screen and (min-width: 1025px) and (max-width: 1440px){

  .main-container{
    max-width:1400px;
  }

  .question-area h2{
    font-size:38px;
    
 
  }

  .image-area img{
    width:450px;
    height:300px;
  }

  .input-area{
    max-width:700px;
    gap:20px;
  }

  .input-box input{
    font-size:28px;
  }

  .input-box button{
    font-size:24px;
    padding:10px 18px;
  }

  .nav button{
    font-size:22px;
    padding:14px 35px;
  }

}


/* ========================= */
/* Large Monitors */
/* ========================= */
@media screen and (min-width: 1441px) and (max-width: 1920px){

  .main-container{
    max-width:1600px;
  }

  .question-area h2{
    font-size:42px;
       
  }

  .image-area img{
    width:520px;
    height:340px;
  }

  .input-area{
    max-width:1000px;
    gap:25px;
  }

  .input-box{
    padding:12px;
  }

  .input-box input{
    font-size:28px;
  }

  .input-box button{
    font-size:18px;
    padding:12px 22px;
  }

  .nav{
    bottom:120px;
  }

  .nav button{
    font-size:22px;
    padding:16px 45px;
  }

}


/* ========================= */
/* Extra Large Screens / 4K */
/* ========================= */
@media screen and (min-width: 1921px){

  .main-container{
    max-width:1900px;
  }

  .question-area h2{
    font-size:50px;
  }

  .image-area img{
    width:650px;
    height:420px;
  }

  .input-area{
    max-width:1200px;
    gap:30px;
  }

  .input-box{
    padding:16px;
    border-radius:20px;
  }

  .input-box input{
    font-size:32px;
  }

  .input-box button{
    font-size:20px;
    padding:14px 26px;
  }

  .nav{
    bottom:140px;
  }

  .nav button{
    font-size:26px;
    padding:20px 55px;
  }

  /* Popup bigger */
  .kid-card{
    width:420px;
  }

  .final-kid-box{
    width:480px;
  }

}

.input-box{
  flex: 0 0 480px;  
  max-width: 95%;
}


</style>
</head>

<body>

<div class="main-container">
<div class="quiz-container">

<div class="question-area">
<h2 id="questionText"></h2>
</div>

<div class="image-area">
<img id="questionImage">
</div>

<div class="input-area" id="inputsContainer"></div>
<div class="nav">
<button class="prev" id="prevBtn" onclick="prevQ()" disabled>← Prev</button>
<button class="next" id="nextBtn" onclick="nextQ()" disabled>Next →</button>
</div>

</div>
</div>

<div id="answerPopup" class="kid-popup">
<div class="kid-card">
<div class="kid-icon" id="popupIcon"></div>
<h3 id="popupTitle"></h3>
<p id="popupMsg"></p>
</div>
</div>

<div id="finalPopup">
<div class="final-kid-box">
<h2>🎉 Congratulations!</h2>
<p id="finalScore"></p>
<div id="stars"></div>
<button class="playAgain-btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>

const questions=[

{
q:"Q1. A penguin builds its nest on the ground using ______ and ______.",
a:["stones","pebbles"],
img:"../images/ftb1.png"
},

{
q:"Q2. An eagle has a strong, sharp and ______ beak.",
a:["hooked"],
img:"../images/ftb2.png"
},

{
q:"Q3. Birds like ______ and ______ have only two toes.",
a:["ostrich","emu"],
img:"../images/ftb3.png"
},

{
q:"Q4. ______ feathers help in keeping the bird's body warm.",
a:["down"],
img:"../images/ftb4.png"
},

{
q:"Q5. An ostrich is a ______ bird.",
a:["flightless"],
img:"../images/ftb5.png"
}

]

let index=0
let score=0

const questionText=document.getElementById("questionText")
const image=document.getElementById("questionImage")
const prevBtn=document.getElementById("prevBtn")
const nextBtn=document.getElementById("nextBtn")
const inputsRow=document.getElementById("inputsContainer")

const userAnswers=questions.map(q=>({
used:[],
boxes:q.a.map(()=>({value:"",correct:false}))
}))

/* TEXT SPEECH SAME AS MCQ */

function speakText(text){

const speech = new SpeechSynthesisUtterance(text)

speech.lang="en-GB"
speech.volume=0.25
speech.rate=1
speech.pitch=1

speechSynthesis.speak(speech)

}

/* CONFETTI SAME AS MCQ */

function correctConfetti(){
confetti({
particleCount:40,
spread:70,
origin:{y:0.6}
})
}

function finalConfetti(){

confetti({
particleCount:120,
spread:120,
origin:{y:0.6}
})

setTimeout(()=>{
confetti({
particleCount:80,
spread:100,
origin:{y:0.6}
})
},300)

}

/* POPUP SAME STYLE */

function showPopup(isCorrect){

const popup=document.getElementById("answerPopup")
const icon=document.getElementById("popupIcon")
const title=document.getElementById("popupTitle")
const msg=document.getElementById("popupMsg")

popup.className="kid-popup "+(isCorrect?"kid-correct":"kid-wrong")
popup.style.display="flex"

if(isCorrect){

icon.textContent="🎉😊"
title.textContent="Great Job!"
msg.textContent="You got it right!"

}else{

icon.textContent="😅"
title.textContent="Oops!"
msg.textContent="Try again!"

}

setTimeout(()=>popup.style.display="none",1400)

}

/* LOAD QUESTION */

function loadQuestion(){

const q=questions[index]

questionText.innerText=q.q
image.src=q.img

image.classList.toggle(
"reveal",
userAnswers[index].boxes.every(b=>b.correct)
)

prevBtn.disabled=index===0

inputsRow.innerHTML=""

q.a.forEach((_,i)=>{

const box=document.createElement("div")
box.className="input-box"

const input=document.createElement("input")
input.placeholder="Type here..."
input.value=userAnswers[index].boxes[i].value

const btn=document.createElement("button")
btn.textContent="Check"
btn.disabled=input.value.trim()===""

input.addEventListener("input",()=>{
btn.disabled=input.value.trim()===""
})

if(userAnswers[index].boxes[i].correct){
box.classList.add("correct")
input.disabled=true
btn.disabled=true
}

btn.onclick=()=>checkAnswer(input,btn,box,i)

box.append(input,btn)
inputsRow.appendChild(box)

})

checkAllAnswered()

}

/* CHECK ANSWER */

function checkAnswer(input,btn,box,i){

const value=input.value.trim().toLowerCase()
const answers=questions[index].a
const state=userAnswers[index]
if(answers.includes(value) && !state.used.includes(value)){

box.classList.add("correct")

image.classList.add("reveal")   // ⭐ ADD THIS LINE

input.disabled=true
btn.disabled=true

state.used.push(value)
state.boxes[i]={value,correct:true}

correctConfetti()

speakText("Correct")

showPopup(true)

}else{

input.value=""
btn.disabled=true

speakText("Wrong")

showPopup(false)

}

checkAllAnswered()

}

function checkAllAnswered(){

const done=userAnswers[index].boxes.every(b=>b.correct)
nextBtn.disabled=!done

if(done && !userAnswers[index].scored){

score++
userAnswers[index].scored=true
image.classList.add("reveal")

if(index===questions.length-1){

setTimeout(showFinal,1500)

}

}

}

nextBtn.onclick=()=>{
if(index<questions.length-1){
index++
loadQuestion()
}
}

prevBtn.onclick=()=>{
if(index>0){
index--
loadQuestion()
}
}

function showFinal(){

const popup=document.getElementById("finalPopup")

document.getElementById("finalScore").textContent =
`Your Score: ${score} / ${questions.length}`

document.getElementById("stars").textContent="⭐".repeat(score)

popup.style.display="flex"

finalConfetti()

}
function nextQ(){

if(index < questions.length-1){
index++
loadQuestion()
}else{
showFinal()
}

}

function prevQ(){

if(index > 0){
index--
loadQuestion()
}

}
loadQuestion()

</script>

</body>
</html>
