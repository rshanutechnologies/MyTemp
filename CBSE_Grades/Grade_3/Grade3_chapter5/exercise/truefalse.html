<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>True False Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Livvic',sans-serif;
}

/* BODY */
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* MAIN BOX */
.quiz-box{
  width:100%;
  max-width:1200px;
  text-align:center;

  display:flex;
  flex-direction:column;
  justify-content:space-between;
  height:60%;
}

/* QUESTION (SAME AS MCQ) */
.question{
  font-size: clamp(20px, 2.5vw + 1vh, 30px);
  color:#2f4f4f;
  line-height:1.3;
  text-align:left;
  padding-left:clamp(5px,1vw,10px);
}

/* LAYOUT */
.quiz-layout{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  align-items:center;
  justify-items:center;
  gap: clamp(20px, 4vw, 50px);
}

/* IMAGE */
.left-img img{
  width: clamp(160px, 28vw, 300px);
  height: clamp(130px, 25vw, 280px);
  object-fit:contain;
}

/* OPTIONS */
.options{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap: clamp(15px, 3vw, 35px);
}

/* TRUE/FALSE BUTTON */
.water-btn{
  width: clamp(140px, 22vw, 210px);
  height: clamp(55px, 10vh, 80px);

  border-radius:60px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size: clamp(18px, 2vw, 26px);
  font-weight:700;

  cursor:pointer;
  color:white;

  position:relative;
  overflow:hidden;

  transition:0.35s;

  box-shadow:
    0 12px 25px rgba(0,0,0,0.25),
    inset 0 5px 10px rgba(255,255,255,0.5),
    inset 0 -6px 10px rgba(0,0,0,0.2);
}

/* COLORS */
.true-btn{
  background:linear-gradient(145deg,#4caf50,#1b8e3e);
}

.false-btn{
  background:linear-gradient(145deg,#ffb74d,#f57c00);
}

/* HOVER */
.water-btn:hover{
  transform:translateY(-6px) scale(1.05);
}

/* SHINE */
.water-btn::before{
  content:"";
  position:absolute;
  top:-40%;
  left:-60%;
  width:220%;
  height:200%;
  background:linear-gradient(
    120deg,
    transparent 35%,
    rgba(255,255,255,0.55),
    transparent 65%
  );
  transform:rotate(25deg);
  transition:0.7s;
}

.water-btn:hover::before{
  left:120%;
}

/* ICON */
.icon{
  margin-right:clamp(6px,1vw,12px);
  font-size: clamp(18px, 2vw, 26px);
}

/* SELECT STATES */
.correct-highlight{
  outline:2px solid #beff4f;
  box-shadow:0 0 20px rgba(255,213,79,0.8);
  transform:scale(1.05);
}

/* NAV (EXACT MCQ STYLE) */
.nav{
  margin-top: clamp(10px, 2vh, 25px);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* BUTTON */
.nav button{
  border:none;
  padding: clamp(10px, 1.2vw, 14px) clamp(20px, 3vw, 32px);
  font-size: clamp(15px, 1.4vw + 0.6vh, 20px);
  font-weight:600;
  border-radius:50px;
  cursor:pointer;
  transition:all .3s ease;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
   min-width: clamp(100px, 14vw, 150px);
}

/* PREV */
.prev{
  background:linear-gradient(45deg,#ff7a7a,#ffb199);
  color:white;
}

/* NEXT */
.next{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
}

/* HOVER */
.prev:hover,
.next:hover{
  transform:translateY(-3px) scale(1.05);
}

/* DISABLED */
.nav button:disabled{
  background:#dcdcdc;
  color:#888;
  box-shadow:none;
  cursor:not-allowed;
}

/* POPUP */
.kid-popup{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:3000;
}

.kid-card{
  background:#fff;
 width: clamp(280px, 55vw, 360px); /* 🔥 increase */
  padding: clamp(18px, 2.5vw, 28px);
  border-radius:30px;
  text-align:center;
}

.kid-icon{
  font-size: clamp(3.5em, 7vw, 5em);
  margin-bottom:10px;
}

.kid-card h3{
 font-size: clamp(1.6em, 3vw, 2.2em);
  margin-bottom:8px;
}

.kid-card p{
  font-size: clamp(1.1em, 1.8vw, 1.3em);
}

.kid-correct .kid-card{
  background:#e6fffa;
  border:6px solid #38d9a9;
}

.kid-wrong .kid-card{
  background:#fff5f5;
  border:6px solid #ffa8a8;
}

/* FINAL POPUP */
#finalPopup{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:4000;
}

.final-kid-box{
  background:linear-gradient(135deg,#fff7d6,#e6fff5);
  padding: clamp(20px, 3vw, 35px);
  border-radius:35px;
  text-align:center;
  width: clamp(280px, 60vw, 420px);
}

.final-kid-box h2{
  font-size: clamp(1.6em, 3vw, 2.2em);
  color:#2f9e44;
  margin-bottom:10px;
}

.final-kid-box p{
  font-size: clamp(1.1em, 2vw, 1.3em);
  font-weight:600;
}

#stars{
  font-size: clamp(1.5em, 3vw, 2.3em);
  margin:12px 0;
}

.playAgain-btn{
  background:#ffac30;
  color:#fff;
  border:none;
  padding: clamp(10px, 1.5vw, 14px) clamp(20px, 3vw, 34px);
  border-radius:30px;
  font-size: clamp(1em, 1.5vw, 1.1em);
  cursor:pointer;
  margin-top:12px;
}

/* POP ANIMATION */
@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(.4)}
  70%{transform:translate(-50%,-50%) scale(1.1)}
  100%{transform:translate(-50%,-50%) scale(1)}
}

/* ========================= */
/* Desktop / Monitor */
/* ========================= */
@media screen and (min-width: 1025px) and (max-width: 1440px){

  .quiz-box{
    max-width:1400px;
    height:65%;
  }

  .question{
    font-size:38px;
  }

  .left-img img{
    width:400px;
    height:310px;
  }

  .water-btn{
    width:260px;
    height:90px;
    font-size:30px;
  }

  .icon{
    font-size:30px;
  }

  .nav button{
    font-size:22px;
    padding:14px 35px;
  }

}


/* ========================= */
/* Large Monitors */
/* ========================= */
@media screen and (min-width: 1441px) and (max-width: 1920px){

  .quiz-box{
    max-width:1600px;
    height:70%;
  }

  .question{
    font-size:42px;
  }

  .left-img img{
    width:420px;
    height:320px;
  }

  .quiz-layout{
    gap:60px;
  }

  .water-btn{
    width:260px;
    height:90px;
    font-size:28px;
  }

  .icon{
    font-size:28px;
  }

  .nav button{
    font-size:22px;
    padding:16px 45px;
  }

}


/* ========================= */
/* Extra Large Screens / 4K */
/* ========================= */
@media screen and (min-width: 1921px){

  .quiz-box{
    max-width:1900px;
    height:75%;
  }

  .question{
    font-size:50px;
  }

  .left-img img{
    width:520px;
    height:400px;
  }

  .quiz-layout{
    gap:80px;
  }

  .water-btn{
    width:320px;
    height:110px;
    font-size:34px;
  }

  .icon{
    font-size:34px;
  }

  .nav button{
    font-size:26px;
    padding:20px 55px;
  }

  /* popup scaling */
  .kid-card{
    width:420px;
  }

  .final-kid-box{
    width:480px;
  }

}
</style>
</head>

<body>

<div class="quiz-box">

<div class="question" id="question"></div>

<div class="quiz-layout">

<div class="left-img">
<img id="qImage">
</div>

<div class="options">

<div class="water-btn true-btn" onclick="selectAnswer(true)">
<span class="icon">✔</span> True
</div>

<div class="water-btn false-btn" onclick="selectAnswer(false)">
<span class="icon">✖</span> False
</div>

</div>

</div>

<div class="nav">
<button class="prev" id="prevBtn" onclick="prevQ()" disabled>← Prev</button>
<button class="next" id="nextBtn" onclick="nextQ()" disabled>Next →</button>
</div>

</div>
<div id="answerPopup" class="kid-popup">
<div class="kid-card">
<div class="kid-icon" id="popupIcon"></div>
<h3 id="popupTitle"></h3>
<p id="popupMsg"></p>
</div>
</div>

<div id="finalPopup">
<div class="final-kid-box">
<h2>🎉 Congratulations!</h2>
<p id="finalScore"></p>
<div id="stars"></div>
<button class="playAgain-btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>
const quiz=[

{
q:"Q1. Birds have tiny spots behind their eyes.",
img:"../images/tf1.png",
a:false
},

{
q:"Q2. Ducks and geese have long and pointed beaks.",
img:"../images/tf2.png",
a:false
},

{
q:"Q3. Birds have hollow bones filled with air.",
img:"../images/tf3.png",
a:true
},

{
q:"Q4. Flight feathers are found close to the body of a bird.",
img:"../images/tf4.png",
a:false
},

{
q:"Q5. Birds fly to escape from their predators.",
img:"../images/tf5.png",
a:true
}

]

let current=0
let score=0
let answered=false
let userAnswers=new Array(quiz.length).fill(null)

/* CONFETTI */

function correctConfetti(){
confetti({
particleCount:40,
spread:70,
origin:{y:0.6}
})
}

/* SPEECH */

function speakText(text){

const speech=new SpeechSynthesisUtterance(text)

speech.lang="en-GB"
speech.volume=0.25
speech.rate=1
speech.pitch=1

speechSynthesis.speak(speech)

}

/* POPUP */

function showPopup(isCorrect){

const popup=document.getElementById("answerPopup")
const icon=document.getElementById("popupIcon")
const title=document.getElementById("popupTitle")
const msg=document.getElementById("popupMsg")

popup.className="kid-popup "+(isCorrect?"kid-correct":"kid-wrong")
popup.style.display="flex"

if(isCorrect){

icon.textContent="🎉😊"
title.textContent="Great Job!"
msg.textContent="You got it right!"

}else{

icon.textContent="😅"
title.textContent="Oops!"
msg.textContent="Try again!"

}

setTimeout(()=>popup.style.display="none",1400)

}

function loadQuestion(){

answered=userAnswers[current]!==null

document.getElementById("question").innerText=quiz[current].q
document.getElementById("qImage").src=quiz[current].img

document.getElementById("prevBtn").disabled=current===0
document.getElementById("nextBtn").disabled=!answered

const trueBtn=document.querySelector(".true-btn")
const falseBtn=document.querySelector(".false-btn")

trueBtn.classList.remove("correct-highlight")
falseBtn.classList.remove("correct-highlight")

/* show correct answer when returning */

if(userAnswers[current]!==null){

if(quiz[current].a===true){
trueBtn.classList.add("correct-highlight")
}else{
falseBtn.classList.add("correct-highlight")
}

}

}

function selectAnswer(user){

if(answered) return

const trueBtn=document.querySelector(".true-btn")
const falseBtn=document.querySelector(".false-btn")

if(user===quiz[current].a){

answered=true
score++
userAnswers[current]=user

correctConfetti()

showPopup(true)

speakText("Correct")

document.getElementById("nextBtn").disabled=false

/* highlight correct */

if(quiz[current].a===true){
trueBtn.classList.add("correct-highlight")
}else{
falseBtn.classList.add("correct-highlight")
}

if(current===quiz.length-1){
setTimeout(showResult,1200)
}

}else{

showPopup(false)

speakText("Wrong")

}

}

/* NEXT */

function nextQ(){

if(!answered) return

if(current<quiz.length-1){

current++
loadQuestion()

}else{

showResult()

}

}

/* PREV */

function prevQ(){

if(current>0){

current--
loadQuestion()

}

}

/* FINAL CONFETTI */

function finalConfetti(){

confetti({
particleCount:120,
spread:120,
origin:{y:0.6}
})

setTimeout(()=>{
confetti({
particleCount:80,
spread:100,
origin:{y:0.6}
})
},300)

}

/* RESULT */

function showResult(){

const popup=document.getElementById("finalPopup")

document.getElementById("finalScore").textContent=
"Your Score: "+score+" / "+quiz.length

document.getElementById("stars").textContent="⭐".repeat(score)

popup.style.display="flex"

finalConfetti()

}

loadQuestion()
</script>

</body>
</html>
