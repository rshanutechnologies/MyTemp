<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>True False Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
font-family:'Livvic',sans-serif;

display:flex;
justify-content:center;
align-items:center;
height:95vh;
margin:0;
overflow: hidden;
}

.quiz-box{
width:950px;
max-width:95%;
text-align:center;
}

/* QUESTION */
.question{
font-size:30px;
color:#2f4f4f;
margin-top: 30px;
text-align:left;
padding-left:10px;
}

/* IMAGE + BUTTON LAYOUT */

.quiz-layout{
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
justify-items:center;
gap:50px;
margin-top: 80px;
}

/* IMAGE */

.left-img{
display:flex;
justify-content:center;
align-items:center;
}

.left-img img{
width:300px;
height:280px;
object-fit:contain;
}

/* OPTIONS */

.options{
display:flex;
gap:35px;
}
/* NEW QUIZ BUTTON DESIGN */

.water-btn{

width:210px;
height:80px;

border-radius:60px;

display:flex;
align-items:center;
justify-content:center;

font-size:26px;
font-weight:700;

cursor:pointer;
color:white;

position:relative;
overflow:hidden;

transition:0.35s;

box-shadow:
0 12px 25px rgba(0,0,0,0.25),
inset 0 5px 10px rgba(255,255,255,0.5),
inset 0 -6px 10px rgba(0,0,0,0.2);

}
/* TRUE BUTTON */
.selected{
outline:2px solid #beff4f;
transform:scale(1.05);
}
.correct-highlight{
outline:2px solid #beff4f;
box-shadow:0 0 20px rgba(255,213,79,0.8);
transform:scale(1.05);
}
.true-btn{
background:linear-gradient(145deg,#4caf50,#1b8e3e);
}

/* FALSE BUTTON */

.false-btn{
background:linear-gradient(145deg,#ffb74d,#f57c00);
}
/* SHINE EFFECT */

.water-btn::before{

content:"";

position:absolute;

top:-40%;
left:-60%;

width:220%;
height:200%;

background:linear-gradient(
120deg,
transparent 35%,
rgba(255,255,255,0.55),
transparent 65%
);

transform:rotate(25deg);

transition:0.7s;

}

.water-btn:hover::before{
left:120%;
}

/* HOVER EFFECT */

.water-btn:hover{

transform:translateY(-8px) scale(1.07);

box-shadow:
0 20px 40px rgba(0,0,0,0.35),
inset 0 6px 12px rgba(255,255,255,0.6),
inset 0 -8px 12px rgba(0,0,0,0.25);

}

/* ICON */

.icon{
margin-right:12px;
font-size:28px;
}

.icon{
margin-right:10px;
font-size:26px;
}
/* NAV BUTTONS */

.nav{
margin-top:50px;
display:flex;
justify-content:space-between;

}

/* COMMON BUTTON */

button{
border:none;
padding:14px 32px;
font-size:18px;
font-weight:600;
border-radius:50px;
cursor:pointer;
transition:all .3s ease;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* PREV BUTTON */

.prev{
background:linear-gradient(45deg,#ff7a7a,#ffb199);
color:white;
}

.prev:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* NEXT BUTTON */

.next{
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
}

.next:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* DISABLED BUTTON */

button:disabled{
background:#dcdcdc;
color:#888;
box-shadow:none;
cursor:not-allowed;
}
.kid-popup{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
z-index:3000;
}

.kid-card{
background:#fff;
width:300px;
padding:2px;
border-radius:30px;
text-align:center;

}

.kid-icon{
font-size:4.5em;
margin-bottom:10px;
}

.kid-card h3{
font-size:2em;
margin-bottom:8px;
}

.kid-card p{
font-size:1.2em;
}

.kid-correct .kid-card{
background:#e6fffa;
border:6px solid #38d9a9;
}

.kid-wrong .kid-card{
background:#fff5f5;
border:6px solid #ffa8a8;
}


#finalPopup{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
z-index:4000;
}

.final-kid-box{
background:linear-gradient(135deg,#fff7d6,#e6fff5);
padding:30px 35px;
border-radius:35px;
text-align:center;
width:420px;

}

.final-kid-box h2{
font-size:2.2em;
color:#2f9e44;
margin-bottom:10px;
}

.final-kid-box p{
font-size:1.3em;
font-weight:600;
}

#stars{
font-size:2.3em;
margin:12px 0;
}

.playAgain-btn{
background:#ffac30;
color:#fff;
border:none;
padding:14px 34px;
border-radius:30px;
font-size:1.1em;
cursor:pointer;
margin-top:12px;
}

/* POP ANIMATION */

@keyframes pop{
0%{transform:translate(-50%,-50%) scale(.4)}
70%{transform:translate(-50%,-50%) scale(1.1)}
100%{transform:translate(-50%,-50%) scale(1)}
}
.popup.wrong{
background:white;
color:#d32f2f;
border:2px solid #ef5350;
}

/* MOBILE */
@media (max-width:900px){

.quiz-layout{
grid-template-columns:1fr 1fr;
gap:30px;
}

.left-img img{
width:230px;
height:200px;
}

.water-btn{
width:190px;
height:80px;
font-size:22px;
}

.question{
font-size:30px;
}

}
@media (max-width:700px){

body{
padding:20px 10px;
align-items:flex-start;
margin-top: 20px;
}

.quiz-layout{
grid-template-columns:1fr;
gap:25px;
margin-top:40px;
}

.left-img img{
width:200px;
height:160px;
}

.options{
flex-direction:column;
align-items:center;
gap:18px;
}

.water-btn{
width:170px;
height:65px;
font-size:20px;
}

.question{
font-size:22px;
text-align:center;
padding:0;
}

.nav{
padding:0 10px;
margin-top:40px;
}

button{
padding:12px 24px;
font-size:16px;
}
/* ✅ FINAL POPUP SMALL FOR MOBILE */
.final-kid-box{
  width:90%;
  padding:20px 18px;   /* reduced padding */
  border-radius:25px;
}

.final-kid-box h2{
  font-size:18px;      /* smaller title */
}

.final-kid-box p{
  font-size:14px;      /* smaller score text */
}

#stars{
  font-size:18px;      /* smaller stars */
  margin:8px 0;
}

.playAgain-btn{
  padding:10px 20px;
  font-size:14px;
}

}

@media (max-width:480px){

.quiz-box{
padding:5px;
}

.left-img img{
width:160px;
height:130px;
}

.question{
font-size:19px;
}

.water-btn{
width:150px;
height:58px;
font-size:18px;
}

.icon{
font-size:20px;
}

.nav{
margin-top:30px;
}

button{
font-size:14px;
padding:10px 18px;
}
/* ✅ FINAL POPUP SMALL FOR MOBILE */
.final-kid-box{
  width:90%;
  padding:20px 18px;   /* reduced padding */
  border-radius:25px;
}

.final-kid-box h2{
  font-size:18px;      /* smaller title */
}

.final-kid-box p{
  font-size:14px;      /* smaller score text */
}

#stars{
  font-size:18px;      /* smaller stars */
  margin:8px 0;
}

.playAgain-btn{
  padding:10px 20px;
  font-size:14px;
}
}

</style>
</head>

<body>

<div class="quiz-box">

<div class="question" id="question"></div>

<div class="quiz-layout">

<div class="left-img">
<img id="qImage">
</div>

<div class="options">

<div class="water-btn true-btn" onclick="selectAnswer(true)">
<span class="icon">✔</span> True
</div>

<div class="water-btn false-btn" onclick="selectAnswer(false)">
<span class="icon">✖</span> False
</div>

</div>

</div>

<div class="nav">
<button class="prev" id="prevBtn" onclick="prevQ()" disabled>← Prev</button>
<button class="next" id="nextBtn" onclick="nextQ()" disabled>Next →</button>
</div>

</div>
<div id="answerPopup" class="kid-popup">
<div class="kid-card">
<div class="kid-icon" id="popupIcon"></div>
<h3 id="popupTitle"></h3>
<p id="popupMsg"></p>
</div>
</div>

<div id="finalPopup">
<div class="final-kid-box">
<h2>🎉 Congratulations!</h2>
<p id="finalScore"></p>
<div id="stars"></div>
<button class="playAgain-btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>
const quiz=[

{
q:"Q1. Birds have tiny spots behind their eyes.",
img:"../images/tf1.png",
a:false
},

{
q:"Q2. Ducks and geese have long and pointed beaks.",
img:"../images/tf2.png",
a:false
},

{
q:"Q3. Birds have hollow bones filled with air.",
img:"../images/tf3.png",
a:true
},

{
q:"Q4. Flight feathers are found close to the body of a bird.",
img:"../images/tf4.png",
a:false
},

{
q:"Q5. Birds fly to escape from their predators.",
img:"../images/tf5.png",
a:true
}

]

let current=0
let score=0
let answered=false
let userAnswers=new Array(quiz.length).fill(null)

/* CONFETTI */

function correctConfetti(){
confetti({
particleCount:40,
spread:70,
origin:{y:0.6}
})
}

/* SPEECH */

function speakText(text){

const speech=new SpeechSynthesisUtterance(text)

speech.lang="en-GB"
speech.volume=0.25
speech.rate=1
speech.pitch=1

speechSynthesis.speak(speech)

}

/* POPUP */

function showPopup(isCorrect){

const popup=document.getElementById("answerPopup")
const icon=document.getElementById("popupIcon")
const title=document.getElementById("popupTitle")
const msg=document.getElementById("popupMsg")

popup.className="kid-popup "+(isCorrect?"kid-correct":"kid-wrong")
popup.style.display="flex"

if(isCorrect){

icon.textContent="🎉😊"
title.textContent="Great Job!"
msg.textContent="You got it right!"

}else{

icon.textContent="😅"
title.textContent="Oops!"
msg.textContent="Try again!"

}

setTimeout(()=>popup.style.display="none",1400)

}

function loadQuestion(){

answered=userAnswers[current]!==null

document.getElementById("question").innerText=quiz[current].q
document.getElementById("qImage").src=quiz[current].img

document.getElementById("prevBtn").disabled=current===0
document.getElementById("nextBtn").disabled=!answered

const trueBtn=document.querySelector(".true-btn")
const falseBtn=document.querySelector(".false-btn")

trueBtn.classList.remove("correct-highlight")
falseBtn.classList.remove("correct-highlight")

/* show correct answer when returning */

if(userAnswers[current]!==null){

if(quiz[current].a===true){
trueBtn.classList.add("correct-highlight")
}else{
falseBtn.classList.add("correct-highlight")
}

}

}

function selectAnswer(user){

if(answered) return

const trueBtn=document.querySelector(".true-btn")
const falseBtn=document.querySelector(".false-btn")

if(user===quiz[current].a){

answered=true
score++
userAnswers[current]=user

correctConfetti()

showPopup(true)

speakText("Correct")

document.getElementById("nextBtn").disabled=false

/* highlight correct */

if(quiz[current].a===true){
trueBtn.classList.add("correct-highlight")
}else{
falseBtn.classList.add("correct-highlight")
}

if(current===quiz.length-1){
setTimeout(showResult,1200)
}

}else{

showPopup(false)

speakText("Wrong")

}

}

/* NEXT */

function nextQ(){

if(!answered) return

if(current<quiz.length-1){

current++
loadQuestion()

}else{

showResult()

}

}

/* PREV */

function prevQ(){

if(current>0){

current--
loadQuestion()

}

}

/* FINAL CONFETTI */

function finalConfetti(){

confetti({
particleCount:120,
spread:120,
origin:{y:0.6}
})

setTimeout(()=>{
confetti({
particleCount:80,
spread:100,
origin:{y:0.6}
})
},300)

}

/* RESULT */

function showResult(){

const popup=document.getElementById("finalPopup")

document.getElementById("finalScore").textContent=
"Your Score: "+score+" / "+quiz.length

document.getElementById("stars").textContent="⭐".repeat(score)

popup.style.display="flex"

finalConfetti()

}

loadQuestion()
</script>

</body>
</html>
