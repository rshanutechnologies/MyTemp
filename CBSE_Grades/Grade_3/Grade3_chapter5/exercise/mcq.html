<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bird Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
font-family:'Livvic';
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.quiz-box{
width:100%;
max-width:1400px;

text-align:center;

}

.question{
font-size:30px;

color:#2f4f4f;
}

/* QUESTION IMAGE */

.question-img{
width:200px;
height:170px;
object-fit:contain;
margin:10px auto 25px;
display:block;
}

/* OPTIONS */

.options{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

/* WATER BUBBLE */

.option{

width:170px;
height:170px;

border-radius:50%;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(8px);

border:2px solid rgba(255,255,255,0.6);

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

cursor:pointer;

transition:.3s;

box-shadow:
inset -8px -8px 20px rgba(0,0,0,0.2),
inset 8px 8px 20px rgba(255,255,255,0.6),
0 10px 20px rgba(0,0,0,0.15);

}

.option:hover{
transform:scale(1.08);
}

/* OPTION IMAGE */

.option img{
width:120px;
height:120px;
object-fit:contain;
margin-top: 10px;
}

.option p{
font-size:20px;
font-weight:600;
color:#1a3c50;
}

/* CORRECT */

.correct{
border:4px solid #ffd54f;
background:rgba(255,255,200,0.4);
}

/* NAV BUTTON */

.nav{
margin-top:10px;
display:flex;
justify-content:space-between;
}

/* COMMON BUTTON STYLE */

button{
border:none;
padding:14px 32px;
font-size:18px;
font-weight:600;
border-radius:50px;
cursor:pointer;
transition:all .3s ease;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* PREV BUTTON */

.prev{
background:linear-gradient(45deg,#ff7a7a,#ffb199);
color:white;
}

.prev:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* NEXT BUTTON */

.next{
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
}

.next:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* DISABLED BUTTON */

button:disabled{
background:#dcdcdc;
color:#888;
box-shadow:none;
cursor:not-allowed;
}

.kid-popup{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
z-index:3000;
}

.kid-card{
background:#fff;
width:300px;
padding:2px;
border-radius:30px;
text-align:center;

}

.kid-icon{
font-size:4.5em;
margin-bottom:10px;
}

.kid-card h3{
font-size:2em;
margin-bottom:8px;
}

.kid-card p{
font-size:1.2em;
}

.kid-correct .kid-card{
background:#e6fffa;
border:6px solid #38d9a9;
}

.kid-wrong .kid-card{
background:#fff5f5;
border:6px solid #ffa8a8;
}


#finalPopup{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
z-index:4000;
}

.final-kid-box{
background:linear-gradient(135deg,#fff7d6,#e6fff5);
padding:30px 35px;
border-radius:35px;
text-align:center;
width:420px;

}

.final-kid-box h2{
font-size:2.2em;
color:#2f9e44;
margin-bottom:10px;
}

.final-kid-box p{
font-size:1.3em;
font-weight:600;
}

#stars{
font-size:2.3em;
margin:12px 0;
}

.playAgain-btn{
background:#ffac30;
color:#fff;
border:none;
padding:14px 34px;
border-radius:30px;
font-size:1.1em;
cursor:pointer;
margin-top:12px;
}

/* POP ANIMATION */

@keyframes pop{
0%{transform:translate(-50%,-50%) scale(.4)}
70%{transform:translate(-50%,-50%) scale(1.1)}
100%{transform:translate(-50%,-50%) scale(1)}
}
.popup.wrong{
background:white;
color:#d32f2f;
border:2px solid #ef5350;
}
/* ================= MOBILE RESPONSIVE ================= */




@media (max-width:800px){

body{
padding:10px;
height:auto;
margin-top: 100px;
overflow: auto;
}

.quiz-box{
max-width:100%;
}

/* QUESTION */

.question{
font-size:26px;
line-height:1.3;

}

/* QUESTION IMAGE */

.question-img{
width:150px;
height:100px;
margin:20px auto 15px;
}

/* OPTIONS GRID */

.options{
gap:15px;
}

/* WATER BUBBLE SMALL */

.option{
width:100px;
height:100px;
}
.options{
display:grid;
grid-template-columns: repeat(2, 1fr);
gap:20px;
justify-items:center;
}
/* OPTION IMAGE */

.option img{
width:70px;
height:70px;
}

/* OPTION TEXT */

.option p{
font-size:15px;
}

/* NAV BUTTONS */

.nav{
margin-top:25px;
gap:10px;
}

button{
font-size:15px;
padding:10px 18px;
}

/* RESULT BOX */

.result-box{
width:90%;
padding:30px 20px;
}

.result-box h2{
font-size:24px;
}

#scoreText{
font-size:20px;
}

/* POPUP */

.popup{
width:200px;
font-size:20px;
padding:15px;
}

}

@media (max-width:600px){

  body{
    padding:12px;
    height:auto;
    overflow:auto;
    align-items:flex-start;
  }

  .quiz-box{
    width:100%;
    max-width:100%;
  }

  /* QUESTION */
  .question{
    font-size:20px;
    line-height:1.4;
    margin-bottom:10px;
  }

  /* IMAGE */
  .question-img{
    width:140px;
    height:100px;
    margin:10px auto 15px;
  }

  /* OPTIONS GRID (FIXED) */
  .options{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:12px;
    justify-items:center;
  }

  /* OPTION SIZE FIXED */
  .option{
    width:120px;
    height:120px;
    border-radius:50%;
  }

  .option img{
    width:70px;
    height:70px;
  }

  .option p{
    font-size:14px;
  }

  /* NAV BUTTON FIX (STATIC POSITION) */
  .nav{
    margin-top:15px;
    display:flex;
    justify-content:space-between;
    gap:10px;
  }

  button{
    flex:1;
    font-size:15px;
    padding:10px;
  }

  /* POPUPS */
  .kid-card{
    width:85%;
  }

  .final-kid-box{
    width:90%;
    padding:20px;
  }

}
</style>
</head>

<body>

<div class="quiz-box">

<div class="question" id="question"></div>

<img id="questionImg" class="question-img">

<div class="options" id="options"></div>

<div class="nav">
<button class="prev" id="prevBtn" onclick="prevQ()" disabled>← Prev</button>
<button class="next" id="nextBtn" onclick="nextQ()" disabled>Next →</button>
</div>

</div>

<div id="answerPopup" class="kid-popup">
<div class="kid-card">
<div class="kid-icon" id="popupIcon"></div>
<h3 id="popupTitle"></h3>
<p id="popupMsg"></p>
</div>
</div>

<div id="finalPopup">
<div class="final-kid-box">
<h2>🎉 Congratulations!</h2>
<p id="finalScore"></p>
<div id="stars"></div>
<button class="playAgain-btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>

/* QUIZ DATA */

const quiz=[

{
q:"Q1. Birds can also breathe directly through their open ______.",
img:"../images/mcq1.png",
options:[
{img:"../images/nose.png",text:"Nose"},
{img:"../images/eyes.png",text:"Eyes"},
{img:"../images/ears.png",text:"Ears"},
{img:"../images/beak.png",text:"Beaks"}
],
correct:0
},

{
q:"Q2. A ______ eats the flesh of other animals.",
img:"../images/mcq2.png",
options:[
{img:"../images/sparrow.png",text:"Sparrow"},
{img:"../images/vulture-img.png",text:"Vulture"},
{img:"../images/pegion.png",text:"Pigeon"},
{img:"../images/hoopie.png",text:"Hoopoe"}
],
correct:1
},

{
q:"Q3. A ______ pokes holes in the hard wood of tree trunks.",
img:"../images/mcq3.png",
options:[
{img:"../images/pegion.png",text:"Pigeon"},
{img:"../images/eagle.png",text:"Eagle"},
{img:"../images/hen-img.png",text:"Hen"},
{img:"../images/hoopie.png",text:"Hoopoe"}
],
correct:3
},

{
q:"Q4. A ______ has a broad and flat beak with big holes.",
img:"../images/mcq4.png",
options:[
{img:"../images/hawk.png",text:"Hawk"},
{img:"../images/crow.png",text:"Crow"},
{img:"../images/duck.png",text:"Duck"},
{img:"../images/sparrow.png",text:"Sparrow"}
],
correct:2   
},

{
q:"Q5. Sharp and hooked claws are called ______.",
img:"../images/mcq5.png",
options:[
{img:"../images/talons1.png",text:"Talons"},
{img:"../images/nail.png",text:"Nails"},
{img:"../images/toes.png",text:"Toes"},
{img:"../images/trowel.png",text:"Trowels"}
],
correct:0
}

]

let current=0
let score=0
let answered=false
let userAnswers = new Array(quiz.length).fill(null);

function correctConfetti(){
confetti({
particleCount:40,
spread:70,
origin:{y:0.6}
})
}

function speakText(text){

const speech = new SpeechSynthesisUtterance(text);

speech.lang = "en-GB";   // UK English
speech.volume = 0.25;
speech.rate = 1;
speech.pitch = 1;

speechSynthesis.speak(speech);

}

function showPopup(isCorrect){

const popup=document.getElementById("answerPopup")
const icon=document.getElementById("popupIcon")
const title=document.getElementById("popupTitle")
const msg=document.getElementById("popupMsg")

popup.className="kid-popup "+(isCorrect?"kid-correct":"kid-wrong")
popup.style.display="flex"

if(isCorrect){

icon.textContent="🎉😊"
title.textContent="Great Job!"
msg.textContent="You got it right!"

}else{

icon.textContent="😅"
title.textContent="Oops!"
msg.textContent="Try again!"

}

setTimeout(()=>popup.style.display="none",1400)

}

function loadQuestion(){

document.getElementById("nextBtn").disabled=true
document.getElementById("prevBtn").disabled=current===0
answered=false

document.getElementById("question").innerText=quiz[current].q

/* LOAD QUESTION IMAGE */

document.getElementById("questionImg").src=quiz[current].img

const optionsDiv=document.getElementById("options")
optionsDiv.innerHTML=""

quiz[current].options.forEach((opt,i)=>{

const card=document.createElement("div")
card.classList.add("option")

card.innerHTML=`
<img src="${opt.img}">
<p>${opt.text}</p>
`

/* Restore previous answer highlight */

if(userAnswers[current] === i){
card.classList.add("correct")
answered = true
document.getElementById("nextBtn").disabled=false
}

card.onclick=()=>{

if(answered) return

if(i===quiz[current].correct){

answered=true
card.classList.add("correct")

score++
userAnswers[current] = i;

correctConfetti()

showPopup(true)
speakText("Correct")

if(current === quiz.length - 1){
setTimeout(showResult,1200)
}else{
document.getElementById("nextBtn").disabled=false
}

}else{
showPopup(false)

speakText("wrong")

}

}

optionsDiv.appendChild(card)

})

}

function nextQ(){

if(!answered) return

if(current<quiz.length-1){
current++
loadQuestion()
}else{
showResult()
}

}

function prevQ(){
if(current>0){
current--
loadQuestion()
}
}
function finalConfetti(){

confetti({
particleCount:120,
spread:120,
origin:{y:0.6}
});

setTimeout(()=>{
confetti({
particleCount:80,
spread:100,
origin:{y:0.6}
});
},300);

}
function showResult(){

const popup=document.getElementById("finalPopup")

document.getElementById("finalScore").textContent =
"Your Score: "+score+" / "+quiz.length

document.getElementById("stars").textContent="⭐".repeat(score)

popup.style.display="flex"

finalConfetti()

}

loadQuestion()

</script>

</body>
</html>
