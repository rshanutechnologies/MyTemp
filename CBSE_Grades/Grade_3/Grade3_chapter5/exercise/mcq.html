<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bird Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
body{
  font-family:'Livvic';
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden; /* 🔥 NO SCROLL */
  
}

.quiz-box{
  width:100%;
  max-width:1400px;
  text-align:center;

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  height:60%; /* 🔥 force fit */
}

/* QUESTION */
.question{
  font-size: clamp(20px, 2.5vw + 1vh, 30px);
  color:#2f4f4f;
  line-height:1.3;
}

/* QUESTION IMAGE */
.question-img{
  width: clamp(120px, 18vw, 220px);
  height: clamp(90px, 15vw, 180px);
  object-fit:contain;
  margin: clamp(10px, 2vh, 25px) auto;
  display:block;
}

/* OPTIONS GRID */
.options{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(clamp(110px, 20vw, 180px), 1fr));
  gap: clamp(10px, 2vw, 20px);
  justify-items:center;
}

/* OPTION (BUBBLE) */
.option{
  width: clamp(100px, 18vw, 170px);
  height: clamp(100px, 18vw, 170px);
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(8px);
  border:2px solid rgba(255,255,255,0.6);

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  cursor:pointer;
  transition:.3s;

  box-shadow:
    inset -8px -8px 20px rgba(0,0,0,0.2),
    inset 8px 8px 20px rgba(255,255,255,0.6),
    0 10px 20px rgba(0,0,0,0.15);
}

.option:hover{
  transform:scale(1.08);
}

/* OPTION IMAGE */
.option img{
  width: clamp(60px, 10vw, 120px);
  height: clamp(60px, 10vw, 120px);
  object-fit:contain;
  margin-top: clamp(4px, 1vh, 10px);
}

/* OPTION TEXT */
.option p{
  font-size: clamp(14px, 1.2vw + 0.5vh, 20px);
  font-weight:600;
  color:#1a3c50;
}

/* CORRECT */
.correct{
  border:4px solid #ffd54f;
  background:rgba(255,255,200,0.4);
}
.nav{
  margin-top: clamp(10px, 2vh, 25px);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* REMOVE flex:1 */
button{
  border:none;
  padding: clamp(10px, 1.2vw, 14px) clamp(20px, 3vw, 32px);
  font-size: clamp(15px, 1.4vw + 0.6vh, 20px);
  font-weight:600;
  border-radius:50px;
  cursor:pointer;
  transition:all .3s ease;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
   min-width: clamp(100px, 14vw, 150px);
}

/* keep spacing like old */
.prev{
  align-self:flex-start;
}

.next{
  align-self:flex-end;
}

/* PREV */
.prev{
  background:linear-gradient(45deg,#ff7a7a,#ffb199);
  color:white;
}

.prev:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* NEXT */
.next{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
}

.next:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* DISABLED */
button:disabled{
  background:#dcdcdc;
  color:#888;
  box-shadow:none;
  cursor:not-allowed;
}

/* POPUP */
.kid-popup{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:3000;
}

.kid-card{
  background:#fff;
  width: clamp(260px, 50vw, 320px);
  padding: clamp(15px, 2vw, 25px);
  border-radius:30px;
  text-align:center;
}

.kid-icon{
  font-size: clamp(3em, 6vw, 4.5em);
  margin-bottom:10px;
}

.kid-card h3{
  font-size: clamp(1.4em, 2.5vw, 2em);
  margin-bottom:8px;
}

.kid-card p{
  font-size: clamp(1em, 1.5vw, 1.2em);
}

.kid-correct .kid-card{
  background:#e6fffa;
  border:6px solid #38d9a9;
}

.kid-wrong .kid-card{
  background:#fff5f5;
  border:6px solid #ffa8a8;
}

/* FINAL POPUP */
#finalPopup{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:4000;
}

.final-kid-box{
  background:linear-gradient(135deg,#fff7d6,#e6fff5);
  padding: clamp(20px, 3vw, 35px);
  border-radius:35px;
  text-align:center;
  width: clamp(280px, 60vw, 420px);
}

.final-kid-box h2{
  font-size: clamp(1.6em, 3vw, 2.2em);
  color:#2f9e44;
  margin-bottom:10px;
}

.final-kid-box p{
  font-size: clamp(1.1em, 2vw, 1.3em);
  font-weight:600;
}

#stars{
  font-size: clamp(1.5em, 3vw, 2.3em);
  margin:12px 0;
}

.playAgain-btn{
  background:#ffac30;
  color:#fff;
  border:none;
  padding: clamp(10px, 1.5vw, 14px) clamp(20px, 3vw, 34px);
  border-radius:30px;
  font-size: clamp(1em, 1.5vw, 1.1em);
  cursor:pointer;
  margin-top:12px;
}

/* POP ANIMATION */
@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(.4)}
  70%{transform:translate(-50%,-50%) scale(1.1)}
  100%{transform:translate(-50%,-50%) scale(1)}
}

/* ========================= */
/* Desktop / Monitor */
/* ========================= */
@media screen and (min-width: 1025px) and (max-width: 1440px){

  .quiz-box{
    max-width:1500px;
    height:65%;
  }

  .question{
    font-size:38px;
  }

  .question-img{
    width:260px;
    height:200px;
  }

  .option{
    width:200px;
    height:200px;
  }

  .option img{
    width:140px;
    height:140px;
  }

  .option p{
    font-size:24px;
  }

  button{
    padding:14px 35px;
    font-size:22px;
  }

}


/* ========================= */
/* Large Monitors */
/* ========================= */
@media screen and (min-width: 1441px) and (max-width: 1920px){

  .quiz-box{
    max-width:1700px;
    height:70%;
  }

  .question{
    font-size:40px;
  }

  .question-img{
    width:320px;
    height:240px;
  }

  .options{
    gap:30px;
  }

  .option{
    width:220px;
    height:220px;
  }

  .option img{
    width:140px;
    height:140px;
  }

  .option p{
    font-size:24px;
  }

  button{
    padding:16px 45px;
    font-size:22px;
  }

}


/* ========================= */
/* Extra Large Screens / 4K */
/* ========================= */
@media screen and (min-width: 1921px){

  .quiz-box{
    max-width:2000px;
    height:75%;
  }

  .question{
    font-size:50px;
  }

  .question-img{
    width:380px;
    height:280px;
  }

  .options{
    gap:40px;
  }

  .option{
    width:260px;
    height:260px;
  }

  .option img{
    width:170px;
    height:170px;
  }

  .option p{
    font-size:28px;
  }

  button{
    padding:20px 55px;
    font-size:26px;
  }

}
</style>
</head>

<body>

<div class="quiz-box">

<div class="question" id="question"></div>

<img id="questionImg" class="question-img">

<div class="options" id="options"></div>

<div class="nav">
<button class="prev" id="prevBtn" onclick="prevQ()" disabled>← Prev</button>
<button class="next" id="nextBtn" onclick="nextQ()" disabled>Next →</button>
</div>

</div>

<div id="answerPopup" class="kid-popup">
<div class="kid-card">
<div class="kid-icon" id="popupIcon"></div>
<h3 id="popupTitle"></h3>
<p id="popupMsg"></p>
</div>
</div>

<div id="finalPopup">
<div class="final-kid-box">
<h2>🎉 Congratulations!</h2>
<p id="finalScore"></p>
<div id="stars"></div>
<button class="playAgain-btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>

/* QUIZ DATA */

const quiz=[

{
q:"Q1. Birds can also breathe directly through their open ______.",
img:"../images/mcq1.png",
options:[
{img:"../images/mcq11.png",text:"Nose"},
{img:"../images/mcq22.png",text:"Eyes"},
{img:"../images/mcq33.png",text:"Ears"},
{img:"../images/beak.png",text:"Beaks"}
],
correct:0
},

{
q:"Q2. A ______ eats the flesh of other animals.",
img:"../images/mcq2.png",
options:[
{img:"../images/sparrow.png",text:"Sparrow"},
{img:"../images/vulture-img.png",text:"Vulture"},
{img:"../images/pegion.png",text:"Pigeon"},
{img:"../images/hoopie.png",text:"Hoopoe"}
],
correct:1
},

{
q:"Q3. A ______ pokes holes in the hard wood of tree trunks.",
img:"../images/mcq3.png",
options:[
{img:"../images/pegion.png",text:"Pigeon"},
{img:"../images/Eagle.png",text:"Eagle"},
{img:"../images/hen-img.png",text:"Hen"},
{img:"../images/hoopie.png",text:"Hoopoe"}
],
correct:3
},

{
q:"Q4. A ______ has a broad and flat beak with big holes.",
img:"../images/mcq4.png",
options:[
{img:"../images/hawk.png",text:"Hawk"},
{img:"../images/crow.png",text:"Crow"},
{img:"../images/duck.png",text:"Duck"},
{img:"../images/sparrow.png",text:"Sparrow"}
],
correct:2   
},

{
q:"Q5. Sharp and hooked claws are called ______.",
img:"../images/mcq5.png",
options:[
{img:"../images/talons1.png",text:"Talons"},
{img:"../images/nail.png",text:"Nails"},
{img:"../images/toes.png",text:"Toes"},
{img:"../images/trowel.png",text:"Trowels"}
],
correct:0
}

]

let current=0
let score=0
let answered=false
let userAnswers = new Array(quiz.length).fill(null);

function correctConfetti(){
confetti({
particleCount:40,
spread:70,
origin:{y:0.6}
})
}

function speakText(text){

const speech = new SpeechSynthesisUtterance(text);

speech.lang = "en-GB";   // UK English
speech.volume = 0.25;
speech.rate = 1;
speech.pitch = 1;

speechSynthesis.speak(speech);

}

function showPopup(isCorrect){

const popup=document.getElementById("answerPopup")
const icon=document.getElementById("popupIcon")
const title=document.getElementById("popupTitle")
const msg=document.getElementById("popupMsg")

popup.className="kid-popup "+(isCorrect?"kid-correct":"kid-wrong")
popup.style.display="flex"

if(isCorrect){

icon.textContent="🎉😊"
title.textContent="Great Job!"
msg.textContent="You got it right!"

}else{

icon.textContent="😅"
title.textContent="Oops!"
msg.textContent="Try again!"

}

setTimeout(()=>popup.style.display="none",1400)

}

function loadQuestion(){

document.getElementById("nextBtn").disabled=true
document.getElementById("prevBtn").disabled=current===0
answered=false

document.getElementById("question").innerText=quiz[current].q

/* LOAD QUESTION IMAGE */

document.getElementById("questionImg").src=quiz[current].img

const optionsDiv=document.getElementById("options")
optionsDiv.innerHTML=""

quiz[current].options.forEach((opt,i)=>{

const card=document.createElement("div")
card.classList.add("option")

card.innerHTML=`
<img src="${opt.img}">
<p>${opt.text}</p>
`

/* Restore previous answer highlight */

if(userAnswers[current] === i){
card.classList.add("correct")
answered = true
document.getElementById("nextBtn").disabled=false
}

card.onclick=()=>{

if(answered) return

if(i===quiz[current].correct){

answered=true
card.classList.add("correct")

score++
userAnswers[current] = i;

correctConfetti()

showPopup(true)
speakText("Correct")

if(current === quiz.length - 1){
setTimeout(showResult,1200)
}else{
document.getElementById("nextBtn").disabled=false
}

}else{
showPopup(false)

speakText("wrong")

}

}

optionsDiv.appendChild(card)

})

}

function nextQ(){

if(!answered) return

if(current<quiz.length-1){
current++
loadQuestion()
}else{
showResult()
}

}

function prevQ(){
if(current>0){
current--
loadQuestion()
}
}
function finalConfetti(){

confetti({
particleCount:120,
spread:120,
origin:{y:0.6}
});

setTimeout(()=>{
confetti({
particleCount:80,
spread:100,
origin:{y:0.6}
});
},300);

}
function showResult(){

const popup=document.getElementById("finalPopup")

document.getElementById("finalScore").textContent =
"Your Score: "+score+" / "+quiz.length

document.getElementById("stars").textContent="⭐".repeat(score)

popup.style.display="flex"

finalConfetti()

}

loadQuestion()

</script>

</body>
</html>
