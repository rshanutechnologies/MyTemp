<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grade3 Lesson5</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Livvic';
}

body{
height:100vh;
display:flex;
background:#9ec3da;
overflow:hidden;
}
.sidebar{
width:270px;
position:relative;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;

padding-top:40px;
gap:10px;

height:100vh;     /* ADD THIS */
}
/* REALISTIC WOOD STICK */

.wood-stick{
position:absolute;
top:0;
bottom:0;
width:60px;              /* thicker stick */

left:50%;
transform:translateX(-50%);

border-radius:30px;

background:
linear-gradient(90deg,
#7a4a24 0%,
#9b6234 20%,
#c2874e 40%,
#a66a3b 60%,
#c2874e 80%,
#7a4a24 100%),

repeating-linear-gradient(
90deg,
rgba(255,255,255,.08) 0px,
rgba(255,255,255,.08) 2px,
rgba(0,0,0,.05) 3px,
rgba(0,0,0,.05) 6px
);

box-shadow:
inset -6px 0 10px rgba(0,0,0,.35),
inset 6px 0 8px rgba(255,255,255,.25),
0 10px 15px rgba(0,0,0,.25);

z-index:0;
}

/* HANGING WOOD BOARD BUTTON */
.quiz-btn{
margin-top:20px;
width:230px;
height:65px;

display:flex;
align-items:center;
justify-content:flex-start;   /* align content left */

padding-left:35px;            /* space from left */

gap:12px;

font-size:20px;
font-weight:600;

color:#fff;
cursor:pointer;

border-radius:14px;
position:relative;

transition:0.25s;

box-shadow:
0 5px 0 rgba(0,0,0,.25),
inset 0 2px 3px rgba(255,255,255,.15);
}

/* icon fixed width */

.icon{
width:28px;       /* fixed space for icons */
text-align:center;
font-size:22px;
}

/* text alignment */

.text{
flex:1;
}
/* rope holes */

.quiz-btn::before,
.quiz-btn::after{
content:"";
position:absolute;
top:8px;

width:10px;
height:10px;

background:#5c3a1e;
border-radius:50%;

box-shadow:
inset 0 2px 3px rgba(0,0,0,.5);
}

.quiz-btn::before{
left:18px;
}

.quiz-btn::after{
right:18px;
}

/* MATTE COLORS */

.choose{
background:#d86c6c;
}

.fill{
background:#5bb5d6;
}

.true{
background:#6eb07a;
}

.match{
background:#e4a657;
}

/* hover lift */

.quiz-btn:hover{
transform:translateY(-4px);
box-shadow:
0 8px 0 rgba(0,0,0,.25),
inset 0 2px 3px rgba(255,255,255,.15);
}

/* press effect */

.quiz-btn:active{
transform:translateY(2px);
box-shadow:
0 2px 0 rgba(0,0,0,.25);
}
/* icons */

.icon{
font-size:24px;
}
.bunny{
position:absolute;
bottom:10px;
font-size:60px;
z-index:2;
}
.content{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
}

/* LIMIT CONTENT WIDTH FOR LARGE SCREENS */

.screen{
width:100%;
max-width:1100px;   /* keeps layout fixed on large monitors */
height:720px;       /* fixed height for consistent layout */
border-radius:20px;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* MOBILE */

.menu-toggle{
display:none;
}
.quiz-btn.active{

border:2px dashed #ffe066;

box-shadow:
0 0 0 4px rgba(255,224,102,0.6),
0 10px 0 rgba(0,0,0,.25),
0 0 20px rgba(255,224,102,0.8);


}

@keyframes activeGlow{
0%{box-shadow:0 0 0 4px rgba(255,224,102,0.5);}
50%{box-shadow:0 0 20px rgba(255,224,102,0.9);}
100%{box-shadow:0 0 0 4px rgba(255,224,102,0.5);}
}

.quiz-btn.active{
border:4px dashed #ffe066;
animation:activeGlow 1.5s infinite;
}
@media(max-width:1000px){

.sidebar{
position:fixed;
right:-260px;   /* hide on right */
left:auto;      /* disable left */
top:0;
height:100%;
transition:.3s;
background:#9ec3da;
}

.sidebar.open{
right:0;        /* open from right */
}

.menu-toggle{
display:block;
position:fixed;
top:10px;
right:15px;     /* button on right */
font-size:28px;
background:white;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
z-index:999;
}

}
@media (min-width:1600px){

.sidebar{
width:360px;
}

.quiz-btn{
width:300px;
height:90px;
font-size:26px;
padding-left:50px;
}

.icon{
font-size:30px;
width:40px;
}

.wood-stick{
width:90px;
}

.bunny{
font-size:80px;
}

/* SCALE QUIZ AREA */

.content{
padding:80px;
}

.screen{
max-width:1200px;
height:800px;
}

}

@media (min-width:2000px){

.sidebar{
width:420px;
}

.quiz-btn{
width:360px;
height:110px;
font-size:32px;
}

.icon{
font-size:36px;
width:50px;
}

.wood-stick{
width:110px;
}

.bunny{
font-size:95px;
}

.screen{
max-width:1500px;
height:950px;
}

}
</style>
</head>

<body>

<button class="menu-toggle" id="menuToggle">☰</button>

<div class="sidebar" id="menu">

<div class="wood-stick"></div>
<div class="quiz-btn choose active" data-file="./exercise/mcq.html">
<span class="icon">✔</span>
<span class="text">Choose Option</span>
</div>

<div class="quiz-btn fill" data-file="./exercise/fillintheblanks.html">
<span class="icon">🌀</span>
<span class="text">Fill The Blanks</span>
</div>

<div class="quiz-btn true" data-file="./exercise/truefalse.html">
<span class="icon">📖</span>
<span class="text">True / False</span>
</div>

<div class="quiz-btn match" data-file="./exercise/matching.html">
<span class="icon">🍀</span>
<span class="text">Matching</span>
</div>

<div class="bunny">🐰</div>

</div>


<div class="content">

<div class="screen">
<iframe id="frame" src="./exercise/mcq.html"></iframe>
</div>

</div>


<script>

const buttons=document.querySelectorAll(".quiz-btn");
const frame=document.getElementById("frame");
const menu=document.getElementById("menu");
const toggle=document.getElementById("menuToggle");

buttons.forEach(btn=>{

btn.onclick=()=>{

buttons.forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

frame.src=btn.dataset.file;

menu.classList.remove("open");

};

});

toggle.onclick=()=>{

menu.classList.toggle("open");

};

</script>

</body>
</html>
