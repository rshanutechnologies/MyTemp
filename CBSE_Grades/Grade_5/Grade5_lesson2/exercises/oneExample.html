<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Science Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/oneExample.css">
</head>

<body>

<div class="quiz">

<div class="question" id="question"></div>

<div class="imgbox">
<img style="display: none;" id="questionImage">
</div>

<div class="options" id="options"></div>

<div class="nav">
<button class="prev" id="prev">← Prev</button>
<button class="next" id="next">Next →</button>
</div>

</div>

<!-- POPUP -->

<div id="answerPopup" class="popup">
<div class="popup-content">
<div class="popup-icon" id="popupIcon"></div>
<h3 id="popupTitle"></h3>
<p id="popupMsg"></p>
</div>
</div>

<!-- FINAL -->

<div id="final" class="final">

<h2>🎉 Congratulations!</h2>
<h3 id="score"></h3>

<div>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<button class="playBtn" onclick="playAgain()">Play Again</button>

</div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="../assets/js/oneExample.js"></script>


</body>
</html>
