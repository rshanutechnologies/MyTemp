<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assessment Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Livvic',sans-serif;
}

body{
 height:100vh;
/*background:linear-gradient(#f7e9c8,#c9e6f7); */
/* background-image: url("assets/images/BG-O.png");
background-repeat: no-repeat;
background-size: cover; */
background: white;
display:flex;
justify-content:center;
align-items:center;
}

/* WRAPPER */

.wrapper{
width:100%;
max-width:1300px;
height:100%;
padding:10px;
}

/* FRAME */

.frame{

width:100%;
height:100%;
background-image: url("assets/images/BG-O.png");
background-repeat: no-repeat;
background-size: cover;
background-position: center;
border:22px solid #c69052;
border-radius:16px;

/* background:#f7f3ea; */

box-shadow:
inset 0 0 10px rgba(0,0,0,0.35),
0 15px 40px rgba(0,0,0,0.35);

display:flex;
flex-direction:column;

padding:10px;

position:relative;

}

/* NAVBAR */

.top-nav{

display:flex;
justify-content:center;
flex-wrap:wrap;

gap:18px;
margin-bottom:10px;

}

/* NAV BUTTON */

.nav-btn{

padding:12px 26px;

font-size:17px;
font-weight:600;

border:none;
border-radius:30px;

cursor:pointer;

box-shadow:
0 4px 8px rgba(0,0,0,0.25),
inset 0 2px 4px rgba(255,255,255,0.4);

transition:0.2s;

opacity:0.45;
}

.nav-btn:hover{
transform:translateY(-2px);
}

/* ACTIVE BUTTON */

.nav-btn.active{

outline:3px solid white;

box-shadow:
0 0 0 4px rgba(0,0,0,0.15),
0 6px 12px rgba(0,0,0,0.25),
inset 0 2px 4px rgba(255,255,255,0.5);

transform:scale(1.05);

}

/* COLORS */

.mcq{
background:linear-gradient(#8fc3eb,#5aa3d6);
color:white;
}

.fill{
background:linear-gradient(#ffc86d,#f3a83e);
color:white;
}

.true{
background:linear-gradient(#8ed681,#4caf50);
color:white;
}

.two{
background:linear-gradient(#f7a6e3,#db5ec1);
color:white;
}

.match{
background:linear-gradient(#ffd76a,#f4b52c);
color:white;
}

/* CONTENT AREA */

.content{

flex:1;

/* background:linear-gradient(#f7e9c8,#c9e6f7); */
background: transparent;
border-radius:12px;


overflow:hidden;

}

iframe{
width:100%;
height:100%;
border:none;
}

/* MOBILE MENU BUTTON */

.menu-btn{

display:none;

position:absolute;

top:10px;
right: 10px;

font-size:24px;

background:#333;
color:white;

border:none;

border-radius:6px;

padding:6px 12px;

cursor:pointer;

}

/* ---------------- MOBILE ---------------- */

@media (max-width:768px){

.wrapper{
padding:0;
}

.frame{
border:10px solid #c69052;
border-radius:10px;
padding-top:50px;
}

/* hamburger button */

.menu-btn{
display:block;
}

/* hide nav */

.top-nav{

display:none;

flex-direction:column;

position:absolute;

top:60px;
left:10px;

background:white;

padding:15px;

border-radius:10px;

box-shadow:0 10px 25px rgba(0,0,0,0.3);

gap:12px;

}

/* show nav */

.top-nav.show{
display:flex;
}

.nav-btn{
font-size:15px;
padding:10px 20px;
}

}

/* ------------- TABLET ------------- */

@media (max-width:1000px){

.nav-btn{
font-size:15px;
padding:10px 20px;
}

}

/* ACTIVE BUTTON */

.nav-btn.active{

outline:3px solid white;

box-shadow:
0 0 0 4px rgba(0,0,0,0.15),
0 6px 12px rgba(0,0,0,0.25),
inset 0 2px 4px rgba(255,255,255,0.5);

transform:scale(1.05);

/* active button full brightness */
opacity:1;

display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

/* GREEN CIRCLE WITH TICK INSIDE TEXT */

.nav-btn.active::before{

content:"✔";

width:18px;
height:18px;

background:#2ecc71;
color:white;

font-size:15px;

display:flex;
align-items:center;
justify-content:center;

border-radius:50%;

box-shadow:
0 0 6px rgba(46,204,113,0.8),
0 0 12px rgba(46,204,113,0.6),
0 0 18px rgba(46,204,113,0.4);

}

</style>
</head>

<body>

<div class="wrapper">

<div class="frame">

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="top-nav" id="navbar">

<button class="nav-btn mcq active" onclick="openPage('exercises/MCQ.html',this)">MCQ's</button>

<button class="nav-btn fill" onclick="openPage('exercises/FITB.html',this)">Fill in the Blanks</button>

<button class="nav-btn true" onclick="openPage('exercises/True_false.html',this)">True / False</button>

<button class="nav-btn two" onclick="openPage('exercises/oneExample.html',this)">One Example</button>

<button class="nav-btn match" onclick="openPage('exercises/matching.html',this)">Matching</button>

</div>

<div class="content">

<iframe id="viewer" src="exercises/MCQ.html"></iframe>

</div>

</div>

</div>

<script>

function openPage(page,btn){

document.getElementById("viewer").src = page;

document.querySelectorAll(".nav-btn").forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

/* close mobile menu */

document.getElementById("navbar").classList.remove("show");

}

function toggleMenu(){

document.getElementById("navbar").classList.toggle("show");

}

</script>

</body>
</html>
