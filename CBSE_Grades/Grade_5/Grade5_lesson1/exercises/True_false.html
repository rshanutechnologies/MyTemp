<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>True False Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/True_false.css">

</head>

<body>

<div class="quiz">

<div class="question" id="question"></div>

<div class="row">

<div class="tf-options">

<button class="tf-btn true" onclick="check(true)" id="trueBtn">
<span class="icon">✔</span>
<span class="label">TRUE</span>
</button>

<button class="tf-btn false" onclick="check(false)" id="falseBtn">
<span class="icon">✖</span>
<span class="label">FALSE</span>
</button>

</div>

<div class="imgbox">
<img id="questionImage" src="">
</div>

</div>

<div class="nav">
<button class="prev" id="prev" disabled>← Prev</button>
<button class="next" id="next" disabled>Next →</button>
</div>

</div>

<div id="popup" class="popup">
<div class="popup-content">
<div class="popup-icon" id="popupIcon"></div>
<h3 id="popupTitle"></h3>
<p id="popupMsg"></p>
</div>
</div>

<div id="final" class="final">

<h2>🎉 Congratulations!</h2>
<h3 id="score"></h3>

<div>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<button class="playBtn" onclick="playAgain()">Play Again</button>

</div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="../assets/js/true_false.js"></script>


</body>
</html>
