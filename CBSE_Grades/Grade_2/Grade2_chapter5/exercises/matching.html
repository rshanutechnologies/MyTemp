<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Matching Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/CSS/matching.css">

</head>

<body>

<div class="quiz">
  <!-- HEADER -->
    <div class="quiz-header">
        <div class="quiz-title">
            🌱 Plant World Quiz
            <div class="quiz-subtitle">
                Let's explore the world of plants!
            </div>
        </div>

        <div class="score-box" id="scoreBox">
            Score: 0
        </div>
    </div>
 <div class="match-area">
    <div class="column left" id="leftCol"></div>

    <svg id="lineLayer"></svg>

    <div class="column right" id="rightCol"></div>
</div>
</div>

<div id="finalPopup" class="popup">
  <div class="popup-content">
    <h2>🎉 Congratulations!</h2>
    <div id="finalScore"></div>
    <div id="stars"></div>
    <button  class="playAgain-btn"   onclick="location.reload()">Play Again</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="../assets/JavaScript/matching.js"></script>
</body>
</html>
