<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Habitat Quiz</title>

<!-- ✅ Livvic Font -->
<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/CSS/one_example.css">
</head>

<body>
<div class="app">
    <div class="template">

        <!-- ✅ PROGRESS ABOVE QUESTION ✅ -->
      <!-- ===== QUIZ HEADER ===== -->
<div class="quiz-header">

  <div class="quiz-title">
    🌱 Plant World Quiz
    <div class="quiz-subtitle">
      Let's explore the world of plants!
    </div>
  </div>

<div class="score-box" id="scoreBox">
  Score: 0
</div>


</div>
<div class="quiz-row">

  <!-- LEFT SIDE -->
  <div class="left-panel">
      <div class="title" id="titleText"></div>

      <div class="animal-wrap">
          <img id="animalImg" class="animal-img">
      </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="options" id="optionsBox"></div>

</div>

      

        <!-- ✅ BUTTONS -->
        <nav class="quiz-nav">
    <button class="prev" id="prevBtn">← Prev</button>
    <button class="next" id="nextBtn">Next →</button>
</nav>

    </div>
</div>

<!-- ANSWER POPUP -->
<div id="answerPopup" class="popup">
  <div class="popup-content">
    <div id="popupIcon" class="popup-icon"></div>
    <div id="popupTitle" class="popup-title"></div>
    <div id="popupMsg" class="popup-msg"></div>
  </div>
</div>

<!-- FINAL POPUP -->
<div id="finalPopup" class="popup final-popup">
  <div class="popup-content">
    <h2>🎉 Congratulations!</h2>
    <div id="finalScore"></div>
    <div id="stars"></div>
    <button class="playAgain-btn" onclick="location.reload()">Play Again</button>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>


<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
<script src="../assets/JavaScript/one_example.js"></script>
</body>
</html>
