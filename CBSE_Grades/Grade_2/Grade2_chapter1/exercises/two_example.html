<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plant Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/CSS/two_example.css">
</head>

<body>

<div class="quiz">
 <!-- HEADER -->
    <div class="quiz-header">
        <div class="quiz-title">
            🌱 Plant World Quiz
            <div class="quiz-subtitle">
                Let's explore the world of plants!
            </div>
        </div>

        <div class="score-box" id="scoreBox">
            Score: 0
        </div>
    </div>

  <!-- QUESTION -->
  <div class="question" id="question"></div>
   <img
    id="questionImg"
    src=""
    alt="Question image"
    style="
      width:300px;
      height:200px;
      object-fit:contain;
      margin:2px auto;
      display:block;
      /* background-color: yellow; */
    padding: 0 !important;
    "
  />
 
<div class="answer-slots" id="answerSlots"></div>

<!-- LETTER JAR -->
<div class="jar" id="letterJar"></div>
<button
id="submitBtn"
style="
  padding:14px 40px;
  font-size:22px;
  border-radius:999px;
  border:none;
  background:#22c55e;
  color:white;
  cursor:pointer;
   
  "
>
Submit
</button>


   


  <!-- NAV -->
  <div class="nav">
    <button class="prev" id="prev" disabled>← Prev</button>
    <button class="next" id="next" disabled>Next →</button>
  </div>

</div>
<!-- CORRECT / WRONG POPUP -->
    <div id="answerPopup" class="popup">
        <div class="popup-content">
            <div class="popup-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>
 
    <!-- FINAL POPUP -->
    <div id="finalPopup"> <div class=" finalpopup-box">
        <h2 class="final-heading">🎉 Congratulations!</h2>
        <p id="finalScore"></p>
        <div id="stars"></div><br> <button onclick="location.reload()" class="playAgain-btn"> Play Again </button>
    </div>
    </div>
 
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="../assets/JavaScript/two_example.js"></script>
</body>
</html>
