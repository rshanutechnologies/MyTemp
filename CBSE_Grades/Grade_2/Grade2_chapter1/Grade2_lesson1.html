<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grade2_chapter1</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
font-family:'Livvic';
/* background:url("./assets/images/T1_Index_bg.png") center/cover no-repeat; */
 background:url("./assets/images/T1_bg_final.png") center/cover no-repeat;
overflow: hidden;

}

/* SIDEBAR (Desktop visible) */

.sidebar{
width:290px;
padding:30px 20px;
display:flex;
flex-direction:column;
justify-content:center;
gap:28px;
transition:0.3s;
}

/* MENU BUTTON */

.menu-btn{
width:100%;
height:90px;
padding:0 20px;
border-radius:24px;
font-size:18px;
font-weight:500;
cursor:pointer;
transition:all 0.3s ease;
background:#ffffff;
border:1px solid #e8e8e8;
display:flex;
align-items:center;
gap:18px;
box-shadow:0 6px 16px rgba(0,0,0,0.06);
}

.icon-box{
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
color:white;
flex-shrink:0;
}

.menu-btn:hover{
transform:translateX(8px);
box-shadow:0 10px 22px rgba(0,0,0,0.12);
}

/* COLORS */

.color1.active{ background:#ffe8f0; border-color:white; }
.color1 .icon-box{ background:#ff4d88; }

.color2.active{ background:#e6f9ff; border-color:white; }
.color2 .icon-box{ background:#00bcd4; }

.color3.active{ background:#e9fbe9; border-color:white; }
.color3 .icon-box{ background:#4caf50; }

.color4.active{ background:#fff4e6; border-color:white; }
.color4 .icon-box{ background:#ff9800; }

.color5.active{ background:#f3e8ff; border-color:white; }
.color5 .icon-box{ background:#9c27b0; }

.color6.active{ background:#eef3ff; border-color:white; }
.color6 .icon-box{ background:#5b6cff; }

/* CONTENT */

.content{
flex:1;
position:relative;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* TOGGLE BUTTON (hidden by default) */

.toggle-btn{
position:fixed;
top:15px;
right:15px;
background:white;
border:none;
width:45px;
height:45px;
border-radius:10px;
font-size:20px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
display:none;
z-index:1000;
}

/* MOBILE STYLES */

@media (max-width:768px){

.sidebar{
position:fixed;
top:0;
left:-100%;
width:96vw;
height:100vh;
padding:25px;
z-index:999;
/* box-shadow:0 0 20px rgba(0,0,0,0.2); */
transition:0.3s;
background:url("./assets/images/T1_Index_bg.png") center/cover no-repeat;
}
body{
    background:url("./assets/images/T1_Index_bg.png") center/cover no-repeat !important;
}

.sidebar.active{
left:0;
}

.toggle-btn{
display:block;
background:#8b97ff;
color:white;
}

.menu-btn{
height:70px;
font-size:16px;
padding:0 16px;
width: 92vw !important;
}

.icon-box{
width:42px;
height:42px;
font-size:18px;
}

.content{
width:100%;
height:100vh;
}

iframe{
width:100%;
height:100%;
}

.sidebar .menu-btn{
margin-bottom:10px;
}

}

</style>
</head>

<body>

<button class="toggle-btn" id="toggleBtn">
<i class="fa-solid fa-bars"></i>
</button>

<div class="sidebar" id="sidebar">

<div class="menu-btn color1 active"
onclick="loadPage(this,'./exercises/mcq.html')">
<div class="icon-box">
<i class="fa-solid fa-circle-check"></i>
</div>
Choose Correct
</div>

<div class="menu-btn color2"
onclick="loadPage(this,'./exercises/fillblanks.html')">
<div class="icon-box">
<i class="fa-solid fa-keyboard"></i>
</div>
Fill in Blanks
</div>

<div class="menu-btn color4"
onclick="loadPage(this,'./exercises/true_false.html')">
<div class="icon-box">
<i class="fa-solid fa-scale-balanced"></i>
</div>
True / False
</div>

<div class="menu-btn color3"
onclick="loadPage(this,'./exercises/matching.html')">
<div class="icon-box">
<i class="fa-solid fa-link"></i>
</div>
Matching
</div>

<div class="menu-btn color5"
onclick="loadPage(this,'./exercises/two_example.html')">
<div class="icon-box">
<i class="fa-solid fa-comment-dots"></i>
</div>
One Word
</div>

<div class="menu-btn color6"
onclick="loadPage(this,'./exercises/one_example.html')">
<div class="icon-box">
<i class="fa-solid fa-chalkboard-user"></i>
</div>
One Example
</div>

</div>

<div class="content">

<iframe id="contentFrame" src="./exercises/mcq.html"></iframe>

</div>

<script>

const sidebar=document.getElementById("sidebar");
const toggleBtn=document.getElementById("toggleBtn");

/* mobile sidebar toggle */

toggleBtn.onclick=()=>{
sidebar.classList.toggle("active");
};

function loadPage(btn,url){

document.querySelectorAll('.menu-btn')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

document.getElementById('contentFrame').src=url;

/* close sidebar after click on mobile */

if(window.innerWidth<=768){
sidebar.classList.remove("active");
}

}

</script>

</body>
</html>
