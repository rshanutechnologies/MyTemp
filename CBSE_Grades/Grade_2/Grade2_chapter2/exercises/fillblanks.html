<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fill in the Blank</title>
<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/CSS/fillblanks.css">
</head>

<body>
   <div class="main">

    <!-- HEADER -->
    <div class="quiz-header">
        <div class="quiz-title">
            🌱 Plant World Quiz
            <div class="quiz-subtitle">
                Let's explore the world of plants!
            </div>
        </div>

        <div class="score-box" id="scoreBox">
            Score: 0
        </div>
    </div>

    <!-- CONTENT -->
    <div class="question" id="qText"></div>
        <div class="left">
            <img id="qImg" src="../assests/images/q5-img.png">
        </div>
              <div class="blank-game">

<div id="answerSlots" class="answer-slots"></div>

<button id="submitBtn" class="submit" style="display: none;">Submit</button>

</div>
    


          <nav class="quiz-nav">
    <button class="prev" id="prevBtn">← Prev</button>
    <button class="next" id="nextBtn">Next →</button>
</nav>

 <!-- ANSWER POPUP -->
<div id="answerPopup" class="popup">
  <div class="popup-content">
    <div id="popupIcon" class="popup-icon"></div>
    <div id="popupTitle" class="popup-title"></div>
    <div id="popupMsg" class="popup-msg"></div>
  </div>
</div>

<!-- FINAL POPUP -->
<div id="finalPopup" class="popup">
  <div class="popup-content">
    <h2>🎉 Congratulations!</h2>
    <div id="finalScore"></div>
    <div id="stars"></div>
     <button class="playAgain-btn" onclick="location.reload()">Play Again</button>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="../assets/JavaScript/fillblanks.js"></script>
</body>

</html>
