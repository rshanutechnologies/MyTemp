<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assessment Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Livvic';
}

/* BODY */

body{

height:100vh;

background-image:url("assets/images/BG-appp.png");
background-size:cover;
background-position:center;

display:flex;
flex-direction:column;

}

/* FRAME */

.frame{

flex:1;

display:flex;
flex-direction:column;

width:100%;
max-width:1300px;

margin:auto;

position:relative;

}

/* ☰ MENU BUTTON */

.menu-btn{

display:none;

position:absolute;

top:10px;
right:15px;   /* RIGHT SIDE */

font-size:26px;

background:#333;
color:white;

border:none;

border-radius:6px;

padding:6px 12px;

cursor:pointer;

z-index:1000;

}

/* NAVBAR */

.top-nav{

display:flex;
justify-content:center;
gap:20px;

flex-wrap:wrap;

padding:10px 0;

}

/* NAV BUTTON */

.nav-btn{

padding:14px 30px;

font-size:18px;
font-weight:600;

border:none;
border-radius:16px;

cursor:pointer;

color:#f2f2f2;

box-shadow:
0 4px 8px rgba(0,0,0,0.35),
inset 0 2px 4px rgba(255,255,255,0.3);

transition:0.2s;

display:flex;
align-items:center;
gap:8px;

opacity:0.5;
filter:grayscale(30%);
}

.nav-btn:hover{
transform:translateY(-2px);
}

.nav-btn.active{
outline:3px solid rgba(255,255,255,0.7);
}

/* COLORS */

.mcq{
background:linear-gradient(#e8d7b7,#d7c39c);
color:#4b3c1f;
}

.fill{
background:linear-gradient(#7f7bd4,#6561bd);
}

.true{
background:linear-gradient(#e07a6f,#c55e53);
}

.match{
background:linear-gradient(#75ab9f,#589387);
}

.one{
background:linear-gradient(#4be79f,#5ddba8);
}

/* CONTENT */

.content{

flex:1;

display:flex;

border-radius:20px;

overflow:hidden;

}

iframe{

flex:1;

width:100%;
height:100%;

border:none;

}


/* SHOW MENU BUTTON FOR MOBILE + TABLET */
@media (max-width:1100px){

  .menu-btn{
    display:block;
  }

  /* MOBILE/TABLET MENU */
  .top-nav{

    display:none;

    flex-direction:column;

    position:absolute;

    top:50px;
    right:10px;

    background:white;

    padding:15px;

    border-radius:12px;

    box-shadow:0 10px 25px rgba(0,0,0,0.35);

    gap:12px;

    z-index:999;
  }

  .top-nav.show{
    display:flex;
  }

  .nav-btn{
    width:220px;
    font-size:16px;
    padding:12px 20px;
  }

}

/* ---------------- MOBILE ---------------- */

@media (max-width:768px){

.menu-btn{
display:block;
}

/* MOBILE MENU */

.top-nav{

display:none;

flex-direction:column;

position:absolute;

top:50px;
right:10px;   /* RIGHT SIDE MENU */

background:white;

padding:15px;

border-radius:12px;

box-shadow:0 10px 25px rgba(0,0,0,0.35);

gap:12px;

z-index:999;

}

.top-nav.show{
display:flex;
}

.nav-btn{

width:200px;

font-size:15px;

padding:10px 20px;

}

}

/* ICON STYLE */

.icon{

display:flex;
align-items:center;
justify-content:center;

width:22px;
height:22px;

font-size:14px;

}

/* ACTIVE ICON CIRCLE */

.nav-btn.active .icon{

background:#2ecc71;
color:white;

border-radius:50%;

/* glow effect */

box-shadow:
0 0 6px rgba(46,204,113,0.8),
0 0 12px rgba(46,204,113,0.6),
0 0 18px rgba(46,204,113,0.4);

}

.nav-btn.active{

outline:3px solid rgba(255,255,255,0.7);

/* highlight */
opacity:1;
filter:none;

transform:scale(1.05);

}
</style>
</head>

<body>

<div class="frame">

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<!-- NAVBAR -->

<div class="top-nav" id="navbar">

<button class="nav-btn mcq active" onclick="openPage('exercises/MCQ.html',this)">
<span class="icon"><i class="fa-solid fa-file-circle-check"></i></span> Choose Option
</button>

<button class="nav-btn fill" onclick="openPage('exercises/FITB.html',this)">
<span class="icon"><i class="fa-solid fa-pencil"></i></span> Fill Blanks
</button>

<button class="nav-btn true" onclick="openPage('exercises/True_false.html',this)">
<span class="icon"><i class="fa-solid fa-check"></i></span> True / False
</button>

<button class="nav-btn match" onclick="openPage('exercises/matching.html',this)">
<span class="icon"><i class="fa-solid fa-link"></i></span> Matching
</button>



</div>

<!-- CONTENT -->

<div class="content">

<iframe id="viewer" src="./exercises/MCQ.html"></iframe>

</div>

</div>

<script>

/* OPEN PAGE */

function openPage(page,btn){

document.getElementById("viewer").src = page;

document.querySelectorAll(".nav-btn").forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

/* CLOSE MOBILE MENU */

document.getElementById("navbar").classList.remove("show");

}

/* TOGGLE MENU */

function toggleMenu(){

const menu=document.getElementById("navbar");

menu.classList.toggle("show");

}

</script>

</body>
</html>
