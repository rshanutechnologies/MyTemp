<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Grade4_Lesson5</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Livvic", sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: url("./assets/images/BGGG.png");
            background-size: 100% 100%;
        }

        .app {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ── TOPBAR ── laptop base (≤1366px) */
        .topbar {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70px;
            margin: 0 14px;
        }

        .nav-group {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            max-width: 1150px;
            padding: 8px;
        }

        .nav-slider {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            border-radius: 40px;
            transition: transform .45s cubic-bezier(.65, .05, .36, 1), width .35s ease;
            z-index: 0;
        }

        /* ── ISLAND BTN ── laptop base (≤1366px) */
        .island-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
            white-space: nowrap;
            transition: .3s;
            color: #2b2b2b;
            background: #f4f4f4;
            box-shadow: 0 6px 14px rgba(0, 0, 0, .12);
            transform: translateY(0);
            opacity: .6;
            filter: grayscale(1);
            position: relative;
            z-index: 2;
        }

        .island-btn:hover {
            transform: translateY(-4px) scale(1.01);
            opacity: .9;
        }

        .island-btn.active {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.18), 0 0 0 2px white;
            opacity: 1;
            filter: none;
        }

        .island-btn:nth-child(2).active { background: #ffb7b7; }
        .island-btn:nth-child(3).active { background: #c7e5ff; }
        .island-btn:nth-child(4).active { background: #c7ffca; }
        .island-btn:nth-child(5).active { background: #ffeaa7; }
        .island-btn:nth-child(6).active { background: #ff199456; }
        .island-btn:nth-child(7).active { background: hsla(197, 55%, 67%, 0.5); }

        .main {
            flex: 1;
            padding: 8px 0 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .menu-btn {
            display: none;
        }

        .offcanvas {
            display: none;
        }

        /* ── DESKTOP ── above 1366px */
        @media (min-width: 1367px) {

            .topbar {
                height: 90px;
                margin: 0 20px;
            }

            .nav-group {
                gap: 20px;
                max-width: 1300px;
                padding: 10px;
            }

            .island-btn {
                padding: 22px 32px;
                font-size: 20px;
            }
        }

        /* ── MOBILE ── ≤900px */
        @media (max-width: 900px) {

            .topbar {
                display: none;
            }

            .menu-btn {
                display: block;
                position: fixed;
                top: 1px;
                right: 2px;
                font-size: 18px;
                background: #f59e0b;
                color: white;
                border: none;
                border-radius: 8px;
                padding: 4px 9px;
                cursor: pointer;
                z-index: 5000;
            }

            .offcanvas {
                position: fixed;
                inset: 0;
                background: url("./assets/images/BGGG.png");
                display: none;
                z-index: 4000;
                margin-top: 5%;
            }

            .offcanvas.show {
                display: block;
            }

            .offcanvas-panel {
                position: absolute;
                right: 0;
                top: 0;
                width: 260px;
                height: 100%;
                background: url("./assets/images/BGGG.png");
                padding: 24px;
                padding-top: 70px;
                display: flex;
                flex-direction: column;
                gap: 30px;
                transform: translateX(100%);
                transition: .35s;
                overflow-y: auto;
            }

            .offcanvas.show .offcanvas-panel {
                transform: translateX(0);
                display: flex;
                justify-content: flex-start;
                align-items: center;
            }

            .offcanvas-panel .island-btn {
                flex: none;
                width: 100%;
                justify-content: flex-start;
                padding: 16px 18px;
                border-radius: 40px;
                font-size: 14px;
            }

            .offcanvas-panel .island-btn:nth-child(1).active { background: #FFE3C8; }
            .offcanvas-panel .island-btn:nth-child(2).active { background: #CFE8FF; }
            .offcanvas-panel .island-btn:nth-child(3).active { background: #D7F7DC; }
            .offcanvas-panel .island-btn:nth-child(4).active { background: #FFF2C6; }
            .offcanvas-panel .island-btn:nth-child(5).active { background: #FFD8DD; }
            .offcanvas-panel .island-btn:nth-child(6).active { background: #DCD6FF; }
        }

    </style>
</head>

<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="app">

        <div class="topbar">
            <div class="nav-group">

                <div class="nav-slider" id="navSlider"></div>

                <div class="island-btn active" onclick="openIsland(0)">
                    <i class="fa-solid fa-list-check"></i>
                    Correct Options
                </div>

                <div class="island-btn" onclick="openIsland(1)">
                    <i class="fa-solid fa-pencil"></i>
                    Fill The Blanks
                </div>

                <div class="island-btn" onclick="openIsland(2)">
                    <i class="fa-solid fa-scale-balanced"></i>
                    True / False
                </div>

                <div class="island-btn" onclick="openIsland(3)">
                    <i class="fa-solid fa-link"></i>
                    Matching
                </div>

            </div>
        </div>

        <div class="main">
            <iframe id="contentFrame" src="./exercises/mcq.html"></iframe>
        </div>

    </div>

    <div class="offcanvas" id="offcanvas" onclick="toggleMenu()">

        <div class="offcanvas-panel" onclick="event.stopPropagation()">

            <div class="island-btn active" onclick="mobileOpen(0)">
                <i class="fa-solid fa-list-check"></i>
                Correct Options
            </div>

            <div class="island-btn" onclick="mobileOpen(1)">
                <i class="fa-solid fa-pencil"></i>
                Fill The Blanks
            </div>

            <div class="island-btn" onclick="mobileOpen(2)">
                <i class="fa-solid fa-scale-balanced"></i>
                True / False
            </div>

            <div class="island-btn" onclick="mobileOpen(3)">
                <i class="fa-solid fa-arrows-left-right"></i>
                Matching
            </div>

        </div>

    </div>

    <script>

        const sidebarButtons = document.querySelectorAll(".topbar .island-btn");
        const mobileButtons = document.querySelectorAll(".offcanvas .island-btn");

        const slider = document.getElementById("navSlider");
        const frame = document.getElementById("contentFrame");

        const pages = [
            "./exercises/mcq.html",
            "./exercises/FTB.html",
            "./exercises/true_false.html",
            "./exercises/matching.html",
            "./exercises/one_example.html",
            "./exercises/one_word.html",
        ];

        function moveSlider(el) {
            slider.style.width = el.offsetWidth + "px";
            slider.style.transform = `translateX(${el.offsetLeft}px)`;
        }

        function openIsland(index) {
            sidebarButtons.forEach(btn => btn.classList.remove("active"));
            sidebarButtons[index].classList.add("active");

            mobileButtons.forEach(btn => btn.classList.remove("active"));
            mobileButtons[index].classList.add("active");

            moveSlider(sidebarButtons[index]);
            frame.src = pages[index];
        }

        function toggleMenu() {
            if (window.innerWidth > 900) return;
            document.getElementById("offcanvas").classList.toggle("show");
        }

        function mobileOpen(i) {
            openIsland(i);
            toggleMenu();
        }

        window.onload = () => {
            moveSlider(sidebarButtons[0]);
        };

    </script>

</body>

</html>
