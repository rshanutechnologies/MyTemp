<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grade4_Lesson3</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Livvic", sans-serif;
}

body {
    min-height: 100vh;
    overflow: hidden;
    background: url("./assets/images/bg-img-blurred.png");
    background-size: cover;
}

/* APP */
.app {
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* TOPBAR */
.topbar {
    display: flex;
    justify-content: center;
    align-items: center;
    height: clamp(55px, 7vh, 70px);
    /* margin: 0 clamp(10px, 3vw, 20px); */
    margin-top:clamp(10px, 2vh, 25px);
}

/* NAV */
.nav-group {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(10px, 2vw, 18px);
    width: 100%;
    max-width: 1150px;
    padding: clamp(6px, 1vw, 10px);
}

/* SLIDER */
.nav-slider {
    position: absolute;
    top: 10px;
    left: 10px;
    height: calc(100% - 20px);
    border-radius: 12px;
    transition: transform .45s cubic-bezier(.65, .05, .36, 1), width .35s ease;
    z-index: 1;
}

/* BUTTONS */
.island-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(5px, 1vw, 8px);
    padding: clamp(8px, 1.2vw, 14px) clamp(12px , 2vw, 18px);
    font-size: clamp(15px, 2.8vw, 18px);
    font-weight: 600;
    cursor: pointer;
    border-radius: 50% ;
    white-space: nowrap;
    transition: .3s;
    color: #2b2b2b;
    background: #ffffff;
    box-shadow: 0 6px 14px rgba(0, 0, 0, .12);
    opacity: .6;
    filter: grayscale(1);
}

.island-btn:hover {
    transform: translateY(-4px) scale(1.01);
    opacity: .9;
}

.island-btn.active {
    transform: translateY(-6px) scale(1.02);
    border: 4px solid white;
    opacity: 1;
    filter: none;
}

/* ACTIVE COLORS */
.island-btn:nth-child(2).active { background: #ffb7b7; }
.island-btn:nth-child(3).active { background: #c7e5ff; }
.island-btn:nth-child(4).active { background: #c7ffca; }
.island-btn:nth-child(5).active { background: #ffeaa7; }

/* MAIN */
.main {
    flex: 1;
    padding: clamp(5px, 1vw, 10px) 0 0;
}

/* IFRAME */
iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* MOBILE MENU */
.menu-btn {
    display: none;
}

.offcanvas {
    display: none;
}

/* 🔥 SINGLE BREAKPOINT */
@media (max-width: 900px) {

    .topbar {
        display: none;
    }

    .menu-btn {
        display: block;
        position: fixed;
        top: clamp(10px, 2vw, 15px);
        right: clamp(10px, 2vw, 15px);
        /* font-size: clamp(15px, 3vw, 18px); */
        background: #f59e0b;
        color: white;
        border: none;
        border-radius: 8px;
        padding: clamp(5px, 1.5vw, 8px) clamp(10px, 2vw, 12px);
        cursor: pointer;
        z-index: 5000;
    }

    .offcanvas {
        position: fixed;
        inset: 0;
        background: url("./assets/images/bg-img-blurred.png");
        display: none;
        z-index: 4000;
        margin-top: 5%;
    }

    .offcanvas.show {
        display: block;
    }

    .offcanvas-panel {
        position: absolute;
        right: 0;
        top: 0;
        width: clamp(240px, 70%, 320px);
        height: 100%;
        background: url("./assets/images/bg-img-blurred.png");
        padding: clamp(20px, 4vw, 30px);
        padding-top: clamp(60px, 10vh, 80px);
        display: flex;
        flex-direction: column;
        gap: clamp(20px, 4vw, 40px);
        transform: translateX(100%);
        transition: .35s;
        overflow-y: auto;
    }

    .offcanvas.show .offcanvas-panel {
        transform: translateX(0);
        align-items: center;
    }

    /* REDUCE NAV TAB HEIGHT */
.offcanvas-panel .island-btn {
    width: 100%;
    
    display: flex;
    align-items: center;
    justify-content: center; /* 🔥 center icon + text */
    
    gap: clamp(8px, 2vw, 12px); /* 🔥 space between icon & text */
    
    padding: clamp(10px, 2vw, 14px); /* 🔥 reduced height */
    
    border-radius: 40px;
    font-size: clamp(15px, 3vw, 18px);
}
}
</style>
</head>

<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="app">

    <!-- DESKTOP NAV -->
    <div class="topbar">
        <div class="nav-group">

            <div class="nav-slider" id="navSlider"></div>

            <div class="island-btn active" onclick="openIsland(0)">
                <i class="fa-solid fa-list-check"></i>
                Correct Options
            </div>

            <div class="island-btn" onclick="openIsland(1)">
                <i class="fa-solid fa-pencil"></i>
                Fill The Blanks
            </div>

            <div class="island-btn" onclick="openIsland(2)">
                <i class="fa-solid fa-scale-balanced"></i>
                True / False
            </div>

            <div class="island-btn" onclick="openIsland(3)">
                <i class="fa-solid fa-link"></i>
                Matching
            </div>

        </div>
    </div>

    <!-- CONTENT -->
    <div class="main">
        <iframe id="contentFrame" src="./assets/exercises/mcq.html"></iframe>
    </div>

</div>

<!-- MOBILE MENU -->
<div class="offcanvas" id="offcanvas" onclick="toggleMenu()">
    <div class="offcanvas-panel" onclick="event.stopPropagation()">

        <div class="island-btn active" onclick="mobileOpen(0)">
            <i class="fa-solid fa-list-check"></i>
            Correct Options
        </div>

        <div class="island-btn" onclick="mobileOpen(1)">
            <i class="fa-solid fa-pencil"></i>
            Fill The Blanks
        </div>

        <div class="island-btn" onclick="mobileOpen(2)">
            <i class="fa-solid fa-scale-balanced"></i>
            True / False
        </div>

        <div class="island-btn" onclick="mobileOpen(3)">
            <i class="fa-solid fa-arrows-left-right"></i>
            Matching
        </div>

    </div>
</div>

<script>
const sidebarButtons = document.querySelectorAll(".topbar .island-btn");
const mobileButtons = document.querySelectorAll(".offcanvas .island-btn");
const slider = document.getElementById("navSlider");
const frame = document.getElementById("contentFrame");

const pages = [
    "./assets/exercises/mcq.html",
    "./assets/exercises/fib.html",
    "./assets/exercises/tf.html",
    "./assets/exercises/matching.html"
];

function moveSlider(el) {
    slider.style.width = el.offsetWidth + "px";
    slider.style.transform = `translateX(${el.offsetLeft}px)`;
}

function openIsland(index) {
    sidebarButtons.forEach(btn => btn.classList.remove("active"));
    sidebarButtons[index].classList.add("active");

    mobileButtons.forEach(btn => btn.classList.remove("active"));
    mobileButtons[index].classList.add("active");

    moveSlider(sidebarButtons[index]);
    frame.src = pages[index];
}

function toggleMenu() {
    if (window.innerWidth > 900) return;
    document.getElementById("offcanvas").classList.toggle("show");
}

function mobileOpen(i) {
    openIsland(i);
    toggleMenu();
}

window.onload = () => {
    moveSlider(sidebarButtons[0]);
};
</script>

</body>
</html>
