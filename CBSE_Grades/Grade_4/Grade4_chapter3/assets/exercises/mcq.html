<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MCQ Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="../css/mcq.css">
</head>

<body>

    <div class="quiz">

        <div class="quiz-layout">

            <div class="header">
                <h2 id="question"></h2>
                <div class="question-image">
                    <img id="questionImg">
                </div>
            </div>

            <div class="options" id="options"></div>

        </div>

        <div class="controls">
            <button class="prev" id="prevBtn"><i class="fa-solid fa-angles-left"></i>Prev</button>
            <button class="next" id="nextBtn">Next<i class="fa-solid fa-angles-right"></i> </button>
        </div>

    </div>

    <div id="answerPopup" class="kid-popup">
        <div class="kid-card">
            <div class="kid-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <div id="finalPopup">
        <div class="final-kid-box">
            <h2>🎉 Congratulations!</h2>
            <p id="finalScore"></p>
            <div id="stars"></div>
            <button class="playAgain-btn" onclick="restartQuiz()">Play Again</button>
        </div>
    </div>

    <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

    <script src="../js/mcq.js"></script>

</body>

</html>
