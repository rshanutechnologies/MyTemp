<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MCQ Quiz</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/CSS/mcq.css">
</head>

<body>

    <!-- ✅ Wrapper added ONLY for centering main content -->
    <div class="quiz-wrapper">

        <div class="quiz">

            <div class="header">
                <div id="question"></div>

                <div class="question-image">
                    <img id="questionImg" src="" alt="">
                </div>
            </div>

            <div class="options" id="options"></div>

            <div class="controls">
                <button class="prev" id="prevBtn">← Prev</button>
                <button class="next" id="nextBtn">Next →</button>
            </div>

        </div>

    </div>

    <!-- ✅ ANSWER POPUP (UNCHANGED) -->
    <div id="answerPopup" class="kid-popup">
        <div class="kid-card">
            <div class="kid-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <!-- ✅ FINAL POPUP (UNCHANGED) -->
    <div id="finalPopup">
        <div class="final-kid-box">
            <h2>🎉 Congratulations!</h2>
            <p id="finalScore"></p>
            <div id="stars"></div>
            <button class="playAgain-btn" onclick="location.reload()">
                Play Again
            </button>
        </div>
    </div>

    <!-- ✅ AUDIO & JS (UNCHANGED) -->
    <audio id="correctSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>

    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="../assets/JavaScript/mcq.js"></script>

</body>
</html>
