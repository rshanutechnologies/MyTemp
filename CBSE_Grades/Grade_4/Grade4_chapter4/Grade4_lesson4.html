
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nature Quiz</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Livvic', sans-serif;
}

body {
    height: 100vh;
    background: url("./assets/images/bg.png");
    background-size: cover;
    overflow: hidden;
}

/* APP */
.app {
    display: flex;
    height: 100vh;
    background: rgba(128, 128, 128, 0.26);
}

/* SIDEBAR */
.sidebar {
    width: clamp(200px, 16vw, 240px);
    padding: clamp(15px, 2vw, 20px) clamp(8px, 1.5vw, 12px);

    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(12px, 2vw, 18px); /* 🔥 increased */
}

/* PATH */
.path {
    width: 100%;
    height: 100%;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: clamp(18px, 3vw, 30px); /* 🔥 increased */
}

/* LEAF */
.leaf {
    width: 100%;
    padding: clamp(12px, 2vw, 16px); /* 🔥 increased height */
    border-radius: 18px;

    background: #e5e5e5;
    color: #222;
    text-align: center;
    font-weight: 700;

    cursor: pointer;
    transition: 0.3s ease;

    box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
    filter: grayscale(100%);
}

.leaf:hover {
    transform: translateY(-4px);
}

.leaf.active {
    filter: grayscale(0%);
    color: #134e4a;
    box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
}

/* COLORS */
.leaf.l1.active { background: linear-gradient(135deg, #bae6fd, #7dd3fc); }
.leaf.l2.active { background: linear-gradient(135deg, #fde68a, #facc15); }
.leaf.l3.active { background: linear-gradient(135deg, #93ffb9, #78ffaa); }
.leaf.l4.active { background: linear-gradient(135deg, #ffb3bc, #ff8e9f); }

.leaf i {
    font-size: clamp(16px, 2vw, 20px);
    margin-bottom: 4px;
}

.leaf h3 {
    font-size: clamp(14px, 1.8vw, 16px);
    margin-bottom: 2px;
}

.leaf p {
    font-size: clamp(10px, 1.5vw, 12px);
    opacity: .8;
}

/* MAIN */
.main {
    flex: 1;
    height: 100%;

    display: flex;
    justify-content: center;
    align-items: center;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* MENU */
.menu-btn {
    display: none;
}

.offcanvas {
    display: none;
}

/* 🔥 SINGLE BREAKPOINT */
@media (max-width: 900px) {

    body {
        display: flex;                /* 🔥 FIX center */
        justify-content: center;
        align-items: center;
    }

    .app {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;     /* 🔥 center content */
        align-items: center;
    }

    .main {
        width: 100%;
        height: 100%;

        display: flex;
        justify-content: center;     /* 🔥 ensure center */
        align-items: center;
    }

    .sidebar {
        display: none;
    }

    .menu-btn {
        display: block;
        position: fixed;
        top: clamp(10px, 2vw, 15px);
        right: clamp(10px, 2vw, 15px);
        font-size: clamp(18px, 4vw, 24px);
        background: #22c55e;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: clamp(6px, 1.5vw, 10px);
        cursor: pointer;
        z-index: 5000;
    }

    .offcanvas {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .45);
        display: none;
        z-index: 4000;
    }

    .offcanvas.show {
        display: block;
    }

    .offcanvas-panel {
        position: absolute;
        right: 0;
        top: 0;
        width: clamp(240px, 70%, 320px);
        height: 100%;

        background: #ecfdf5;

        padding: clamp(18px, 3vw, 24px);
        padding-top: clamp(70px, 10vh, 90px);

        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(16px, 3vw, 22px); /* 🔥 increased */

        transform: translateX(100%);
        transition: transform .3s ease;
    }

    .offcanvas.show .offcanvas-panel {
        transform: translateX(0);
    }

    .offcanvas-panel .leaf {
        width: 100%;
        text-align: center;
        padding: clamp(12px, 2.5vw, 16px); /* 🔥 increased */
    }
}
</style>
</head>

<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="app">

        <div class="sidebar">
            <div class="path">

                <div class="leaf l1 active" onclick="openPage(0)">
                    <i class="fa-solid fa-check-double"></i>
                    <h3>Choose Answer</h3>
                </div>

                <div class="leaf l2" onclick="openPage(1)">
                    <i class="fa-solid fa-pen-to-square"></i>
                    <h3>Fill The Blanks</h3>
                </div>

                <div class="leaf l3" onclick="openPage(2)">
                    <i class="fa-solid fa-scale-balanced"></i>
                    <h3>True / False</h3>
                </div>

                <div class="leaf l4" onclick="openPage(3)">
                    <i class="fa-solid fa-link"></i>
                    <h3>Matching</h3>
                </div>

                <div class="leaf l2" onclick="openPage(4)">
                    <i class="fa-solid fa-pen-to-square"></i>
                    <h3>Two Examples</h3>
                </div>

            </div>
        </div>

        <div class="main">
            <iframe id="quizFrame" src="./exercises/mcq.html"></iframe>
        </div>

    </div>

    <!-- MOBILE -->
    <div class="offcanvas" id="offcanvas" onclick="toggleMenu()">
        <div class="offcanvas-panel" onclick="event.stopPropagation()">

            <div class="leaf l1 active" onclick="mobileOpen(0)">
                <i class="fa-solid fa-check-double"></i>
                <h3>Choose Answer</h3>
            </div>

            <div class="leaf l2" onclick="mobileOpen(1)">
                <i class="fa-solid fa-pen-to-square"></i>
                <h3>Fill The Blanks</h3>
            </div>

            <div class="leaf l3" onclick="mobileOpen(2)">
                <i class="fa-solid fa-scale-balanced"></i>
                <h3>True / False</h3>
            </div>

            <div class="leaf l4" onclick="mobileOpen(3)">
                <i class="fa-solid fa-link"></i>
                <h3>Matching</h3>
            </div>

            <div class="leaf l2" onclick="mobileOpen(4)">
                <i class="fa-solid fa-pen-to-square"></i>
                 <h3>Two Examples</h3>
            </div>

        </div>
    </div>

    <script>
        const frame = document.getElementById("quizFrame");

        const pages = [
            "./exercises/mcq.html",
            "./exercises/FTB.html",
            "./exercises/true_false.html",
            "./exercises/matching.html",
            "./exercises/two_example.html"
        ];

        function setActive(i) {
            document.querySelectorAll(".sidebar .leaf").forEach((l, index) => {
                l.classList.toggle("active", index === i);
            });

            document.querySelectorAll(".offcanvas-panel .leaf").forEach((l, index) => {
                l.classList.toggle("active", index === i);
            });
        }

        function openPage(i) {
            setActive(i);
            frame.src = pages[i];
        }

        function toggleMenu() {
            if (window.innerWidth > 900) return; /* ✅ Changed from 1150 → 900 */
            document.getElementById("offcanvas").classList.toggle("show");
        }

        function mobileOpen(i) {
            openPage(i);
            toggleMenu();
        }
    </script>

</body>

</html>
