<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nature Quiz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">


<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Livvic', sans-serif;
}

body {
    height: 100vh;
    background: url("./assets/images/bg.png") center/cover no-repeat;
    overflow: hidden;
}

/* APP */
.app {
    display: flex;               /* ✅ RESTORED */
    height: 100vh;
    background: rgba(128,128,128,0.26);
}

/* SIDEBAR (DESKTOP + LAPTOP) */
.sidebar {
    width: clamp(200px, 18vw, 280px);
    padding: 14px;
    display: flex;
    flex-direction: column;
    font-size: 20px;

}

.path {
    display: flex;
    flex-direction: column;
    gap: 10px;
    height: 100%;
}

.leaf {
    flex: 1;
    padding: 12px 10px;
    border-radius: 16px;
    background: #e5e5e5;
    text-align: center;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    filter: grayscale(100%);
    transition: .3s ease;
}

.leaf.active {
    filter: grayscale(0);
    box-shadow: 0 12px 24px rgba(0,0,0,0.2);
      background: linear-gradient(135deg, #22c55e, #4ade80); 
      color: white;
       transform: scale(1.03);  
}
.leaf:hover{
  transform: scale(1.02);
}

/* MAIN */
.main {
    flex: 1;
    height: 100%;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* MOBILE */
.menu-btn {
    display: none;
}

.offcanvas {
    display: none;
}

@media (max-width: 900px) {

    .sidebar {
        display: none;
    }

    .menu-btn {
        display: block;
        position: fixed;
        top: 12px;
        right: 12px;
        font-size: 24px;
        background: #22c55e;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 8px;
        cursor: pointer;
        z-index: 5000;
    }

    .offcanvas {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.45);
        display: none;
        z-index: 4000;
    }

    .offcanvas.show {
        display: block;
    }

    .offcanvas-panel {
        position: absolute;
        right: 0;
        top: 0;
        width: clamp(240px, 70%, 320px);
        height: 100%;
        background: #ecfdf5;
        padding: 20px;
        padding-top: 80px;

        display: flex;
        flex-direction: column;
        gap: 20px;

        transform: translateX(100%);
        transition: transform .3s ease;
    }

    .offcanvas.show .offcanvas-panel {
        transform: translateX(0);
    }
}
</style>
</head>

<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="app">

    <div class="sidebar">
        <div class="path">
            <div class="leaf active" onclick="openPage(0)">Choose Answer</div>
            <div class="leaf" onclick="openPage(1)">Fill The Blanks</div>
            <div class="leaf" onclick="openPage(2)">True / False</div>
            <div class="leaf" onclick="openPage(3)">Matching</div>
            <div class="leaf" onclick="openPage(4)">Two Examples</div>
        </div>
    </div>

    <div class="main">
        <iframe id="quizFrame" src="./exercises/mcq.html"></iframe>
    </div>
</div>

<div class="offcanvas" id="offcanvas" onclick="toggleMenu()">
    <div class="offcanvas-panel" onclick="event.stopPropagation()">
        <div class="leaf active" onclick="mobileOpen(0)">Choose Answer</div>
        <div class="leaf" onclick="mobileOpen(1)">Fill The Blanks</div>
        <div class="leaf" onclick="mobileOpen(2)">True / False</div>
        <div class="leaf" onclick="mobileOpen(3)">Matching</div>
        <div class="leaf" onclick="mobileOpen(4)">Two Examples</div>
    </div>
</div>

<script>
const frame = document.getElementById("quizFrame");

const pages = [
    "./exercises/mcq.html",
    "./exercises/FTB.html",
    "./exercises/true_false.html",
    "./exercises/matching.html",
    "./exercises/two_example.html"
];

function openPage(i) {
    frame.src = pages[i];
     document.querySelectorAll(".sidebar .leaf").forEach(el => el.classList.remove("active"));
    document.querySelectorAll(".sidebar .leaf")[i].classList.add("active");
}

function toggleMenu() {
    if (window.innerWidth > 900) return;
    document.getElementById("offcanvas").classList.toggle("show");
}

function mobileOpen(i) {
    openPage(i);
     document.querySelectorAll(".offcanvas .leaf").forEach(el => el.classList.remove("active"));
    document.querySelectorAll(".offcanvas .leaf")[i].classList.add("active");

    toggleMenu();
}
</script>

</body>
</html>
