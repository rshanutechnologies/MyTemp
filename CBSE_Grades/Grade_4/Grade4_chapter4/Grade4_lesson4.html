
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nature Quiz</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Livvic', sans-serif;
        }

        body {
            height: 100vh;
            background: url("./assets/images/bg.png");
            background-size: 100% 100%;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            background: rgba(128, 128, 128, 0.26);
        }

        .sidebar {
            width: 260px;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
        }

        .path {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .leaf {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            background: #e5e5e5;
            color: #222;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            filter: grayscale(100%);
        }

        .leaf:hover {
            transform: translateY(-4px);
        }

        .leaf.active {
            filter: grayscale(0%);
            color: #134e4a;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
        }

        .leaf.l1.active {
            background: linear-gradient(135deg, #bae6fd, #7dd3fc);
        }

        .leaf.l2.active {
            background: linear-gradient(135deg, #fde68a, #facc15);
        }

        .leaf.l3.active {
            background: linear-gradient(135deg, #93ffb9, #78ffaa);
        }

        .leaf.l4.active {
            background: linear-gradient(135deg, #ffb3bc, #ff8e9f);
        }

        .leaf i {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .leaf h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .leaf p {
            font-size: 13px;
            font-weight: 600;
            opacity: .8;
        }

        .main {
            flex: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .menu-btn {
            display: none;
        }

        .offcanvas {
            display: none;
        }

        /* ✅ Changed from 1150px → 900px */
        @media (max-width: 900px) {

            .sidebar {
                display: none;
            }

            .menu-btn {
                display: block;
                position: fixed;
                top: 14px;
                right: 16px;
                font-size: 26px;
                background: #22c55e;
                color: #fff;
                border: none;
                border-radius: 10px;
                padding: 6px 12px;
                cursor: pointer;
                z-index: 5000;
            }

            .offcanvas {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, .45);
                display: none;
                z-index: 4000;
            }

            .offcanvas.show {
                display: block;
            }

            .offcanvas-panel {
                position: absolute;
                right: 0;
                top: 0;
                width: 320px;
                height: 100%;
                background: #ecfdf5;
                padding: 20px;
                padding-top: 80px;
                transform: translateX(100%);
                transition: transform .3s ease;
                overflow-y: auto;
            }

            .offcanvas.show .offcanvas-panel {
                transform: translateX(0);
            }

            .offcanvas-panel .leaf {
                margin-bottom: 15px;
            }
        }

        /* ✅ Changed from 1150px → 900px */
        @media (min-width: 900px) and (max-height: 800px) {
            .app {
                transform: scaleY(0.95);
                transform-origin: top center;
                height: calc(100vh / 0.95);
            }
        }

        @media (min-width: 900px) and (max-height: 700px) {
            .app {
                transform: scaleY(0.9);
                transform-origin: top center;
                height: calc(100vh / 0.9);
            }
        }

        @media (min-width: 900px) and (max-height: 600px) {
            .app {
                transform: scaleY(0.85);
                transform-origin: top center;
                height: calc(100vh / 0.85);
            }
        }

        @media (min-width: 900px) and (max-height: 500px) {
            .app {
                transform: scaleY(0.8);
                transform-origin: top center;
                height: calc(100vh / 0.8);
            }
        }
    </style>
</head>

<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="app">

        <div class="sidebar">
            <div class="path">

                <div class="leaf l1 active" onclick="openPage(0)">
                    <i class="fa-solid fa-check-double"></i>
                    <h3>Choose Answer</h3>
                </div>

                <div class="leaf l2" onclick="openPage(1)">
                    <i class="fa-solid fa-pen-to-square"></i>
                    <h3>Fill The Blanks</h3>
                </div>

                <div class="leaf l3" onclick="openPage(2)">
                    <i class="fa-solid fa-scale-balanced"></i>
                    <h3>True / False</h3>
                </div>

                <div class="leaf l4" onclick="openPage(3)">
                    <i class="fa-solid fa-link"></i>
                    <h3>Matching</h3>
                </div>

            </div>
        </div>

        <div class="main">
            <iframe id="quizFrame" src="./exercises/mcq.html"></iframe>
        </div>

    </div>

    <!-- MOBILE -->
    <div class="offcanvas" id="offcanvas" onclick="toggleMenu()">
        <div class="offcanvas-panel" onclick="event.stopPropagation()">

            <div class="leaf l1 active" onclick="mobileOpen(0)">
                <i class="fa-solid fa-check-double"></i>
                <h3>Choose Answer</h3>
            </div>

            <div class="leaf l2" onclick="mobileOpen(1)">
                <i class="fa-solid fa-pen-to-square"></i>
                <h3>Fill The Blanks</h3>
            </div>

            <div class="leaf l3" onclick="mobileOpen(2)">
                <i class="fa-solid fa-scale-balanced"></i>
                <h3>True / False</h3>
            </div>

            <div class="leaf l4" onclick="mobileOpen(3)">
                <i class="fa-solid fa-link"></i>
                <h3>Matching</h3>
            </div>

        </div>
    </div>

    <script>
        const frame = document.getElementById("quizFrame");

        const pages = [
            "./exercises/mcq.html",
            "./exercises/FTB.html",
            "./exercises/true_false.html",
            "./exercises/matching.html",
            "./exercises/two_example.html"
        ];

        function setActive(i) {
            document.querySelectorAll(".sidebar .leaf").forEach((l, index) => {
                l.classList.toggle("active", index === i);
            });

            document.querySelectorAll(".offcanvas-panel .leaf").forEach((l, index) => {
                l.classList.toggle("active", index === i);
            });
        }

        function openPage(i) {
            setActive(i);
            frame.src = pages[i];
        }

        function toggleMenu() {
            if (window.innerWidth > 900) return; /* ✅ Changed from 1150 → 900 */
            document.getElementById("offcanvas").classList.toggle("show");
        }

        function mobileOpen(i) {
            openPage(i);
            toggleMenu();
        }
    </script>

</body>

</html>
