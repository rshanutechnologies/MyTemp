<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animal Quiz</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/CSS/mcq.css">
</head>

<body>
  <div class="app">
    <div class="home" onclick="location.href='../index.html'">🏠 Home</div>

    <div class="title-pill" id="quizTitle">Animal Quiz</div>

    <div class="question-pill">
      <p class="question-text" id="questionText">Loading...</p>
    </div>

    <!-- ✅ NEW WRAPPER -->
    <div class="content">

      <!-- LEFT: IMAGE -->
      <div class="image-box">
        <img class="question-image" id="questionImage" src="" alt="question image">
      </div>

      <!-- RIGHT: OPTIONS -->
      <div class="options" id="optionsWrap"></div>

    </div>

    <div class="nav">
      <button class="nav-btn prev-btn" id="prevBtn" disabled>← Prev</button>
      <button class="nav-btn next-btn" id="nextBtn" disabled>Next →</button>
    </div>

  </div>

  <!-- ✅ POPUP (UNCHANGED) -->
  <div class="popup" id="popup">
    <div class="popup-box" id="popupBox"></div>
  </div>

  <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
  <audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

  <script src="../assets/JavaScript/mcq.js"></script>
</body>
</html>
