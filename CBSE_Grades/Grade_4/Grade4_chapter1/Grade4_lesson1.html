<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Body Quiz Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Livvic", sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: url('./assets/images/bg.png') center center / cover no-repeat;
    }

    /* ── NAV ── */
    .top-index {
      width: 100%;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      /* ✅ FIX: gap scales with screen, never pushes buttons to next line */
      gap: clamp(8px, 3vw, 60px);
      padding: 10px 16px;
     /* background: rgba(220, 235, 195, -0.45); */
     background: transparent;
      /* ✅ FIX: single row always, no wrapping */
      flex-wrap: nowrap;
      white-space: nowrap;
    }

    /* ── BUTTON ── */
    .index-btn {
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .35s ease;
      /* ✅ FIX: prevent button itself from shrinking */
      flex-shrink: 0;
    }

    .index-btn:hover { transform: translateY(-2px); }

    .index-btn.active .nav-text {
      border-color: #00be10;
      background-color: rgb(198, 255, 193);
    }

    /* ── NAV LABEL ── */
    .nav-text {
      /* ✅ FIX: wide enough to hold text in one line at all times */
      width: clamp(130px, 16vw, 210px);
      height: clamp(44px, 6vh, 72px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px 14px;
      border-radius: 18px;
      /* ✅ FIX: font scales down on small screens, never wraps */
      font-size: clamp(11px, 1.5vw, 18px);
      font-weight: 600;
      color: #2f3a4a;
      border: 3px solid transparent;
      text-align: center;
      white-space: nowrap; /* ✅ KEY FIX: text never breaks to second line */
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,.85),
        inset 0 -4px 6px rgba(0,0,0,.08),
        0 8px 10px rgba(0,0,0,.18);
      transition: all .3s ease;
    }

    .index-btn:nth-of-type(1) .nav-text { background: #ffb6d5; }
    .index-btn:nth-of-type(2) .nav-text { background: #FFEBD8; }
    .index-btn:nth-of-type(3) .nav-text { background: #F6F193; }

    /* ── IFRAME AREA ── */
    /* ✅ FIX: flex:1 + overflow:hidden = fills exactly remaining height */
    .content {
      flex: 1;
      overflow: hidden;
      /* ✅ FIX: position relative so iframe stretches inside correctly */
      position: relative;
    }

    /* ✅ FIX: iframe fills the entire .content box, no gap */
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── HAMBURGER ── */
    .mobile-toggle {
      display: none;
      position: fixed;
      top: 12px;
      right: 15px;
      z-index: 1000;
      background: #00cfff;
      color: #fff;
      font-size: 22px;
      border: none;
      padding: 8px 13px;
      border-radius: 10px;
      cursor: pointer;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: none;
      z-index: 998;
    }
    #overlay.show { display: block; }

    /* ── MOBILE ≤ 600px ── */
    @media (max-width: 600px) {

      .mobile-toggle { display: block; }

      /* slide-in drawer */
      .top-index {
        position: fixed;
        top: 0;
        right: -100%;
        width: 72%;
        height: 100vh;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 20px;
        padding-top: 70px;
        background: radial-gradient(circle at top, #fff5fb, #ffe6f5);
        box-shadow: -5px 0 20px rgba(0,0,0,.2);
        transition: right .4s ease;
        z-index: 999;
        flex-wrap: nowrap;
      }

      .top-index.active { right: 0; }

      .index-btn {
        width: 100%;
        max-width: 220px;
        justify-content: flex-start;
        padding-left: 16px;
      }

      .nav-text {
        width: 100%;
        height: 52px;
        font-size: 15px;
        white-space: nowrap;
        border-radius: 14px;
      }

      .content { height: 100vh; }
    }
  </style>
</head>

<body>

  <button class="mobile-toggle" id="menuToggle">☰</button>
  <div id="overlay"></div>

  <nav class="top-index">
    <button class="index-btn active" data-file="exercises/mcq.html">
      <span class="nav-text">📝 Choose Option</span>
    </button>
    <button class="index-btn" data-file="exercises/fillblanks.html">
      <span class="nav-text">✍️ Fill the Blanks</span>
    </button>
    <button class="index-btn" data-file="exercises/true_false.html">
      <span class="nav-text">⚖️ True / False</span>
    </button>
  </nav>

  <div class="content">
    <iframe id="quizFrame"></iframe>
  </div>

  <script>
    const iframe  = document.getElementById("quizFrame");
    const buttons = document.querySelectorAll(".index-btn");
    const toggle  = document.getElementById("menuToggle");
    const menu    = document.querySelector(".top-index");
    const overlay = document.getElementById("overlay");

    iframe.src = buttons[0].dataset.file;

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        iframe.src = btn.dataset.file;
        closeMenu();
      });
    });

    toggle.addEventListener("click", () => {
      menu.classList.toggle("active");
      overlay.classList.toggle("show");
    });

    overlay.addEventListener("click", closeMenu);

    function closeMenu() {
      menu.classList.remove("active");
      overlay.classList.remove("show");
    }
  </script>

</body>
</html>
