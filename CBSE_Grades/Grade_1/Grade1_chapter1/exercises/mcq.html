<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Journey Quiz</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="../assets/CSS/mcq.css">
    </style>
</head>

<body>

    <div class="quiz">
        <!-- <div class="title">MCQ'S Learning Quiz</div> -->

        <!-- PROGRESS -->
        <!-- <div class="journey">
            <div class="path"></div>
            <div class="boy" id="boy">🏃‍➡️</div>
            <div class="station">🏁</div>
            <div class="station">1</div>
            <div class="station">2</div>
            <div class="station">3</div>
            <div class="station">4</div>
            <div class="station">🎯</div>
        </div> -->

        <div class="question-box" id="question"></div>

        <div class="content">
            <div class="image-card">
                <img id="questionImg">
            </div>
            <div class="options" id="options"></div>
        </div>

        <div class="controls">
            <button class="prev" id="prevBtn" disabled>← Prev</button>
            <button class="next" id="nextBtn" disabled>Next →</button>
        </div>

    </div>

    <div id="answerPopup" class="kid-popup">
        <div class="kid-card">
            <div class="kid-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <div id="finalPopup">
        <div class="final-kid-box">
            <h2>🎉 Congratulations!</h2>
            <p id="finalScore"></p>
            <div id="stars"></div>
            <button class="playAgain-btn" onclick="location.reload()">
                Play Again
            </button>
        </div>
    </div>

    <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
    <script src="../assets/JavaScript/mcq.js"></script>
</body>

</html>
