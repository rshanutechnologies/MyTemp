<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade1_Lession1</title>
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Livvic", sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: url("./assets/images/bg1.png");
      background-size: 100% 100%;
    }

    /* ===== APP ===== */
    .app {
      height: 100vh;
      display: flex;
      background: rgba(206, 221, 217, 0.733);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 275px;
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 30px;
    }

    /* ===== HEADER ===== */
    /* .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 6px;
      }

      .header img {
        width: 140px;
        height: 92px;
        margin-bottom: 6px;
      }

      .sidebar-title {
        font-size: 20px;
        font-weight: 600;
        color: #0369a1;
        text-align: center;
      } */

    /* ===== OPTION BUTTON ===== */
    .island-btn {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 25px 18px;
      border-radius: 22px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 600;
      color: #1e293b;
      transform-style: preserve-3d;
      transition: transform .35s ease, box-shadow .35s ease;
      box-shadow:
        0 6px 12px rgba(0, 0, 0, .15),
        inset 0 1px 0 rgba(255, 255, 255, .6);
    }

    .island-btn img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 10px;
      flex-shrink: 0;
    }

    /* hover */
    .island-btn:hover {
      transform: translateY(-2px) scale(1.02);
    }

    /* ===== 3D ACTIVE EFFECT ===== */
    .island-btn.active {
      transform: perspective(700px) translateZ(2px) scale(1);
      font-weight: 600 !important;
      box-shadow:
        0 18px 28px rgba(0, 0, 0, .25),
        0 0 0 3px rgba(255, 255, 255, .9),
        0 0 24px rgba(255, 200, 0, .6),
        inset 0 3px 0 rgba(255, 255, 255, .85);
      /* box-shadow:
        0 10px 18px rgba(0, 0, 0, .18),
        0 6px 12px rgba(0, 0, 0, .12),
        0 0 14px rgba(255, 180, 0, .45),
        inset 0 2px 0 rgba(255, 255, 255, .7); */
    }

    /* light sheen */
    .island-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg,
          transparent 30%,
          rgba(255, 255, 255, .45) 50%,
          transparent 70%);
      transform: translateX(-120%);
      pointer-events: none;
    }

    .island-btn.active::after {
      animation: shine 2.8s ease-in-out infinite;
    }

    /* ===== DEFAULT DIMMED STATE ===== */
    .island-btn {
      opacity: .55;
      filter: saturate(.6);
    }

    /* ===== ACTIVE RESTORES COLOR ===== */
    .island-btn.active {
      opacity: 1;
      filter: none;
    }

    /* ===== SPARKLES ===== */
    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .sparkles span {
      position: absolute;
      width: 7px;
      height: 7px;
      background: radial-gradient(circle, #fff 40%, transparent 70%);
      opacity: 0;
      animation: sparkle 2.5s infinite;
    }

    .sparkles span:nth-child(1) {
      top: 12%;
      left: 18%;
      animation-delay: 0s;
    }

    .sparkles span:nth-child(2) {
      top: 18%;
      right: 20%;
      animation-delay: .8s;
    }

    .sparkles span:nth-child(3) {
      bottom: 16%;
      left: 25%;
      animation-delay: 1.6s;
    }

    /* ===== PASTEL COLORS ===== */
    .o1 {
      background: #ffe3c3;
    }

    .o2 {
      background: #c5e6fc;
    }

    .o3 {
      background: #ffe58f;
    }

    .o4 {
      background: #cafffb;
    }

    .o5 {
      background: #f8c5c8;
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes shine {
      0% {
        transform: translateX(-120%);
      }

      50% {
        transform: translateX(120%);
      }

      100% {
        transform: translateX(120%);
      }
    }

    @keyframes sparkle {

      0%,
      100% {
        opacity: 0;
        transform: scale(.6);
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    /* ================================
📱 MOBILE RESPONSIVE
================================ */

    .menu-btn {
      display: none;
    }

    .offcanvas {
      display: none;
    }

    @media (max-width:1065px) {

      body {
        overflow: hidden;
      }

      .app {
        flex-direction: column;
      }

      /* hide sidebar */
      .sidebar {
        display: none;
      }

      /* menu button */
      .menu-btn {
        display: block;
        position: fixed;
        top: 14px;
        right: 16px;
        font-size: 26px;
        background: #e9a106;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 6px 12px;
        cursor: pointer;
        z-index: 5000;
      }

      /* overlay */
      .offcanvas {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .45);
        display: none;
        z-index: 4000;
       
      }

      .offcanvas.show {
        display: block;
      }

      /* panel */
      .offcanvas-panel {
        position: absolute;
        right: 0;
        top: 0;
        width: 300px;
        height: 100%;
        background: #f1f5f9;
        padding: 20px;
        padding-top: 50px;
        transform: translateX(100%);
        transition: transform .3s ease;
        overflow-y: auto;
      }

      .offcanvas.show .offcanvas-panel {
        transform: translateX(0);
      }

      .offcanvas-panel .island-btn {
        width: 100%;
        margin-bottom: 16px;
      }

    }

    @media (min-width: 900px) and (max-height: 800px) {
      .app {
        transform: scaleY(0.95);
        transform-origin: top center;
        height: calc(100vh / 0.95);
      }
    }

    @media (min-width: 900px) and (max-height: 700px) {
      .app {
        transform: scaleY(0.9);
        transform-origin: top center;
        height: calc(100vh / 0.9);
      }
    }

    @media (min-width: 900px) and (max-height: 600px) {
      .app {
        transform: scaleY(0.85);
        transform-origin: top center;
        height: calc(100vh / 0.85);
      }
    }

    @media (min-width: 900px) and (max-height: 500px) {
      .app {
        transform: scaleY(0.8);
        transform-origin: top center;
        height: calc(100vh / 0.8);
      }
    }
  </style>
</head>

<body>

  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <div class="app">
    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- <div class="header">
        <img src="./assets/images/group-img.png" alt="Living">
        <div class="sidebar-title">Living & Non-living Things</div>
      </div> -->

      <div class="island-btn o1 active" onclick="openIsland(0)">
        <div class="sparkles">
          <span></span><span></span><span></span>
        </div>
        <img src="./assets/images/bear-img.png">
        Correct Options
      </div>

      <div class="island-btn o2" onclick="openIsland(1)">
        <div class="sparkles">
          <span></span><span></span><span></span>
        </div>
        <img src="./assets/images/pencil.png">
        Fill Blanks
      </div>

      <div class="island-btn o3" onclick="openIsland(2)">
        <div class="sparkles">
          <span></span><span></span><span></span>
        </div>
        <img src="./assets/images/forest-img.png">
        True / False
      </div>

      <div class="island-btn o4" onclick="openIsland(3)">
        <div class="sparkles">
          <span></span><span></span><span></span>
        </div>
        <img src="./assets/images/a-3.png">
        Matching
      </div>

      <div class="island-btn o5" onclick="openIsland(4)">
        <div class="sparkles">
          <span></span><span></span><span></span>
        </div>
        <img src="./assets/images/tiger-img.png">
        One Examples
      </div>

    </div>

    <!-- MAIN -->
    <div class="main">
      <iframe id="contentFrame" src="./exercises/mcq.html"></iframe>
    </div>

  </div>

  <div class="offcanvas" id="offcanvas" onclick="toggleMenu()">
    <div class="offcanvas-panel" onclick="event.stopPropagation()">

      <div class="island-btn o1 active" onclick="mobileOpen(0)">
        <img src="./assets/images/bear-img.png">
        Correct Options
      </div>

      <div class="island-btn o2" onclick="mobileOpen(1)">
        <img src="./assets/images/pencil.png">
        Fill Blanks
      </div>

      <div class="island-btn o3" onclick="mobileOpen(2)">
        <img src="./assets/images/forest-img.png">
        True / False
      </div>

      <div class="island-btn o4" onclick="mobileOpen(3)">
        <img src="./assets/images/a-3.png">
        Matching
      </div>

      <div class="island-btn o5" onclick="mobileOpen(4)">
        <img src="./assets/images/tiger-img.png">
        One Examples
      </div>

    </div>
  </div>

  <script>
    const sidebarButtons = document.querySelectorAll(".sidebar .island-btn");
    const mobileButtons = document.querySelectorAll(".offcanvas .island-btn");
    const frame = document.getElementById("contentFrame");

    const pages = [
      "./exercises/mcq.html",
      "./exercises/FTB.html",
      "./exercises/true_false.html",
      "./exercises/matching.html",
      "./exercises/one_example.html"
    ];

    function openIsland(index) {

      /* Sidebar active */
      sidebarButtons.forEach(btn => btn.classList.remove("active"));
      sidebarButtons[index].classList.add("active");

      /* Mobile active */
      mobileButtons.forEach(btn => btn.classList.remove("active"));
      mobileButtons[index].classList.add("active");

      frame.src = pages[index];
    }

    function toggleMenu() {
      document.getElementById("offcanvas").classList.toggle("show");
    }

    function mobileOpen(i) {
      openIsland(i);
      toggleMenu();
    }
  </script>

</body>

</html>
