<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade1_chapter5</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Livvic', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(130deg, #fffaf5, #ffeded);
      background-size: 10px 3px;
    }

    .app {
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 280px;
      padding: 22px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }

    .menu-btn {
      width: 100%;
      height: 70px;
      padding: 0 18px;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s ease;
      border: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgb(212, 212, 212);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .menu-btn:hover {
      transform: translateY(-4px);
    }

    .icon-box {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      flex-shrink: 0;
    }

    .color1.active {
      background: #ffc1d7;
    }

    .color1 .icon-box {
      background: #ff4d88;
    }

    .color2.active {
      background: #b0edff;
    }

    .color2 .icon-box {
      background: #00bcd4;
    }

    .color3.active {
      background: #a5ffa5;
    }

    .color3 .icon-box {
      background: #4caf50;
    }

    .color4.active {
      background: #ffd7a3;
    }

    .color4 .icon-box {
      background: #ff9800;
    }

    .color5.active {
      background: #d0a3ff;
    }

    .color5 .icon-box {
      background: #9c27b0;
    }

    .color6.active {
      background: #95b5ff;
    }

    .color6 .icon-box {
      background: #5b6cff;
    }

    .main {
      flex: 1;
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .menu-toggle {
      display: none;
    }

    .offcanvas {
      display: none;
    }

    @media(max-width:900px) {

      .app {
        flex-direction: column;
      }

      .sidebar {
        display: none;
      }

      .menu-toggle {
        display: block;
        position: fixed;
        top: 15px;
        right: 16px;
        font-size: 24px;
        background: #5b6cff;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 6px 12px;
        cursor: pointer;
        z-index: 5000;
      }

      .offcanvas {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .45);
        display: none;
        z-index: 4000;
      }

      .offcanvas.show {
        display: block;
      }

      .offcanvas-panel {
        position: absolute;
        right: 0;
        top: 0;
        width: 280px;
        height: 100%;
        background: #f8fafc;
        padding: 20px;
        padding-top: 80px;
        transform: translateX(100%);
        transition: transform .3s ease;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .offcanvas.show .offcanvas-panel {
        transform: translateX(0);
      }

    }

    @media (min-width: 900px) and (max-height: 800px) {
      .app {
        transform: scaleY(0.95);
        transform-origin: top center;
        height: calc(100vh / 0.95);
      }
    }

    @media (min-width: 900px) and (max-height: 700px) {
      .app {
        transform: scaleY(0.9);
        transform-origin: top center;
        height: calc(100vh / 0.9);
      }
    }

    @media (min-width: 900px) and (max-height: 600px) {
      .app {
        transform: scaleY(0.85);
        transform-origin: top center;
        height: calc(100vh / 0.85);
      }
    }

    @media (min-width: 900px) and (max-height: 500px) {
      .app {
        transform: scaleY(0.8);
        transform-origin: top center;
        height: calc(100vh / 0.8);
      }
    }

    /* ============================= */
    /* Desktop / Monitor (1025–1440) */
    /* ============================= */
    @media screen and (min-width: 1025px) and (max-width: 1440px) {

      .sidebar {
        width: 300px;
        gap: 28px;
      }

      .menu-btn {
        height: 75px;
        font-size: clamp(15px, 1vw, 17px);
        padding: 0 20px;
      }

      .icon-box {
        width: 48px;
        height: 48px;
        font-size: 21px;
      }
    }

    /* ============================= */
    /* Large Monitors (1441–1920) */
    /* ============================= */
    @media screen and (min-width: 1441px) and (max-width: 1920px) {

      .sidebar {
        width: 340px;
        gap: 32px;
        padding: 28px 16px;
      }

      .menu-btn {
        height: 85px;
        font-size: clamp(17px, 1.1vw, 20px);
        padding: 0 24px;
        border-radius: 22px;
      }

      .icon-box {
        width: 55px;
        height: 55px;
        font-size: 24px;
      }
    }

    /* ============================= */
    /* Extra Large Screens / 4K */
    /* ============================= */
    @media screen and (min-width: 1921px) {

      .sidebar {
        width: 420px;
        gap: 40px;
        padding: 36px 20px;
      }

      .menu-btn {
        height: 100px;
        font-size: clamp(20px, 1.2vw, 26px);
        padding: 0 30px;
        border-radius: 26px;
      }

      .icon-box {
        width: 65px;
        height: 65px;
        font-size: 28px;
      }

      iframe {
        border-radius: 14px;
      }
    }
  </style>
</head>

<body>

  <button class="menu-toggle" onclick="toggleMenu()">☰</button>

  <div class="app">

    <div class="sidebar">

      <div class="menu-btn color1 active" onclick="openPage(0)">
        <div class="icon-box"><i class="fa-solid fa-circle-check"></i></div>
        Choose Correct
      </div>

      <div class="menu-btn color2" onclick="openPage(1)">
        <div class="icon-box"><i class="fa-solid fa-keyboard"></i></div>
        Fill in Blanks
      </div>

      <div class="menu-btn color4" onclick="openPage(2)">
        <div class="icon-box"><i class="fa-solid fa-scale-balanced"></i></div>
        True / False
      </div>

      <div class="menu-btn color3" onclick="openPage(3)">
        <div class="icon-box"><i class="fa-solid fa-link"></i></div>
        Matching
      </div>

      <div class="menu-btn color6" onclick="openPage(4)">
        <div class="icon-box"><i class="fa-solid fa-chalkboard-user"></i></div>
        One Example
      </div>

      <div class="menu-btn color5" onclick="openPage(5)">
        <div class="icon-box"><i class="fa-solid fa-pen-to-square"></i></div>
        One Word
      </div>

    </div>

    <div class="main">
      <iframe id="contentFrame" src="./exercises/mcq.html"></iframe>
    </div>

  </div>

  <div class="offcanvas" id="offcanvas" onclick="toggleMenu()">

    <div class="offcanvas-panel" onclick="event.stopPropagation()">

      <div class="menu-btn color1 active" onclick="mobileOpen(0)">
        <div class="icon-box"><i class="fa-solid fa-circle-check"></i></div>
        Choose Correct
      </div>

      <div class="menu-btn color2" onclick="mobileOpen(1)">
        <div class="icon-box"><i class="fa-solid fa-keyboard"></i></div>
        Fill in Blanks
      </div>

      <div class="menu-btn color4" onclick="mobileOpen(2)">
        <div class="icon-box"><i class="fa-solid fa-scale-balanced"></i></div>
        True / False
      </div>

      <div class="menu-btn color3" onclick="mobileOpen(3)">
        <div class="icon-box"><i class="fa-solid fa-link"></i></div>
        Matching
      </div>

      <div class="menu-btn color6" onclick="mobileOpen(4)">
        <div class="icon-box"><i class="fa-solid fa-chalkboard-user"></i></div>
        One Example
      </div>

      <div class="menu-btn color5" onclick="mobileOpen(5)">
        <div class="icon-box"><i class="fa-solid fa-pen-to-square"></i></div>
        One Word
      </div>

    </div>

  </div>

  <script>

    const sidebarButtons = document.querySelectorAll(".sidebar .menu-btn");
    const mobileButtons = document.querySelectorAll(".offcanvas .menu-btn");
    const frame = document.getElementById("contentFrame");

    const pages = [
      "./exercises/mcq.html",
      "./exercises/fillblanks.html",
      "./exercises/true_false.html",
      "./exercises/matching.html",
      "./exercises/one_example.html",
      "./exercises/one_word.html"
    ];

    function openPage(index) {

      sidebarButtons.forEach(btn => btn.classList.remove("active"));
      sidebarButtons[index].classList.add("active");

      mobileButtons.forEach(btn => btn.classList.remove("active"));
      mobileButtons[index].classList.add("active");

      frame.src = pages[index];
    }

    function toggleMenu() {
      if (window.innerWidth > 900) return;
      document.getElementById("offcanvas").classList.toggle("show");
    }

    function mobileOpen(i) {
      openPage(i);
      toggleMenu();
    }
  </script>
</body>

</html>
