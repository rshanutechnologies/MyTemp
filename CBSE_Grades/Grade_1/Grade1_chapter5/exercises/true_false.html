<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>True / False Quiz</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/CSS/true_false.css">

</head>

<body>

  <div class="quiz-card">

    <div class="question" id="question"></div>
    <img id="questionImg" class="question-img" />


    <div class="tf-buttons">

      <button class="true" id="trueBtn">
        <span class="icon-true">✓</span>
        TRUE
      </button>

      <button class="false" id="falseBtn">
        <span class="icon-false">✕</span>
        FALSE
      </button>

    </div>

    <div class="nav">
      <button class="prev" id="prevBtn" disabled>❮ Prev</button>
      <button class="next" id="nextBtn" disabled>Next ❯</button>
    </div>

  </div>

  <div id="answerPopup" class="kid-popup">
    <div class="kid-card">
      <div class="kid-icon" id="popupIcon"></div>
      <h3 id="popupTitle"></h3>
      <p id="popupMsg"></p>
    </div>
  </div>

  <div id="finalPopup">
    <div class="final-kid-box">
      <h2>🎉 Congratulations!</h2>
      <p id="finalScore"></p>
      <div id="stars"></div>
      <button class="playAgain-btn" onclick="location.reload()">
        Play Again
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
  <audio id="wrongSound"
    src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
  <script src="../assets/JavaScript/true_false.js"></script>

</body>

</html>
