<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fill in the Blank</title>
    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/CSS/fillblanks.css">
</head>

<body>
    <div class="main">

        <div id="imgLoader" class="img-loader">Loading...</div>

        <div class="question" id="qText"></div>

        <div class="left">
            <img id="qImg" src="../assests/images/q5-img.png">
        </div>

        <div id="inputsContainer"></div>

        <nav class="quiz-nav">
            <button class="prev" id="prevBtn">❮ Prev</button>
            <button class="next" id="nextBtn">Next ❯</button>
        </nav>
    </div>

    <div id="answerPopup" class="kid-popup">
        <div class="kid-card">
            <div class="kid-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <div id="finalPopup">
        <div class="final-kid-box">
            <h2>🎉 Congratulations!</h2>
            <p id="finalScore"></p>
            <div id="stars"></div>
            <button class="playAgain-btn" onclick="location.reload()">
                Play Again
            </button>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
     <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
    <script src="../assets/JavaScript/fillblanks.js"></script>
</body>

</html>
