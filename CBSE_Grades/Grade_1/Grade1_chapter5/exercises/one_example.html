<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Image Answer Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../assets/CSS/one_example.css">
</head>

<body>

    <div class="main">
        <div class="question">
            <h2 id="question"></h2>
        </div>

        <div class="image-container">
            <div class="image-box" id="box1">
                <img id="img1">
                <div class="image-bottom" id="text1"></div>
            </div>

            <div class="image-box" id="box2">
                <img id="img2">
                <div class="image-bottom" id="text2"></div>
            </div>
        </div>

        <div class="controls">
            <button class="prev" id="prevBtn">❮ Prev</button>
            <button class="next" id="nextBtn">Next ❯</button>
        </div>

    </div>

    <div id="answerPopup" class="kid-popup">
        <div class="kid-card">
            <div class="kid-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <div id="finalPopup">
        <div class="final-kid-box">
            <h2>🎉 Congratulations!</h2>
            <p id="finalScore"></p>
            <div id="stars"></div>
            <button class="playAgain-btn" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="../assets/JavaScript/one_example.js"></script>
    <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

</body>

</html>
