<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fill The Blanks Quiz</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="../assets/CSS/FTB.css">
</head>

<body>

    <div class="main-container">

        <div class="quiz-container">

            <div class="question-area">
                <h2 id="questionText"></h2>
            </div>

            <div class="image-area">
                <img id="questionImage">
            </div>

            <div class="input-area" id="inputsContainer"></div>

            <div class="nav-buttons">
                <button id="prevBtn"><i class="fa-solid fa-angles-left"></i> Prev</button>
                <button id="nextBtn">Next <i class="fa-solid fa-angles-right"></i></button>
            </div>

        </div>
    </div>

    <div id="answerPopup" class="kid-popup">
        <div class="kid-card">
            <div class="kid-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <div id="finalPopup">
        <div class="final-kid-box">
            <h2>🎉 Congratulations!</h2>
            <p id="finalScore"></p>
            <div id="stars"></div>
            <button class="playAgain-btn" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script src="../assets/JavaScript/FTB.js"></script>
</body>

</html>
