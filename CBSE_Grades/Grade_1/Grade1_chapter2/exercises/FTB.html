<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fill The Blanks Quiz</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="../assets/CSS/FTB.css">
</head>

<body>

    <div class="main-container">

        <div class="quiz-container">

            <div class="question-area">
                <h2 id="questionText"></h2>
            </div>

            <div class="image-area">
                <img id="questionImage">
            </div>

            <div class="input-area">
                <input type="text" id="answerInput" placeholder="Enter your answer...">
                <button id="submitBtn">Submit</button>
            </div>

            <div class="nav-buttons">
                <button id="prevBtn">← Prev</button>
                <button id="nextBtn">Next →</button>
            </div>

        </div>
    </div>

    <div id="answerPopup" class="kid-popup">
        <div class="kid-card">
            <div class="kid-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <div id="finalPopup">
        <div class="final-kid-box">
            <h2>🎉 Congratulations!</h2>
            <p id="finalScore"></p>
            <div id="stars"></div>
            <button class="playAgain-btn" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

    <script src="../assets/JavaScript/FTB.js"></script>

</body>

</html>
