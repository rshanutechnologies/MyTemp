<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Label the Heart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="../assets/CSS/label.css">
</head>

<body>

    <div class="device-warning">
        <div class="warning-box">
            <h2>Activity Not Available</h2>
            <p>
                This activity is not available on mobile or tablet devices.<br>
                Please open it on a <strong>laptop or desktop computer</strong>.
            </p>
        </div>
    </div>

    <div class="wrapper">
        <div class="home" onclick="location.href='../index.html'">🏠 Home</div>
        <div class="title">Label the Diagram of the Heart</div>

        <div class="heart">
            <img src="../assets/images/human-body.png">
        </div>

        <button id="checkBtn" class="check-btn" disabled>✔ Check</button>

        <!-- LEFT -->
        <div class="label l1"><input data-answer="Mouth" data-line="line1" placeholder="Label"></div>
        <div class="label l2"><input data-answer="Liver" data-line="line2" placeholder="Label"></div>
        <div class="label l3"><input data-answer="Small Intestine" data-line="line3" placeholder="Label"></div>
        <div class="label l4"><input data-answer="Anus" data-line="line8" placeholder="Label"></div>

        <div class="line line1"></div>
        <div class="line line2"></div>
        <div class="line line3"></div>
        <div class="line line8"></div>

        <!-- RIGHT -->
        <div class="label r1"><input data-answer="Esophagus" data-line="line4" placeholder="Label"></div>
        <div class="label r2"><input data-answer="Stomach" data-line="line5" placeholder="Label"></div>
        <div class="label r3"><input data-answer="Pancreas" data-line="line6" placeholder="Label"></div>
        <div class="label r4"><input data-answer="Large Intestine" data-line="line7" placeholder="Label"></div>

        <div class="line line4"></div>
        <div class="line line5"></div>
        <div class="line line6"></div>
        <div class="line line7"></div>
    </div>

    <div class="popup" id="popup">
        <div class="popup-box" id="popupText"></div>
    </div>

    <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
    <script src="../assets/JavaScript/label.js"></script>

</body>

</html>
