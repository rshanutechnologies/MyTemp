<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nature Science</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Livvic', sans-serif;
    }

    body {
      height: 100vh;
      background: url('./assets/images/bg-5.png') no-repeat;
      background-size: 100% 100%;
    }

    /* ===== APP ===== */
    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      /* background-color: #f3fff20a; */
    }

    /* ===== HEADER ===== */
    .sidebar {
      width: 100%;
      padding: 14px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* ☰ MENU BUTTON */
    .menu-btn {
      display: none;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 26px;
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }

    /* ===== BOARD (DESKTOP) ===== */
    .board {
      display: flex;
      gap: 18px;
    }

    .card {
      width: 220px;
      height: 58px;
      border-radius: 20px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      padding: 10px 14px;
      cursor: pointer;
      border: 3px solid transparent;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.12),
        0 10px 20px rgba(0, 0, 0, 0.15);
      transition: .2s;
    }

    .board .card:nth-child(1) {
      background: #a7f3d0;
      background: #fde68a;
    }

    .board .card:nth-child(2) {
      background: #ffb6d5;
      background: #fde68a;
    }

    .board .card:nth-child(3) {
      background: #fde68a;
    }

    .board .card:nth-child(4) {
      background: #038ece;
      background: #fde68a;
    }

    .board .card:nth-child(5) {
      background: #dd8c13;
      background: #fde68a;
    }

    /* ===== INACTIVE STATE EFFECT ===== */
    .board .card {
      transition: 0.25s ease;
    }

    /* When any card is active, dim others */
    .board:has(.card.active) .card:not(.active) {
      filter: grayscale(85%) blur(0px);
      opacity: 0.9;
      transform: scale(0.96);
      pointer-events: auto;
    }

    /* Active card stays sharp */
    .board .card.active {
      filter: none;
      opacity: 1;
      transform: scale(1.02);
      z-index: 2;
    }

    .card img {
      width: 36px;
      height: 36px;
    }

    .card span {
      font-size: 17px;
      font-weight: 600;
      color: #1f2937;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .card.active {
      /* background: #0aa44b  !important; */
      color: #0aa44b;
      transform: translateY(4px);
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      /* padding: 10px; */
      overflow-y: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 14px;
    }

    /* ===== OFFCANVAS ===== */
    .offcanvas {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      display: none;
      z-index: 1000;
    }

    .offcanvas.show {
      display: block;
    }

    .offcanvas-panel {
      position: absolute;
      right: 0;
      top: 0;
      width: 280px;
      height: 100%;
      background: #f0fdf4;
      padding: 20px;
      transform: translateX(100%);
      transition: transform .3s ease;
    }

    .offcanvas.show .offcanvas-panel {
      transform: translateX(0);
    }

    .offcanvas .card {
      width: 100%;
      margin-bottom: 14px;
    }

    /* ===== OFFCANVAS ACTIVE / INACTIVE EFFECTS ===== */

    /* Dim non-active cards when one is active */
    .offcanvas-panel:has(.card.active) .card:not(.active) {
      filter: grayscale(85%);
      opacity: 0.85;
      transform: scale(0.96);
    }

    /* Active card */
    .offcanvas .card.active {
      filter: none;
      opacity: 1;
      transform: scale(1.02) translateY(4px);
      z-index: 2;
      /* border: 3px solid #22c55e; */
    }

    /* Hover effect (optional but nice) */
    .offcanvas .card:hover {
      transform: translateY(-3px);
    }

    .offcanvas .card:nth-child(1),
    .board .card:nth-child(1) {
      background: #fde68a;
    }

    .offcanvas .card:nth-child(2),
    .board .card:nth-child(2) {
      background: #fde68a;
    }

    .offcanvas .card:nth-child(3),
    .board .card:nth-child(3) {
      background: #fde68a;
    }

    .offcanvas .card:nth-child(4),
    .board .card:nth-child(4) {
      background: #fde68a;
    }

    .offcanvas .card:nth-child(5),
    .board .card:nth-child(5) {
      background: #fde68a;
    }

    /* ===== MOBILE + SMALL TABLETS ===== */
    @media (max-width: 1100px) {
      .board {
        display: none;
      }

      .menu-btn {
        display: block;
        margin-top: 20px;
      }
    }

    /* ===================================== */
    /* DESKTOP ONLY – HEIGHT BASED UI SCALING */
    /* width >= 900px AND small height        */
    /* ===================================== */

    @media (min-width: 900px) and (max-height: 800px) {
      .app {
        transform: scale(0.95);
        transform-origin: top center;
        height: calc(100vh / 0.95);
      }
    }

    @media (min-width: 900px) and (max-height: 700px) {
      .app {
        transform: scale(0.9);
        transform-origin: top center;
        height: calc(100vh / 0.9);
      }
    }

    @media (min-width: 900px) and (max-height: 600px) {
      .app {
        transform: scale(0.85);
        transform-origin: top center;
        height: calc(100vh / 0.85);
      }
    }

    @media (min-width: 900px) and (max-height: 500px) {
      .app {
        transform: scale(0.8);
        transform-origin: top center;
        height: calc(100vh / 0.8);
      }
    }

    /* ========================================
   💻 Desktop / Monitor (1025px – 1440px)
======================================== */
    @media screen and (min-width: 1025px) and (max-width: 1440px) {
      body {
        overflow: hidden;
      }

      .board {
        min-width: 1700px;
        margin: 0 auto;
        justify-content: center;
        flex-wrap: wrap;
      }

      .card {
        width: 220px;
        height: 70px;
      }

      .card span {
        font-size: 18px;
      }

      .card img {
        width: 32px;
        height: 32px;
      }

    }


    /* ========================================
   🖥️ Large Monitors (1441px – 1920px)
======================================== */
    @media screen and (min-width: 1441px) and (max-width: 1920px) {
      body {
        overflow: hidden;
      }

      .board {
        max-width: 1600px;
        /* 🔥 prevents stretching */
        margin: 0 auto;
        justify-content: center;
        flex-wrap: wrap;
      }

      .card {
        width: 280px;
        height: 70px;
      }

      .card span {
        font-size: 20px;
      }

    }


    /* ========================================
   📺 Extra Large Screens / 4K (1921px+)
======================================== */
    @media screen and (min-width: 1921px) {
      body {
        overflow: hidden;
      }

      .board {
        max-width: 1600px;
        /* 🔥 keeps same layout */
        margin: 0 auto;
        justify-content: center;
        flex-wrap: wrap;
      }

      .card {
        width: 300px;
        height: 75px;
      }

      .card span {
        font-size: 22px;
      }

      .card img {
        width: 40px;
        height: 40px;
      }

    }
  </style>
</head>

<body>

  <div class="app">

    <!-- HEADER -->
    <div class="sidebar">
      <button class="menu-btn" onclick="toggleMenu()">☰</button>

      <div class="board">
        <div class="card active" onclick="openPage(0)">
          <img src="./assets/images/cc.png">
          <span>Choose Answer</span>
        </div>
        <div class="card" onclick="openPage(1)">
          <img src="./assets/images/pp (1).png">
          <span>Fill the Blanks</span>
        </div>
        <div class="card" onclick="openPage(2)">
          <img src="./assets/images/tf.png">
          <span>True / False</span>
        </div>
        <div class="card" onclick="openPage(3)">
          <img src="./assets/images/te.png">
          <span>Two Examples</span>
        </div>
        <div class="card" onclick="openPage(4)">
          <img src="./assets/images/mm.png">
          <span>Picture Match</span>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <iframe id="quizFrame" src="./exercises/mcq.html"></iframe>
    </div>
  </div>

  <!-- OFFCANVAS -->
  <div class="offcanvas" id="offcanvas" onclick="toggleMenu()">
    <div class="offcanvas-panel" onclick="event.stopPropagation()">

      <div class="card active" onclick="mobileOpen(0)">
        <img src="./assets/images/cc.png">
        <span>Choose Answer</span>
      </div>

      <div class="card" onclick="mobileOpen(1)">
        <img src="./assets/images/pp (1).png">
        <span>Fill the Blanks</span>
      </div>

      <div class="card" onclick="mobileOpen(2)">
        <img src="./assets/images/tf.png">
        <span>True / False</span>
      </div>

      <div class="card" onclick="mobileOpen(3)">
        <img src="./assets/images/te.png">
        <span>Two Examples</span>
      </div>

      <div class="card" onclick="mobileOpen(4)">
        <img src="./assets/images/mm.png">
        <span>Picture Match</span>
      </div>

    </div>
  </div>

  <script>
    const desktopCards = document.querySelectorAll(".board .card");
    const mobileCards = document.querySelectorAll(".offcanvas .card");
    const frame = document.getElementById("quizFrame");
    const offcanvas = document.getElementById("offcanvas");

    const pages = [
      "./exercises/mcq.html",
      "./exercises/FTB.html",
      "./exercises/true_false.html",
      "./exercises/two_example.html",
      "./exercises/matching.html"
    ];

    function openPage(i) {
      desktopCards.forEach(c => c.classList.remove("active"));
      mobileCards.forEach(c => c.classList.remove("active"));

      desktopCards[i].classList.add("active");
      mobileCards[i].classList.add("active");

      frame.src = pages[i];
    }

    function toggleMenu() {
      offcanvas.classList.toggle("show");
    }

    function mobileOpen(i) {
      // ✅ OPEN menu first so active styles apply
      if (!offcanvas.classList.contains("show")) {
        offcanvas.classList.add("show");
      }

      openPage(i);

      // ✅ MATCH CSS breakpoint (1150px)
      if (window.innerWidth <= 1150) {
        offcanvas.classList.remove("show");
      }
    }
  </script>

</body>

</html>
