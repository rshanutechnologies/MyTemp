<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Nature Lab - Professional Split</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="../assets/CSS/two-example.css">
</head>

<body>

    <div class="main-container">
        <div class="left-panel">
            <!-- <div class="question-text" id="qText"></div> -->
            <div class="question-text">
                <span id="qIndex">Q1.</span>
                <span id="qText"></span>
            </div>

            <img src="" alt="Icon" class="q-image" id="topicImg">
        </div>

        <div class="right-panel">
            <div class="progress"></div>
            
            <div class="drop-section">
                <div class="drop-box" id="drop1" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <span class="drop-hint">Drag & Drop here</span>
                </div>
                <div class="drop-box" id="drop2" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <span class="drop-hint">Drag & Drop here</span>
                </div>
            </div>

            <div class="options-grid" id="optionsBox"></div>

            <div class="nav-footer">
                <button id="prevBtn" class="nav-btn" onclick="changeQuestion(-1)">← Prev</button>
                <button id="nextBtn" class="nav-btn" onclick="changeQuestion(1)">Next →</button>
            </div>
        </div>
    </div>

    <!-- CORRECT / WRONG POPUP -->
    <div id="answerPopup" class="popup">
        <div class="popup-content">
            <div class="popup-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <!-- FINAL POPUP -->
    <div id="finalPopup">
        <div class=" finalpopup-box">
            <h2 class="final-heading">🎉 Congratulations!</h2>
            <p id="finalScore"></p>
            <div id="stars"></div><br> <button onclick="location.reload()" class="playAgain-btn"> Play Again </button>
        </div>
    </div>

    <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
    <script src="../assets/JavaScript/two-example.js"></script>
</body>

</html>
