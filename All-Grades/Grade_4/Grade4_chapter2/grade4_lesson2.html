<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Quiz</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Livvic", sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(70deg, rgb(204, 255, 242), rgb(255, 228, 254));
      background-size: 5px 5px;
      overflow: hidden;
    }

    /* ===== APP ===== */
    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ===== NAV CONTAINER ===== */
    .nav-container {
      position: relative;
      height: 35px;
      width: 100%;
      /* background-image: url("./assets/images/branch3.png");
      background-repeat: repeat-x;
      background-size: 20% 100%; */
    }

    /* ===== BOARD (DESKTOP ONLY) ===== */
    .board {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* ===== ISLAND BUTTON ===== */
    /* .island-btn {
      position: absolute;
      top: 100%;
      transform-origin: top center;
      padding: 10px 22px;
      min-width: 170px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe9c7, #f2c58d);
      border: 2px solid #c49a6c;
      font-size: 17px;
      font-weight: 700;
      color: #3b2a14;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow:
        0 6px 0 #b0895a,
        0 14px 22px rgba(0, 0, 0, .25);
      animation: swing 4.8s ease-in-out infinite;
    } */

    .island-btn {
      position: absolute;
      top: 30%;
      transform-origin: top center;
      padding: 10px 22px;
      min-width: 170px;
      border-radius: 999px;

      /* BLACK & WHITE BASE */
      background: #ffffff;
      border: 2px solid #111;
      color: #111;

      font-size: 17px;
      font-weight: 700;
      cursor: pointer;

      display: flex;
      justify-content: center;
      align-items: center;

      box-shadow:
        0 6px 0 #111,
        0 14px 22px rgba(0, 0, 0, 0.25);

      animation: swing 4.8s ease-in-out infinite;
      transition: all 0.25s ease;
    }

    .island-btn::before,
    .island-btn::after {
      content: "";
      position: absolute;
      top: -18px;
      width: 3px;
      height: 16px;
      background: linear-gradient(#1f1f1f, #2c2b2b);
      border-radius: 2px;
    }

    .island-btn::before {
      left: 26%;
    }

    .island-btn::after {
      right: 26%;
    }

    /* .island-btn.active {
      background: linear-gradient(180deg, #eaffd6, #c4f0a6);
      border-color: #6fbf4a;
      box-shadow:
        0 6px 0 #6fbf4a,
        0 0 18px rgba(120, 200, 80, .8),
        0 18px 30px rgba(0, 0, 0, .35);
    } */

    .island-btn:nth-child(1) {
      left: 3%;
    }

    .island-btn:nth-child(2) {
      left: 22%;
    }

    .island-btn:nth-child(3) {
      left: 42%;
    }

    .island-btn:nth-child(4) {
      left: 62%;
    }

    .island-btn:nth-child(5) {
      left: 83%;
    }

    @keyframes swing {

      0%,
      50%,
      100% {
        transform: rotate(0deg);
      }

      25% {
        transform: rotate(1.4deg);
      }

      75% {
        transform: rotate(-1.4deg);
      }
    }

    /* ===== MENU BUTTON (HIDDEN DESKTOP) ===== */
    .menu-btn {
      display: none;
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ===== OFFCANVAS (HIDDEN DESKTOP) ===== */
    .offcanvas {
      display: none;
    }

    /* ================================
       📱 MOBILE & SMALL TABLETS ONLY
       ================================ */
    @media (max-width: 1150px) {

      body {
        overflow: hidden;
      }

      /* NAV BAR */
      .nav-container {
        height: 60px;
        background-size: cover;
        background-image: none;
      }

      /* HIDE ISLAND BUTTONS */
      .nav-container .board {
        display: none;
      }

      /* ☰ MENU BUTTON */
      .menu-btn {
        display: block;
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 26px;
        background: #22c55e;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 6px 12px;
        cursor: pointer;
        z-index: 3000;
      }

      /* OFFCANVAS OVERLAY */
      .offcanvas {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 4000;
      }

      .offcanvas.show {
        display: block;
      }

      /* OFFCANVAS PANEL */
      .offcanvas-panel {
        position: absolute;
        right: 0;
        top: 0;
        width: 280px;
        height: 100%;
        background: #f0fdf4;
        padding: 20px;
        transform: translateX(100%);
        transition: transform .3s ease;
        overflow-y: auto;
      }

      .offcanvas.show .offcanvas-panel {
        transform: translateX(0);
      }

      /* MOBILE BUTTON STYLE */
      .offcanvas-panel .island-btn {
        position: static;
        animation: none;
        transform: none;
        width: 100%;
        margin-bottom: 14px;
      }

      .offcanvas-panel .island-btn::before,
      .offcanvas-panel .island-btn::after {
        display: none;
      }
    }

    /* .island-btn.active {
      background: linear-gradient(180deg, #e6fff4, #bdf3df);
      border-color: #5fbfa0;
      color: #0f3d2e;

      box-shadow:
        0 6px 0 #3d8f75,
        0 0 18px rgba(95, 191, 160, 0.7),
        0 18px 30px rgba(0, 0, 0, 0.35);
    } */

    .board:has(.island-btn.active) .island-btn:not(.active) {
      filter: grayscale(100%) brightness(0.8);
      opacity: 0.75;
    }

    .card.active {
      background: #e6fff4 !important;
      border-color: #5fbfa0;
      color: #0f3d2e;
    }

    .board:has(.card.active) .card:not(.active) {
      filter: grayscale(100%) brightness(0.8);
      opacity: 0.85;
      transform: scale(0.96);
    }

    .island-btn {
      position: absolute;
      top: 30%;
      transform-origin: top center;
      padding: 10px 22px;
      min-width: 170px;
      border-radius: 999px;

      /* MINT BASE FOR ALL */
      /* background: linear-gradient(180deg, #e6fff4, #bdf3df); */
      background: linear-gradient(180deg, #eaffd6, #c4f0a6);
      border: 2px solid #5fbfa0;
      color: #0f3d2e;

      font-size: 17px;
      font-weight: 700;
      cursor: pointer;

      display: flex;
      justify-content: center;
      align-items: center;

      /* box-shadow:
        0 6px 0 #3d8f75,
        0 14px 22px rgba(0, 0, 0, 0.25); */
      border-color: #6fbf4a;
      box-shadow:
        0 6px 0 #6fbf4a,
        0 0 18px rgba(120, 200, 80, .4),
        0 18px 30px rgba(0, 0, 0, .1);

      animation: swing 4.8s ease-in-out infinite;
      transition: all 0.25s ease;
    }

    .island-btn.active {
      filter: none;
      opacity: 1;
      z-index: 2;

      /* box-shadow:
        0 6px 0 #3d8f75,
        0 0 18px rgba(95, 191, 160, 0.7),
        0 18px 30px rgba(0, 0, 0, 0.35); */
    }

    .board:has(.island-btn.active) .island-btn:not(.active) {
      filter: grayscale(100%) brightness(0.9);
      opacity: 0.7;
    }

    .offcanvas-panel:has(.island-btn.active) .island-btn:not(.active) {
      filter: grayscale(100%) brightness(0.9);
      opacity: 0.7;
    }

    /* ================================================= */
    /* DESKTOP ONLY – HEIGHT-BASED SCALING (SAFE MODE)   */
    /* Does NOT affect normal or large screens           */
    /* ================================================= */

    @media (min-width: 900px) and (max-height: 800px) {
      .app {
        transform: scale(0.95);
        transform-origin: top center;
        height: calc(100vh / 0.95);
      }
    }

    @media (min-width: 900px) and (max-height: 700px) {
      .app {
        transform: scale(0.9);
        transform-origin: top center;
        height: calc(100vh / 0.9);
      }
    }

    @media (min-width: 900px) and (max-height: 600px) {
      .app {
        transform: scale(0.85);
        transform-origin: top center;
        height: calc(100vh / 0.85);
      }
    }
  </style>
</head>

<body>

  <div class="app">

    <!-- NAV -->
    <div class="nav-container">
      <button class="menu-btn" onclick="toggleMenu()">☰</button>

      <div class="board">
        <div class="island-btn active" onclick="openPage(0)">Choose Answer</div>
        <div class="island-btn" onclick="openPage(1)">Fill the Blanks</div>
        <div class="island-btn" onclick="openPage(2)">True / False</div>
        <div class="island-btn" onclick="openPage(3)">Picture Match</div>
        <div class="island-btn" onclick="openPage(4)">Two Examples</div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <iframe id="quizFrame" src="./exercises/mcq.html"></iframe>
    </div>

  </div>

  <!-- OFFCANVAS -->
  <div class="offcanvas" id="offcanvas" onclick="toggleMenu()">
    <div class="offcanvas-panel" onclick="event.stopPropagation()">
      <div class="island-btn active" onclick="mobileOpen(0)">Choose Answer</div>
      <div class="island-btn" onclick="mobileOpen(1)">Fill the Blanks</div>
      <div class="island-btn" onclick="mobileOpen(2)">True / False</div>
      <div class="island-btn" onclick="mobileOpen(3)">Picture Match</div>
      <div class="island-btn" onclick="mobileOpen(4)">Two Examples</div>
    </div>
  </div>

  <script>
    const desktopBtns = document.querySelectorAll(".board .island-btn");
    const mobileBtns = document.querySelectorAll(".offcanvas-panel .island-btn");
    const frame = document.getElementById("quizFrame");
    const offcanvas = document.getElementById("offcanvas");

    const pages = [
      "./exercises/mcq.html",
      "./exercises/fillblanks.html",
      "./exercises/true_false.html",
      "./exercises/matching.html",
      "./exercises/two_example.html",
    ];

    function setActive(index) {
      desktopBtns.forEach(btn => btn.classList.remove("active"));
      mobileBtns.forEach(btn => btn.classList.remove("active"));

      if (desktopBtns[index]) desktopBtns[index].classList.add("active");
      if (mobileBtns[index]) mobileBtns[index].classList.add("active");

      frame.src = pages[index];
    }

    function openPage(index) {
      setActive(index);
    }

    function toggleMenu() {
      offcanvas.classList.toggle("show");
    }

    function mobileOpen(index) {
      setActive(index);
      toggleMenu();
    }
  </script>

</body>

</html>
