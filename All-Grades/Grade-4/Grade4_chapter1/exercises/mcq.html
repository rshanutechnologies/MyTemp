<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Quiz UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="../assets/CSS/mcq.css">
</head>

<body>

    <div class="main-container">

        <!-- <div class="card progress-card">
            <div class="progress-bar">
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
            </div>
        </div> -->

        <div class="card question-card">
            <p class="question">
                <span class="q-no"></span>
                <span class="q-text"></span>
            </p>

            <img>
        </div>

        <div class="options-container">
            <div class="option-card blue">
                <div></div>
                <span></span>
            </div>

            <div class="option-card orange">
                <div></div>
                <span></span>
            </div>

            <div class="option-card green">
                <div></div>
                <span></span>
            </div>

            <div class="option-card yellow">
                <div></div>
                <span></span>
            </div>
        </div>

        <div class="nav-container">
            <button class="btn prev">← Prev</button>
            <button class="btn next" disabled>Next →</button>
        </div>
    </div>

    <!-- CORRECT / WRONG POPUP -->
    <div id="answerPopup" class="popup">
        <div class="popup-content">
            <div class="popup-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <!-- FINAL POPUP -->
    <div id="finalPopup">
        <div class=" finalpopup-box">
            <h2 class="final-heading">🎉 Congratulations!</h2>
            <p id="finalScore"></p>
            <div id="stars"></div><br> <button onclick="location.reload()" class="playAgain-btn"> Play Again </button>
        </div>
    </div>

    <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
    <script src="../assets/JavaScript/mcq.js"></script>
</body>

</html>
