<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Drag & Drop Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="../assets/CSS/mcq.css">

</head>

<body>

    <div class="quiz">

        <div class="left">
            <div class="question">
                <span id="qIndex"></span>
                <span id="qText"></span>
            </div>
            <div class="image">
                <img id="questionImg">
            </div>

            <div class="drop">
                <div class="drop-inner">Drop your answer here</div>
            </div>
        </div>

        <div class="right">
            <div class="progress"></div>
            <div class="options"></div>
            <div class="footer">
                <button class="prev" disabled>← Prev</button>
                <button class="next" disabled>Next →</button>
            </div>
        </div>

    </div>

    <!-- CORRECT / WRONG POPUP -->
    <div id="answerPopup" class="popup">
        <div class="popup-content">
            <div class="popup-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <!-- FINAL POPUP -->
    <div id="finalPopup">
        <div class=" finalpopup-box">
            <h2 class="final-heading">🎉 Congratulations!</h2>
            <p id="finalScore"></p>
            <div id="stars"></div><br> <button onclick="location.reload()" class="playAgain-btn"> Play Again </button>
        </div>
    </div>

    <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
    <script src="../assets/javaScript/mcq.js"></script>
</body>

</html>
