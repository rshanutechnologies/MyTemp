<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human body</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Livvic', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      /* background-image: url('./assets/images/back.png');
      background-size: 100% 100%; */
      background: #E8E0D5;
    }

    /* ===== APP ===== */
    .app {
      height: 100%;
      display: flex;
      flex-direction: row;
      /* background: #e9e7e7be; */
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 260px;
      padding: 30px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 26px;
      z-index: 2;
    }

    .island {
      width: 100%;
      position: relative;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      border-radius: 18px;
      background: linear-gradient(135deg, #f1f1f1, #e6e6e6);
      box-shadow:
        0 6px 14px rgba(0, 0, 0, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transition:
        transform .25s ease,
        box-shadow .25s ease;
      overflow: hidden;
    }

    .island:hover {
      transform: translateY(-4px);
      box-shadow:
        0 12px 26px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    /* ✨ SHIMMER EFFECT */
    /* .island::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 120%;
      height: 100%;
      background: linear-gradient(120deg,
          transparent,
          rgba(255, 255, 255, 0.35),
          transparent);
      animation: shimmer 5s infinite;
    } */

    @keyframes shimmer {
      0% {
        left: -120%;
      }

      50% {
        left: 120%;
      }

      100% {
        left: 120%;
      }
    }

    @keyframes softGlow {

      0%,
      100% {
        box-shadow: 0 14px 26px rgba(0, 0, 0, .15);
      }

      50% {
        box-shadow: 0 18px 32px rgba(0, 0, 0, .25);
      }
    }

    /* .island:hover {
      transform: translateY(-6px) rotate(-1deg);
    } */

    /* 🌟 ACTIVE ISLAND — pastel + green highlight */
    /* .island.active {
      outline: none;
      position: relative;
    } */

    /* .island.active {
      outline: 3px solid rgba(34, 197, 94, 0.6);
      --c1: #b9ffa4;
      --c2: #83fc5f;
      outline-offset: 1px;
    } */

    /* soft green overlay */
    /* .island.active::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(34, 197, 94, 0.15);
      pointer-events: none;
      z-index: 0;
    } */

    .island .icon,
    .island .label {
      position: relative;
      z-index: 1;
    }

    /* ICON */
    .icon {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      z-index: 1;
    }

    .label {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
      z-index: 1;
    }

    /* 🎨 COLORS */
    .i1 {
      --c1: #a4dbff;
      --c2: #83d4ff;
    }

    .i2 {
      --c1: #fdf6a7;
      --c2: #fde277;
    }

    .i3 {
      --c1: #cfc4ff;
      --c2: #aa97ff;
    }

    .i4 {
      --c1: #b8fdd0;
      --c2: #9fffc1;
    }

    .i5 {
      --c1: #ffbcc1;
      --c2: #ffa8b2;
    }

    .i6 {
      --c1: #ffaa3cc9;
      --c2: #ffad4fde;
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      flex: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ===== MOBILE MENU BUTTON ===== */
    .menu-btn {
      display: none;
    }

    /* ===== OFFCANVAS ===== */
    .offcanvas {
      display: none;
    }

    /* neutral icon */
    .island .icon i {
      color: #374151;
      /* slate gray */
    }

    /* neutral text */
    .island .label {
      color: #1f2937;
    }

    /* 🎨 ACTIVE — ORIGINAL COLORS */
    /* 🎨 ACTIVE — USE ORIGINAL OPTION COLORS */
    .island.active {
      background: linear-gradient(135deg, var(--c1), var(--c2));
      box-shadow:
        0 12px 26px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    /* active icon */
    .island.active .icon i {
      color: #111827;
      /* sharp dark */
    }

    /* active label */
    .island.active .label {
      color: #111827;
    }

    /* ================================
   📱 MOBILE & SMALL TABLETS
================================ */
    @media (max-width: 1150px) {

      body {
        overflow: hidden;
      }

      .app {
        flex-direction: column;
      }

      /* HIDE SIDEBAR */
      .sidebar {
        display: none;
      }

      /* MENU BUTTON */
      .menu-btn {
        display: block;
        position: fixed;
        top: 14px;
        right: 16px;
        font-size: 26px;
        background: #22c55e;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 6px 12px;
        cursor: pointer;
        z-index: 5000;
      }

      /* OVERLAY */
      .offcanvas {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .45);
        display: none;
        z-index: 4000;
      }

      .offcanvas.show {
        display: block;
      }

      /* PANEL */
      .offcanvas-panel {
        position: absolute;
        right: 0;
        top: 0;
        width: 300px;
        height: 100%;
        background: #ecfdf5;
        padding: 20px;
        padding-top: 75px;
        transform: translateX(100%);
        transition: transform .3s ease;
        overflow-y: auto;
      }

      .offcanvas.show .offcanvas-panel {
        transform: translateX(0);
      }

      /* ISLANDS INSIDE OFFCANVAS */
      .offcanvas-panel .island {
        margin-bottom: 16px;
        animation: none;
      }
    }

    /* ===================================================== */
    /* DESKTOP ONLY – HEIGHT BASED UI SCALING (SAFE MODE)    */
    /* Applies ONLY when width > 900px AND height is small  */
    /* Original big screen remains UNCHANGED                */
    /* ===================================================== */

    @media (min-width: 900px) and (max-height: 800px) {
      .app {
        transform: scaleY(0.95);
        transform-origin: top center;
        height: calc(100vh / 0.95);
      }
    }

    @media (min-width: 900px) and (max-height: 700px) {
      .app {
        transform: scaleY(0.9);
        transform-origin: top center;
        height: calc(100vh / 0.9);
      }
    }

    @media (min-width: 900px) and (max-height: 600px) {
      .app {
        transform: scaleY(0.8);
        transform-origin: top center;
        height: calc(100vh / 0.8);
      }
    }
  </style>
</head>

<body>

  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="island i1 active" onclick="openPage(0)">
        <div class="icon"><i class="fa-solid fa-check-double"></i></div>
        <div class="label">Choose Answer</div>
      </div>

      <div class="island i2" onclick="openPage(1)">
        <div class="icon"><i class="fa-solid fa-pen"></i></div>
        <div class="label">Fill the Blanks</div>
      </div>

      <div class="island i3" onclick="openPage(2)">
        <div class="icon"><i class="fa-solid fa-circle-check"></i></div>
        <div class="label">True/ False</div>
      </div>

      <div class="island i4" onclick="openPage(3)">
        <div class="icon"><i class="fa-solid fa-puzzle-piece"></i></div>
        <div class="label">One Word</div>
      </div>

      <div class="island i5" onclick="openPage(4)">
        <div class="icon"><i class="fa-solid fa-link"></i></div>
        <div class="label">Matching</div>
      </div>

      <div class="island i6" onclick="openPage(5)">
        <div class="icon"><i class="fa-solid fa-tag"></i></div>
        <div class="label">Label</div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <iframe id="quizFrame" src="./exercises/mcq.html"></iframe>
    </div>

  </div>

  <div class="offcanvas" id="offcanvas" onclick="toggleMenu()">
    <div class="offcanvas-panel" onclick="event.stopPropagation()">

      <div class="island i1 active" onclick="mobileOpen(0)">
        <div class="icon"><i class="fa-solid fa-check-double"></i></div>
        <div class="label">Choose Answer</div>
      </div>

      <div class="island i2" onclick="mobileOpen(1)">
        <div class="icon"><i class="fa-solid fa-pen"></i></div>
        <div class="label">Fill the Blanks</div>
      </div>

      <div class="island i3" onclick="mobileOpen(2)">
        <div class="icon"><i class="fa-solid fa-circle-check"></i></div>
        <div class="label">True / False</div>
      </div>

      <div class="island i4" onclick="mobileOpen(3)">
        <div class="icon"><i class="fa-solid fa-puzzle-piece"></i></div>
        <div class="label">One Word</div>
      </div>

      <div class="island i5" onclick="mobileOpen(4)">
        <div class="icon"><i class="fa-solid fa-link"></i></div>
        <div class="label">Matching</div>
      </div>

      <div class="island i6" onclick="mobileOpen(5)">
        <div class="icon"><i class="fa-solid fa-tag"></i></div>
        <div class="label">Label</div>
      </div>

    </div>
  </div>

  <script>
    const islands = document.querySelectorAll(".sidebar .island");
    const mobileIslands = document.querySelectorAll(".offcanvas-panel .island");
    const frame = document.getElementById("quizFrame");
    const offcanvas = document.getElementById("offcanvas");

    const pages = [
      "./exercises/mcq.html",
      "./exercises/fillblanks.html",
      "./exercises/true_false.html",
      "./exercises/two_example.html",
      "./exercises/matching.html",
      "./exercises/label.html"
    ];

    function setActive(index) {
      islands.forEach(i => i.classList.remove("active"));
      mobileIslands.forEach(i => i.classList.remove("active"));

      if (islands[index]) islands[index].classList.add("active");
      if (mobileIslands[index]) mobileIslands[index].classList.add("active");

      frame.src = pages[index];
    }

    function openPage(index) {
      setActive(index);
    }

    function mobileOpen(index) {
      setActive(index);
      toggleMenu();
    }

    function toggleMenu() {
      if (window.innerWidth > 1150) return;
      offcanvas.classList.toggle("show");
    }
  </script>

</body>

</html>
