<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Fill in the Blanks</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/CSS/two_example.css">

</head>

<body>

  <div class="quiz-box">

    <div class="question">
      <span class="q-no" id="qNo"></span>
      <span class="q-text" id="question"></span>
    </div>


    <div class="image-box">
      <img id="questionImage">
    </div>

    <div class="input-box"> 
      <input id="answerInput" placeholder="Type one word answer">
    </div>

    <div class="buttons">
      <button class="prev" id="prevBtn" disabled>← Prev</button>
      <button class="submit" id="submitBtn" disabled>Submit</button>
      <button class="next" id="nextBtn" disabled>Next →</button>
    </div>

  </div>

  <div class="popup" id="popup">
    <div class="popup-box" id="popupText"></div>
  </div>

  <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
  <script src="../assets/JavaScript/two_example.js"></script>

</body>

</html>
