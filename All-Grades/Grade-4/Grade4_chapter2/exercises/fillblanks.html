<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Science Quiz – Plants</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="../assets/CSS/fillblanks.css">

</head>

<body>

  <div class="main">
    <!-- <div class="quiz-type">🧠 Fill The Blanks Quiz</div>
    <div class="home" onclick="location.href='../index.html'">🏠 Home</div> -->

    <div class="content">
      <!-- <div class="parts-progress" id="partsProgress"></div> -->

      <div class="question" id="qText"></div>

      <div class="image-wrap">
        <div class="image-circle">
          <img id="qImg">
        </div>
      </div>

      <div class="input-wrap">
        <div class="input-box" id="inputBox">
          <input id="answerInput" placeholder="Type your answer...">
          <button id="checkBtn">Submit</button>
        </div>
      </div>

       <div class="nav">
        <button class="prev" id="prevBtn" disabled>← Prev</button>
        <button class="next" id="nextBtn" disabled>Next →</button>
      </div>
    </div>
  </div>

  <!-- CORRECT / WRONG POPUP -->
  <div id="answerPopup" class="popup">
    <div class="popup-content">
      <div class="popup-icon" id="popupIcon"></div>
      <h3 id="popupTitle"></h3>
      <p id="popupMsg"></p>
    </div>
  </div>

  <!-- FINAL POPUP -->
  <div id="finalPopup">
    <div class=" finalpopup-box">
      <h2 class="final-heading">🎉 Congratulations!</h2>
      <p id="finalScore"></p>
      <div id="stars"></div><br> <button onclick="location.reload()" class="playAgain-btn"> Play Again </button>
    </div>
  </div>

  <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
  <script src="../assets/JavaScript/fillblanks.js"></script>
</body>

</html>
