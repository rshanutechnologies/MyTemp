<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BASIC SCIENCE QUIZ</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Livvic', sans-serif;
      font-weight: 500;
    }

    html,
    body {
      height: 100%;
      overflow:hidden;   /* prevents scrolling */
    }

   body{
  margin:0;
  height:100vh;
  
}


    /* ===== APP ===== */
    .app {
      height: 100%;
      display: flex;
    }

    /* ===== LEFT SIDEBAR (STATIC) ===== */
    .sidebar{
  width:320px;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align: center;
}



  .board{
  width:270px;
  padding:44px;
  gap:20px;
  border-radius:30px;
  display:flex;
  flex-direction:column;
  gap:15px;

  
}


   .magnet{
  border-radius:22px;
  padding:18px 18px;
  font-size:23px;
  font-weight:600;
  color:#2f4f4f;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:12px;

 
  transition:.2s ease;
}


.magnet{
  display:flex;
  align-items:center;
  gap:12px;
}

/* ✅ FIX ICON ALIGNMENT */
.icon{
  width:28px;              /* same width for all icons */
  display:flex;
  justify-content:center;  /* center emoji */
  font-size:22px;
}

/* TEXT */
.text{
  flex:1;
}

    /* HOVER */
    .magnet:hover {
      transform: scale(1.06) rotate(-1deg);
    }

    .magnet.active {
  animation: snap .35s ease;
  box-shadow:
    0 0 0 4px rgba(255, 255, 255, .9),
    0 0 30px rgba(0, 123, 255, .6);
  outline: 3px solid #0c7df4;
}
    @keyframes snap {
      0% {
        transform: scale(1);
      }

      60% {
        transform: scale(1.14) rotate(1deg);
      }

      100% {
        transform: scale(1);
      }
    }

 .m1{
  background:#ed6c61;   /* Choose Option */
}

.m2{
  background:#7fc98a;   /* True or False */
}

.m3{
  background:#7fa9c4;   /* Matching */
}

.m4{
  background:#f3cd5a;   /* Two Examples */
}


.magnet:hover{
  transform:translateY(2px);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.6),
    inset 0 -4px 0 rgba(0,0,0,.12);
}


    /* ===== RIGHT SIDE (FULL SCREEN CONTENT) ===== */
    .main{
  flex:1;
  height:100%;
}


    /* ✅ IFRAME FULL WIDTH + FULL HEIGHT */
    .quiz-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      
    }

    /* ===== MOBILE ===== */
    @media(max-width:800px) {
      body {
        overflow: auto;
      }

      .app {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        padding: 18px 0;
      }

      .board {
        flex-direction: row;
        height: auto;
        width: 100%;
        justify-content: center;
        gap: 12px;
      }

      .magnet {
        width: 170px;
        font-size: 14px;
        padding: 14px;
      }

      .magnet::before {
        display: none;
      }

      .main {
        height: 70vh;
      }
    }
 .slate{
  position: relative;   /* ❌ remove fixed */
  width:100%;
  height:100%;
  min-height:100vh;

  background:
    linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)),
    url("./assets/images/bgimg.png") center bottom / cover no-repeat;

  padding: 28px;
  border-radius:50px;
  box-shadow:
    inset 0 0 0 30px #f5b82e;
}


/* BLACK SLATE BORDER */
.slate::after{
  content:"";
  position:absolute;
  inset:18px;
  border-radius:50px;
  box-shadow: inset 0 0 0 15px #111;
  pointer-events:none;
}

/* ===================================== */
/* ✅ LARGE MONITOR (1400px and above)   */
/* ===================================== */
@media (min-width:1400px){

  .sidebar{
    width:380px;
  }

  .board{
    width:320px;
    padding:50px;
  }

  .magnet{
    font-size:30px !important;
    padding:22px;
  }

}



/* ===================================== */
/* ✅ TABLET (992px and below)           */
/* ===================================== */
@media (max-width:992px){

  body{
    overflow:auto;
  }

  .sidebar{
    width:220px;
  }

  .board{
    width:200px;
    padding:25px;
    gap:18px;
  }

  .magnet{
    font-size:24px;
    padding:14px;
  }

}


/* ===================================== */
/* ✅ MOBILE (768px and below)           */
/* ===================================== */
@media (max-width:768px){

  body{
    overflow:auto;
  }

  .app{
    flex-direction:column;
  }

  /* 👇 KEEP MENU AT TOP */
  .sidebar{
    width:100%;
    padding:15px 0;
  }

  .board{
    flex-direction:row;
    flex-wrap:wrap;
    justify-content:center;
    width:100%;
    padding:10px;
    gap:12px;
  }

  .magnet{
    width:45%;
    font-size:14px;
    padding:12px;
    text-align:center;
    justify-content:center;
  }

  .main{
    height:70vh;
  }

}


/* ===================================== */
/* ✅ SMALL MOBILE (480px and below)     */
/* ===================================== */
@media (max-width:480px){

  .magnet{
    width:100%;
    font-size:13px;
    padding:10px;
  }

  .main{
    height:65vh;
  }

  .slate{
    padding:16px;
    border-radius:30px;
  }

  .slate::after{
    inset:10px;
    border-radius:30px;
  }

}
/* ================= MOBILE MENU ================= */

.menu-btn{
  display:none;
  position:fixed;
  top:20px;
  right:20px;
  background:#7c3aed;
  color:#fff;
  border:none;
  font-size:22px;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  z-index:5000;
}

.offcanvas{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  z-index:4000;
}

.offcanvas.show{
  display:block;
}

.offcanvas-panel{
  position:absolute;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#ffffff;
  padding:90px 20px 20px;
  transform:translateX(100%);
  transition:.3s ease;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.offcanvas.show .offcanvas-panel{
  transform:translateX(0);
}

.mobile-item{
  padding:14px;
  border-radius:12px;
  background:#f3f4f6;
  font-weight:700;
  cursor:pointer;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}

/* ===== MOBILE BEHAVIOR ===== */


@media screen and (min-width:1025px) and (max-width:1440px){

  .app{
    width:95%;
    margin:auto;
  }

  .sidebar{
    width:280px;   /* 🔥 balanced */
  }

  .board{
    width:240px;
    padding:30px;
  }

  .magnet{
    font-size:20px;
    padding:16px;
  }

  .main{
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .quiz-frame{
    max-width:900px;   /* 🔥 center like MCQ */
    border-radius:24px;
  }
   
}
/* ============================= */
/* Large Screens (1441px–1920px) */
/* ============================= */
@media screen and (min-width:1441px) and (max-width:1920px){

  .app{
    width:95%;   /* use more width */
  }

  .sidebar{
    width:400px;   /* 🔥 bigger sidebar */
  }

  .board{
    width:360px;   /* 🔥 bigger board */
    padding:50px;
    gap:25px;
  }

  .magnet{
    font-size:28px;   /* 🔥 bigger text */
    padding:22px 26px;
    border-radius:26px;
  }

  .slate{
    box-shadow: inset 0 0 0 45px #f5b82e;   /* 🔥 bigger yellow */
  }

  .slate::after{
    inset:25px;   /* adjust spacing */
    box-shadow: inset 0 0 0 20px #111;   /* 🔥 bigger black */
  }
}
/* ============================= */
/* 4K Screens (1921px+) */
/* ============================= */
@media screen and (min-width:1921px){

  .app{
    width:95%;
  }

  .sidebar{
    width:480px;
  }

  .board{
    width:400px;
    padding:60px;
    gap:30px;
  }

  .magnet{
    font-size:32px;
    padding:26px 30px;
    border-radius:28px;
  }

}

@media(max-width:1000px){

  .sidebar{
    display:none;   /* hide magnet sidebar */
  }

  .menu-btn{
    display:block;
  }

  .app{
    flex-direction:column;
  }

  .main{
    height:100dvh;
  }

}
  </style>
</head>

<body>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
<div class="slate">
<div class="app">


    <!-- ✅ LEFT SIDEBAR (STATIC) -->
    <div class="sidebar">
      <div class="board">
<div class="magnet m1" onclick="openPage(0)">
  <span class="icon">🎯</span>
  <span class="text">Choose Option</span>
</div>

<div class="magnet m2" onclick="openPage(1)">
  <span class="icon">👍</span>
  <span class="text">True or False</span>
</div>

<div class="magnet m3" onclick="openPage(2)">
  <span class="icon">🧩</span>
  <span class="text">Match The Following</span>
</div>

<div class="magnet m4" onclick="openPage(3)">
  <span class="icon">🔢</span>
  <span class="text">Two Examples</span>
</div>
      </div>
    </div>

    <!-- ✅ RIGHT SIDE FULL CONTENT -->
    <div class="main">
     <iframe id="quizFrame" class="quiz-frame" src="./exercises/mcq.html"></iframe>
    </div>
<!-- OFFCANVAS MENU -->
<div class="offcanvas" id="offcanvas" onclick="toggleMenu()">
  <div class="offcanvas-panel" onclick="event.stopPropagation()">

    <div class="mobile-item" onclick="mobileOpen(0)">🎯 Choose Option</div>
    <div class="mobile-item" onclick="mobileOpen(1)">👍 True or False</div>
    <div class="mobile-item" onclick="mobileOpen(2)">🧩 Match The Following</div>
    <div class="mobile-item" onclick="mobileOpen(3)">🔢 Two Examples</div>

  </div>
</div>
  </div>
  </div>

 <script>
const magnets = document.querySelectorAll(".magnet");
const quizFrame = document.getElementById("quizFrame");
const offcanvas = document.getElementById("offcanvas");

const pages = [
  "./exercises/mcq.html",
  "./exercises/true_false.html",
  "./exercises/matching.html",
  "./exercises/two_example.html",
];

function openPage(index){
  magnets.forEach(m => m.classList.remove("active"));
  magnets[index]?.classList.add("active");
  quizFrame.src = pages[index];
}

function toggleMenu(){
  offcanvas.classList.toggle("show");
}

function mobileOpen(index){
  openPage(index);
  toggleMenu();
}

window.addEventListener("load", ()=>{
  openPage(0);
});
</script>

</body>

</html>
