<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnet Pull Match</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="../assets/CSS/matching.css">
</head>

<body>

    <div class="game">
        <!-- <div class="title">🧲 Magnet Pull Match</div> -->

        <!-- TRAIN PROGRESS BAR -->
        

        <div class="field">

            <div class="magnet">🧲</div>

            <div class="animal a1 p1" data-answer="d">🦁<span>Lion</span></div>
            <div class="animal a2 p2" data-answer="a">🦟<span>Mosquito</span></div>
            <div class="animal a3 p4" data-answer="b">🦎<span>Lizard</span></div>
            <div class="animal a4 p3" data-answer="e">🐄<span>Cow</span></div>
            <div class="animal a5 p5" data-answer="c">🐀<span>Rat</span></div>

        </div>

        <div class="labels">
            <div class="label" data-value="a">It sucks blood</div>
            <div class="label" data-value="b"> It swallows its prey</div>
            <div class="label" data-value="c">It gnaws its food.</div>
            <div class="label" data-value="d">It holds and tears its prey</div>
            <div class="label" data-value="e">It chews the cud</div>
        </div>
    </div>
<!-- CORRECT / WRONG POPUP -->
<div id="answerPopup" class="popup">
  <div class="popup-content">
    <div class="popup-icon" id="popupIcon"></div>
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
  </div>
</div>

    <!-- FINAL POPUP -->
    <div id="finalPopup""> <div class=" finalpopup-box">
        <h2 class="final-heading">🎉 Congratulations!</h2>
        <p id="finalScore"></p>
        <div id="stars"></div><br> <button onclick="location.reload()" class="playAgain-btn"> Play Again </button>
    </div>
    </div>

    <script src="../assets/JavaScript/matching.js"></script>

</body>

</html>
