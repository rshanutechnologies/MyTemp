<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Two Answer Drag Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="../assets/CSS/two-example.css">
</head>

<body>

    <div class="main">

        <!-- <div style="text-align:center">
            <div class="title">Two Answer Quiz</div>
        </div> -->

        <!-- TRAIN PROGRESS BAR -->
        <div class="train-area">
            <div class="train-frame">
                <div class="train-rail"></div>
                <div class="moving-train" id="movingTrain"></div>
                <div class="train-boxes" id="trainBoxes"></div>
            </div>
        </div>

        <div class="content">

            <div class="left">
                <div class="drop">Click on a Option</div>
                <div class="drop">Click on a Option</div>
            </div>

            <div class="right">
                <div class="question"></div>
            </div>

        </div>

        <div class="options"></div>

        <div class="nav fancy-nav">
  <!-- PREV -->
  <button class="nav-btn prev-btn" id="prevBtn">
    <span class="circle">❮❮</span>
    <span class="label">PREV</span>
  </button>

  <!-- NEXT -->
  <button class="nav-btn next-btn" id="nextBtn">
    <span class="label">NEXT</span>
    <span class="circle">❯❯</span>
  </button>
</div>


    </div>
<!-- CORRECT / WRONG POPUP -->
<div id="answerPopup" class="popup">
  <div class="popup-content">
    <div class="popup-icon" id="popupIcon"></div>
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
  </div>
</div>

    <!-- FINAL POPUP -->
    <div id="finalPopup">
        <div class=" finalpopup-box">
            <h2 class="final-heading">🎉 Congratulations!</h2>
            <p id="finalScore"></p>
            <div id="stars"></div><br> <button onclick="location.reload()" class="playAgain-btn"> Play Again </button>
        </div>
    </div>

    <script src="../assets/JavaScript/two-example.js"></script>

</body>

</html>
