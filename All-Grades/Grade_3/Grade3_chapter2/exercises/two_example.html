<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ Livvic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="../assets/CSS/two_example.css">
  <title>Plant Worksheet Quiz</title>

 
</head>

<body>

<div class="ui-scale">
  <div class="wrapper">

    <!-- ✅ SAME PROGRESS BAR LIKE FIRST CODE -->
    
    <div class="quiz-card">
      <div class="question-text" id="questionText">Loading...</div>
      <div class="options" id="optionsBox"></div>
    </div>

    <!-- ✅ NAV BUTTONS SAME POSITION LIKE FIRST CODE -->
    <div class="footer">
      <button class="nav-btn" id="prevBtn" disabled>← Prev</button>
      <button class="nav-btn" id="nextBtn" disabled>Next →</button>
    </div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-box" id="popupText"></div>
</div>
<script src="../assets/JavaScript/two_example.js"></script>

</body>
</html>
