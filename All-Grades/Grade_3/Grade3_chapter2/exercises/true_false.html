  <!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>True or False Quiz (Plants)</title>

  <!-- ✅ Livvic Font -->
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/CSS/true_false.css">
  </head>

  <body>

  <div class="ui-scale">
    <div class="game">
    


      <div class="question-box">
        <div class="question" id="question">Loading...</div>
      </div>
      <img id="questionImg" class="q-img" src="" />

      <div class="chests">
        <div class="chest" id="trueBtn" onclick="checkAnswer(true)">
        <span>✅</span>
          <p>TRUE</p>
        </div>

        <div class="chest" id="falseBtn" onclick="checkAnswer(false)">
          <span>❌</span>
          <p>FALSE</p>
        </div>
      </div>

      <!-- ✅ Prev + Next always visible -->
      <div class="nav-row">
        <button class="nav-btn" id="prevBtn" disabled>← Prev</button>
        <button class="nav-btn" id="nextBtn" disabled>Next →</button>
      </div>

    </div>
  </div>

  <!-- ✅ POPUP -->
  <div class="popup" id="popup">
    <div class="popup-box" id="popupText"></div>
  </div>
  <script src="../assets/JavaScript/true_false.js"></script>

  </body>
  </html>
