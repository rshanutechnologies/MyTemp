<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drag & Match – Plant Parts</title>

<!-- ✅ Livvic Font Only -->
<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/CSS/Matching.css">

</head>

<body>

<div class="ui-scale">
   <div class="wrap">

      <!-- ✅ SAME PROCESS BAR -->
      <div class="process-wrap">
        <div class="process-top">
          <div id="progressLabel"></div>
          <div id="statusLabel"></div>
        </div>

        <div class="process-bar">
          <div class="process-fill" id="processFill"></div>
        </div>

        <div class="process-steps" id="processPills"></div>
      </div>
       <div class="header-title">Match The Option</div>
  <div class="game">
 
<div class="match-container">

  <!-- LEFT SIDE -->
  <div class="left-side">
    <div class="left-item" data-match="d">1. Flower 🌸</div>
    <div class="left-item" data-match="a">2. Root 🌿</div>
    <div class="left-item" data-match="b">3. Shoot 🌱</div>
    <div class="left-item" data-match="e">4. Seed 🌰</div>
    <div class="left-item" data-match="c">5. Leaf 🍃</div>
  </div>

  <!-- SVG LINES -->
  <svg class="line-svg"></svg>

  <!-- RIGHT SIDE -->
  <div class="right-side">
    <div class="right-item" data-key="a">a)It Grows under the ground</div>
    <div class="right-item" data-key="b">b)It Grows above the ground</div>
    <div class="right-item" data-key="c">c)It Prepares food</div>
    <div class="right-item" data-key="d">d)It Develops into fruit</div>
    <div class="right-item" data-key="e">e)It Grows into new plant</div>
  </div>

</div>
  </div>
</div>

<!-- ✅ POPUP -->
<div class="popup" id="popup">
  <div class="popup-box" id="popupText"></div>
</div>
<script src="../assets/JavaScript/Matching.js"></script>

</body>
</html>
