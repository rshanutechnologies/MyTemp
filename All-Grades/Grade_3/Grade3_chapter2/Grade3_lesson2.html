<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crayon Learning Board</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Livvic',sans-serif;
}

html, body{
  height:100%;
  margin:0;
}

  body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("./assets/images/bgimg.png") no-repeat center center;
  background-size: cover;
  filter: blur(.5px);   /* adjust blur here */
  z-index: -1;
}
/* ===== APP LAYOUT ===== */
.app{
  width:90%;
  height:92%;
  position:relative;
}
/* MAIN LEFT SIDE */

.main{
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.quizFrame{
  width:90%;
  height:100%;
  border:none;
  border-radius:22px;
  background:#f9fafb;
 /* 3-layer frame */
  /* OUTSIDE layered frame */
  box-shadow:
    0 0 0 10px #2c4e6e,      /* dark blue main frame */
    0 0 0 15px #cfd6dc,      /* soft gray outside border */
    0 25px 60px rgba(0,0,0,.25); /* soft shadow */
  transition:opacity .25s ease;
  position:relative;
}
.quizFrame.fade{
  opacity:6;
}

/* ============================= */
/* 🖍️ RIGHT CRAYON SIDEBAR */
/* ============================= */

.sidebar{
  position:absolute;
  right:-50px;  /* this makes overlap */
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:25px;
  z-index:10;
}

/* CRAYON STYLE */
.crayon{
  width:180px;
  height:70px;
  border-radius:18px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:600;
  color:#fff;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}
/* Vertical support bar */

/* Remove old width */
.sidebar{
  width:auto;
}
/* Triangle tip */
.crayon::before{
  content:"";
  position:absolute;
  top:-25px;
  left:50%;
  transform:translateX(-50%);
  border-left:20px solid transparent;
  border-right:20px solid transparent;
  border-bottom:25px solid currentColor;
}

/* Color crayons */
.c1{ background:#ef4444; color:#ef4444; }
.c2{ background:#3b82f6; color:#3b82f6; }
.c3{ background:#10b981; color:#10b981; }
.c4{ background:#f59e0b; color:#f59e0b; }
.c5{ background:#8b5cf6; color:#8b5cf6; }

/* Inner text fix */
.crayon span{
  color:white;
  z-index:2;
}

/* Slight playful tilt */
.crayon:nth-child(odd){
  transform:rotate(-4deg);
}
.crayon:nth-child(even){
  transform:rotate(4deg);
}

/* Hover */
.crayon:hover{
  transform:scale(1.1) rotate(0deg);
}
.crayon.active{
  box-shadow:
    0 0 0 4px #00e5d4,
    0 0 25px rgba(0,229,212,.7);
}


/* ===================================== */
/* ✅ LARGE MONITOR (1400px and above)   */
/* ===================================== */
@media (min-width:1400px){

  .sidebar{
    width:340px;
  }

  .crayon{
    width:220px;
    height:100px;
    font-size:22px;
  }

}



/* ===================================== */
/* ✅ MOBILE (768px and below)           */
/* ===================================== */
@media (max-width:768px){

  body{
    overflow:auto;   /* allow scroll */
  }

  .app{
    flex-direction:column;
  }

  .main{
    height:60vh;
  }

  .sidebar{
    width:100%;
    flex-direction:row;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    padding:15px;
  }

  .crayon{
    width:140px;
    height:75px;
    font-size:16px;
    transform:none !important;   /* remove tilt on small screens */
  }

  .crayon::before{
    border-left:16px solid transparent;
    border-right:16px solid transparent;
    border-bottom:20px solid currentColor;
    top:-20px;
  }

}


/* ===================================== */
/* ✅ SMALL MOBILE (480px and below)     */
/* ===================================== */
@media (max-width:480px){

  .main{
    height:65vh;
  }

  .crayon{
    width:120px;
    height:65px;
    font-size:14px;
  }

  .crayon span{
    font-size:13px;
  }

  .crayon::before{
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    border-bottom:18px solid currentColor;
    top:-18px;
  }

}
/* ================= MOBILE MENU ================= */

.menu-btn{
  display:none;
  position:fixed;
  top:20px;
  right:20px;
  background:#10b981;
  color:#fff;
  border:none;
  font-size:20px;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  z-index:3000;
}

/* overlay */
.offcanvas{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  z-index:2500;
}

.offcanvas.show{
  display:block;
}

.offcanvas-panel{
  position:absolute;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#ffffff;
  padding:90px 20px 20px;
  transform:translateX(100%);
  transition:.3s ease;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.offcanvas.show .offcanvas-panel{
  transform:translateX(0);
}

.mobile-item{
  padding:14px;
  border-radius:12px;
  background:#f3f4f6;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}

/* MOBILE BEHAVIOR */
@media(max-width:600px){

  .sidebar{
    display:none;   /* hide crayons */
  }

  .menu-btn{
    display:block;
  }

  .app{
    flex-direction:column;
  }

  .main{
    height:90dvh;
  }

}

@media(max-width:1000px){

  .sidebar{
    display:none;   /* hide crayons */
  }

  .menu-btn{
    display:block;
  }

  .app{
    flex-direction:column;
  }

  .main{
    height:90dvh;
  }

}

@media screen and (min-width:1025px){

  .app{
    width:95%;
    height:92%;
  }

  .quizFrame{
    width:92%;
    height:100%;
  }

  .sidebar{
    right: -10px;
    gap:20px;
  }

  .crayon{
    width:180px;
    height:75px;
    font-size:20px;
  }
}

@media screen and (min-width:1350px){


  .sidebar{
    right: -190px;
    gap:20px;
  }

}


@media screen and (min-width:1441px) and (max-width:1920px){


  .main{
    justify-content:center;
  }
  .app{
    width:92%;   /* 🔥 use more width */
    height:92%;
  }

  .quizFrame{
    width:100%;
    max-width:none;   /* 🔥 REMOVE LIMIT */
    height:100%;
  }

  .sidebar{
    right:-180px;   /* keep position clean */
  }

  .crayon{
    width:210px;
    height:90px;
    font-size:22px;
  }
}

@media screen and (min-width:1921px){

  .app{
    width:90%;            /* 🔥 use more screen */
    max-width:1800px;     /* 🔥 allow larger layout */
  }

  .quizFrame{
    width:80%;
    max-width:none;       /* 🔥 REMOVE LIMIT */
    height:100%;
  }

  .main{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .sidebar{
    right:0px;
    gap:45px;
  }

  .crayon{
    width:280px;
    height:120px;
    font-size:26px;
  }

}


</style>
</head>

<body>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="app">

  <!-- LEFT SIDE -->
  <div class="main">
    <iframe id="quizFrame" class="quizFrame" src="./exercises/mcq.html"></iframe>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="sidebar">

    <div class="crayon c1" onclick="selectPiece(0)">
      <span>📝 Choose Option</span>
    </div>

    <div class="crayon c2" onclick="selectPiece(1)">
      <span>✏️ Fill Blanks</span>
    </div>

    <div class="crayon c3" onclick="selectPiece(2)">
      <span>✔ True / False</span>
    </div>

    <div class="crayon c4" onclick="selectPiece(3)">
      <span>📚 Two Examples</span>
    </div>

    <div class="crayon c5" onclick="selectPiece(4)">
      <span>🔗 Matching</span>
    </div>

  </div>

</div>
<!-- OFFCANVAS MENU -->
<div class="offcanvas" id="offcanvas" onclick="toggleMenu()">
  <div class="offcanvas-panel" onclick="event.stopPropagation()">

    <div class="mobile-item" onclick="mobileSelect(0)">📝 Choose Option</div>
    <div class="mobile-item" onclick="mobileSelect(1)">✏️ Fill Blanks</div>
    <div class="mobile-item" onclick="mobileSelect(2)">✔ True / False</div>
    <div class="mobile-item" onclick="mobileSelect(3)">📚 Two Examples</div>
    <div class="mobile-item" onclick="mobileSelect(4)">🔗 Matching</div>

  </div>
</div>
<script>
const pieces = document.querySelectorAll(".crayon");
const frame = document.getElementById("quizFrame");

const quizPaths = [
  "./exercises/mcq.html",
  "./exercises/fillblanks.html",
  "./exercises/true_false.html",
  "./exercises/two_example.html",
  "./exercises/Matching.html"
];

let currentIndex = 0;

function setActive(index){
  pieces.forEach(p => p.classList.remove("active"));
  pieces[index].classList.add("active");
}

function selectPiece(index){
  if(index === currentIndex) return;

  setActive(index);
  frame.classList.add("fade");

  setTimeout(() => {
    frame.src = quizPaths[index];
    frame.onload = () => {
      frame.classList.remove("fade");
      frame.onload = null;
    };
  }, 180);

  currentIndex = index;
}

window.addEventListener("load", () => {
  setActive(0);
});

const offcanvas = document.getElementById("offcanvas");

function toggleMenu(){
  offcanvas.classList.toggle("show");
}

function mobileSelect(index){
  selectPiece(index);
  toggleMenu();
}
</script>

</body>
</html>
