<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Correct Option Quiz</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/CSS/mcq2.css">

</head>

<body>

    <div class="quiz">

        <div class="header">
            <span>📖 Correct option</span>
            <div class="progress" id="progress"></div>
        </div>

        <!-- QUESTION AREA -->
        <div class="question-holder">
            <div class="question-emoji" id="questionEmoji"></div>
            <div class="question" id="questionText"></div>
        </div>

        <div class="options" id="options"></div>

        <div class="nav">
            <button class="prev" id="prevBtn" disabled>← Prev</button>
            <button class="next" id="nextBtn" disabled>Next →</button>
        </div>

    </div>

    <!-- CORRECT / WRONG POPUP -->
<div id="answerPopup" class="popup">
  <div class="popup-content">
    <div class="popup-icon" id="popupIcon"></div>
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
  </div>
</div>

<!-- FINAL POPUP -->
<div id="finalPopup">
  <div class="finalpopup-box">
    <h2 class="final-heading">🎉 Congratulations!</h2>
    <p id="finalScore"></p>
    <div id="stars"></div><br>
    <button onclick="restart()" class="playAgain-btn">Play Again</button>
  </div>
</div>


    <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
    <script src="../assets/JavaScript/mcq.js"></script>

</body>
</html>
