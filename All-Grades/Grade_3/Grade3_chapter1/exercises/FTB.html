<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Learning Flow – Sequential Questions</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../assets/CSS/FTB2.css">
</head>

<body>
<div class="">
 
</div>

    <div class="viewport">
        <div class="path" id="path"></div>
    </div>

    <div class="nav-btn">
        <button id="prevBtn" disabled>← Prev</button>
        <button id="nextBtn" disabled>Next →</button>
    </div>


    <!-- CORRECT / WRONG POPUP -->
    <div id="answerPopup" class="popup">
        <div class="popup-content">
            <div class="popup-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <!-- FINAL POPUP -->
    <div id="finalPopup""> <div class=" finalpopup-box">
        <h2 class="final-heading">🎉 Congratulations!</h2>
        <p id="finalScore"></p>
        <div id="stars"></div><br> <button onclick="location.reload()" class="playAgain-btn"> Play Again </button>
    </div>
    </div>

    <script src="../assets/JavaScript/FTB.js"></script>

</body>

</html>
