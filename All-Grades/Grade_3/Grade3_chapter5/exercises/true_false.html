<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>True / False Quiz</title>

 <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700;900&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="../assets/CSS/true_false.css">
 
</head>

<body>

<div class="quiz-card">
  
  <div class="top-title">True / False Quiz</div>
  <div class="progress" id="progress"></div>

  <img id="questionImg" src="" class="qimg">

  <div class="question" id="question"></div>

  <div class="tf-buttons">
    <button class="true" id="trueBtn">TRUE</button>
    <button class="false" id="falseBtn">FALSE</button>
  </div>

  <div class="nav">
    <button class="prev" id="prevBtn">← Prev</button>
    <button class="next" id="nextBtn">Next →</button>
  </div>

</div>


<!-- CORRECT / WRONG POPUP -->
<div id="answerPopup" class="popup">
  <div class="popup-content">
    <div class="popup-icon" id="popupIcon"></div>
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
  </div>
</div>

<!-- FINAL POPUP -->
<div id="finalPopup" class="popup">
  <div class="popup-content">
    <div class="popup-icon">🎉</div>
    <h3>Congratulations!</h3>
    <p id="finalScore"></p>
    <div id="stars"></div>
    <button class="playAgain-btn" onclick="location.reload()">Play Again</button>
  </div>
</div>

<script src="../assets/JavaScript/true_false.js"></script>
</body>
</html>
