<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plant Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/CSS/two_example.css">
</head>

<body>

<div class="quiz">
   <div class="header">
            <span> Think and Answer </span>
            <div class="progress" id="progress"></div>
        </div>
    <button class="home" onclick="location.href='../index.html'">🏠 Home</button>
          <div class="title-wrapper">
 
</div>
  <!-- QUESTION -->
  <div class="question" id="question"></div>
   <img
    id="questionImg"
    src=""
    alt="Question image"
    style="
      width:220px;
      height:220px;
      object-fit:contain;
      margin:2px auto;
      display:block;
    "
  />
  <!-- ✅ REQUIRED INPUT (ADDED) -->
  <div style="margin:5px 0;">
   <textarea
  autocomplete="off"
  autocorrect="off"
  autocapitalize="off"
  spellcheck="false"
  id="answerInput"
  placeholder="Type answer here...."
  style="
    width:80%;
    height:120px;
    font-size:22px;
    padding:10px 16px;
    border-radius:14px;
    border:2px solid #ccc;
    text-align:left;
    margin-left: 10%;
    line-height:1.6;
    resize:none;
  "
></textarea>

  </div>
  <!-- 🔥 MULTI INPUTS (ONLY FOR Q2) -->
<div id="multiInputs"   style="display:none; justify-content:center; gap:12px; margin:0px 0;  width:80%;
        height:120px;
        font-size:22px;
        padding:10px 16px;
        border-radius:14px;
        border:2px solid #ccc;
        text-align:center;
         margin-left: 10%;">
  <input class="small-input" autocomplete="off"  placeholder="Type answer  a...">
  <input class="small-input" autocomplete="off"  placeholder="Type answer  b...">
  <input class="small-input" autocomplete="off"  placeholder="Type answer  c...">
  <input class="small-input" autocomplete="off"  placeholder="Type answer  d...">
</div>


  <!-- ✅ REQUIRED SUBMIT BUTTON (ADDED) -->
 
  <!-- NAV -->
  <div class="nav nav1">
    <button class="prev" id="prev" disabled>← Prev</button>
      <button id="submitBtn" > ✓ Submit </button>
    <button class="next" id="next" disabled>Next →</button>
  </div>

</div>

   <!-- CORRECT / WRONG POPUP -->
<div id="answerPopup" class="popup">
  <div class="popup-content">
    <div class="popup-icon" id="popupIcon"></div>
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
  </div>
</div>

<!-- FINAL POPUP -->
<div id="finalPopup">
  <div class="finalpopup-box">
    <h2 class="final-heading">🎉 Congratulations!</h2>
    <p id="finalScore"></p>
    <div id="stars"></div><br>
    <button onclick="restart()" class="playAgain-btn">Play Again</button>
  </div>
</div>

<script src="../assets/JavaScript/two_example.js"></script>
</body>
</html>
