<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Adventure Zone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Livvic";
}

body{
  min-height:100vh;
  margin:0;
  display:flex;

  background-image: url("./assets/images/L2bg.png");
  background-size: cover;        /* ✅ Makes image full screen */
  background-position: center;   /* ✅ Center the image */
  background-repeat: no-repeat;  /* ✅ Prevent repeat */
  /* background-attachment: fixed;  */

  overflow:hidden;
}

/* ===== SIDE NAV ===== */
.side-nav{
width:280px;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding-top:25px;
gap:18px;
position:fixed;
left:0;
top:0;
}

/* ===== TITLE ===== */
.nav-title{
font-size:26px;
font-weight:700;
color:#0284c7;
margin-bottom:10px;
}

/* ===== IMAGE ===== */
.side-image{
width:120px;
margin-bottom:20px;
}

/* ===== SIMPLE NAV BUTTON ===== */
.nav-btn{
width:220px;
padding:14px 18px;
border-radius:10px;
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
text-align:center;
transition:0.2s ease;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

/* DIFFERENT COLORS */
.nav-btn:nth-child(3){
background:#ff6b6b;
}

.nav-btn:nth-child(4){
background:#4dabf7;
}

.nav-btn:nth-child(5){
background:#51cf66;
}

.nav-btn:nth-child(6){
background:#f59f00;
}

/* HOVER */
.nav-btn:hover{
transform:scale(1.05);
}

/* ACTIVE */
.nav-btn.active{
outline:3px solid white;
}

/* ===== CONTENT ===== */
.content{
margin-left:280px;
flex:1;
height:100vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

body{
flex-direction:column;
}

.content{
display:none;
position:fixed;
inset:0;
background:#fff;
z-index:999;
margin-left:0;
}

.content.active{
display:block;
}

.side-nav{
position:relative;
width:100%;
height:100vh;
}

.nav-btn{
width:90%;
}

}

/* MOBILE TOGGLE */
.mobile-toggle{
display:none;
position:fixed;
top:15px;
right:15px;
background:#00cfff;
color:#fff;
font-size:22px;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
z-index:1001;
}

.mobile-toggle.show{
display:block;
}


</style>
</head>

<body>

<div class="mobile-toggle" id="toggleBtn" onclick="goBack()">☰</div>

<div class="side-nav">

<div class="nav-title">Animal Quiz</div>

<img src="./assets/images/FrindelyAnimal.png" class="side-image" alt="Animal Image">

<div class="nav-btn active" onclick="loadPage(this,'./exercises/mcq.html')">
📝 Choose Option
</div>

<div class="nav-btn" onclick="loadPage(this,'./exercises/FTB.html')">
✍ Fill & Blanks
</div>

<div class="nav-btn" onclick="loadPage(this,'./exercises/true_false.html')">
✔ True / False
</div>

<div class="nav-btn" onclick="loadPage(this,'./exercises/matching.html')">
🔗 Matching
</div>

</div>

<div class="content">
<iframe id="contentFrame" src="./exercises/mcq.html"></iframe>
</div>

<script>

function loadPage(btn,page){

document.getElementById("contentFrame").src = page;

document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
btn.classList.add("active");

if(window.innerWidth <= 768){
document.querySelector(".content").classList.add("active");
document.getElementById("toggleBtn").classList.add("show");
}
}

function goBack(){
document.querySelector(".content").classList.remove("active");
document.getElementById("toggleBtn").classList.remove("show");
}

</script>

</body>
</html>
