<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Correct Options Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/CSS/mcq.css">

</head>

<body>

<div class="quiz-card">

  <div class="top-title">Correct Options</div>

  <!-- ✅ FULL WIDTH QUESTION -->
  <div class="question question-full" id="questionText"></div>

  <div class="quiz-content">

    <!-- ✅ IMAGE TAG BACK -->
    <div class="quiz-image">
      <img id="quizImg" alt="Quiz Image">
    </div>

    <div class="quiz-right">
      <div class="options" id="options"></div>
    </div>

  </div>

  <div class="nav">
    <button class="prev" id="prevBtn" disabled>← Prev</button>
    <button class="next" id="nextBtn" disabled>Next →</button>
  </div>

</div>

<!-- CORRECT / WRONG POPUP -->
<div id="answerPopup" class="popup">
  <div class="popup-content">
    <div class="popup-icon" id="popupIcon"></div>
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
  </div>
</div>

<!-- FINAL POPUP -->
<div id="finalPopup" class="popup">
  <div class="popup-content">
    <div class="popup-icon">🎉</div>
    <h3>Quiz Completed!</h3>

    <div id="stars">⭐⭐⭐⭐⭐</div>
    <p id="finalScore">Score: 5/5</p>

    <button class="restart" onclick="location.reload()">Play Again</button>
  </div>
</div>


 <script src="../assets/JavaScript/mcq.js"></script>

</body>
</html>
