
<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <title>Animal Quiz</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../assets/CSS/fillblanks.css">
</head>

<body>

    <div class="quiz">
   <div class="top-title">Fill In The Blanks</div>

        <!-- HEADER -->
        <div class="header">
            <div id="qCount"></div>
          
            
        </div>

        <!-- CONTENT -->
        <div class="content">
            <div class="image-box">
                <img id="qImg">
            </div>
            <div class="question-area">
                <div class="question" id="qText"></div>
<div class="input-row">

  <div class="input-box" id="singleInputBox">
    <input id="answerInput" placeholder="Type your answer">
  </div>

  <!-- ✅ DOUBLE INPUT FOR Q4 -->
  <div class="double-input" id="doubleInputBox" style="display:none;">
    <input id="answerInput1" placeholder="Type your answer">
    <input id="answerInput2" placeholder="Type your answer">
  </div>

  <div class="checkBtn-container" id="singleCheck">
    <button id="checkBtn">Check</button>
  </div>

  <!-- ✅ DOUBLE CHECK BUTTON -->
  <div class="double-check" id="doubleCheck" style="display:none;">
    <button id="checkBtn1">Check</button>
    <button id="checkBtn2">Check</button>
  </div>

</div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <button class="prev" id="prevBtn">← Prev</button>

            <div class="score">
               
                
            </div>

            <button class="next" id="nextBtn">Next →</button>
        </div>

    </div>

    <!-- CORRECT / WRONG POPUP -->
    <div id="answerPopup" class="popup">
        <div class="popup-content">
            <div class="popup-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <!-- FINAL POPUP -->
  <div id="finalPopup" class="popup">
  <div class="popup-content">
    <div class="popup-icon">🏆</div>
    <h3>Congratulations!</h3>
    <p id="finalScore"></p>
    <div id="stars"></div>
    <button onclick="location.reload()" class="playAgain-btn">Play Again</button>
  </div>
</div>


    <script src="../assets/JavaScript/fillblanks.js"></script>

</body>

</html>
