<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaf Path Match</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/CSS/matching.css">
</head>

<body>

<div class="game">

    <div class="hint">
        🍃 Match the options
    </div>

    <div class="play-area">

        <!-- ✅ ANSWERS (LEFT SIDE NOW) -->
        <div class="answers">

            <div class="answer" data-match="frog">
                <div class="answer-inner">
                    <img src="../assets/images/frog-img.png">
                    <span>Frog</span>
                </div>
            </div>

            <div class="answer" data-match="butterfly">
                <div class="answer-inner">
                    <img src="../assets/images/butterfly.png">
                    <span>Butterfly</span>
                </div>
            </div>

            <div class="answer" data-match="fish">
                <div class="answer-inner">
                    <img src="../assets/images/fish.png">
                    <span>Fish</span>
                </div>
            </div>

            <div class="answer" data-match="cow">
                <div class="answer-inner">
                    <img src="../assets/images/cow.png">
                    <span>Cow</span>
                </div>
            </div>

            <div class="answer" data-match="plant">
                <div class="answer-inner">
                    <img src="../assets/images/plant.png">
                    <span>Plant</span>
                </div>
            </div>

        </div>

        <!-- ✅ GAP (CENTER) -->
        <div class="gap">
            <svg id="lines"></svg>
        </div>

        <!-- ✅ QUESTIONS (RIGHT SIDE NOW) -->
        <div class="path">

            <div class="step" data-match="plant">
                <div class="step-text">1. It prepares its own food.</div>
                <div class="step-img"></div>
            </div>

            <div class="step" data-match="cow">
                <div class="step-text">2. It breathes through its lungs.</div>
                <div class="step-img"></div>
            </div>

            <div class="step" data-match="butterfly">
                <div class="step-text">3. It has six legs.</div>
                <div class="step-img"></div>
            </div>

            <div class="step" data-match="frog">
                <div class="step-text">4. It breathes through its skin when in water.</div>
                <div class="step-img"></div>
            </div>

            <div class="step" data-match="fish">
                <div class="step-text">5. It breathes through its gills.</div>
                <div class="step-img"></div>
            </div>

        </div>

        <div class="finish" id="finish">
            🎉 Amazing! You Done the Matching Quiz.
        </div>

    </div>

    <!-- FINAL POPUP -->
    <div id="finalPopup">
        <div class="finalpopup-box">
            <h2 class="final-heading">🎉 Congratulations!</h2>
            <p id="finalScore"></p>
            <div id="finalstars" class="stars"></div>
            <br>
            <button onclick="location.reload()" class="playAgain-btn">
                Play Again
            </button>
        </div>
    </div>

</div>

<script src="../assets/JavaScript/matching.js"></script>

</body>
</html>
