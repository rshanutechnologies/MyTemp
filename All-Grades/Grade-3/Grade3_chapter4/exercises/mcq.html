<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drinking Quiz</title>

  <!-- ✅ Livvic Font -->
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/CSS/mcq.css">
</head>

<body>
  <div class="app">

  <div class="header-bar">
    <div class="title-box" id="quizTitle">DRINKING QUIZ</div>
    <div  id="homeBtn"></div>
  </div>


    <div class="question-pill">
      <p class="question-text" id="questionText">Loading...</p>
    </div>
    

    <div class="options" id="optionsWrap"></div>

    <!-- ✅ Progress Boxes -->
    

    <div class="nav">
      <button class="nav-btn prev-btn" id="prevBtn" disabled>← Prev</button>
      <button class="nav-btn next-btn" id="nextBtn" disabled>Next →</button>
    </div>
    

  </div>

  <!-- ✅ Popup -->
  <div class="popup" id="popup">
    <div class="popup-box" id="popupBox"></div>
  </div>
<script src="../assets/JavaScript/mcq.js"></script>
</body>
</html>
