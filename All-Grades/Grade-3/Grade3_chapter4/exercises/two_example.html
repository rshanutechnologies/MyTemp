<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Two Example Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/CSS/two_example.css">

</head>

<body>
<div class="viewport">
    <div class="scale-wrapper">
<div class="board">

  <div class="header-bar">
  
  <div class="home-btn" id="homeBtn"></div>
</div>

  <div>
    <div class="question-text" id="questionText">Loading...</div>
  </div>

  <div class="content">
    <div class="options-box" id="optionsBox"></div>

    <div class="drop-area" id="dropArea">
      <div class="drop-title">DROP ZONE</div>
      <div class="drop-items" id="dropItems"></div>
    </div>
  </div>

  <div class="nav">
    <button class="btn prev" id="prevBtn" onclick="prevQuestion()" disabled>← Prev</button>
    <button class="btn next" id="nextBtn" onclick="nextQuestion()" disabled>Next →</button>
  </div>
        </div>
    </div>


<!-- </div> -->
</div>
<!-- ✅ POPUP -->
<div class="popup" id="popup">
  <div class="popup-box" id="popupText"></div>
</div>


<script src="../assets/JavaScript/two_example.js"></script>

</body>
</html>
