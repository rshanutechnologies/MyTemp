<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title> SCIENCE FILL IN THE BLANKS QUIZ</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
   
    <link rel="stylesheet" href="../assets/CSS/fillblanks.css">
</head>

<body>

  <div class="book">

  <div class="top-bar">
    
    <div id="homeBtn" class="home-btn"></div>
  </div>

        <div class="header">
            <h1></h1>
            <div class="page" id="counter"></div>
        </div>

        <div class="content">
            <div class="photo" id="photo"></div>
            <div class="story" id="story"></div>
        </div>

        <input id="answer" placeholder="Write the missing word…">

        <div class="controls">
            <button id="prev">←  Prev</button>
           <button id="submit" class="check-btn">Check</button>

            <button id="next">Next →</button>
        </div>

    </div>

    <!-- CORRECT / WRONG POPUP -->
    <div id="answerPopup" class="popup">
        <div class="popup-content">
            <div class="popup-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <!-- FINAL POPUP -->
    <div id="finalPopup"> <div class=" finalpopup-box">
        <h2 class="final-heading">🎉 Congratulations!</h2>
        <p id="finalScore"></p>
        <div id="stars"></div><br> <button onclick="location.reload()" class="playAgain-btn"> Play Again </button>
    </div>
    </div>
    <div id="homePopup" class="popup">
  <div class="popup-content">
    <div class="popup-icon">🏠</div>
    <h3>Go to Home?</h3>
    <p>Your progress will be lost.</p>

    <div style="margin-top:10px;">
      <button onclick="goHome()">Yes</button>
      <button onclick="closeHomePopup()">Cancel</button>
    </div>
  </div>
</div>


    <script src="../assets/JavaScript/fillblanks.js"></script>

</body>

</html>
