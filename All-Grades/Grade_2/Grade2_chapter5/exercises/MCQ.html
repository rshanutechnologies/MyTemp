<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Animal Quiz</title>
  <link rel="stylesheet" href="../assets/css/MCQ.css">
</head>
<canvas id="confetti"></canvas>

<body>
  <h3
    style="position: absolute; top:5px;left:20px; color:#0284c7; padding:10px 28px;background:#ff9f2f;color:#fff;border-radius:25px;font-size:20px;font-weight:600;">
    MCQ's</h3>
  <div class="quiz-container">

    <div class="level-progress">
      <div class="progress-line"></div>
      <div class="level"></div>
      <div class="level"></div>
      <div class="level"></div>
      <div class="level"></div>
      <div class="level"></div>
    </div>

    <div id="question"></div>
    <div class="img-container">
      <img id="questionImg" class="question-img">
    </div>
    <div class="options" id="options"></div>

  </div>

  <div class="controls">
    <button class="prev" id="prevBtn">❮</button>
    <button class="next" id="nextBtn">❯</button>
  </div>

  <div class="popup" id="popup">
    <div class="popup-box" id="popupText"></div>
  </div>
  <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
  <audio id="wrongSound"
    src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
  <script src="../assets/js/MCQ.js"></script>
</body>

</html>
