<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fill the Blanks - Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Livvic', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #e9fbf4, #dff7ee);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        /* PROGRESS BAR - SEPARATE (not in game wrapper) */
        .progress-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .progress-bar {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.95);
              padding: 8px 14px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .progress-box {
          width: 28px !important;
    height: 28px !important;
    border-radius: 50%;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 16px;
    font-weight: bold;
        }

        .progress-box.done {
            background: #22c55e;
            color: #fff;
            animation: popCircle 0.4s ease;
        }

        @keyframes popCircle {
            0% { transform: scale(0.7); opacity: 0; }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* MAIN GAME WRAPPER */
        .game-wrapper {
            width: 100%;
            max-width: 600px;
            background: transparent;
            padding: 40px 20px;
            text-align: center;
            margin-top: -70px;
        }

        /* Image */
        .question-img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            /* margin: 0 auto 20px; */
            margin: auto;
            display: block;
        }

        /* Question Text */
        #questionText {
            font-size: 30px;
            font-weight: 400;
            color: #2f4f4f;
            text-align: center;
            /* margin-bottom: 30px; */
            min-height: 60px;
           
            padding: 20px;
            border-radius: 20px;
            margin-top: -30px;
        }

        /* INPUT */
        .input-row {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 420px;
            max-height: 50px;
            margin: 0 auto 25px;
            padding: 14px 18px;
            background: #fff;
            border-radius: 30px;
            border: 3px solid #e6f2e2;
            box-shadow: 0 8px 18px rgba(0, 216, 187, 0.2);
        }

        .input-row.correct {
            border-color: #22c55e;
            background: #f0fff0;
        }

        .input-row input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 26px;
            text-align: center;
            padding: 10px;
            color: #2f4f4f;
            font-weight: 500;
        }

        .input-row input:focus {
            outline: none;
        }

        .input-row input:disabled {
            color: #22c55e;
            font-weight: bold;
        }

        /* CHECK BUTTON */
        .check-btn {
            background: linear-gradient(#ffd96a, #ffc107);
            border: none;
            padding: 14px 36px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            color: #6b4b00;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 0 auto 20px;
            display: block;
            transition: all 0.3s ease;
        }

        .check-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .check-btn:active {
            transform: translateY(0);
        }

        .check-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
    width: 100%;
}

        /* NAV BUTTONS */
        .nav button { 
    font-size: 20px;
    padding: 10px 30px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
}

.nav button:disabled {
    opacity: 0.5;
}

.prev,
.next {
    position: static;
    font-size: 18px;
    padding: 10px 24px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
}

.prev {
    background: #ffb74d;
    color: white;
}

.next {
    background: #4fc3f7;
    color: white;
}
        .nav button:hover {
            transform: translateY(-2px);
        }

        .nav button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* BIG CIRCLE POPUP (same as your chain game) */
        .popup {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .feedback-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 86px;
            color: white;
            font-weight: 900;
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .feedback-circle.correct {
            background: #22c55e;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.5);
        }

        .feedback-circle.wrong {
            background: #ef4444;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
        }

        @keyframes popIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* FLYING TICK (same as your chain game) */
        .fly-tick {
            position: fixed;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #22c55e;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 900;
            z-index: 10000;
            pointer-events: none;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        /* FINAL POPUP (same as your chain game) */
        .final-popup-box {
            width: 450px;
            background: white;
            border-radius: 24px;
            display: flex;
            overflow: hidden;
            animation: finalZoom 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        @keyframes finalZoom {
            0% { opacity: 0; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1); }
        }

        .final-left {
            width: 160px;
            background: linear-gradient(135deg, #fef08a, #fde047);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .final-left img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            animation: trophyBounce 1s ease-in-out infinite;
        }

        @keyframes trophyBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .final-right {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: center;
        }

        .final-right h2 {
            font-size: 26px;
            font-weight: 800;
            color: #0f172a;
            margin: 0;
        }

        .final-score {
            font-size: 18px;
            font-weight: 700;
            color: #2563eb;
        }

        .final-stars {
            font-size: 28px;
            letter-spacing: 5px;
        }

        .restart-btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

                <button class="restart-btn" id="restartBtn">🔄 Play Again</button>
            </div>
        </div>
    </div>

    <script>
                const questions = [

    q: "Visakhapatnam is the most populated city in _______________.",
    a: "ANDHRAPRADESH",
    img: "../assets/images/F-3.png",
   
  },
  {
    q:
      "_______________ is one of the popular street foods of Hyderabad.",
    a: "BIRYANI",
    img: "../assets/images/DinnerWB.png",
   
  },
  {
    q: "_______________ lies on the banks of Musi River.",
    a: "HYDERABAD",
    img: "../assets/images/C-4.png",
    
  },
];

        let index = 0;
        let score = 0;
        const answers = Array(questions.length).fill(null);

        // DOM Elements
        const qText = document.getElementById("questionText");
        const input = document.getElementById("answerInput");
        const checkBtn = document.getElementById("checkBtn");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const inputRow = document.getElementById("inputRow");
        const qImg = document.getElementById("questionImg");
        const progressBar = document.getElementById("progressBar");
        const feedbackPopup = document.getElementById("feedbackPopup");
        const feedbackCircle = document.getElementById("feedbackCircle");
        const flyTick = document.getElementById("flyTick");
        const finalPopup = document.getElementById("finalPopup");
        const finalScoreText = document.getElementById("finalScoreText");
        const finalStars = document.getElementById("finalStars");

        // Speech function
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                setTimeout(() => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = "en-US";
                    utterance.rate = 0.9;
                    utterance.volume = 1;
                    window.speechSynthesis.speak(utterance);
                }, 50);
            }
        }

        // Initialize Progress Bar
        function initProgress() {
            progressBar.innerHTML = "";
            for (let i = 0; i < questions.length; i++) {
                const box = document.createElement("div");
                box.className = "progress-box";
                box.textContent = i + 1;
                progressBar.appendChild(box);
            }
        }

        // Update Progress Bar
        function updateProgress() {
            const boxes = document.querySelectorAll(".progress-box");
            boxes.forEach((box, i) => {
                if (answers[i]) {
                    box.classList.add("done");
                } else {
                    box.classList.remove("done");
                }
            });
        }

        // Show Feedback Popup (big circle)
        function showFeedback(type) {
            feedbackPopup.style.display = "flex";
            feedbackCircle.className = "feedback-circle " + type;
            feedbackCircle.textContent = type === "correct" ? "✔" : "✖";
            setTimeout(() => {
                feedbackPopup.style.display = "none";
            }, 800);
        }

        // Fly Tick Animation
        function flyTickToProgress() {
            const target = document.querySelector(`.progress-box:nth-child(${index + 1})`);
            if (!target) return;
            
            const from = feedbackCircle.getBoundingClientRect();
            const to = target.getBoundingClientRect();
            
            flyTick.style.transition = "none";
            flyTick.style.opacity = "1";
            flyTick.style.left = from.left + from.width / 2 + "px";
            flyTick.style.top = from.top + from.height / 2 + "px";
            
            flyTick.offsetHeight;
            flyTick.style.transition = "all 0.8s cubic-bezier(0.34, 1.2, 0.64, 1)";
            flyTick.style.left = to.left + to.width / 2 + "px";
            flyTick.style.top = to.top + to.height / 2 + "px";
            flyTick.style.transform = "translate(-50%, -50%) scale(0.3)";
            
            setTimeout(() => {
                flyTick.style.opacity = "0";
                flyTick.style.transform = "translate(-50%, -50%) scale(1)";
            }, 800);
        }

        // Show Final Popup
        function showFinalPopup() {
            finalScoreText.textContent = `Score: ${score} / ${questions.length}`;
            const stars = "⭐".repeat(score) + "☆".repeat(questions.length - score);
            finalStars.textContent = stars;
            finalPopup.style.display = "flex";
            speak("Congratulations! You completed the quiz!");
        }

        // Load Question
        function loadQuestion() {
            const current = questions[index];
            qText.textContent = current.q;
            qImg.src = current.img;
            
            input.value = answers[index] || "";
            input.disabled = !!answers[index];
            inputRow.classList.toggle("correct", !!answers[index]);
            checkBtn.disabled = !!answers[index] || !input.value.trim();
            prevBtn.disabled = index === 0;
            nextBtn.disabled = !answers[index];
            
            updateProgress();
        }

        // Check Answer
        function checkAnswer() {
            const userAnswer = input.value.trim().toUpperCase();
            const correctAnswer = questions[index].a;
            
            if (!userAnswer) {
                showFeedback("wrong");
                speak("Please enter an answer!");
                return;
            }
            
            if (userAnswer === correctAnswer) {
                if (!answers[index]) {
                    answers[index] = userAnswer;
                    score++;
                    updateProgress();
                    showFeedback("correct");
                    speak("Correct! Well done!");
                    
                    setTimeout(() => {
                        flyTickToProgress();
                    }, 200);
                    
                    input.disabled = true;
                    inputRow.classList.add("correct");
                    checkBtn.disabled = true;
                    nextBtn.disabled = false;
                    
                    if (score === questions.length) {
                        setTimeout(() => {
                            showFinalPopup();
                        }, 1000);
                    }
                }
            } else {
                showFeedback("wrong");
                speak("Try again!");
                input.value = "";
                input.focus();
            }
        }

        // Next Question
        function nextQuestion() {
            if (index < questions.length - 1 && answers[index]) {
                index++;
                loadQuestion();
                input.focus();
            }
        }

        // Previous Question
        function prevQuestion() {
            if (index > 0) {
                index--;
                loadQuestion();
                input.focus();
            }
        }

        // Restart Quiz
        function restartQuiz() {
            index = 0;
            score = 0;
            answers.fill(null);
            finalPopup.style.display = "none";
            initProgress();
            loadQuestion();
            speak("Quiz restarted! Good luck!");
        }

        // Input handler
        input.oninput = () => {
            if (!answers[index]) {
                checkBtn.disabled = !input.value.trim();
            }
        };

        // Enter key support
        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !checkBtn.disabled) {
                checkAnswer();
            }
        });

        // Event Listeners
        checkBtn.onclick = checkAnswer;
        prevBtn.onclick = prevQuestion;
        nextBtn.onclick = nextQuestion;
        document.getElementById("restartBtn").onclick = restartQuiz;

        // Initialize
        initProgress();
        loadQuestion();
    </script>

</body>
</html>
