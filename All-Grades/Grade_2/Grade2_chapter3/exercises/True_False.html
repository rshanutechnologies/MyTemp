<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji True False Click</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/True_False.css">
</head>

<body>

  <div class="progress-wrap" id="progressWrap"></div>
  <div class="fly-tick" id="flyTick">✔</div>

  <div class="quiz">
    <div class="emoji-box">
      <div class="emoji-bg">
        <img id="quizImg" src="" alt="Question Image" style="width:90%;height:90%;object-fit:contain;">
      </div>
    </div>
<div class="question-option">
    <div class="right">
      <div class="question" id="question"></div>

      <div class="drop-zone" id="dropZone"></div>

      <div class="options">
        <div class="option true" id="trueBtn">T</div>
        <div class="option false" id="falseBtn">F</div>
      </div>

      <div class="result" id="result"></div>
</div>
      <div class="nav">
        <button class="prev" id="prevBtn" onclick="prev()">◀ Prev</button>
        <button class="next" id="nextBtn" onclick="next()" disabled>Next  ▶</button>
      </div>
    </div>
  </div>

  <!-- ✅ Feedback Popup -->
  <div class="popup" id="feedbackPopup">
    <div id="feedbackCircle" class="feedback-circle correct">✔</div>
  </div>

  <!-- ✅ Final Popup -->
  <div class="popup" id="finalPopup">
    <div class="final-popup-box">
      <div class="final-left">
        <img src="../assets/images/boy-trophy.png" alt="Winner">
      </div>
      <div class="final-right">
        <h2>🎉 Congratulations!</h2>
        <div class="final-score" id="finalScoreText"></div>
        <div class="final-stars" id="finalStars"></div>
        <button class="restart-btn" onclick="restartQuiz()">🔁 Restart</button>
      </div>
    </div>
  </div>
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
  <script src="../assets/js/True_False.js"></script>

</body>

</html>
