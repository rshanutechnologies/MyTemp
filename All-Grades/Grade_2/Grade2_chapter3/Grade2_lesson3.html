<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Quiz Hub - Moving Nav</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Livvic', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #e9fbf4, #dff7ee);
      /* background-image: url("assets/images/BG.png"); */
      display: flex;
      flex-direction: column;
    }

    /* TOP BAR WRAP */
    .top-bar-wrap {
      width: 100%;
      overflow: hidden;
      padding: 8px 0;

    }

    /* MOVING TRACK */
    .top-bar {
      display: flex;
      gap: 18px;
      /* animation:marqueeMove 20s linear infinite; */
      width: max-content;
      margin: auto;
    }

    /* TAB */
    .tab {
      min-width: 170px;
      padding: 14px 18px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 700;
      cursor: pointer;

      transition: transform .2s;
      user-select: none;
    }

    .tab:hover {
      transform: scale(1.05);
    }

    /* COLORS */
    .t1 {
      background: #fde68a;
    }

    .t2 {
      background: #bbf7d0;
    }

    .t3 {
      background: #bfdbfe;
    }

    .t4 {
      background: #fbcfe8;
    }

    .t5 {
      background: #ddd6fe;
    }

    /* MARQUEE */
    @keyframes marqueeMove {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    /* CONTENT */
    .content-area {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      /* padding:24px; */
      width: 100%;
      height: 100%;

    }

    .content {
      width: 100%;
      /* max-width:1000px; */
      height: 100%;
      /* background:#fff;
  border-radius:32px; */
      /* padding:10px;
  box-shadow:0 22px 44px rgba(0,0,0,.18); */
      background: transparent;
    }

    /* IFRAME */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 24px;
      /* background:#fff; */
    }

    /* ACTIVE TAB */
    .tab {
      min-width: 170px;
      padding: 14px 18px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all .25s ease;
      position: relative;
    }

    /* emoji style */
    .icon {
      font-size: 20px;
      transition: all .25s ease;
    }

    /* default emoji look */
    .tab .icon {
      filter: grayscale(100%);
      opacity: .6;
    }

    /* ACTIVE STATE */
    .tab.active {
      background: #ffffff;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    .tab.active .icon {
      filter: none;
      opacity: 1;
      transform: scale(1.2);
    }

    /* make emoji appear green glow */
    .tab.active .icon {
      text-shadow: 0 0 8px #18db60;
    }

    /* ================= TOGGLE BUTTON ================= */
.menu-toggle {
  display: none;
  position: fixed;
  top: 10px;
  right: 12px;
  z-index: 1000;
  font-size: 26px;
  background: #ffffff;
  border-radius: 10px;
  padding: 6px 12px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,.15);
}

/* ================= MOBILE MODE ================= */
@media (max-width: 990px) {

  body {
    overflow: hidden;
  }

  .menu-toggle {
    display: block;
  }

  .top-bar-wrap {
    position: fixed;
    top: 0;
    left: -100%;
    width: 260px;
    height: 100vh;
    background: #f7fffb;
    padding-top: 60px;
    transition: left .35s ease;
    z-index: 999;
    box-shadow: 4px 0 15px rgba(0,0,0,.15);
  }

  .top-bar-wrap.open {
    left: 0;
  }

  .top-bar {
    flex-direction: column;
    align-items: stretch;
    padding: 10px;
  }

  .tab {
    width: 100%;
    min-width: unset;
  }

  /* content full screen */
  .content-area {
    padding-top: 50px;
  }
}

/* ================= 1025px — 1440px ================= */
 @media screen and (min-width:1350px) and (max-width:1640px){

.top-bar{
gap:14px;
}

.tab{
min-width:250px;
padding:12px 16px;
font-size:25px;
}

.icon{
font-size:48px;
}

.content{
max-width:1200px;
margin:auto;
}

iframe{
border-radius:20px;
}

} 


/* ================= 1441px — 1920px ================= */
@media screen and (min-width:1350px) and (max-width:1920px){

.top-bar{
gap:20px;
}

.tab{
min-width:280px;
padding:16px 22px;
font-size:24px;
}

.icon{
font-size:29px;
}

.content{
max-width:1400px;
margin:auto;
}

iframe{
border-radius:24px;
}

}


/* ================= 1921px+ ================= */
@media screen and (min-width:1921px){

.top-bar{
gap:26px;
}

.tab{
min-width:210px;
padding:18px 26px;
font-size:19px;
}

.icon{
font-size:24px;
}

.content{
max-width:1600px;
margin:auto;
}

iframe{
border-radius:28px;
}

}
  </style>
</head>

<body>
<!-- TOGGLE BUTTON -->
<div class="menu-toggle" id="menuToggle">
  ☰
</div>
  <div class="top-bar-wrap">
    <div class="top-bar">

      <!-- ORIGINAL -->
      <div class="tab t1" data-link="./exercises/MCQ.html">
        <span class="icon">🎯</span> Choose Correct
      </div>

      <div class="tab t2" data-link="./exercises/FITB.html">
        <span class="icon">🧠</span> Fill Blanks
      </div>

      <div class="tab t3" data-link="./exercises/True_False.html">
        <span class="icon">👍👎</span> True / False
      </div>

       <div class="tab t4" data-link="./exercises/matching.html">
        <span class="icon">🧩</span> Matching
      </div>

      <div class="tab t5" data-link="./exercises/twoExample.html">
        <span class="icon">🔢</span> One Examples
      </div>

      <!-- DUPLICATES FOR LOOP -->
      <!-- <div class="tab t1" data-link="./exercises/MCQ.html"><span>🎯</span>Choose Correct</div>
    <div class="tab t2" data-link="./exercises/True_False.html"><span>👍👎</span>True / False</div>
    <div class="tab t3" data-link="./exercises/twoExample.html"><span>🔢</span>Two Examples</div>
    <div class="tab t4" data-link="./exercises/matching.html"><span>🧩</span>Matching</div>
    <div class="tab t5" data-link="./exercises/FITB.html"><span>🧠</span>Fill Blanks</div> -->

    </div>
  </div>

  <div class="content-area">
    <div class="content">
      <!-- DEFAULT LOAD -->
      <iframe id="quizFrame" src="./exercises/MCQ.html"></iframe>
    </div>
  </div>

 <script>
  /* ================= SELECT ELEMENTS ================= */
  const toggleBtn = document.getElementById("menuToggle");
  const navWrap = document.querySelector(".top-bar-wrap");
  const tabs = document.querySelectorAll(".tab");
  const frame = document.getElementById("quizFrame");

  /* ================= TOGGLE MENU ================= */
  toggleBtn.addEventListener("click", () => {
    navWrap.classList.toggle("open");
  });

  /* ================= DEFAULT ACTIVE ================= */
  tabs[0].classList.add("active");

  /* ================= TAB NAVIGATION ================= */
  tabs.forEach(tab => {
    tab.addEventListener("click", () => {

      // active highlight
      tabs.forEach(t => t.classList.remove("active"));
      tab.classList.add("active");

      // iframe change
      frame.src = tab.dataset.link;

      // close menu on mobile
      navWrap.classList.remove("open");
    });
  });
</script>



</body>

</html>
