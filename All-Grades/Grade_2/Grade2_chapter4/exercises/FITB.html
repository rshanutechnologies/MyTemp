<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Plant Fill Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/FITB.css">
</head>

<body>

  <div class="main">
    <button class="home-btn">Fill in the blanks</button>
    <div class="progress" id="progress"></div>
    <div class="questions" id="questions"></div>
  </div>



  <div class="popup hidden" id="popup">
    <div class="popup-box">
      <div class="popup-emoji" id="popupEmoji">👍</div>
      <h3 id="popupTitle"></h3>
      <p id="popupText"></p>
      <button class="restart hidden" id="restart">Play Again</button>

    </div>
  </div>
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
  <script src="../assets/js/FITB.js"></script>
</body>

</html>
