<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Two Example Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/oneExample.css">
</head>

<body>

  <!-- <button class="home-btn" onclick="window.parent.closeQuiz()">🏠 Home</button> -->
  <div>
    <div class="home-btn">One Example </div>
  </div>
  <div class="main">
    <div class="progress" id="progress"></div>

    <!-- <div style="text-align:center;"><div class="title">Two Example Quiz</div></div> -->

    <div class="content">
      <div class="left">
        <div class="drop"></div>

      </div>

      <div class="right">
        <div class="question">
          <div id="questionText"></div>
          <img id="questionImg">
        </div>

      </div>
    </div>

    <div class="options" id="options"></div>

    <div class="nav">
      <div class="btn" id="prev">← Prev</div>
      <div class="btn" id="next">Next →</div>
    </div>
  </div>

  <!-- POPUP -->
  <div class="popup hidden" id="popup">
    <div class="popup-box">
      <div class="popup-emoji" id="popupEmoji">👍</div>
      <h3 id="popupTitle"></h3>
      <p id="popupText"></p>
      <button class="btn hidden" id="restart">Play Again</button>

    </div>
  </div>
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
  <script src="../assets/js/oneExample.js"></script>
</body>

</html>
