<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Think & Flip – True or False</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/true_false.css">
</head>

<body>

<div class="game">
  <div class="header">
    <div class="count" id="count"></div>
      <!-- ✅ IMAGE -->
  <img id="qImg" class="q-img" src="" alt="Question Image">
    <div class="question" id="question"></div>
  </div>

  <div class="cards">
    <div class="card" onclick="choose(true,this)">
      <div class="inner">
        <div class="face front">TRUE</div>
        <div class="face back true">TRUE</div>
      </div>
    </div>

    <div class="card" onclick="choose(false,this)">
      <div class="inner">
        <div class="face front">FALSE</div>
        <div class="face back false">FALSE</div>
      </div>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>

  <!-- <div class="nav">
    <button id="prevBtn" onclick="prev()">← Prev</button>
    <button id="nextBtn" onclick="next()" disabled>Next →</button>
  </div> -->

  <div class="nav">
        <button id="prevBtn">◀ Prev</button>
        <button id="nextBtn">Next ▶</button>
      </div>
</div>

<!-- ✅ popup -->
<div id="answer-popup" class="popup">
  <div class="popup-content">
    <div class="popup-icon" id="popup-icon"></div>
    <h3 id="popup-title"></h3>
    <p id="popup-message"></p>
  </div>
</div>
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
 <script src="../assets/js/true_false.js"></script>
</body>
</html>
