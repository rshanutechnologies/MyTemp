<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Two Example Quiz</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/twoExample.css">
</head>

<body>

  <div class="wrapper">
    <div class="card">

      

      <!-- Question -->
      <h2 class="question" id="questionText">Loading...</h2>

      <div class="content">
        <!-- Left image -->
        <div class="left">
          <img id="questionImage" src="" alt="image" />
          <input id="answerInput" class="answer-box" placeholder="" disabled />
        </div>

        <!-- Right options -->
        <div class="right" id="optionsWrap"></div>
      </div>

      <!-- Nav -->
      <div class="nav">
        <button id="prevBtn">◀ Prev</button>
        <button id="nextBtn">Next ▶</button>
      </div>

    </div>
  </div>

  <!-- ✅ SAME POPUP (Correct/Wrong/Final) -->
  <div id="answer-popup" class="popup">
    <div class="popup-content">
      <div class="popup-icon" id="popup-icon"></div>
      <h3 id="popup-title"></h3>
      <p id="popup-message"></p>
    </div>
  </div>
 <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
  <script src="../assets/js/twoExample.js"></script>
</body>
</html>
