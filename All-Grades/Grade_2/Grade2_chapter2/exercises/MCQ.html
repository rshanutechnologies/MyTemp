<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Quiz - One Line Layout</title>
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/MCQ.css">
</head>
<body>

<div class="quiz-container">
  <!-- NO TITLE, NO SCORE BAR — removed completely as requested -->

  <!-- HORIZONTAL LAYOUT: question | image | options inline (3 in a row) -->
  <div class="horizontal-layout">
    <!-- left: question text -->
    <div class="question-block">
      <div class="question-text" id="qText"></div>
    </div>

    <!-- center: image -->
    <div class="image-block">
      <img id="qImage" class="quiz-image" src="" alt="quiz visual">
    </div>

    <!-- right: three options in one line (flex row) -->
    <div class="options-row" id="optionsContainer"></div>
  </div>

  <!-- nav buttons (prev / next) -->
  <div class="nav">
    <button class="prev" id="prevBtn">← Prev</button>
    <button class="next" id="nextBtn" disabled>Next →</button>
  </div>
</div>

<!-- popup for correct/wrong feedback -->
<div class="popup" id="popup">
  <div class="popup-box">
    <div id="popupMedia"></div>
    <div id="popupText" class="popup-msg"></div>
  </div>
</div>

<!-- final result popup -->
<div class="popup" id="finalPopup">
  <div class="popup-box final-box">
    <img id="winnerImg" class="winner-img" src="../assets/images/boy-trophy.png" alt="Winner Trophy">
    <h2 class="final-title">🎉 Congratulations!</h2>
    <p class="final-score" id="finalScore"></p>
    <div class="final-stars" id="finalStars"></div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 Play Again</button>
  </div>
</div>

<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

<script src="../assets/js/MCQ.js"></script>
</body>
</html>
