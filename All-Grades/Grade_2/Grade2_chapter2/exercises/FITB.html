<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Fill in the Blank - Simple Input</title>
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Livvic', sans-serif;
    }

    body {
      min-height: 100vh;
      /* background: linear-gradient(145deg, #f1f5f9 0%, #e6edf4 100%); */
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    .quiz-container {
      width: 100%;
      max-width: 1200px;
      /* background: rgba(255, 255, 255, 0.96); */
      border-radius: 56px;
      /* padding: 40px 45px; */
      margin-top: -7% !important;
      /* box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2); */
    }

    /* ============================================ */
    /* LAYOUT: Question → Image → Inputs → Submit → Nav */
    /* ============================================ */

    /* Question Area */
    .question-area {
      width: 100%;
      text-align: center;
      margin-bottom: 30px;
    }

    .question-text {
      font-size: 30px !important;
      font-weight: 400 !important;
      color: #1e3a5f;
      line-height: 1.4;
      /* background: #fef9e6; */
      padding: 25px 30px;
      border-radius: 48px;
      display: inline-block;
      width: auto;
      max-width: 90%;
      word-break: break-word;
    }

    /* Simple Input Box Styling */
    .simple-input {
      display: inline-block;
      width: auto;
      min-width: 120px;
      height: 45px;
      padding: 8px 15px;
      font-size: 24px;
      font-weight: 500;
      text-align: center;
      border: 3px solid #4a90e2;
      border-radius: 16px;
      background: white;
      color: #1e3a5f;
      outline: none;
      transition: all 0.2s ease;
      margin: 0 5px;
      font-family: 'Livvic', monospace;
    }

    .simple-input:focus {
      border-color: #ff9f43;
      box-shadow: 0 0 0 3px rgba(255, 159, 67, 0.2);
    }

    .simple-input.disabled-input {
      background: #e8f8ef;
      border-color: #2ecc71;
      color: #2ecc71;
      font-weight: 700;
    }

    /* Image Area - Below Question */
    .image-area {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 35px;
    }

    .question-img {
      width: 100%;
      max-width: 280px;
      height: auto;
      max-height: 120px !important;
      object-fit: contain;
      transition: transform 0.3s ease;
      border-radius: 24px;
      margin-top: -20px;
    }

    .question-img:hover {
      transform: scale(1.02);
    }

    /* Inputs Container */
    .inputs-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 30px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .input-label {
      font-size: 14px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: none;
    }

    /* Submit Button */
    .submit-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .submit-btn {
      padding: 14px 40px;
      background: #2ecc71;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
    }

    .submit-btn:hover:not(:disabled) {
      transform: scale(1.02);
      background: #27ae60;
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Navigation Buttons */
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      gap: 30px;
    }

    .nav-btn {
     padding: 14px 48px;
      font-size: 22px;
      font-weight: 700;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      color: white;
      transition: 0.2s;
    }
    


    .prev-btn {
      background: #5a8dee;
    }

    .next-btn {
      background: #ff9f43;
    }

    .nav-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .nav-btn:hover:not(:disabled) {
      transform: scale(1.02);
      filter: brightness(1.03);
    }

    /* Popup Styles */
    .popup {
      position: fixed;
      inset: 0;
      /* background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px); */
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .animated-popup {
      width: 380px;
      padding: 35px;
      border-radius: 56px;
      text-align: center;
      background: white;
      animation: popupFade 0.3s ease;
      box-shadow: 0 30px 40px rgba(0, 0, 0, 0.2);
    }

    @keyframes popupFade {
      from {
        opacity: 0;
        transform: scale(0.85);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .popup-img {
      width: 200px;
      height: 150px;
      object-fit: contain;
      margin-bottom: 15px;
      border-radius: 20px;
    }

    .popup-emoji {
      font-size: 70px;
      margin-bottom: 15px;
    }

    #feedbackText {
      font-size: 28px;
      font-weight: 900;
    }

    #feedbackText.correct {
      color: #2ecc71;
    }

    #feedbackText.wrong {
      color: #e74c3c;
    }

    /* Final Popup */
    .final-box {
      width: 500px;
      padding: 40px 35px;
      border-radius: 56px;
      text-align: center;
      background: white;
      animation: popupZoom 0.4s ease;
    }

    @keyframes popupZoom {
      from {
        opacity: 0;
        transform: scale(0.75);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .winner-img {
      width: 160px;
      height: 160px;
      object-fit: contain;
      margin-bottom: 15px;
      animation: liftTrophy 1.1s ease-in-out infinite;
    }

    @keyframes liftTrophy {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-18px) scale(1.05); }
    }

    .final-title {
      font-size: 32px;
      font-weight: 900;
      margin: 10px 0;
      color: #1e293b;
    }

    .final-score {
      font-size: 24px;
      font-weight: 700;
      color: #0284c7;
      margin: 10px 0;
    }

    .final-stars {
      font-size: 38px;
      margin: 15px 0 25px;
      letter-spacing: 5px;
    }

    .restart-btn {
      padding: 14px 38px;
      border-radius: 50px;
      border: none;
      background: #ff9f43;
      color: white;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
    }

    .restart-btn:hover {
      transform: scale(1.02);
      background: #ff881f;
    }

<body>

  <div class="quiz-container">
    <!-- Question Area (Top) -->
    <div class="question-area">
      <div class="question-text" id="qText"></div>
    </div>

    <!-- Image Area (Below Question) -->
    <div class="image-area">
      <img id="qImage" class="question-img" src="" alt="Question Image">
    </div>

    <!-- Inputs Container (Below Image) -->
    <div class="inputs-container" id="inputsContainer"></div>

    <!-- Submit Button (Below Inputs) -->
    <div class="submit-wrapper">
      <button class="submit-btn" id="submitBtn" disabled>✔ Submit</button>
    </div>

    <!-- Navigation Buttons (Bottom) -->
    <div class="nav-buttons">
      <button class="nav-btn prev-btn" id="prevBtn">← Prev</button>
      <button class="nav-btn next-btn" id="nextBtn" disabled>Next →</button>
    </div>
  </div>

  <!-- Feedback Popup -->
  <div class="popup" id="feedbackPopup">
    <div class="animated-popup">
      <div id="popupMedia"></div>
      <h2 id="feedbackText"></h2>
    </div>
  </div>

  <!-- Final Popup -->
  <div class="popup" id="finalPopup">
    <div class="final-box">
      <img class="winner-img" src="../assets/images/boy-trophy.png" alt="Winner">
      <h2 class="final-title">🎉 Congratulations!</h2>
      <p class="final-score" id="finalScore"></p>
      <div class="final-stars" id="stars"></div>
      <button class="restart-btn" onclick="restartQuiz()">🔄 Play Again</button>
    </div>
  </div>

  <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
  <audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

  <script>
    const questions = [
      {
        text: "___________ contains calcium that makes bones strong.",
        answer: "MILK",
        img: "../assets/images/BONESSS.png",
      },
      {
        text: "The muscles in our body form the ___________ system.",
        answer: "MUSCULAR",
        img: "../assets/images/q2-F.png",
      },
      {
        text: "The ribcage protects our ___________ and ___________.",
        answer: ["HEART", "LUNGS"],
        img: "../assets/images/ribcage.png",
      },
      {
        text: "___________ help us bend our arms and legs.",
        answer: "JOINTS",
        img: "../assets/images/ArmsLegs.png",
      },
      {
        text: "An adult has ___________ bones.",
        answer: "206",
        img: "../assets/images/q2-img.png",
      },
    ];

    let currentIndex = 0;
    let totalScore = 0;
    let locked = Array(questions.length).fill(false);
    let savedAnswers = Array(questions.length).fill(null);
    let inputElements = [];

    const qText = document.getElementById("qText");
    const qImage = document.getElementById("qImage");
    const inputsContainer = document.getElementById("inputsContainer");
    const submitBtn = document.getElementById("submitBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function speak(t) {
      speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(t);
      msg.lang = "en-UK";
      msg.volume = 0.25;
      msg.rate = 1;
      speechSynthesis.speak(msg);
    }

    function showFeedback(isCorrect, imgSrc) {
      const popup = document.getElementById("feedbackPopup");
      const media = document.getElementById("popupMedia");
      const txt = document.getElementById("feedbackText");
      media.innerHTML = "";
      
      if (isCorrect) {
        const img = document.createElement("img");
        img.src = imgSrc;
        img.className = "popup-img";
        media.appendChild(img);
        txt.textContent = "Correct! ✅";
        txt.classList.add("correct");
        speak("Correct");
        const correctSound = document.getElementById("correctSound");
        if (correctSound) correctSound.play().catch(e => console.log);
      } else {
        media.innerHTML = "<div class='popup-emoji'>😢</div>";
        txt.textContent = "Wrong! ❌";
        txt.classList.add("wrong");
        speak("Wrong");
        const wrongSound = document.getElementById("wrongSound");
        if (wrongSound) wrongSound.play().catch(e => console.log);
      }
      
      popup.style.display = "flex";
      setTimeout(() => {
        popup.style.display = "none";
      }, 1400);
    }

    function showFinalPopup() {
      document.getElementById("finalPopup").style.display = "flex";
      document.getElementById("finalScore").textContent = `Score: ${totalScore} / ${questions.length}`;
      document.getElementById("stars").textContent = "⭐".repeat(totalScore);
      speak(`Congratulations! Your score is ${totalScore} out of ${questions.length}`);
    }

    function checkAndEnableSubmit() {
      let allFilled = true;
      inputElements.forEach(input => {
        if (!input.value.trim()) {
          allFilled = false;
        }
      });
      submitBtn.disabled = !allFilled;
    }

    function getCurrentAnswers() {
      const q = questions[currentIndex];
      if (Array.isArray(q.answer)) {
        return inputElements.map(input => input.value.trim().toUpperCase());
      } else {
        return inputElements[0].value.trim().toUpperCase();
      }
    }

    function handleCorrect() {
      const q = questions[currentIndex];
      const answers = getCurrentAnswers();
      
      locked[currentIndex] = true;
      if (Array.isArray(q.answer)) {
        savedAnswers[currentIndex] = answers;
      } else {
        savedAnswers[currentIndex] = answers;
      }
      
      totalScore++;
      submitBtn.disabled = true;
      nextBtn.disabled = false;
      
      // Disable inputs and mark them as correct
      inputElements.forEach(input => {
        input.disabled = true;
        input.classList.add("disabled-input");
      });
      
      showFeedback(true, q.img);
      
      if (currentIndex === questions.length - 1) {
        setTimeout(showFinalPopup, 1500);
      }
    }

    function handleWrong() {
      showFeedback(false, questions[currentIndex].img);
      // Clear inputs on wrong answer
      inputElements.forEach(input => {
        input.value = "";
      });
      checkAndEnableSubmit();
    }

    submitBtn.onclick = () => {
      const q = questions[currentIndex];
      const userAnswers = getCurrentAnswers();
      
      let isCorrect = false;
      
      if (Array.isArray(q.answer)) {
        const sortedUser = [...userAnswers].sort();
        const sortedCorrect = [...q.answer].sort();
        isCorrect = JSON.stringify(sortedUser) === JSON.stringify(sortedCorrect);
      } else {
        isCorrect = userAnswers === q.answer;
      }
      
      if (isCorrect) {
        handleCorrect();
      } else {
        handleWrong();
      }
    };

    function loadQuestion() {
      const q = questions[currentIndex];
      
      // Update question text (replace underscores with input boxes)
      let htmlText = q.text;
      const answerArray = Array.isArray(q.answer) ? q.answer : [q.answer];
      
      // Replace each blank with a placeholder marker
      answerArray.forEach((_, idx) => {
        htmlText = htmlText.replace(/___________/, `<span class="input-placeholder" data-idx="${idx}">______</span>`);
      });
      
      qText.innerHTML = htmlText;
      qImage.src = q.img;
      
      // Clear and rebuild inputs container
      inputsContainer.innerHTML = "";
      inputElements = [];
      
      // Create input boxes for each blank
      answerArray.forEach((answer, idx) => {
        const inputGroup = document.createElement("div");
        inputGroup.className = "input-group";
        
        const label = document.createElement("div");
        label.className = "input-label";
        label.textContent = `Answer ${idx + 1}`;
        
        const input = document.createElement("input");
        input.type = "text";
        input.className = "simple-input";
        input.placeholder = "Type here...";
        input.autocomplete = "off";
        
        if (locked[currentIndex] && savedAnswers[currentIndex]) {
          const savedValue = Array.isArray(savedAnswers[currentIndex]) 
            ? savedAnswers[currentIndex][idx] 
            : savedAnswers[currentIndex];
          input.value = savedValue;
          input.disabled = true;
          input.classList.add("disabled-input");
        } else {
          input.disabled = false;
          input.addEventListener("input", checkAndEnableSubmit);
        }
        
        inputGroup.appendChild(label);
        inputGroup.appendChild(input);
        inputsContainer.appendChild(inputGroup);
        inputElements.push(input);
      });
      
      // Update button states
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = !locked[currentIndex];
      
      if (!locked[currentIndex]) {
        submitBtn.disabled = true;
        // Check if there are pre-filled values (from wrong answer retry)
        let hasValues = inputElements.some(input => input.value.trim());
        if (hasValues) checkAndEnableSubmit();
      } else {
        submitBtn.disabled = true;
      }
    }

    prevBtn.onclick = () => {
      if (currentIndex > 0) {
        currentIndex--;
        loadQuestion();
      }
    };

    nextBtn.onclick = () => {
      if (currentIndex + 1 < questions.length) {
        currentIndex++;
        loadQuestion();
      } else if (currentIndex === questions.length - 1 && locked[currentIndex]) {
        showFinalPopup();
      }
    };

    window.restartQuiz = function() {
      currentIndex = 0;
      totalScore = 0;
      locked.fill(false);
      savedAnswers.fill(null);
      document.getElementById("finalPopup").style.display = "none";
      loadQuestion();
      speak("Quiz restarted");
    };

    // Initial load
    loadQuestion();
  </script>
</body>

</html>
