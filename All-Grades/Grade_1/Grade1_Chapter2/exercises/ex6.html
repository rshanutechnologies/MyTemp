<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Example🎨</title>
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1:#fde2e4; --bg2:#e2f0fb; --bg3:#e8f8e8;
      --text:#2f4f4f; --fill-color:#4cc9f0;
      --btnBlue:#4cc9f0; --btnPink:#f778a1;
      --q-text-color: #2F4F4F;
    }

    * { font-family:'Livvic' !important; box-sizing:border-box; }

    body {
      margin: 0;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: radial-gradient(circle at top left, var(--bg1), transparent 55%),
                  radial-gradient(circle at bottom right, var(--bg2), transparent 55%),
                  radial-gradient(circle at center, var(--bg3), #ffffff 60%);
    }

    .quiz-area {
      width: 95%;
      max-width: 1100px;
      height: 100%;
      padding: 2vh 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .q-number {
      font-weight: 700;
      font-size: clamp(14px, 2vh, 20px);
      color: var(--q-text-color);
      opacity: .9;
      background: rgba(255,255,255,0.5);
      padding: 5px 20px;
      border-radius: 50px;
      margin-bottom: 1vh;
    }

    .qRow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 100%;
      margin-bottom: 2vh;
    }

    .q-text {
      font-size: clamp(25pt, 3.8vh, 32pt);
      color: var(--q-text-color);
      line-height: 1.2;
      font-weight: 500;
      margin: 0;
    }

    .bird-btn {
      background: #FFD54F;
      border: none;
      width: clamp(50px, 7vh, 70px);
      height: clamp(50px, 7vh, 70px);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 5px 0 #E0B93F;
      flex-shrink: 0;
    }
    .bird-btn:active { transform: translateY(3px); box-shadow: none; }
    .bird-btn svg { width: 50%; fill: #2C3E50; }

    .options-row {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 3vw;
      width: 100%;
      flex: 1;
      max-height: 45vh;
    }

    .tank-wrapper {
      cursor: pointer;
      width: clamp(140px, 22vh, 200px);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.2s ease;
    }

    .image-tank {
      width: 100%;
      aspect-ratio: 1/1;
      border: 5px solid rgba(47,79,79,0.18);
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255,255,255,0.65);
      position: relative;
      box-shadow: 0 12px 25px rgba(0,0,0,0.1);
    }

    .grey-img { width: 80%; height: 80%; margin: 10%; filter: grayscale(1); opacity: 0.4; position: relative; z-index: 2; }
    .color-img { position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; opacity: 0; z-index: 3; transition: opacity 1.2s; }
    .liquid { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: var(--fill-color); transition: height 1.2s cubic-bezier(0.4,0,0.2,1); z-index: 1; }

    .filled .liquid { height: 100%; }
    .filled .color-img { opacity: 1; }
    .filled .image-tank { border-color: var(--fill-color); }

    .label {
      font-size: clamp(18px, 2.2vh, 22px);
      font-weight: 700;
      color: #2F4F4F;
      margin-top: 10px;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      width: 100%;
      padding: 2vh 5%;
      gap: 20px;
    }

    .nav-btn {
      padding: 15px 30px;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: clamp(16px, 2vh, 22px);
      cursor: pointer;
      color: #2f4f4f;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      min-width: 140px;
       border: 4px solid white;
    }

    #prevBtn { background: var(--btnPink); }
    #nextBtn { background: var(--btnBlue); }
    .nav-btn.disabled { opacity: 0.3; pointer-events: none; filter: grayscale(.10); }

    #bigEmoji {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-size: 150px; z-index: 2000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none;
    }
    #bigEmoji.show { transform: translate(-50%, -50%) scale(1); }

    .confetti span { position: absolute; width: 10px; height: 10px; top: -20px; border-radius: 2px; animation: fall 1.5s linear forwards; }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

    .wrong-shake { animation: shake 0.4s; }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }

    @media (max-width:370px){
       .q-text {
      font-size: 22px;
      
    }
    }

    @media (max-width: 800px) {
  
  .nav-btn {
    padding: 10px 18px;
    font-size: 14px;
    min-width: 110px;
  }
  .q-text {
    font-size: 22px;
    line-height: 1.2;
  }
 }



 /* ================= 1025px — 1440px ================= */


/* ================= 1441px — 1920px ================= */
@media screen and (min-width:1441px) and (max-width:1920px){

.quiz-area{
max-width:1350px;
}

.q-text{
font-size:44px;
}

.options-row{
gap:3vw;
max-height:50vh;
}

.tank-wrapper{
width:220px;
}

.label{
font-size:22px;
}

.nav-btn{
padding:16px 32px;
font-size:20px;
}

}


/* ================= 1921px+ ================= */
@media screen and (min-width:1921px){

.quiz-area{
max-width:1500px;
}

.q-text{
font-size:38pt;
}

.options-row{
gap:3.5vw;
max-height:55vh;
}

.tank-wrapper{
width:250px;
}

.label{
font-size:24px;
}

.nav-btn{
padding:18px 36px;
font-size:22px;
}

}


    .final-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 3000; backdrop-filter: blur(8px);
    }
    .final-modal { background: #C2F4FF; padding: 5vh; border-radius: 40px; text-align: center; width: min(600px, 90%); }
  </style>
</head>

<body>
  <div class="quiz-area">
    <div id="quiz-content" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    <div class="nav-row">
      <button id="prevBtn" class="nav-btn" onclick="prevSlide()">◀ PREV</button>
      <button id="nextBtn" class="nav-btn disabled" onclick="nextSlide()">NEXT ▶</button>
    </div>
  </div>

  <div id="bigEmoji">😄</div>
  <div class="confetti" id="confetti" style="position:fixed; inset:0; pointer-events:none; z-index:1500;"></div>

  <script>
    const quizData = [
      { q: "A Body Part:", solved: false, options: [
          { name: "Pencil", img: "../uploads/pencil.png", correct: false },
          { name: "Hand", img: "../uploads/hand.png", correct: true },
          { name: "Apple", img: "../uploads/apple.png", correct: false }
      ]},
      { q: "An activity we do with our Hands:", solved: false, options: [
          { name: "Writing", img: "../uploads/writing.png", correct: true },
          { name: "Running", img: "../uploads/running.png", correct: false },
          { name: "Sleeping", img: "../uploads/sleeping.png", correct: false }
      ]},
      { q: "An activity we do with our Legs:", solved: false, options: [
          { name: "Eating", img: "../uploads/eat.png", correct: false },
          { name: "Jumping", img: "../uploads/jumping.png", correct: true },
          { name: "Singing", img: "../uploads/singing.png", correct: false }
      ]},
      { q: "Give an example of a Sense Organ:", solved: false, options: [
          { name: "Nose", img: "../uploads/nose.png", correct: true },
          { name: "Hair", img: "../uploads/hair.png", correct: false },
          { name: "Nail", img: "../uploads/nails.png", correct: false }
      ]},
      { q: "An activity we do with our Nose:", solved: false, options: [
          { name: "Tasting", img: "../uploads/tasting.png", correct: false },
          { name: "Smelling", img: "../uploads/smelling.png", correct: true },
          { name: "Hearing", img: "../uploads/hearing.png", correct: false }
      ]}
    ];

    let currentSlide = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(isCorrect) {
      if (audioCtx.state === "suspended") audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      if (isCorrect) {
        osc.type = "sine"; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      } else {
        osc.type = "sawtooth"; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      }
      osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function makeConfetti() {
      const box = document.getElementById("confetti");
      box.innerHTML = "";
      for (let i = 0; i < 50; i++) {
        const p = document.createElement("span");
        p.style.left = Math.random() * 100 + "vw";
        p.style.background = `hsl(${Math.random() * 360}, 100%, 60%)`;
        p.style.animationDelay = Math.random() * 0.2 + "s";
        box.appendChild(p);
      }
      setTimeout(() => box.innerHTML = "", 2000);
    }

    function renderSlide() {
      const data = quizData[currentSlide];
      const container = document.getElementById("quiz-content");
      const nextBtn = document.getElementById("nextBtn");
      const prevBtn = document.getElementById("prevBtn");

      nextBtn.classList.toggle("disabled", !data.solved);
      prevBtn.classList.toggle("disabled", currentSlide === 0);

      const optionsHTML = data.options.map((opt, i) => `
        <div class="tank-wrapper ${data.solved && opt.correct ? 'filled' : ''}" 
             onclick="handleChoice(this, ${opt.correct}, ${i})" 
             style="${data.solved ? 'pointer-events:none' : ''}">
          <div class="image-tank">
            <div class="liquid"></div>
            <img src="${opt.img}" class="grey-img" />
            <img src="${opt.img}" class="color-img" />
          </div>
          <span class="label">${opt.name}</span>
        </div>`).join("");

      container.innerHTML = `
        <div class="q-number">Question ${currentSlide + 1} of ${quizData.length}</div>
        <div class="qRow">
          <p class="q-text">${data.q}</p>
          <button class="bird-btn" onclick="speakText(quizData[currentSlide].q)">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          </button>
        </div>
        <div class="options-row">${optionsHTML}</div>`;
    }

    function handleChoice(el, isCorrect, optIdx) {
      if (quizData[currentSlide].solved) return;
      if (isCorrect) {
        quizData[currentSlide].solved = true;
        el.classList.add("filled");
        document.querySelectorAll(".tank-wrapper").forEach(t => t.style.pointerEvents = "none");
        playSound(true); makeConfetti();
        const emoji = document.getElementById("bigEmoji");
        emoji.classList.add("show"); setTimeout(() => emoji.classList.remove("show"), 1200);
        
        if(currentSlide === quizData.length - 1) setTimeout(nextSlide, 1500);
        else document.getElementById("nextBtn").classList.remove("disabled");
      } else {
        el.classList.add("wrong-shake"); playSound(false);
        setTimeout(() => el.classList.remove("wrong-shake"), 400);
      }
    }

    function nextSlide() {
      if (currentSlide < quizData.length - 1) {
        currentSlide++; renderSlide();
      } else {
        document.querySelector(".quiz-area").innerHTML = `
         <div class="final-modal">
          <h1 style="font-family: "livvic", cursive; color:#2c7a4b; font-size:45px; margin:0;">🎉 YOU WON! 🎉</h1>
          <p style="font-size:24px; color:#2F4F4F; margin-top:14px;">Superstar! You are an expert ✅</p>
          <button class="nav-btn" style="position:static; margin-top:20px; background:#4cc9f0; color:white; border:none;" onclick="location.reload()">PLAY AGAIN ↺</button>
          </div>`;
        makeConfetti(); playSound(true);
      }
    }

    function prevSlide() { if (currentSlide > 0) { currentSlide--; renderSlide(); } }
    function speakText(txt) { if (!window.speechSynthesis) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(txt); u.lang = "en-IN"; window.speechSynthesis.speak(u); }

    renderSlide();
  </script>
</body>
</html>
