<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Fill in the Blanks — Type Letters</title>
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
  --bg1: #fde2e4;
  --bg2: #e2f0fb;
  --bg3: #e8f8e8;
  --correct: #28a745;
  --wrong: #dc3545;
  --q-text-color: #2F4F4F;
  --blue: #4cc9f0;
  --pink: #f778a1;
  --magic2: #00c2ff;
}

* {
  box-sizing: border-box;
}

body {
  height: 100vh;
  width: 100vw;
  margin: 0;
  font-family: 'Livvic' !important;
  background:
    radial-gradient(circle at top left, var(--bg1), transparent 55%),
    radial-gradient(circle at bottom right, var(--bg2), transparent 55%),
    radial-gradient(circle at center, var(--bg3), #ffffff 60%);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.wrap {
  width: 100%;
  height: 100%;
  max-width: 1100px;
  display: flex;
  justify-content: center;
  flex-direction: column;
  padding: 2vh 20px;
}

.question-area {
  flex-grow: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5vh;
  width: 100%;
}

.header-row {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 5px;
}

.q-number {
  font-weight: 700;
  font-size: clamp(16px, 2.5vh, 24px);
  color: var(--q-text-color);
  background: rgba(255, 255, 255, 0.6);
  padding: 5px 20px;
  border-radius: 20px;
}

.bird-btn {
  background: #FFC312;
  border: 4px solid #F79F1F;
  border-radius: 50%;
  width: clamp(50px, 7.5vh, 75px);
  height: clamp(50px, 7.5vh, 75px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 0 #e58e26;
  transition: transform 0.1s;
  visibility: hidden;
}

.bird-btn:active {
  transform: translateY(4px);
  box-shadow: 0 0 0 #e58e26;
}

.bird-btn svg {
  width: 60%;
  height: 60%;
  fill: #333;
}

.hint-text {
  font-size: clamp(14pt, 2.5vh, 22pt);
  color: var(--q-text-color);
  text-align: center;
  opacity: 0.8;
}

.sentence {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 10px;
  font-size: clamp(25pt, 3.2vh, 32pt);
  color: var(--q-text-color);
  text-align: center;
  width: 100%;
}

.blank-group {
  display: inline-flex;
  gap: clamp(5px, 1vw, 10px);
  padding: 5px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.3);
}

.blank-input {
  width: clamp(45px, 7.5vh, 70px);
  height: clamp(50px, 8.5vh, 80px);
  border-radius: 12px;
  border: 3px dashed var(--q-text-color);
  background: rgba(255, 255, 255, 0.85);
  font-weight: 900;
  font-size: clamp(20px, 4.5vh, 34px);
  color: var(--q-text-color);
  text-align: center;
  outline: none;
  caret-color: transparent;
}

.blank-input:focus {
  border-color: var(--magic2);
  box-shadow: 0 0 15px rgba(0, 194, 255, 0.3);
  border-style: solid;
}

.blank-input.correct {
  border-style: solid;
  border-color: var(--correct);
  background: #fff;
}

.blank-input.wrong {
  border-style: solid;
  border-color: var(--wrong);
  background: #fff;
}

.clue-box {
  width: min(300px, 80vw);
  height: clamp(200px, 25vh, 220px);
  border-radius: 20px;
  border: 4px solid white;
  overflow: hidden;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
  margin: 10px 0;
}

.clue-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.controls {
  display: flex;
  justify-content: space-between;
  width: 100%;
  padding: 10px 5%;
  margin-top: -8%;
}

.nav-btn, .btn {
  padding: clamp(15px, 1.8vh, 18px) 30px;
  border-radius: 50px;
  font-weight: 700;
  font-size: clamp(14px, 2vh, 22px);
  border: 4px solid white;
  cursor: pointer;
  font-family: 'Livvic' !important;
  min-width: 140px;
}

#prevBtn {
  background: var(--pink);
  color: var(--q-text-color);
}

#nextBtn {
  background: var(--blue);
  color: var(--q-text-color);
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.small-btn {
  padding: 10px 25px;
  border-radius: 50px;
  border: 3px solid #fff;
  font-family: "Livvic" !important;
  font-weight: 800;
  cursor: pointer;
  font-size: 16px;
  background: rgba(255, 255, 255, 0.7);
}

.btn {
  background: rgba(19, 184, 19, 0.753);
  color: #2f4f4f;
}

#feedbackSmiley {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 150px;
  opacity: 0;
  z-index: 2600;
  pointer-events: none;
}

#feedbackSmiley.show {
  opacity: 1;
  transition: 0.2s;
}

canvas.confetti {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1500;
}

.final-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3000;
  backdrop-filter: blur(8px);
}

.final-modal {
  background: white;
  padding: 40px;
  border-radius: 30px;
  text-align: center;
  width: 90%;
  max-width: 550px;
}

/* ============================================
   MEDIA QUERIES FOR SMALLER SCREENS
   ============================================ */

/* 600px and below */
@media (max-width: 600px) {
  body {
    overflow-y: auto;
    height: auto;
    min-height: 100vh;
  }

  .wrap {
    padding: 15px;
    justify-content: flex-start;
  }

  .question-area {
    gap: 12px;
  }

  .header-row {
    gap: 10px;
  }

  .q-number {
    font-size: 14px;
    padding: 4px 15px;
  }

  .bird-btn {
    width: 45px;
    height: 45px;
  }

  .hint-text {
    font-size: 12px;
  }

  .sentence {
    gap: 8px;
    font-size: 18px;
  }

  .blank-input {
    width: 45px;
    height: 50px;
    font-size: 20px;
  }

  .blank-group {
    gap: 6px;
  }

  .clue-box {
    width: 260px;
    height: 180px;
  }

  .controls {
    padding: 10px 3%;
    margin-top: -5%;
    gap: 10px;
  }

  .nav-btn, .btn {
    padding: 12px 20px;
    min-width: 60px !important;
    font-size: 14px;
  }

  .small-btn {
    padding: 8px 18px;
    font-size: 14px;
  }

  #feedbackSmiley {
    font-size: 100px;
  }

  .final-modal {
    padding: 25px;
    width: 95%;
  }

  .final-modal h2 {
    font-size: 20px;
  }
}

/* 450px and below */
@media (max-width: 450px) {
  .wrap {
    padding: 10px;
  }

  .question-area {
    gap: 10px;
  }

  .header-row {
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .q-number {
    font-size: 12px;
    padding: 3px 12px;
  }

  .bird-btn {
    width: 40px;
    height: 40px;
  }

  .hint-text {
    font-size: 11px;
  }

  .sentence {
    gap: 6px;
    font-size: 16px;
    flex-direction: column;
    align-items: center;
  }

  .blank-input {
    width: 40px;
    height: 45px;
    font-size: 18px;
    border-width: 2px;
  }

  .blank-group {
    gap: 5px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .clue-box {
    width: 220px;
    height: 160px;
  }

  .controls {
    
    align-items: center;
    gap: 12px;
    margin-top: 10px;
    padding: 10px;
  }

  .nav-btn, .btn {
    width: 80%;
    min-width: unset;
    padding: 10px 15px;
    font-size: 14px;
  }

  .small-btn {
    padding: 6px 15px;
    font-size: 12px;
  }

  #feedbackSmiley {
    font-size: 80px;
  }

  .final-modal {
    padding: 20px;
    width: 95%;
  }

  .final-modal h2 {
    font-size: 18px;
  }

  .final-modal button {
    padding: 10px 20px;
    font-size: 14px;
  }
}

/* 375px and below */
@media (max-width: 375px) {

  .question-area {

  }

    height: 50%;
  }

  .hint-text {

  }

  }

  }

    height: 145px;
  }

  .nav-btn, .btn {
    padding: 8px 12px;
    font-size: 14px;
    /* color: #ffffff; */

  }
  
  .nav-btn, .btn {
    padding: 8px 15px;
    min-width: 60px !important;
    height: 50px;
  }

  .small-btn {
    padding: 5px 12px;
    font-size: 11px;
  }

  #feedbackSmiley {
    font-size: 60px;
  }

  .final-modal {
    padding: 15px;
  }

  .final-modal h2 {
    font-size: 16px;
  }

  .final-modal p {
    font-size: 14px;
  }

  .final-modal button {
    padding: 8px 16px;
    font-size: 12px;
  }
}

 @media (max-width: 800px) {
  .sentence {
    font-size: 30px !important;
  }
 }

/* Landscape mode for small screens */
@media (max-width: 700px) and (orientation: landscape) {
  body {
    overflow-y: auto;
  }

  .wrap {
    padding: 10px;
    height: auto;
    min-height: 100vh;
  }

  .question-area {
    gap: 8px;
  }

  .sentence {
    font-size: 14px;
  }

  .blank-input {
    width: 40px;
    height: 45px;
    font-size: 18px;
  }

  .clue-box {
    width: 180px;
    height: 130px;
  }

  .controls {
    flex-direction: row;
    margin-top: 10px;
  }

  .nav-btn, .btn {
    padding: 8px 15px;
    min-width: 100px;
  }
}

      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;

<body>
  <div class="wrap">
    <div class="question-area">
      <div class="header-row">
        <div class="q-number" id="qNumber">Question 1 of 5</div>
        <button id="readBtn" class="bird-btn">
          <svg viewBox="0 0 24 24">
            <path
              d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
          </svg>
        </button>
      </div>

      <div class="hint-text">Type the missing word ✨</div>

      <div class="sentence" id="sentenceLine">Loading...</div>

      <div class="clue-box">
        <img id="clueImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
          alt="Clue Image">
      </div>

      <div class="mini-controls">
        <button id="clearBtn" class="small-btn" style="visibility: hidden;">🧽 CLEAR</button>
      </div>
    </div>

    <div class="controls">
      <button id="prevBtn" class="nav-btn">◀ PREV</button>
      <button id="nextBtn" class="nav-btn">NEXT ▶</button>
    </div>
  </div>

  <div id="feedbackSmiley"></div>
  <canvas id="confettiCanvas" class="confetti"></canvas>

  <script>
    const questions = [
      { prefix: "Each part of our body has different", blank: "FUNCTIONS", suffix: "to perform.", status: false, img: "../uploads/work.png" },
      { prefix: "We must wipe our body with a clean", blank: "TOWEL", suffix: ".", status: false, img: "../uploads/towel.png" },
      { prefix: "Eyes, ears, nose, tongue and skin are called the", blank: "SENSE", suffix: ".", status: false, img: "../uploads/senseorgans.png" },
      { prefix: "The", blank: "TONGUE", suffix: "is the sense organ that helps us to taste.", status: false, img: "../uploads/tongue.png" },
      { prefix: "We hold things with our", blank: "HANDS", suffix: ".", status: false, img: "../uploads/hands.png" }
    ];
window.addEventListener("drop", e => e.preventDefault(), true);
window.addEventListener("dragover", e => e.preventDefault(), true);
    let idx = 0, inputs = [], audioCtx = null, isAnimating = false;
    const qNumber = document.getElementById("qNumber"), sentenceLine = document.getElementById("sentenceLine");
    const clueImg = document.getElementById("clueImg"), nextBtn = document.getElementById("nextBtn"), prevBtn = document.getElementById("prevBtn");
    const feedbackSmiley = document.getElementById("feedbackSmiley"), confettiCanvas = document.getElementById("confettiCanvas");
    const ctx = confettiCanvas.getContext("2d");

    function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }

    function playTone(freqs, dur = 0.6, type = 'sine') {
      const a = ensureAudio(); const now = a.currentTime; const g = a.createGain();
      g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.2, now + 0.01); g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
      freqs.forEach(f => { const o = a.createOscillator(); o.type = type; o.frequency.value = f; o.connect(g); o.start(now); o.stop(now + dur); });
      g.connect(a.destination);
    }

    let particles = [];
    function resize() { confettiCanvas.width = window.innerWidth; confettiCanvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function launchConfetti(count = 100) {
      particles = Array.from({ length: count }, () => ({
        x: Math.random() * confettiCanvas.width, y: -20,
        vx: (Math.random() - 0.5) * 10, vy: 2 + Math.random() * 5,
        s: 5 + Math.random() * 10, c: `hsl(${Math.random() * 360},80%,60%)`
      }));
      if (!isAnimating) { isAnimating = true; render(); }
    }

    function render() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      particles.forEach((p, i) => {
        ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.s, p.s);
        p.x += p.vx; p.y += p.vy; p.vy += 0.1;
        if (p.y > confettiCanvas.height) particles.splice(i, 1);
      });
      if (particles.length) requestAnimationFrame(render); else isAnimating = false;
    }

    function showSmiley(emoji) {
      feedbackSmiley.textContent = emoji; feedbackSmiley.classList.add("show");
      setTimeout(() => feedbackSmiley.classList.remove("show"), 1200);
    }

    function updateNav() {
      prevBtn.disabled = idx === 0;
      nextBtn.disabled = !questions[idx].status;
      nextBtn.textContent = (idx === questions.length - 1) ? "FINISH" : "NEXT ▶";
    }

    function buildTypingBoxes(word) {
      const blankGroup = document.createElement("span");
      blankGroup.className = "blank-group";
      blankGroup.id = "blankGroup";
      inputs = [];

      for (let i = 0; i < word.length; i++) {
        const inp = document.createElement("input");
        /* 🚫 BLOCK DROP */
inp.addEventListener("drop", (e) => {
  e.preventDefault();
});

/* 🚫 BLOCK PASTE */
inp.addEventListener("paste", (e) => {
  e.preventDefault();
});

/* 🚫 BLOCK RIGHT CLICK */
inp.addEventListener("contextmenu", (e) => {
  e.preventDefault();
});
        inp.className = "blank-input";
        inp.maxLength = 1;
        inp.autocomplete = "off";

        if (questions[idx].status) {
          inp.value = word[i].toUpperCase();
          inp.disabled = true;
          inp.classList.add("correct");
        }

      inp.addEventListener("input", () => {
  if (questions[idx].status) return;

  let val = inp.value;

  // 🚨 REMOVE URL / DROP TEXT (MAIN FIX)
  if (
    val.includes("http") ||
    val.includes("www.") ||
    val.includes("blob:") ||
    val.includes("data:")
  ) {
    inp.value = "";
    return;
  }

  // ✅ ONLY A–Z
  val = val.toUpperCase().replace(/[^A-Z]/g, "");
  inp.value = val.slice(0, 1);

  if (inp.value && inputs[i + 1]) inputs[i + 1].focus();
  tryAutoCheck();
});

        inp.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !inp.value && inputs[i - 1]) inputs[i - 1].focus();
        });

        inputs.push(inp);
        blankGroup.appendChild(inp);
      }
      if (!questions[idx].status) setTimeout(() => inputs[0]?.focus(), 150);
      return blankGroup;
    }

    function tryAutoCheck() {
      if (inputs.some(i => !i.value)) return;
      const correct = questions[idx].blank.toUpperCase();
      const typed = inputs.map(i => i.value).join("");

      if (typed === correct) {
        questions[idx].status = true;
        inputs.forEach(i => { i.classList.add("correct"); i.disabled = true; });
        playTone([880, 1100]); launchConfetti(80); showSmiley("😃");
        updateNav();
        if (questions.every(q => q.status)) setTimeout(showCompletePopup, 1500);
      } else {
        inputs.forEach(i => i.classList.add("wrong"));
        playTone([180], 0.4, 'square'); showSmiley("😭");
        const bg = document.getElementById("blankGroup");
        bg.classList.add("shake");
        setTimeout(() => {
          bg.classList.remove("shake");
          inputs.forEach(i => { i.value = ""; i.classList.remove("wrong"); });
          inputs[0].focus();
        }, 800);
      }
    }

    function showQuestion(i) {
      const q = questions[i]; idx = i;
      qNumber.textContent = `Question ${i + 1} of ${questions.length}`;
      clueImg.src = q.img; // Update the hint image
      sentenceLine.innerHTML = "";
      const pre = document.createElement("span"); pre.textContent = q.prefix + " ";
      const suf = document.createElement("span"); suf.textContent = " " + q.suffix;
      sentenceLine.append(pre, buildTypingBoxes(q.blank), suf);
      updateNav();
    }

    function showCompletePopup() {
      playTone([660, 880, 1320], 1.2); launchConfetti(150);
      const div = document.createElement("div");
      div.className = "final-modal-overlay";
      div.innerHTML = `   <div class="final-modal">
          <h1 style="font-family: "livvic", cursive; color:#2c7a4b; font-size:45px; margin:0;">🎉 YOU WON! 🎉</h1>
          <p style="font-size:24px; color:#2F4F4F; margin-top:14px;">Superstar! You are an expert ✅</p>
          <button class="nav-btn" style="position:static; margin-top:20px; background:#4cc9f0; color:white; border:none;" onclick="location.reload()">PLAY AGAIN ↺</button>
        </div>`;
      document.body.appendChild(div);
    }

    document.getElementById("readBtn").onclick = () => {
      const q = questions[idx];
      const u = new SpeechSynthesisUtterance(`${q.prefix} blank ${q.suffix}`);
      u.lang = "en-IN"; window.speechSynthesis.speak(u);
    };

    document.getElementById("clearBtn").onclick = () => {
      if (questions[idx].status) return;
      inputs.forEach(i => i.value = ""); inputs[0].focus();
    };

    prevBtn.onclick = () => showQuestion(--idx);
    nextBtn.onclick = () => { if (idx < questions.length - 1) showQuestion(++idx); else showCompletePopup(); };

    showQuestion(0);
  </script>
</body>

</html>
