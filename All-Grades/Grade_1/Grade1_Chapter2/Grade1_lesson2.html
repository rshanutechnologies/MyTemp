<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>II Chapter Quiz</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📘</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

 <style>
  :root {
    --bg1: #fde2e4;
    --bg2: #e2f0fb;
    --bg3: #e8f8e8;
    --sidebar-width: 320px;
    --text-blue: #1F3C5B;
    --active-pink: #f778a1;
  }

  /* ========== Global: no scrollbars anywhere on parent page ========== */
  html, body {
    width: 100%;
    height: 100%;
    max-width: 100vw;
    overflow: hidden;          /* 🚫 no scrollbars */
  }
  *, *::before, *::after { box-sizing: border-box; }

  /* ========== Base layout (desktop/tablet) ========== */
  body {
    margin: 0;
    font-family: 'Livvic' !important;
    display: flex;
    flex-direction: row;
    height: 100vh;
    width: 100vw;
    background:
      radial-gradient(circle at top left, var(--bg1), transparent 55%),
      radial-gradient(circle at bottom right, var(--bg2), transparent 55%),
      radial-gradient(circle at center, var(--bg3), #ffffff 60%);
  }

  .hamburger { display: none; }

  .sidebar {
    width: var(--sidebar-width);
    display: flex;
    flex-direction: column;
    padding: 20px;
    z-index: 10;
    flex-shrink: 0;
    overflow: hidden;          /* 🚫 no scrollbars inside sidebar */
  }

  .l-name {
    text-align: center;
    margin: 0 0 20px 0;
    font-size: clamp(18pt, 3vw, 24pt);
    color: var(--text-blue);
    letter-spacing: 1px;
    font-weight: 700;
  }

  .menu-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-grow: 1;
    padding-right: 5px;
    overflow: hidden;          /* 🚫 prevent menu scrollbars */
  }

  .menu-container::-webkit-scrollbar { display: none; }
  .menu-container { scrollbar-width: none; -ms-overflow-style: none; }

  .menu-btn {
    display: flex;
    align-items: center;
    padding: clamp(10px, 1.5vh, 18px) 20px;
    border: 3px solid transparent;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 600;
    color: var(--text-blue);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-align: left;
    background-color: white;

    /* keep single line to avoid vertical overflow */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sticker-icon {
    font-size: 24px;
    margin-right: 12px;
    transition: transform 0.3s;
    flex: 0 0 auto;
  }

  .btn-1 { background-color: #e4c7e2; border-color: #f3d5f1; }
  .btn-2 { background-color: #CFE8B3; border-color: #dff5c5; }
  .btn-3 { background-color: #FFD84D; border-color: #ffe894; }
  .btn-4 { background-color: #86BCD5; border-color: #a4d4eb; }
  .btn-5 { background-color: #FFE6A7; border-color: #fff1cc; }
  .btn-6 { background-color: #B8B5FF; border-color: #d1cfff; }

  .menu-btn:hover { transform: scale(1.02); }
.menu-btn.active {
  border-color: var(--active-pink);
  background-color: #f9d4e0;
  box-shadow: 0 4px 12px rgba(247, 120, 161, 0.25);
  transform: none; /* remove translateY */
}

  .content {
    flex-grow: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;          /* 🚫 no scrollbars in content */
  }
  .iframe-wrapper { flex-grow: 1; width: 100%; height: 100%; overflow: hidden; }
  iframe { width: 100%; height: 100%; border: none; display: block; overflow: hidden; }

  /* ========== MOBILE: slide-in LEFT panel, 45% width, full height, NO scroll ========== */
  @media (max-width: 800px) {

    .hamburger {
      display: block;
      position: fixed;
      top: 15px;
      right: 15px;              /* matches your screenshot */
      font-size: 26px;
      background: white;
      border: none;
      padding: 8px 12px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 1001;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* Sidebar becomes a left slide-in panel (45% width) */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 45vw;             /* 🔥 exactly what you asked */
      height: 100vh;           /* full height */
      background: #fff;
      z-index: 1000;
      transform: translateX(-100%);  /* hidden completely to the left */
      transition: transform 0.28s ease;
      padding: 16px 14px;
      border-right: 2px solid rgba(0,0,0,0.06);
      overflow: hidden;        /* 🚫 no scrollbars inside */
    }
    .sidebar.show { transform: translateX(0); }

    .l-name { display: none; } /* save height */

    /* Vertical list that fits without scrolling */
    .menu-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      height: calc(100vh - 32px); /* inside panel area after padding */
      padding: 4px 2px 8px 2px;
      overflow: hidden;           /* 🚫 no scroll */
    }

    .menu-btn {
      padding: 12px 14px;         /* compact */
      font-size: 16px;
      border-radius: 16px;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;    /* avoids growing, prevents scroll need */
    }

    .sticker-icon { font-size: 18px; margin-right: 8px; }

    /* Main area behind panel stays full screen and non-scrollable */
    body { flex-direction: column; }
    .content { height: 100vh; overflow: hidden; }
    .iframe-wrapper, iframe { width: 100%; height: 100%; overflow: hidden; }
  }

  /* ========== Desktop/tablet: keep normal layout ========== */
 /* ================================= */
/* 📱 MOBILE – SAME AS FIRST CODE */
/* ================================= */

@media (max-width: 800px) {

  body {
    flex-direction: column;
     background:
      radial-gradient(circle at top left, var(--bg1), transparent 55%),
      radial-gradient(circle at bottom right, var(--bg2), transparent 55%),
      radial-gradient(circle at center, var(--bg3), #ffffff 60%);
  }

  /* Hamburger button */
  .toggle-btn {
    display: block;
    position: fixed;
    top: 15px;
    right: 15px;
    font-size: 24px;
    background: white;
    border: none;
    padding: 8px 12px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1100;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  /* Sidebar becomes slide-in panel */
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 65vw;         /* 🔥 same as first */
    height: 100vh;
    /* background: white; */
     background:
      radial-gradient(circle at top left, var(--bg1), transparent 55%),
      radial-gradient(circle at bottom right, var(--bg2), transparent 55%),
      radial-gradient(circle at center, var(--bg3), #ffffff 60%);
    z-index: 1000;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    padding: 16px;
    border-right: 2px solid rgba(0,0,0,0.05);
  }

  .sidebar.show {
    transform: translateX(0);
  }

  .l-name {
    display: none;
  }

  .menu-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 20px;
  }

  .menu-btn {
    width: 100%;
    font-size: 16px;
    padding: 12px 14px;
  }

  .content {
    width: 100%;
    height: 100vh;
  }

}

/* ===================================== */
/* ===== 1280px FULL BIG UPGRADE ===== */
/* (NO layout change — ONLY bigger) */
/* ===================================== */

@media (min-width: 1480px) {

  /* SIDEBAR */
  .sidebar {
    width: 400px;
    padding: 40px;
  }

  .l-name {
    font-size: 28px;
    margin-bottom: 30px;
  }

  /* MENU */
  .menu-container {
    gap: 18px;
  }

  /* .menu-btn {
    font-size: 22px;
    padding: 22px 26px;
    border-radius: 24px;
    
  } */

   .menu-btn {
    font-size: 24px;

    padding: 26px 30px;   /* 🔥 increases HEIGHT */

    height: 100px;     /* 🔥 force bigger height */

    width: 100%;          /* full width */

    border-radius: 28px;
  }

  .sticker-icon {
    font-size: 32px;
    margin-right: 16px;
  }


  /* HAMBURGER BUTTON */
  .hamburger {
    font-size: 32px;
    padding: 12px 16px;
  }

}
</style>
</head>

<body>
  <button class="hamburger" id="hamburgerBtn">☰</button>

  <div class="sidebar">
    <h2 class="l-name">Chapter 2 Quiz</h2>
    <div class="menu-container">
      <button class="menu-btn btn-1" data-file="exercises/ex1.html"><span class="sticker-icon">✅</span> Tick Correct</button>
      <button class="menu-btn btn-2" data-file="exercises/ex2.html"><span class="sticker-icon">📝</span> Fill Blanks</button>
      <button class="menu-btn btn-3" data-file="exercises/ex3.html"><span class="sticker-icon">🔍</span> True / False</button>
      <button class="menu-btn btn-4" data-file="exercises/ex4.html"><span class="sticker-icon">💡</span> One Word</button>
      <button class="menu-btn btn-5" data-file="exercises/ex5.html"><span class="sticker-icon">🔗</span> Match Up</button>
      <button class="menu-btn btn-6" data-file="exercises/ex6.html"><span class="sticker-icon">🌟</span> One Example</button>
    </div>
  </div>

  <div class="content">
    <div class="iframe-wrapper">
      <iframe id="quizFrame" src=""></iframe>
    </div>
  </div>

  <script>
    const iframe = document.getElementById('quizFrame');
    const buttons = document.querySelectorAll('.menu-btn');
    const hamburger = document.getElementById("hamburgerBtn");
const sidebar = document.querySelector(".sidebar");

hamburger.addEventListener("click", () => {
  sidebar.classList.toggle("show");
});

  buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    const file = btn.getAttribute('data-file');
    openQuiz(file, btn);

    // ✅ AUTO HIDE SIDEBAR ON MOBILE
    if (window.innerWidth <= 800) {
      sidebar.classList.remove("show");
    }
  });
});

    function openQuiz(file, btn) {
      iframe.src = file;
      buttons.forEach(b => b.classList.remove('active'));
      if (btn) {
        btn.classList.add('active');
      } else {
        const match = Array.from(buttons).find(b => b.getAttribute('data-file') === file);
        if (match) match.classList.add('active');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const defaultFile = 'exercises/ex1.html';
      openQuiz(defaultFile);
    });
  </script>

</body>
</html>
