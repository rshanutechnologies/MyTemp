<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Drop the Correct Picture</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Livvic', sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      /* background-image: url("../uploads/bgimg.png");
  background-size: cover;
  background-position: center; */
      overflow: hidden;
    }

    .app {
      width: 95%;
      max-width: 1000px;
      height: 95vh;
      display: flex;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
      box-sizing: border-box;
      border-radius: 40px;
    }

    #header-area {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    /* Header layout for the speaker button */
    .header-top {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .read-btn {
      background: white;
      border: 2px solid #4cc9f0;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .read-btn:hover {
      transform: scale(1.1);
      background: #4cc9f0;
      color: white;
    }

    .q-counter {
    font-weight: 700;
      color: #447272 !important;
      font-size: 1.2rem;
      opacity: 0.7;
    
      padding: 5px 20px;
      border-radius: 50px;
    }

    .q-text {
      text-align: center;
      /* font-size: clamp(1.2rem, 3.3vw, 2.2rem); */
         font-size: clamp(1.2rem, 3.5vw, 2.5rem) !important;
      
      color: #2f4f4f;
      margin-top: -10px;
      margin-bottom: 4%;
    }

    #quiz-main {
      flex-grow: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* justify-content: space-evenly; */
      justify-content: center;
      gap: 15px;
      min-height: 0;
    }

    .drop-box {
      width: 150px;
      height: 80px !important;
      border: 4px dashed #444;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      font-weight: normal;
      color: #ccc;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .drop-box img {
      width: 80%;
      height: 80%;
      object-fit: contain;
      border-radius: 15px;
    }

    .options-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: clamp(10px, 2vw, 25px);
      width: 100%;
    }

    .opt-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .option {
      width: clamp(150px, 20vw, 160px);
      height: clamp(150px, 12vh, 120px);
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-sizing: border-box;
      transition: opacity 0.3s;
    }

    .option img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .opt-label {
      font-weight: 700;
      color: #555;
      font-size: 2rem;
    }

    /* Locked State Styles */
    .option.locked {
      cursor: default;
      opacity: 0.5;
      filter: grayscale(0.5);
    }

    .drop-box.locked {
      border: 4px solid #4cc9f0;
      color: transparent;
      background: #f0faff;
    }

    .footer-nav {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 15px;
      width: 100%;
    }

    .nav-btn {
      padding: 12px 25px;
      border-radius: 50px;
      font-size: 1.1rem;
      background:#f778a1;
      border: 4px solid white;
      font-family: 'Livvic';
      cursor: pointer;
      color: black;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    #backBtn {
      background: #f778a1;
    }

    #nextBtn {
      visibility: hidden;
    }

    .option.wrong {
      border: 3px solid #ff4d4d;
      animation: shake 0.4s;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-8px);
      }

      75% {
        transform: translateX(8px);
      }
    }

    .smiley {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      z-index: 2000;
      font-size: 150px;
    }

    .smiley.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.5);
    }

    .final-overlay {
      position: fixed;
      inset: 0;
      /* background: rgba(0, 0, 0, 0.85); */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 3000;
      /* backdrop-filter: blur(8px); */
    }

    .final-card {
      background: #fff;
      padding: 40px;
      border-radius: 40px;
      text-align: center;
      width: 85%;
      max-width: 450px;
    }


    /* ==================================================
   📱 MOBILES (≤768px)
================================================== */
    @media (max-width: 768px) {

      body {
        overflow: hidden;
      }

      .app {
        width: 100%;
        height: auto;
        min-height: 100vh;
        padding: 16px;
        border-radius: 0;
      }

      .q-counter {
        font-size: 1rem;
      }

      .q-text {
        font-size: 1.4rem;
      }

      .drop-box {
        width: 240px;
        height: 160px;
      }

      .option {
        width: 140px;
        height: 120px;
      }

      .opt-label {
        font-size: 1.4rem;
      }

      .nav-btn {
        font-size: 1rem;
        padding: 12px 24px;
      }

      .smiley {
        font-size: 110px;
      }

      /* 🎉 FINAL POPUP */
      .final-card {
        width: 85%;
        padding: 28px;
      }

      .final-card h1 {
        font-size: 2.4rem;
      }

      .final-card p {
        font-size: 1.3rem;
      }
    }

    /* ==================================================
   📱 TABLETS (769px – 1024px)
================================================== */
    @media (min-width: 769px) and (max-width: 900px) {
      body {
        overflow: hidden;

      }

      .app {
        width: 100%;
        height: 100vh;
        padding: 20px;
      }

      .q-text {
        font-size: 1.8rem;

      }

      #quiz-main {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;

        gap: 50px;
        min-height: 0;
      }

      .drop-box {
        width: 260px;
        height: 150px;

      }

      .option {
        width: 140px;
        height: 100px;
        margin-top: -30px;
      }

      .opt-label {
        font-size: 1.6rem;
      }

      .nav-btn {
        font-size: 1.05rem;
      }

      /* 🎉 FINAL POPUP */
      .final-card {
        width: 420px;
        padding: 34px;
      }

      .final-card h1 {
        font-size: 2.8rem;
      }

      .final-card p {
        font-size: 1.4rem;
      }
    }

    /* ==================================================
   📱 SMALL MOBILES (≤480px)
================================================== */
    @media (max-width: 480px) {

      body {
        overflow: hidden;
        align-items: flex-start;
      }

      .app {
        width: 100%;
        height: auto;
        min-height: 100vh;
        padding: 12px;
        border-radius: 0;
      }

      #header-area {
        gap: 6px;
        margin-bottom: 10px;
      }

      .q-counter {
        font-size: 0.95rem;
        padding: 4px 14px;

      }

      .q-text {
        font-size: 22px;
        font-weight: 200;
      }

      #quiz-main {
        gap: 14px;
      }

      .drop-box {
        width: 120px;
        height: 70px;
        border-radius: 22px;
      }

      .options-container {
        gap: 14px;
      }

      .option {
        width: 90px;
        height: 90px;
        border-radius: 18px;
      }

      .opt-label {
        font-size: 1.2rem;
      }

      .footer-nav {
        padding-top: 10px;
      }

      .nav-btn {
        padding: 10px 18px;
        font-size: 0.9rem;
      }

      .smiley {
        font-size: 90px;
      }

      /* 🎉 FINAL POPUP */
      .final-card {
        width: 92%;
        padding: 22px;
        border-radius: 24px;
      }

      .final-card h1 {
        font-size: 1.9rem;
      }

      .final-card p {
        font-size: 1.1rem;
      }

      .final-card button {
        font-size: 1.1rem;
        padding: 12px 26px;
      }
    }

💻 DESKTOP (1025px – 1440px)
========================================= */

<body>
  <div class="app">
    <div id="header-area">
      <div class="header-top">
        <div id="q-counter" class="q-counter">Question 1 of 4</div>
        <button class="read-btn" onclick="readQuestion()">🔊</button>
      </div>
      <p>Click The answer in given space</p>
      <div id="q-text" class="q-text">Loading...</div>
    </div>

    <div id="quiz-main">
      <div class="drop-box" id="dropBox">Select  Answer</div>
      <div class="options-container" id="options-grid"></div>
    </div>

    <div class="footer-nav">
      <button id="backBtn" class="nav-btn">◀ PREV</button>
      <button id="nextBtn" class="nav-btn">NEXT ▶</button>
    </div>

    <div id="smiley" class="smiley"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script>
   const quiz = [
  {
    text: "Give one example for a living thing.", answer: "cat", isCorrect: false, userImg: null,
    options: [
      { id: "cat", img: "../uploads/cat.png", label: "Cat" },
      { id: "rock", img: "../uploads/rock-img.png", label: "Rock" },
      { id: "car", img: "../uploads/car-img.png", label: "Car" }]
  },
  {
    text: "Give one example for a non-living thing.", answer: "book", isCorrect: false, userImg: null,
    options: [
      { id: "tree", img: "../uploads/tree-img.png", label: "Tree" },
      { id: "book", img: "../uploads/book.png", label: "Book" },
      { id: "bird", img: "../uploads/bird-img.png", label: "Bird" }]
  },
  {
    text: "Give one example for a natural non-living thing.", answer: "rock", isCorrect: false, userImg: null,
    options: [
      { id: "rock", img: "../uploads/rock-img.png", label: "Rock" },
      { id: "car", img: "../uploads/car-img.png", label: "Car" },
      { id: "dog", img: "../uploads/dog-img.png", label: "Dog" }]
  },
  {
    text: "Give one example for a man-made thing.", answer: "chair", isCorrect: false, userImg: null,
    options: [
      { id: "chair", img: "../uploads/chair-img.png", label: "Chair" },
      { id: "tree", img: "../uploads/tree-img.png", label: "Tree" },
      { id: "cow", img: "../uploads/cow-img.png", label: "Cow" }]
  }
];

let current = 0;

const qCounter = document.getElementById("q-counter");
const qText = document.getElementById("q-text");
const dropBox = document.getElementById("dropBox");
const optionsGrid = document.getElementById("options-grid");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");
const smiley = document.getElementById("smiley");

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

/* TEXT TO SPEECH */
function readQuestion() {
  const utterance = new SpeechSynthesisUtterance(quiz[current].text);
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utterance);
}

/* SOUND */
function playSound(isSuccess) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = isSuccess ? 800 : 110;
  gain.gain.value = 0.1;
  osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}

/* FEEDBACK */
function showFeedback(isHappy) {
  smiley.innerHTML = isHappy ? "🤩" : "😢";
  smiley.classList.add("show");
  setTimeout(() => smiley.classList.remove("show"), 1000);
}

/* RENDER */
function render() {
  const q = quiz[current];

  qCounter.textContent = `Question ${current + 1} of ${quiz.length}`;
  qText.textContent = q.text;

  if (q.isCorrect) {
    dropBox.innerHTML = `<img src="${q.userImg}">`;
    dropBox.classList.add("locked");
    nextBtn.style.visibility = (current === quiz.length - 1) ? "hidden" : "visible";
  } else {
    dropBox.innerHTML = "Select  Answer";
    dropBox.classList.remove("locked");
    nextBtn.style.visibility = "hidden";
  }

  backBtn.style.visibility = current === 0 ? "hidden" : "visible";

  optionsGrid.innerHTML = q.options.map(o => `
    <div class="opt-wrapper">
      <div class="option ${q.isCorrect ? 'locked' : ''}" data-id="${o.id}">
        <img src="${o.img}">
      </div>
      <div class="opt-label">${o.label}</div>
    </div>
  `).join("");

  /* ✅ CLICK LOGIC (MAIN CHANGE) */
  document.querySelectorAll(".option").forEach(option => {
    option.addEventListener("click", () => {

      if (q.isCorrect) return;

      const selectedId = option.dataset.id;

      if (selectedId === q.answer) {

        q.isCorrect = true;
        q.userImg = option.querySelector("img").src;

        dropBox.innerHTML = `<img src="${q.userImg}">`;
        dropBox.classList.add("locked");

        document.querySelectorAll(".option").forEach(opt => opt.classList.add("locked"));

        showFeedback(true);
        playSound(true);

        if (current === quiz.length - 1) {
          setTimeout(showFinal, 1200);
        } else {
          nextBtn.style.visibility = "visible";
        }

      } else {
        option.classList.add("wrong");
        showFeedback(false);
        playSound(false);
        setTimeout(() => option.classList.remove("wrong"), 600);
      }

    });
  });
}

/* NAVIGATION */
nextBtn.onclick = () => {
  if (current < quiz.length - 1) {
    current++;
    render();
  }
};

backBtn.onclick = () => {
  if (current > 0) {
    current--;
    render();
  }
};

/* FINAL */
function showFinal() {
  const overlay = document.createElement("div");
  overlay.className = "final-overlay";
  overlay.innerHTML = `
    <div class="final-card">
               <h1 style="font-family:'Livvic';font-size: 42px; margin:0; color:#4cc9f0;;">GREAT JOB!</h1>

       <p style="font-size: 20px; color:#2F4F4F;">Quiz Completed Successfully!</p>
      <button onclick="location.reload()" class="nav-btn">PLAY AGAIN</button>
    </div>`;
  document.body.appendChild(overlay);
}

render();
  </script>
</body>
