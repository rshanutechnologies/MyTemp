<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Match the Following</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #f0f9ff;
      --correct: #2ed573;
      --wrong: #dc3545;
      --primary: #4cc9f0;
    }

    body {
      font-family: "Livvic", sans-serif;
      /* background-image: url("../uploads/bg2.png");
  background-size: cover;
  background-position: center; */
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .app {
      width: 95%;
      max-width: 1000px;
      height: 100vh;
      /* padding: 20px; */
      border-radius: 40px;
      display: flex;
      flex-direction: column;
      /* box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1); */
      box-sizing: border-box;
      overflow: hidden;
    }

    .title {
      font-size: clamp(20px, 4vw, 32px);
      color: #ff7a00;
      margin-bottom: 15px;
      text-align: center;
      font-weight: 700;
      flex-shrink: 0;
    }

    .match-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      justify-content: space-evenly;
    }

    .match-row {
      display: grid;
      grid-template-columns: 1.2fr 70px 1.2fr;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.4);
      padding: 10px 15px;
      border-radius: 20px;
      height: 28%;
    }

    .left-item {
      font-size: clamp(16px, 2.5vw, 24px);
      color: #2F4F4F;
      font-weight: 600;
    }

    .answer-box {
      width: 55px;
      height: 44px;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      border: 3px dashed #2F4F4F;
      border-radius: 12px;
      outline: none;
      text-transform: lowercase;
      margin: 0 auto;
    }

    .answer-box:disabled {
      background: #eee;
      border: 3px solid var(--correct);
      color: var(--correct);
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(16px, 2.5vw, 22px);
    }

    .option img {
      /* height: clamp(60px, 15vh, 100px); */
      height: 60px;
      width: 60px;
      aspect-ratio: 3/2;
      object-fit: contain;
      background: white;
      padding: 5px;
      border-radius: 15px;
      border: 4px solid white;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    /* FEEDBACK GLOW - Target only the specific option box */
    .option.correct img {
      border-color: var(--correct);
      box-shadow: 0 0 20px var(--correct);
    }

    .option.wrong img {
      border-color: var(--wrong);
      box-shadow: 0 0 20px var(--wrong);
      animation: shake 0.4s;
    }

    @keyframes shake {
      25% {
        transform: translateX(-6px);
      }

      75% {
        transform: translateX(6px);
      }
    }

    .smiley {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(.4);
      font-size: 150px;
      opacity: 0;
      transition: .45s cubic-bezier(.17, .89, .32, 1.49);
      pointer-events: none;
      z-index: 2000;
    }

    .smiley.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .final-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      backdrop-filter: blur(6px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }

    .final-card {
      background: #C2F4FF;
      padding: 30px;
      border-radius: 40px;
      text-align: center;
    }

    /* ==================================================
   📱 TABLETS (769px – 1024px)
================================================== */
    @media (max-width: 900px) {

      .app {
        width: 95%;
        height: 100vh;
        padding: 12px;
      }

      .title {
        font-size: 1.8rem;
      }

      .match-row {
        height: auto;
        padding: 16px;
      }

      .left-item {
        font-size: 1.25rem;
      }

      .option img {
        height: 90px;
      }

      /* 🎉 FINAL POPUP */
      .final-card {
        width: 420px;
        padding: 34px;
      }

      .final-card h1 {
        font-size: 2.6rem;
      }

      .final-card p {
        font-size: 1.35rem;
      }
    }


    /* ==================================================
   📱 MOBILES (≤768px)
================================================== */
    @media (max-width: 768px) {

      body {
        overflow: hidden;
      }

      .app {
        width: 100%;
        height: auto;
        min-height: 100vh;
        padding: 18px;
        border-radius: 0;
      }

      .title {
        font-size: 1.5rem;
      }

      .match-row {
        grid-template-columns: 1.2fr 60px 1.2fr;
        height: auto;
      }

      .left-item {
        font-size: 1.1rem;
      }

      .answer-box {
        width: 52px;
        height: 42px;
        font-size: 20px;
      }

      .option img {
        height: 80px;
      }

      .smiley {
        font-size: 110px;
      }

      /* 🎉 FINAL POPUP */
      .final-card {
        width: 85%;
        padding: 26px;
      }

      .final-card h1 {
        font-size: 2.2rem;
      }

      .final-card p {
        font-size: 1.25rem;
      }
    }



    /* ==================================================
   📱 SMALL MOBILES (≤480px)
================================================== */
    @media (max-width: 480px) {

      body {
        overflow-y: hidden;
        align-items: flex-start;
      }

      .app {
        width: 100%;
        height: auto;
        min-height: 100vh;
        padding: 14px;
        border-radius: 0;
      }

      .title {
        font-size: 1.3rem;
        margin-bottom: 10px;
      }

      .match-row {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        height: auto;
        padding: 14px;
        text-align: center;
      }

      .left-item {
        font-size: 1rem;
        font-weight: 300;
      }

      .answer-box {
        width: 50px;
        height: 40px;
        font-size: 18px;
      }

      .option {
        justify-content: center;
        font-size: 1rem;
      }

      .option img {
        height: 40px;
      }

      .smiley {
        font-size: 90px;
      }

      /* 🎉 FINAL POPUP */
      .final-card {
        width: 90%;
        padding: 20px;
        border-radius: 24px;
      }

      .final-card h1 {
        font-size: 1.8rem;
      }

      .final-card p {
        font-size: 1.1rem;
      }
    }

    /* =========================================
💻 DESKTOP (1025px – 1440px)
========================================= */
    /* @media screen and (min-width: 1025px) and (max-width: 1440px) {

      .app {
        max-width: 1200px;
        padding: 30px;
      }

      .match-row {
        padding: 18px 20px;
        gap: 20px;
      }

      .left-item {
        font-size: clamp(20px, 1.6vw, 26px);
      }

      .answer-box {
        width: 70px;
        height: 55px;
        font-size: 26px;
      }

      .option img {
        height: clamp(100px, 9vh, 140px);
      }
    }
 */

    /* =========================================
🖥 LARGE MONITORS (1441px – 1920px)
========================================= */
    @media screen and (min-width: 1441px) and (max-width: 1920px) {

      .app {
        max-width: 1400px;
        padding: 40px;
      }

      .match-row {
        padding: 20px 25px;
        gap: 25px;
      }

      .left-item {
        font-size: 28px
      }

      .answer-box {
        width: 80px;
        height: 60px;
        font-size: 30px;
      }

      .option img {
        height: clamp(120px, 8vh, 160px);
      }
    }


    /* =========================================
🖥 4K / EXTRA LARGE (1921px+)
========================================= */
    @media screen and (min-width: 1921px) {

      .app {
        max-width: 1600px;
        padding: 50px;
      }

      .match-row {
        padding: 25px 30px;
        gap: 30px;
      }

      .left-item {
        font-size: clamp(26px, 1.3vw, 36px);
      }

      .answer-box {
        width: 90px;
        height: 70px;
        font-size: 34px;
      }

      .option img {
        height: clamp(140px, 7vh, 200px);
        border-radius: 20px;
      }

      .title {
        font-size: clamp(32px, 2vw, 48px);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="title">Match the Following</div>

    <div class="match-container">
      <div class="match-row">
        <div class="left-item">1. Natural living thing</div>
        <input class="answer-box" data-answer="b" maxlength="1">
        <div class="option" data-id="a">
          a) <img src="../uploads/mountain-img.png">
        </div>
      </div>

      <div class="match-row">
        <div class="left-item">2. Man-made thing</div>
        <input class="answer-box" data-answer="c" maxlength="1">
        <div class="option" data-id="b">
          b) <img src="../uploads/bird-img.png">
        </div>
      </div>

      <div class="match-row">
        <div class="left-item">3. Natural non-living thing</div>
        <input class="answer-box" data-answer="a" maxlength="1">
        <div class="option" data-id="c">
          c) <img src="../uploads/car-img.png">
        </div>
      </div>
    </div>

    <div id="smiley" class="smiley"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script>
    let audioCtx = null, correctCount = 0;
    const inputs = document.querySelectorAll(".answer-box");
    const options = document.querySelectorAll(".option");
    const smiley = document.getElementById("smiley");

    function ensureAudio() {
      audioCtx ??= new (window.AudioContext || window.webkitAudioContext)();
    }

    function successSound() {
      ensureAudio();
      const t = audioCtx.currentTime;
      [880, 1100, 1320].forEach((f, i) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.frequency.value = f;
        g.gain.setValueAtTime(.001, t + i * .12);
        g.gain.linearRampToValueAtTime(.25, t + .05 + i * .12);
        g.gain.exponentialRampToValueAtTime(.0001, t + .8 + i * .12);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t + i * .12); o.stop(t + .9 + i * .12);
      });
    }

    function zzzSound() {
      ensureAudio();
      const t = audioCtx.currentTime;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.frequency.setValueAtTime(220, t);
      o.frequency.exponentialRampToValueAtTime(140, t + .4);
      g.gain.setValueAtTime(.001, t);
      g.gain.exponentialRampToValueAtTime(.0001, t + .5);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t + .5);
    }

    function showSmiley(e) {
      smiley.textContent = e;
      smiley.classList.add("show");
      setTimeout(() => smiley.classList.remove("show"), 1200);
    }

    // inputs.forEach(input => {
    //   input.addEventListener("input", (e) => {
    //     const val = e.target.value.toLowerCase();
    //     if(!val) return;

    //     const correctId = input.dataset.answer;
    //     const targetOption = document.querySelector(`.option[data-id="${val}"]`);

    //     if(!targetOption) return;

    //     targetOption.classList.remove("wrong");

    //     if(val === correctId) {
    //       targetOption.classList.add("correct");
    //       input.disabled = true;
    //       correctCount++;
    //       showSmiley("😄"); 
    //       confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    //       successSound();
    //       if(correctCount === inputs.length) setTimeout(showFinal, 900);
    //     } else {
    //       targetOption.classList.add("wrong");
    //       showSmiley("😢"); 
    //       zzzSound();
    //       setTimeout(() => targetOption.classList.remove("wrong"), 700);
    //       e.target.value = ""; // Clear input for retry
    //     }
    //   });
    // });

    inputs.forEach(input => {
      input.addEventListener("input", (e) => {
        let val = e.target.value.toLowerCase();

        // ✅ ALLOW ONLY a, b, c
        if (!["a", "b", "c"].includes(val)) {
          e.target.value = ""; // block other letters
          return;
        }

        const correctId = input.dataset.answer;
        const targetOption = document.querySelector(`.option[data-id="${val}"]`);

        if (!targetOption) return;

        targetOption.classList.remove("wrong");

        if (val === correctId) {
          targetOption.classList.add("correct");
          input.disabled = true;
          correctCount++;
          showSmiley("😄");
          confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
          successSound();
          if (correctCount === inputs.length) setTimeout(showFinal, 900);
        } else {
          targetOption.classList.add("wrong");
          showSmiley("😢");
          zzzSound();
          setTimeout(() => targetOption.classList.remove("wrong"), 700);
          e.target.value = "";
        }
      });
    });

    function showFinal() {
      confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
      successSound(); showSmiley("🥳");
      const d = document.createElement("div");
      d.className = "final-overlay";
      d.style.display = "flex";
      d.innerHTML = `
    <div class="final-card">
      <h1 style="font-family:'Livvic';font-size: 42px; margin:0; color:#ff7a00;">🎉 GREAT JOB! 🎉</h1>
      <p style="font-size: 20px; color:#2F4F4F;">You matched all correctly!</p>
      <button onclick="location.reload()" style="
        margin-top:15px; padding:12px 30px; font-size:18px; border-radius:30px;
        border:none; background:var(--primary); color:white; font-family:'Livvic'; cursor:pointer;">
        PLAY AGAIN ↺
      </button>
    </div>`;
      document.body.appendChild(d);
    }
  </script>
</body>

</html>
