<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Match the Following</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #f0f9ff;
      --correct: #2ed573;
      --wrong: #dc3545;
      --primary: #4cc9f0;
    }

    body {
      font-family: "Livvic", sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .app {
      width: 95%;
      max-width: 1000px;
      height: 100vh;
      border-radius: 40px;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      overflow: hidden;
    }

    .title {
      font-size: clamp(20px, 4vw, 32px);
        color: #447272 !important;
      margin-bottom: 15px;
      text-align: center;
      font-weight: 500;
      flex-shrink: 0;
    }

    .match-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      justify-content: space-evenly;
    }

    .match-row {
      display: grid;
      grid-template-columns: 1.2fr 70px 1.2fr;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.4);
      padding: 10px 15px;
      border-radius: 20px;
      height: 28%;
      position: relative;
    }

    .left-item {
      font-size: clamp(16px, 2.5vw, 24px);
      color: #2F4F4F;
      font-weight: 600;
    }

    .answer-box {
      width: 55px;
      height: 44px;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      border: 3px dashed #2F4F4F;
      border-radius: 12px;
      outline: none;
      text-transform: lowercase;
      margin: 0 auto;
    }

    .answer-box:disabled {
      background: #eee;
      border: 3px solid var(--correct);
      color: var(--correct);
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(16px, 2.5vw, 22px);
      transition: all 0.3s ease;
    }

    .option img {
      height: 60px;
      width: 60px;
      aspect-ratio: 3/2;
      object-fit: contain;
      background: white;
      padding: 5px;
      border-radius: 15px;
      border: 4px solid white;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    /* Matched image container - appears next to question */
    .matched-image {
      position: absolute;
      right: -80px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(46, 213, 115, 0.2);
      padding: 5px 12px;
      border-radius: 30px;
      animation: slideIn 0.5s ease;
    }

    .matched-image img {
      height: 50px;
      width: 50px;
      object-fit: contain;
      border-radius: 12px;
      border: 2px solid var(--correct);
    }

    .matched-image span {
      font-size: 14px;
      color: var(--correct);
      font-weight: bold;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-50%) translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateY(-50%) translateX(0);
      }
    }

    /* Hide original option when matched */
    .option.matched {
      opacity: 0.3;
      pointer-events: none;
      filter: grayscale(0.5);
      position: relative;
    }

    .option.matched::after {
      content: "✓";
      position: absolute;
      right: -10px;
      top: -10px;
      background: var(--correct);
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }

    .option.correct img {
      border-color: var(--correct);
      box-shadow: 0 0 20px var(--correct);
    }

    .option.wrong img {
      border-color: var(--wrong);
      box-shadow: 0 0 20px var(--wrong);
      animation: shake 0.4s;
    }

    @keyframes shake {
      25% {
        transform: translateX(-6px);
      }
      75% {
        transform: translateX(6px);
      }
    }

    .smiley {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(.4);
      font-size: 150px;
      opacity: 0;
      transition: .45s cubic-bezier(.17, .89, .32, 1.49);
      pointer-events: none;
      z-index: 2000;
    }

    .smiley.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .final-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      backdrop-filter: blur(6px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }

    .final-card {
      background: #C2F4FF;
      padding: 30px;
      border-radius: 40px;
      text-align: center;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .matched-image {
        right: -60px;
      }
      .matched-image img {
        height: 40px;
        width: 40px;
      }
    }

    @media (max-width: 480px) {
      .match-row {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .matched-image {
        position: static;
        transform: none;
        grid-column: span 2;
        justify-content: center;
        margin-top: 8px;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    }

    @media screen and (min-width: 1441px) {
      .app {
        max-width: 1400px;
        padding: 40px;
      }
      .left-item {
        font-size: 28px;
      }
      .answer-box {
        width: 80px;
        height: 60px;
        font-size: 30px;
      }
      .option img {
        height: clamp(120px, 8vh, 160px);
      }
    }

        /* =========================================
🖥 LARGE MONITORS (1441px – 1920px)
========================================= */
    @media screen and (min-width: 1441px) and (max-width: 1920px) {

      .app {
        max-width: 1400px;
        padding: 40px;
      }

      .match-row {
        padding: 20px 25px;
        gap: 25px;
      }

      .left-item {
        font-size: 28px
      }

      .answer-box {
        width: 80px;
        height: 60px;
        font-size: 30px;
      }

      .option img {
        height: clamp(120px, 8vh, 160px);
      }
    }


    /* =========================================
🖥 4K / EXTRA LARGE (1921px+)
========================================= */
    @media screen and (min-width: 1921px) {

      .app {
        max-width: 1600px;
        padding: 50px;
      }

      .match-row {
        padding: 25px 30px;
        gap: 30px;
      }

      .left-item {
        font-size: clamp(26px, 1.3vw, 36px);
      }

      .answer-box {
        width: 90px;
        height: 70px;
        font-size: 34px;
      }

      .option img {
        height: clamp(140px, 7vh, 200px);
        border-radius: 20px;
      }

      .title {
        font-size: clamp(32px, 2vw, 48px);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="title">Match the Following</div>

    <div class="match-container">
      <div class="match-row" data-question="1">
        <div class="left-item">1. Natural living thing</div>
        <input class="answer-box" data-answer="b" data-question-id="1" maxlength="1">
        <div class="option" data-id="a" data-image-src="../uploads/mountain-img.png" data-image-label="Mountain">
          a) <img src="../uploads/mountain-img.png">
        </div>
        <div class="matched-image-container"></div>
      </div>

      <div class="match-row" data-question="2">
        <div class="left-item">2. Man-made thing</div>
        <input class="answer-box" data-answer="c" data-question-id="2" maxlength="1">
        <div class="option" data-id="b" data-image-src="../uploads/bird-img.png" data-image-label="Bird">
          b) <img src="../uploads/bird-img.png">
        </div>
        <div class="matched-image-container"></div>
      </div>

      <div class="match-row" data-question="3">
        <div class="left-item">3. Natural non-living thing</div>
        <input class="answer-box" data-answer="a" data-question-id="3" maxlength="1">
        <div class="option" data-id="c" data-image-src="../uploads/car-img.png" data-image-label="Car">
          c) <img src="../uploads/car-img.png">
        </div>
        <div class="matched-image-container"></div>
      </div>
    </div>

    <div id="smiley" class="smiley"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script>
    let audioCtx = null, correctCount = 0;
    const inputs = document.querySelectorAll(".answer-box");
    const options = document.querySelectorAll(".option");
    const smiley = document.getElementById("smiley");
    
    // Track which options have been matched
    const matchedOptions = new Set();

    function ensureAudio() {
      audioCtx ??= new (window.AudioContext || window.webkitAudioContext)();
    }

    function successSound() {
      ensureAudio();
      const t = audioCtx.currentTime;
      [880, 1100, 1320].forEach((f, i) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.frequency.value = f;
        g.gain.setValueAtTime(.001, t + i * .12);
        g.gain.linearRampToValueAtTime(.25, t + .05 + i * .12);
        g.gain.exponentialRampToValueAtTime(.0001, t + .8 + i * .12);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t + i * .12); o.stop(t + .9 + i * .12);
      });
    }

    function zzzSound() {
      ensureAudio();
      const t = audioCtx.currentTime;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.frequency.setValueAtTime(220, t);
      o.frequency.exponentialRampToValueAtTime(140, t + .4);
      g.gain.setValueAtTime(.001, t);
      g.gain.exponentialRampToValueAtTime(.0001, t + .5);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t + .5);
    }

    function showSmiley(e) {
      smiley.textContent = e;
      smiley.classList.add("show");
      setTimeout(() => smiley.classList.remove("show"), 1200);
    }

    // Function to move image to the question row
    function moveImageToQuestion(questionRow, optionElement, optionId) {
      const imageSrc = optionElement.getAttribute('data-image-src');
      const imageLabel = optionElement.getAttribute('data-image-label') || optionId;
      const container = questionRow.querySelector('.matched-image-container');
      
      if (!container) return;
      
      // Create the matched image display
      const matchedDiv = document.createElement('div');
      matchedDiv.className = 'matched-image';
      matchedDiv.innerHTML = `
        <img src="${imageSrc}" alt="${imageLabel}">
        <span>✓ Matched</span>
      `;
      
      // Clear previous matched image if any
      container.innerHTML = '';
      container.appendChild(matchedDiv);
      
      // Mark original option as matched (hide/disable it)
      optionElement.classList.add('matched');
      
      // Store that this option is now used
      matchedOptions.add(optionId);
    }

    inputs.forEach(input => {
      input.addEventListener("input", (e) => {
        let val = e.target.value.toLowerCase();

        // Allow only a, b, c
        if (!["a", "b", "c"].includes(val)) {
          e.target.value = "";
          return;
        }

        const correctId = input.dataset.answer;
        const targetOption = document.querySelector(`.option[data-id="${val}"]`);
        const currentQuestionRow = input.closest('.match-row');

        if (!targetOption) return;

        // Check if this option has already been matched to another question
        if (matchedOptions.has(val)) {
          // Option already used - show error and clear
          showSmiley("❌");
          zzzSound();
          e.target.value = "";
          
          // Flash the already matched option to indicate it's taken
          targetOption.style.transition = '0.2s';
          targetOption.style.opacity = '0.5';
          setTimeout(() => {
            targetOption.style.opacity = '';
          }, 300);
          return;
        }

        targetOption.classList.remove("wrong");

        if (val === correctId) {
          // CORRECT MATCH - Move the image to the question
          targetOption.classList.add("correct");
          input.disabled = true;
          correctCount++;
          
          // Move the image to the question row
          moveImageToQuestion(currentQuestionRow, targetOption, val);
          
          showSmiley("😄");
          confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
          successSound();
          
          if (correctCount === inputs.length) setTimeout(showFinal, 900);
        } else {
          // WRONG ANSWER
          targetOption.classList.add("wrong");
          showSmiley("😢");
          zzzSound();
          setTimeout(() => targetOption.classList.remove("wrong"), 700);
          e.target.value = "";
        }
      });
    });

    function showFinal() {
      confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
      successSound(); 
      showSmiley("🥳");
      const d = document.createElement("div");
      d.className = "final-overlay";
      d.style.display = "flex";
      d.innerHTML = `
        <div class="final-card">
          <h1 style="font-family:'Livvic';font-size: 42px; margin:0; color:#ff7a00;">🎉 GREAT JOB! 🎉</h1>
          <p style="font-size: 20px; color:#2F4F4F;">You matched all correctly!</p>
          <button onclick="location.reload()" style="
            margin-top:15px; padding:12px 30px; font-size:18px; border-radius:30px;
            border:none; background:var(--primary); color:white; font-family:'Livvic'; cursor:pointer;">
            PLAY AGAIN ↺
          </button>
        </div>`;
      document.body.appendChild(d);
    }
  </script>
</body>

</html>
