<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Match the Following</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
/* VIEWPORT FLEX LOGIC - NO SCROLLBARS */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden; 
}

body {
  font-family: "Livvic", sans-serif;
  background: url(./uploads/bg4.png) center/cover no-repeat fixed;
  display: flex;
  justify-content: center;
  align-items: center;
}

.app {
  width: 100%;
  max-width: 1100px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 15px;
  box-sizing: border-box;
}

h4 {
  text-align: center;
  color: #ff7a00;
  font-weight: 500;
  margin: 10px 0;
  font-size: clamp(1.2rem, 3vw, 2rem);
  flex-shrink: 0;
}

.hint-title {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  text-align: center;
  color: #ff9800;
  margin: 10px 0;
}

.bulb-icon {
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 2px gold); }
  to { filter: drop-shadow(0 0 8px orange); }
}

/* MATCH TABLE */
.match-table {
  background: rgba(255, 255, 255, 0.85);
  border-radius: 30px;
  padding: clamp(10px, 2vw, 25px);
  box-shadow: 0 15px 35px rgba(0,0,0,.15);
  display: flex;
  flex: 1;
  gap: 20px;
  min-height: 0;
}

.left, .right {
  display: flex;
  flex-direction: column;
  justify-content: space-evenly;
  height: 100%;
}

/* .left { flex: 1.6; } */
.right { flex: 1; gap: 10px; }

/* LEFT ITEMS */
.left-item {
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.5);
  padding: 12px 15px;
  border-radius: 18px;
  border: 3px solid transparent;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
   min-height: 70px !important; 
}

.left-item.selected {
  border-color: #ff9800;
  background: rgba(255, 152, 0, 0.2);
  /* transform: scale(1.02); */
  box-shadow: 0 0 15px rgba(255, 152, 0, 0.5);
}

.left-item.matched {
  background: #4CAF50;
  cursor: default;
  border-color: #2e7d32;
}

.lhs {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  flex: 1;
  width: 100%;
}

.lhs-images {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
}

.lhs-images img {
  width: clamp(45px, 6vw, 65px);
  height: clamp(45px, 6vw, 65px);
  background: white;
  border-radius: 12px;
  padding: 4px;
  object-fit: contain;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.lhs-images p {
  font-size: clamp(12px, 2vw, 16px);
  font-weight: 600;
  margin: 0;
}

/* Answer text that appears after matching */
.answer-text {
  font-size: 15px;
  font-weight: 700;
  color: white;
  /* background: #ff9800; */
  padding: 8px 20px;
  border-radius: 30px;
  display: inline-block;
  animation: slideIn 0.4s ease;
  text-align: center;
  margin-top: 5px;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* RIGHT ITEMS */
.right-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: clamp(10px, 1.5vh, 20px) 20px;
  background: white;
  border-radius: 18px;
  box-shadow: 0 6px 15px rgba(0,0,0,.08);
  font-size: clamp(1rem, 1.8vw, 1.4rem);
  font-weight: 600;
  color: #2F4F4F;
  cursor: pointer;
  transition: all 0.3s ease;
  border: 3px solid transparent;
}

.right-item.selected {
  border-color: #ff9800;
  background: rgba(255, 152, 0, 0.2);
  transform: scale(1.02);
  box-shadow: 0 0 15px rgba(255, 152, 0, 0.5);
}

.right-item.matched {
  background: #4CAF50;
  opacity: 0.7;
  cursor: default;
  border-color: #2e7d32;
  color: white;
}

.right-item.matched .bulb {
  filter: none;
  text-shadow: 0 0 20px gold;
}

.bulb {
  font-size: clamp(24px, 4vw, 36px);
  filter: grayscale(1);
  transition: .3s;
}

.bulb.on {
  filter: none;
  text-shadow: 0 0 20px gold;
}

/* FEEDBACKS */
#smiley {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(.4);
  font-size: 150px;
  opacity: 0;
  transition: .4s cubic-bezier(.17,.89,.32,1.49);
  pointer-events: none;
  z-index: 2000;
}

#smiley.show { 
  opacity: 1; 
  transform: translate(-50%, -50%) scale(1); 
}

@keyframes fall { 
  to { 
    transform: translateY(100vh) rotate(720deg); 
    opacity: 0; 
  } 
}

.confetti-piece {
  position: absolute; 
  width: 10px; 
  height: 14px; 
  top: -20px;
  animation: fall 1.8s linear forwards;
}

/* Mobile Responsive */
@media (max-width: 768px) {
  .app { padding: 10px; }
  .match-table {
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
  }
  .left, .right {
    width: 100%;
    height: auto;
  }
  .left { gap: 15px; }
  .right { gap: 12px; }
  .left-item { padding: 8px 12px; min-height: 100px; }
  .lhs-images img { width: 45px; height: 45px; }
  .answer-text { font-size: 0.9rem; padding: 5px 15px; }
}

@media (max-width: 480px) {
  .match-table { padding: 10px; }
  .left { gap: 12px; }
  .right { gap: 10px; }
  .lhs-images img { width: 34px; height: 34px; }
  .lhs-images p { font-size: 9px; }
  .left-item { padding: 6px 10px; min-height: 80px; }
  .right-item { padding: 10px 15px; font-size: 13px; }
  .answer-text { font-size: 0.8rem; padding: 4px 12px; }
}

@media (max-width: 800px) {
  .app {
    height: auto;
    min-height: 100vh;
  }
  .match-table {
    flex: unset;
    height: auto;
    overflow: hidden;
  }
}

/* Desktop Scaling */
@media screen and (min-width: 1025px) and (max-width: 1440px) {
  .app { max-width: 1100px; padding: 20px; }
  .match-table { gap: 25px; padding: 20px; }
  .lhs-images img { width: 60px; height: 60px; }
  .right-item { font-size: 1.3rem; padding: 15px 20px; }
}

@media screen and (min-width: 1441px) and (max-width: 1920px) {
  .app { max-width: 1300px; padding: 25px; }
  .match-table { gap: 30px; padding: 25px; }
  .lhs-images img { width: 75px; height: 75px; }
  .right-item { font-size: 1.6rem; padding: 18px 25px; }
}

/* Final Popup Styles */
.final-popup-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.final-popup-card {
  background: linear-gradient(135deg, #fff, #f0f0f0);
  padding: 40px;
  border-radius: 30px;
  text-align: center;
  max-width: 450px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  animation: slideUp 0.4s ease;
}

@keyframes slideUp {
  from { transform: translateY(50px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.final-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.trophy {
  font-size: 50px;
  animation: bounce 0.5s ease;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.final-header h2 {
  font-size: 32px;
  color: #2f4f4f;
  margin: 0;
}

.score-circle {
  margin: 20px auto;
}

.score-number {
  font-size: 65px;
  font-weight: bold;
  color: #ff9800;
}

.score-total {
  font-size: 32px;
  color: #666;
}

.final-message {
  font-size: 26px;
  font-weight: bold;
  color: #2f4f4f;
  margin: 20px 0 15px;
}

.final-stars {
  font-size: 40px;
  letter-spacing: 8px;
  margin: 15px 0 25px;
}

.restart-btn {
  padding: 14px 35px;
  border: none;
  border-radius: 50px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s;
  background: linear-gradient(135deg, #4cc9f0, #2ecc71);
  color: white;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}

.restart-btn:active {
  transform: scale(0.98);
}
</style>
</head>

<body>
<div class="app">
  <h4 class="hint-title">
    <span class="bulb-icon">💡</span>
    Click Left Item, Then Click Right Item to Match
  </h4>
  
  <div class="match-table">
    <div class="left">
      <div class="left-item" data-answer="c" data-answer-text="Pulses">
        <div class="lhs">
          <div class="lhs-images">
            <p>Greengram</p>
            <img src="../uploads/gg.jpg">
            &
            <p>Blackgram</p>
            <img src="../uploads/blg.jpg">
          </div>
          <!-- Answer text will appear here after matching -->
        </div>
      </div>

      <div class="left-item" data-answer="a" data-answer-text="Spices">
        <div class="lhs">
          <div class="lhs-images">
            <p>Cumin</p>
            <img src="../uploads/cumin.png">
            &
            <p>Coriander</p>
            <img src="../uploads/coriander.png">
          </div>
          <!-- Answer text will appear here after matching -->
        </div>
      </div>

      <div class="left-item" data-answer="b" data-answer-text="Cereals">
        <div class="lhs">
          <div class="lhs-images">
            <p>Rice</p>
            <img src="../uploads/rice.png">
            &
            <p>Wheat</p>
            <img src="../uploads/wheat.png">
          </div>
          <!-- Answer text will appear here after matching -->
        </div>
      </div>
    </div>

    <div class="right">
      <div class="right-item" data-key="a">
        a) Spices <span class="bulb">💡</span>
      </div>
      <div class="right-item" data-key="b">
        b) Cereals <span class="bulb">💡</span>
      </div>
      <div class="right-item" data-key="c">
        c) Pulses <span class="bulb">💡</span>
      </div>
    </div>
  </div>
</div>

<div id="smiley"></div>
<div id="confetti" style="position:fixed;inset:0;pointer-events:none;z-index:9999;"></div>

<script>
let audioCtx = null;
let correctCount = 0;
let selectedLeft = null;
const totalQuestions = document.querySelectorAll(".left-item").length;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function playWrongSound() {
  const c = ensureAudio(), t = c.currentTime;
  const o = c.createOscillator(), g = c.createGain();
  o.type = "square";
  o.frequency.value = 180;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(.12, t + .01);
  g.gain.exponentialRampToValueAtTime(.0001, t + .35);
  o.connect(g);
  g.connect(c.destination);
  o.start(t);
  o.stop(t + .35);
}

function playSuccessSound() {
  const c = ensureAudio(), t = c.currentTime;
  const g = c.createGain();
  g.gain.setValueAtTime(.0001, t);
  g.gain.linearRampToValueAtTime(.18, t + .02);
  g.gain.exponentialRampToValueAtTime(.0001, t + .65);
  g.connect(c.destination);
  [660, 880, 1100, 1320].forEach((f, i) => {
    const o = c.createOscillator();
    o.type = "sine";
    o.frequency.setValueAtTime(f, t + i * .02);
    o.connect(g);
    o.start(t + i * .02);
    o.stop(t + .65);
  });
}

function triggerConfetti(count = 80) {
  const box = document.getElementById("confetti");
  if (!box) return;
  const colors = ["#f778a1", "#4cc9f0", "#ffaa00", "#2ed573", "#ff4fd8"];
  for (let i = 0; i < count; i++) {
    const p = document.createElement("div");
    p.className = "confetti-piece";
    p.style.left = Math.random() * 100 + "%";
    p.style.background = colors[Math.random() * colors.length | 0];
    p.style.animationDuration = (1.2 + Math.random()) + "s";
    box.appendChild(p);
  }
  setTimeout(() => {
    if (box) box.innerHTML = "";
  }, 2000);
}

function showSmiley(emoji) {
  const s = document.getElementById("smiley");
  if (!s) return;
  s.textContent = emoji;
  s.classList.add("show");
  setTimeout(() => s.classList.remove("show"), 900);
}

function showFinalPopup() {
  const score = correctCount;
  const total = totalQuestions;
  const percentage = (score / total) * 100;
  
  const popup = document.createElement("div");
  popup.className = "final-popup-overlay";
  
  let starRating = "";
  let message = "";
  
  if (percentage === 100) {
    starRating = "⭐⭐⭐⭐⭐";
    message = "Perfect Score! 🎉";
  } else if (percentage >= 80) {
    starRating = "⭐⭐⭐⭐";
    message = "Great Job! 🌟";
  } else if (percentage >= 60) {
    starRating = "⭐⭐⭐";
    message = "Good Work! 📚";
  } else if (percentage >= 40) {
    starRating = "⭐⭐";
    message = "Keep Practicing! 💪";
  } else {
    starRating = "⭐";
    message = "Try Again! 📖";
  }
  
  popup.innerHTML = `
    <div class="final-popup-card">
      <div class="final-header">
        <span class="trophy">🏆</span>
        <h2>Quiz Completed!</h2>
      </div>
      <div class="score-circle">
        <div class="score-number">${score}</div>
        <div class="score-total">/${total}</div>
      </div>
      <div class="final-message">${message}</div>
      <div class="final-stars">${starRating}</div>
      <button class="restart-btn" onclick="location.reload()">🔄 Play Again</button>
    </div>
  `;
  
  document.body.appendChild(popup);
  
  if (percentage === 100) {
    playSuccessSound();
    triggerConfetti(150);
  }
}

function checkCompletion() {
  if (correctCount === totalQuestions) {
    setTimeout(() => {
      showFinalPopup();
    }, 500);
  }
}

function clearSelection() {
  if (selectedLeft) {
    selectedLeft.classList.remove("selected");
    selectedLeft = null;
  }
  document.querySelectorAll(".right-item").forEach(item => {
    item.classList.remove("selected");
  });
}

// Add click handlers for left items
document.querySelectorAll(".left-item").forEach(leftItem => {
  leftItem.addEventListener("click", (e) => {
    e.stopPropagation();
    
    // Don't allow clicking on already matched items
    if (leftItem.classList.contains("matched")) return;
    
    // Clear previous selection
    clearSelection();
    
    // Select this left item
    selectedLeft = leftItem;
    selectedLeft.classList.add("selected");
  });
});

// Add click handlers for right items
document.querySelectorAll(".right-item").forEach(rightItem => {
  rightItem.addEventListener("click", (e) => {
    e.stopPropagation();
    
    // Don't allow clicking on already matched items
    if (rightItem.classList.contains("matched")) return;
    
    // If no left item is selected, show hint
    if (!selectedLeft) {
      showSmiley("👆");
      playWrongSound();
      return;
    }
    
    // Check if they match
    const leftAnswer = selectedLeft.dataset.answer;
    const rightKey = rightItem.dataset.key;
    
    if (leftAnswer === rightKey) {
      // Get the answer text to display
      const answerText = selectedLeft.dataset.answerText;
      
      // Correct match
      selectedLeft.classList.add("matched");
      rightItem.classList.add("matched");
      
      // Remove any existing answer text first
      const existingAnswer = selectedLeft.querySelector('.answer-text');
      if (existingAnswer) existingAnswer.remove();
      
      // Add answer text to left item
      const answerDiv = document.createElement("div");
      answerDiv.className = "answer-text";
      answerDiv.innerHTML = answerText;
      selectedLeft.querySelector('.lhs').appendChild(answerDiv);
      
      // Turn on bulb
      const bulb = rightItem.querySelector(".bulb");
      if (bulb) bulb.classList.add("on");
      
      correctCount++;
      playSuccessSound();
      triggerConfetti(40);
   
      showSmiley("😄");
      
      // Clear selection
      clearSelection();
      
      // Check if quiz is complete
      checkCompletion();
    } else {
      // Wrong match
          showSmiley("😢");

      playWrongSound();
      
      // Flash red on wrong match
      rightItem.style.backgroundColor = "#ffebee";
      setTimeout(() => {
        rightItem.style.backgroundColor = "";
      }, 300);
      
      // Clear selection after wrong match
      clearSelection();
    }
  });
});

// Click anywhere else to clear selection
document.addEventListener("click", (e) => {
  if (!e.target.closest(".left-item") && !e.target.closest(".right-item")) {
    clearSelection();
  }
});
</script>
</body>
</html>
