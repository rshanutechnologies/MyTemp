<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Match the Following</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
/* 1. VIEWPORT FLEX LOGIC - NO SCROLLBARS */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden; 
}

body {
  font-family: "Livvic", sans-serif;
  background: url(./uploads/bg4.png) center/cover no-repeat fixed;
  display: flex;
  justify-content: center;
  align-items: center;
}

.app {
  width: 100%;
  max-width: 1100px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 15px;
  box-sizing: border-box;
}

h4 {
  text-align: center;
  color: #ff7a00;
  font-weight: 500;
  margin: 10px 0;
 font-size: clamp(1.2rem, 3vw, 2rem);
  flex-shrink: 0;
}
.hint-title {
  display: flex;
  justify-content: center;   /* center horizontally */
  align-items: center;
  gap: 8px;
  font-weight: 600;
  text-align: center;
  color: #ff9800;
  margin: 10px 0;
}

.bulb-icon {
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 2px gold); }
  to   { filter: drop-shadow(0 0 8px orange); }
}

/* 2. FLEX TABLE LOGIC */
.match-table {
  background: rgba(255, 255, 255, 0.85);
  border-radius: 30px;
  padding: clamp(10px, 2vw, 25px);
  box-shadow: 0 15px 35px rgba(0,0,0,.15);
  display: flex;
  flex: 1; /* Fills available height */
  gap: 20px;
  min-height: 0; /* Important for flex-child scrolling prevention */
}

/* LHS & RHS Column Logic */
.left, .right {
  display: flex;
  flex-direction: column;
  justify-content: space-evenly; /* Distributes rows in same line/height */
  height: 100%;
}

.left { flex: 1.6; }
.right { flex: 1; gap: 10px; }

/* 3. ROW DESIGN */
.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255, 255, 255, 0.5);
  padding: 8px 15px;
  border-radius: 18px;
  border: 2px solid transparent;
}

.lhs {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}

.lhs-images { display: flex; gap: 8px; flex-shrink: 0; }
.lhs-images img {
  width: clamp(45px, 6vw, 65px);
  height: clamp(45px, 6vw, 65px);
  background: white;
  border-radius: 12px;
  padding: 4px;
  object-fit: contain;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.lhs span {
  font-size: clamp(0.9rem, 1.8vw, 1.3rem);
  font-weight: 500;
  color: #2F4F4F;
}

.mid input {
  width: clamp(50px, 8vw, 75px);
  height: clamp(45px, 6vh, 60px);
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  border-radius: 12px;

  border: 3px solid #d6b8ff;
  box-shadow: 0 0 10px rgba(214, 184, 255, 0.6);
  outline: none;
  background: #fff;
}
.mid input:disabled {
  background: #f0fff4;
  border-color: #2ed573;
  color: #2ed573;
}

/* RHS DESIGN */
.option-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: clamp(10px, 1.5vh, 20px) 20px;
  background: white;
  border-radius: 18px;
  box-shadow: 0 6px 15px rgba(0,0,0,.08);
  font-size: clamp(1rem, 1.8vw, 1.4rem);
  font-weight: 600;
  color: #2F4F4F;
  height: auto;
}

.bulb {
  font-size: clamp(24px, 4vw, 36px);
  filter: grayscale(1);
  transition: .3s;
}

.bulb.on {
  filter: none;
  text-shadow: 0 0 20px gold;
}

/* 5. FEEDBACKS */
#smiley {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(.4);
  font-size: 150px;
  opacity: 0;
  transition: .4s cubic-bezier(.17,.89,.32,1.49);
  pointer-events: none;
  z-index: 2000;
}
#smiley.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

@keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
.confetti-piece {
  position: absolute; width: 10px; height: 14px; top: -20px;
  animation: fall 1.8s linear forwards;
}
@media (max-width: 768px) {

  .app {
    padding: 10px;
  }

  .match-table {
    flex-direction: column;   /* Stack vertically */
    gap: 10px;
    overflow-y: auto;  
    
  }

  .left, .right {
    width: 100%;
    height: auto;
  }

  .left {
    gap: 30px;
   
    
  }
.left {
    gap: 30px;
   
    
  }

  .row {
    padding: 5px;
  }

  .lhs-images {
    flex-wrap: wrap;          /* Prevent overflow */
    gap: 6px;
  }

  .lhs-images img {
    width: 45px;
    height: 45px;
  }

  .lhs-images p {
    font-size: 10px;
    margin: 0 4px;
  }

  .mid input {
    width: 50px;
    height: 40px;
    font-size: 20px;
  }

  .option-row {
    padding: 12px 15px;
    font-size: 16px;
  }

}
@media (max-width: 480px) {

  .match-table {
    padding: 10px;
    gap: 6px;
  }
  .left{
    gap: 15px;
  }
.right{
  gap: 7px;
 
}
  .row {
    padding: 4px 6px;
  }

  .lhs-images img {
    width: 34px;
    height: 34px;
  }

  .lhs-images p {
    font-size: 9px;
  }

  .mid input {
    width: 32px;
    height: 32px;
    font-size: 14px;
  }

  .option-row {
    padding: 8px;
    font-size: 13px;
  }
  .left, .right {
  justify-content: flex-start;   /* ✅ removes extra spacing */
  gap: 12px;                     /* ✅ control spacing manually */
}

}

@media (max-width: 800px){

  .app{
    height: auto;          /* ✅ remove fixed height */
    min-height: 100vh;     /* keep full screen */
  }

  .match-table{
    flex: unset;           /* ❌ stop forcing height */
    height: auto;          /* ✅ content decides height */
    overflow: hidden;      /* ✅ remove scroll */
  }
.left, .right {
  justify-content: flex-start;   /* ✅ removes extra spacing */
  gap: 12px;                     /* ✅ control spacing manually */
}
}

/* =========================
   SAME UI LIKE LAPTOP (SCALING SYSTEM)
========================= */
@media screen and (min-width: 1025px) and (max-width: 1440px) {

  .app {
    max-width: 1100px;
    padding: 20px;
  }

  .match-table {
    gap: 25px;
    padding: 20px;
  }

  .lhs-images img {
    width: 60px;
    height: 60px;
  }

  .lhs span {
    font-size: 1.2rem;
  }

  .mid input {
    width: 70px;
    height: 55px;
    font-size: 24px;
  }

  .option-row {
    font-size: 1.3rem;
    padding: 15px 20px;
  }

}
@media screen and (min-width: 1441px) and (max-width: 1920px) {

  .app {
    max-width: 1300px;
    padding: 25px;
  }

  .match-table {
    gap: 30px;
    padding: 25px;
  }

  .lhs-images img {
    width: 75px;
    height: 75px;
  }

  .lhs span {
    font-size: 1.5rem;
  }

  .mid input {
    width: 85px;
    height: 65px;
    font-size: 28px;
  }

  .option-row {
    font-size: 1.6rem;
    padding: 18px 25px;
  }

}
@media screen and (min-width: 1921px) {

  .app {
    max-width: 1500px;
    padding: 30px;
  }

  .match-table {
    gap: 35px;
    padding: 30px;
  }

  .lhs-images img {
    width: 90px;
    height: 90px;
  }

  .lhs span {
    font-size: 1.8rem;
  }

  .mid input {
    width: 100px;
    height: 75px;
    font-size: 32px;
  }

  .option-row {
    font-size: 1.9rem;
    padding: 20px 30px;
  }

}
</style>
</head>

<body>
<div class="app">
  <h4 class="hint-title">
  <span class="bulb-icon">💡</span>
  Type Your Answer To Match
</h4>
  <div class="match-table">
    <div class="left">
      <div class="row" data-answer="c">
        <div class="lhs">
          <div class="lhs-images"><p>Greengram</p><img src="../uploads/gg.jpg"><p>Blackgram</p><img src="../uploads/blg.jpg"></div>
        </div>
        <div class="mid"><input maxlength="1"></div>
      </div>

      <div class="row" data-answer="a">
        <div class="lhs">
          <div class="lhs-images"><p>Cumin</p><img src="../uploads/cumin.png"><p>Coriander</p><img src="../uploads/coriander.png"></div>
        </div>
        <div class="mid"><input maxlength="1"></div>
      </div>

      <div class="row" data-answer="b">
        <div class="lhs">
          <div class="lhs-images"><p>Rice</p><img src="../uploads/rice.png"><p>Wheat</p><img src="../uploads/wheat.png"></div>
        </div>
        <div class="mid"><input maxlength="1"></div>
      </div>
    </div>

    <div class="right">
      <div class="option-row" data-key="a">a) Spices <span class="bulb">💡</span></div>
      <div class="option-row" data-key="b">b) Cereals <span class="bulb">💡</span></div>
      <div class="option-row" data-key="c">c) Pulses <span class="bulb">💡</span></div>
    </div>
  </div>
</div>

<div id="smiley"></div>
<div id="confetti" style="position:fixed;inset:0;pointer-events:none;z-index:9999;"></div>

<script>
let audioCtx = null;
let correctCount = 0;
const totalQuestions = document.querySelectorAll(".left .row").length;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function playZzzSound() {
  const c = ensureAudio(), t = c.currentTime;
  const o = c.createOscillator(), g = c.createGain();
  o.type = "square";
  o.frequency.value = 180;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(.12, t + .01);
  g.gain.exponentialRampToValueAtTime(.0001, t + .35);
  o.connect(g);
  g.connect(c.destination);
  o.start(t);
  o.stop(t + .35);
}

function playSuccessSound() {
  const c = ensureAudio(), t = c.currentTime;
  const g = c.createGain();
  g.gain.setValueAtTime(.0001, t);
  g.gain.linearRampToValueAtTime(.18, t + .02);
  g.gain.exponentialRampToValueAtTime(.0001, t + .65);
  g.connect(c.destination);
  [660, 880, 1100, 1320].forEach((f, i) => {
    const o = c.createOscillator();
    o.type = "sine";
    o.frequency.setValueAtTime(f, t + i * .02);
    o.connect(g);
    o.start(t + i * .02);
    o.stop(t + .65);
  });
}

function triggerConfetti(count = 80) {
  const box = document.getElementById("confetti");
  if (!box) return;
  const colors = ["#f778a1", "#4cc9f0", "#ffaa00", "#2ed573", "#ff4fd8"];
  for (let i = 0; i < count; i++) {
    const p = document.createElement("div");
    p.className = "confetti-piece";
    p.style.left = Math.random() * 100 + "%";
    p.style.background = colors[Math.random() * colors.length | 0];
    p.style.animationDuration = (1.2 + Math.random()) + "s";
    box.appendChild(p);
  }
  setTimeout(() => {
    if (box) box.innerHTML = "";
  }, 2000);
}

function showSmiley(e) {
  const s = document.getElementById("smiley");
  if (!s) return;
  s.textContent = e;
  s.classList.add("show");
  setTimeout(() => s.classList.remove("show"), 900);
}

function showFinalPopup() {
  const score = correctCount;
  const total = totalQuestions;
  const percentage = (score / total) * 100;
  
  // Create final popup
  const popup = document.createElement("div");
  popup.className = "final-popup-overlay";
  
  let starRating = "";
  if (percentage === 100) {
    starRating = "⭐⭐⭐⭐⭐";
  } else if (percentage >= 80) {
    starRating = "⭐⭐⭐⭐";
  } else if (percentage >= 60) {
    starRating = "⭐⭐⭐";
  } else if (percentage >= 40) {
    starRating = "⭐⭐";
  } else {
    starRating = "⭐";
  }
  
  let message = "";
  if (percentage === 100) {
    message = "Perfect Score! 🎉";
  } else if (percentage >= 80) {
    message = "Great Job! 🌟";
  } else if (percentage >= 60) {
    message = "Good Work! 📚";
  } else if (percentage >= 40) {
    message = "Keep Practicing! 💪";
  } else {
    message = "Try Again! 📖";
  }
  
  popup.innerHTML = `
    <div class="final-popup-card">
      <div class="final-header">
        <span class="trophy">🏆</span>
        <h2>Quiz Completed!</h2>
      </div>
      <div class="final-score">
        <div class="score-circle">
          <span class="score-number">${score}</span>
          <span class="score-total">/${total}</span>
        </div>
      </div>
      <div class="final-message">${message}</div>
      <div class="final-stars">${starRating}</div>
      <div class="final-buttons">
        <button class="restart-btn" onclick="location.reload()">🔄 Play Again</button>
      </div>
    </div>
  `;
  
  document.body.appendChild(popup);
  
  // Play success sound and confetti for perfect score
  if (percentage === 100) {
    playSuccessSound();
    triggerConfetti(150);
  }
}

function checkCompletion() {
  if (correctCount === totalQuestions) {
    setTimeout(() => {
      showFinalPopup();
    }, 500);
  }
}

const bulbs = document.querySelectorAll(".option-row");

document.querySelectorAll(".left .row").forEach(row => {
  const input = row.querySelector("input");
  const correct = row.dataset.answer;
  
  // Initialize if already answered
  if (input.disabled) {
    correctCount++;
  }

  input.addEventListener("input", () => {
    const val = input.value.toLowerCase();
    if (val === correct) {
      const target = [...bulbs].find(b => b.dataset.key === val);
      if (target) {
        target.querySelector(".bulb").classList.add("on");
      }
      input.disabled = true;
      correctCount++;
      playSuccessSound();
      triggerConfetti();
      showSmiley("😄");
      
      // Check if quiz is completed
      checkCompletion();
    } else if (val.length > 0) {
      playZzzSound();
      showSmiley("😴");
      input.value = "";
    }
  });
});

// Add CSS for final popup
const style = document.createElement('style');
style.textContent = `
  .final-popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    animation: fadeIn 0.3s ease;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  .final-popup-card {
    background: linear-gradient(135deg, #fff, #f0f0f0);
    padding: 40px;
    border-radius: 30px;
    text-align: center;
    max-width: 450px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: slideUp 0.4s ease;
  }
  
  @keyframes slideUp {
    from {
      transform: translateY(50px);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }
  
  .final-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  
  .trophy {
    font-size: 50px;
    animation: bounce 0.5s ease;
  }
  
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  
  .final-header h2 {
    font-size: 32px;
    color: #2f4f4f;
    margin: 0;
    font-family: 'Livvic', sans-serif;
  }
  
  .score-circle {
 
    width: 160px;
    height: 160px;
    margin: 20px auto;
    background: linear-gradient(135deg, #4cc9f0, #f778a1);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
  }
  
  .score-number {
    font-size: 65px;
    font-weight: bold;
    color: white;
    font-family: 'Livvic', sans-serif;
  }
  
  .score-total {
    font-size: 32px;
    color: rgba(255, 255, 255, 0.8);
    font-family: 'Livvic', sans-serif;
  }
  
  .final-message {
    font-size: 26px;
    font-weight: bold;
    color: #2f4f4f;
    margin: 20px 0 15px;
    font-family: 'Livvic', sans-serif;
  }
  
  .final-stars {
    font-size: 40px;
    letter-spacing: 8px;
    margin: 15px 0 25px;
  }
  
  .final-buttons {
    display: flex;
    justify-content: center;
    margin-top: 10px;
  }
  
  .restart-btn {
    padding: 14px 35px;
    border: none;
    border-radius: 50px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: 'Livvic', sans-serif;
    background: linear-gradient(135deg, #4cc9f0, #2ecc71);
    color: white;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
  }
  
  .restart-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
  }
  
  .restart-btn:active {
    transform: translateY(0);
  }
  
  @media (max-width: 500px) {
    .final-popup-card {
      padding: 30px 20px;
    }
    
    .score-circle {
      width: 130px;
      height: 130px;
    }
    
    .score-number {
      font-size: 50px;
    }
    
    .score-total {
      font-size: 26px;
    }
    
    .final-message {
      font-size: 22px;
    }
    
    .final-stars {
      font-size: 32px;
      letter-spacing: 5px;
    }
    
    .final-header h2 {
      font-size: 26px;
    }
    
    .trophy {
      font-size: 40px;
    }
    
    .restart-btn {
      padding: 12px 30px;
      font-size: 16px;
    }
  }
`;
document.head.appendChild(style);
</script>
</body>
</html>
