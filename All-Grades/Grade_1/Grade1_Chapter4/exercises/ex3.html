<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>True or False – Drag Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --pink:#ff758c;
  --blue:#4cc9f0;
}

/* 1. VIEWPORT LOCK LOGIC */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden; /* Strict no-scroll */
}

body{
  font-family:"Livvic",sans-serif;
  background:url(./uploads/bg4.png) center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
}

.app{
  width:100%;
  max-width:950px;
  height: 100vh; /* Fill entire viewport */
  padding: 15px;
  display: flex;
  flex-direction: column;
  justify-content: space-evenly; /* Evenly distribute content vertically */
  align-items: center;
  box-sizing: border-box;
}

/* 2. HEADER AREA */
.header-top {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  flex-shrink: 0;
}

.read-btn {
  background: white;
  border: 2px solid var(--blue);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.q-number { font-weight: 700; color: #fff; font-size: clamp(14px, 2vw, 18px); margin: 0; }

/* 3. QUESTION ROW - FLEX LOGIC */
.q-row{
  display:flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 15px;
  width: 100%;
  max-height: 25vh; /* Limit height occupied */
}

.q-hint-img {
  width: clamp(50px, 10vh, 80px); /* Responsive to height */
  height: clamp(50px, 10vh, 80px);
  object-fit: contain; 
  flex-shrink: 0;
}

.q-text{
  font-size: clamp(1rem, 3.5vw, 2.2rem);
  color:#e6efef;
  font-weight:600;
  text-align:left;
  line-height: 1.2;
  margin: 0;
}

/* 4. INTERACTION AREA */
.options{
  display:flex;
  justify-content:center;
  gap: clamp(15px, 4vw, 40px);
  width: 100%;
  flex-shrink: 0;
}

.card{
 width: clamp(70px, 18vw, 100px);
 height: clamp(70px, 18vw, 100px);
 border-radius: 20px;
 font-size: clamp(30px, 6vw, 48px);
 font-weight: 900;
 display: flex;
 align-items: center;
 justify-content: center;
 cursor: grab;
 box-shadow: 0 8px 15px rgba(0,0,0,.1);
 touch-action: manipulation;
}
.card[data-val="T"]{background:#4CAF50;color:#000;}
.card[data-val="F"]{background:#F44336;color:#000;}

.drop-box{
 width: min(170px, 70vw);
 height: clamp(100px, 12vh, 110px);
 border-radius: 25px;
 border: 4px dashed #2F4F4F;
 display: flex;
 align-items: center !important;
 justify-content: center;
 font-size: clamp(12px, 4vw, 22px);
 font-weight: 400;
 background: #ffffffaa;
 flex-shrink: 0;
 padding-left: 20px !important;
}

/* 5. CONTROLS AREA */
.controls{
  display:flex;
  justify-content: space-between;
  width: 100%;
  max-width: 500px;
  gap: 10px;
  flex-shrink: 0;
}

.nav-btn{
  flex: 1;
  padding: clamp(12px, 2vh, 22px);
  border-radius: 50px;
  border: none;
  font-size: clamp(14px, 3vw, 18px);
  font-weight: 900;
  cursor: pointer;
  color: white;
}
#prevBtn{background:var(--pink)}
#nextBtn{background:var(--blue)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;}

/* Mobile Override */
@media (max-width: 600px) {
  .q-row { flex-direction: column; gap: 5px; }
  .q-text { text-align: center; }
}

/* ... Animations kept same from original code ... */
.butterfly{position:absolute;font-size:40px;pointer-events:none;opacity:0;animation:fly 6.8s forwards;}
@keyframes fly{0%{transform:translate(0,0) scale(.4);opacity:0;}20%{opacity:1;}100%{transform:translate(var(--tx),var(--ty)) rotate(var(--tr)) scale(1.2);opacity:0;}}
.sparkle{position:absolute;width:10px;height:10px;background:gold;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:spark 1s forwards;}
@keyframes spark{to{transform:translateY(40px) rotate(180deg);opacity:0}}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:9999;}
.confetti-piece{position:absolute;width:12px;height:16px;left:50%;top:50%;transform:translate(-50%,-50%);animation:splash 1.4s ease-out forwards;}
@keyframes splash{from{transform:translate(-50%,-50%) scale(.3);opacity:1;}to{transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) rotate(720deg);opacity:0;}}
#smiley{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.4);font-size:150px;opacity:0;transition:.4s; z-index: 10000;}
#smiley.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.final{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;justify-content:center;align-items:center;z-index:3000;}
.final-card{background:white;padding: 30px; border-radius:40px;text-align:center; width: 85%; max-width: 400px;}

/* =========================
   LAPTOP SAME UI SCALING SYSTEM
========================= */

/* Default (Laptop) */
.app {
  transform: scale(1);
  transform-origin: top center;
}
@media screen and (min-width: 1025px) and (max-width: 1440px) {

  .app {
    max-width: 950px;
    padding: 20px;
  }

  .q-text {
    font-size: 2rem;
  }

  .card {
    width: 90px;
    height: 90px;
    font-size: 40px;
  }

  .drop-box {
    width: 180px;
    height: 110px;
    font-size: 26px;
  }

  .nav-btn {
    font-size: 18px;
    padding: 14px;
  }

}
@media screen and (min-width: 1441px) and (max-width: 1920px) {

  .app {
    max-width: 1100px;
    padding: 25px;
  }

  .q-text {
    font-size: 2.6rem;
  }

  .card {
    width: 110px;
    height: 110px;
    font-size: 46px;
  }

  .drop-box {
    width: 220px;
    height: 130px;
    font-size: 30px;
  }

  .controls {
    max-width: 600px;
  }

  .nav-btn {
    font-size: 20px;
    padding: 16px;
  }

}
@media screen and (min-width: 1921px) {

  .app {
    max-width: 1300px;
    padding: 30px;
  }

  .q-text {
    font-size: 3rem;
  }

  .card {
    width: 130px;
    height: 130px;
    font-size: 52px;
  }

  .drop-box {
    width: 260px;
    height: 150px;
    font-size: 34px;
  }

  .controls {
    max-width: 700px;
  }

  .nav-btn {
    font-size: 22px;
    padding: 18px;
  }

}
</style>
</head>

<body>
<div class="app">
<div class="header-top">
    <div class="q-number" id="qNumber"></div>
    <button class="read-btn" onclick="readQuestion()">🔊</button>
</div>

<div class="q-row">
<img id="hintImg" class="q-hint-img">
<div class="q-text" id="qText"></div>
</div>

<div class="options">
<div class="card" data-val="T">T</div>
<div class="card" data-val="F">F</div>
</div>

<div class="drop-box" id="dropBox"> Select True or False </div>

<div class="controls">
<button id="prevBtn" class="nav-btn">◀ PREV</button>
<button id="nextBtn" class="nav-btn" disabled>NEXT ▶</button>
</div>
</div>

<div id="smiley"></div>
<div id="confetti"></div>
<script>
// Logic remains identical to your original provided script
const quiz=[
 {q:"Trees are very thin and small plants that live only for few months.", a:"F", img:"../uploads/trees.png"},
 {q:"Beetroot is a root vegetable.", a:"T", img:"../uploads/beetroot.png"},
 {q:"Plants need air and water to grow healthy.", a:"T", img:"../uploads/water.png"},
 {q:"Cinnamon, cardamom and pepper and dry chillies are examples of cereals.", a:"F", img:"../uploads/spices.png"},
 {q:"Flower is the most beautiful part of a plant.", a:"T", img:"../uploads/flower.png"}
];

let i=0,solved=false,audioCtx=null;
const answered=Array(quiz.length).fill(false);

function ensureAudio(){
 if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
 if(audioCtx.state==="suspended")audioCtx.resume();
}
document.addEventListener("mousedown",ensureAudio,{once:true});

function readQuestion() {
  const utterance = new SpeechSynthesisUtterance(quiz[i].q);
  const voices = window.speechSynthesis.getVoices();
  const indianVoice = voices.find(v => v.lang === 'en-IN' || v.name.includes('India'));
  if (indianVoice) utterance.voice = indianVoice;
  utterance.rate = 0.9;
  window.speechSynthesis.cancel(); 
  window.speechSynthesis.speak(utterance);
}

window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

function playSuccessSound(){
 ensureAudio();
 const t=audioCtx.currentTime,g=audioCtx.createGain();
 g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(.15,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+.6);
 g.connect(audioCtx.destination);
 [523,659,783,1046].forEach((f,x)=>{const o=audioCtx.createOscillator();o.frequency.value=f;o.connect(g);o.start(t+x*.07);o.stop(t+.8);});
}

function playWrongSound(){
 ensureAudio();
 const t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
 o.type="sawtooth";o.frequency.setValueAtTime(110,t);o.frequency.exponentialRampToValueAtTime(40,t+.6);
 g.gain.setValueAtTime(.15,t);g.gain.linearRampToValueAtTime(.001,t+.6);
 o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(t+.6);
}

function confetti(){
 const box=document.getElementById("confetti");
 box.innerHTML="";
 const colors=["#ff595e","#ffca3a","#8ac926","#1982c4"];
 for(let j=0;j<200;j++){
  const p=document.createElement("div");
  p.className="confetti-piece";
  p.style.background=colors[Math.random()*4|0];
  p.style.setProperty("--tx",(Math.random()*600-300)+"px");
  p.style.setProperty("--ty",(Math.random()*600-300)+"px");
  box.appendChild(p);
 }
}

function showButterflies(box){
 for(let j=0;j<10;j++){
  const b=document.createElement("div");b.className="butterfly";b.textContent="🦋";
  b.style.setProperty("--tx",(Math.random()*450-225)+"px");
  b.style.setProperty("--ty",(Math.random()*-350-150)+"px");
  b.style.setProperty("--tr",(Math.random()*720-360)+"deg");
  b.style.left="50%";b.style.top="50%";box.appendChild(b);
  for(let k=0;k<8;k++){
   const s=document.createElement("div");s.className="sparkle";box.appendChild(s);
   setTimeout(()=>s.remove(),1000);
  }
  setTimeout(()=>b.remove(),1600);
 }
}

function showSad(){
 const s=document.getElementById("smiley");s.textContent="😔";s.classList.add("show");
 playWrongSound();setTimeout(()=>s.classList.remove("show"),800);
}

function render(){
 solved=answered[i];
 document.getElementById("qNumber").textContent=`Question ${i+1} of ${quiz.length}`;
 document.getElementById("qText").textContent=quiz[i].q;
 document.getElementById("hintImg").src=quiz[i].img;
 document.getElementById("dropBox").textContent=answered[i]?quiz[i].a:"Select True or False";
 document.getElementById("nextBtn").disabled=!answered[i];
 document.getElementById("prevBtn").disabled=(i===0);
}

render();

const dropBox=document.getElementById("dropBox");

document.querySelectorAll(".card").forEach(c=>{

  c.addEventListener("click",()=>{
    if(solved) return;

    const value = c.dataset.val;
    checkAnswer(value);
  });

});

// NAV
document.getElementById("nextBtn").onclick=()=>{window.speechSynthesis.cancel(); i++;render();}
document.getElementById("prevBtn").onclick=()=>{window.speechSynthesis.cancel(); if(i>0){i--;render();}}

// CHECK ANSWER
function checkAnswer(v){
  if(v===quiz[i].a){
    solved=true;
    answered[i]=true;
    dropBox.textContent=v;

    playSuccessSound();
    confetti();
    showButterflies(dropBox);

    if(i===quiz.length-1){
      setTimeout(finish,1500);
    } else {
      document.getElementById("nextBtn").disabled=false;
    }

  } else {
    showSad();
  }
}

// FINAL
function finish(){
 window.speechSynthesis.cancel();
 playSuccessSound();
 confetti();
 const f=document.createElement("div");
 f.className="final";
 f.innerHTML=`<div class="final-card"><h1>🏆 CHAMPION!</h1><p>You completed the quiz!</p><button class="nav-btn" style="background:var(--blue); width:100%;" onclick="location.reload()">PLAY AGAIN</button></div>`;
 document.body.appendChild(f);
}
</script>
</body>
</html>
