
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fill in the Blanks</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700;900&display=swap"
    rel="stylesheet">

  <style>
    /* 1. PREVENT SCROLLING */
    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: "Livvic";
      background: url(./uploads/bg4.png) no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: -2% !important;
    }

    .app {
      width: 100%;
      max-width: 1100px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 10px;
      box-sizing: border-box;
      gap: 10px;
    }

    /* HEADER STYLE WITH READ BUTTON */
    .header {
       display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  flex-shrink: 0;
    }

    .header h1 {
      font-weight: 500;
      color: #ff7a00;
      font-size: clamp(20px, 4vw, 30px);
      margin: 0;
    }

    .read-btn {
      background: white;
      border: 2px solid #ff7a00;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      visibility: hidden;
    }

    .read-btn:hover {
      transform: scale(1.1);
      background: #ff7a00;
      color: white;
    }

    .q-number {
     font-size: 16px;
      color: #f3f5f5;
      font-weight: 700;
      text-transform: uppercase;
      margin: 0;
    }

    /* 2. INLINE STICKER LOGIC */
    .question-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 100%;
      margin-bottom: 40px;
    }

    .hint-sticker {
   width: clamp(80px, 12vw, 120px);
height: clamp(80px, 12vw, 120px);
      background: white;
      border-radius: 12px;
      padding: 5px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      flex-shrink: 0;
      border: 2px solid #fff;
    }

    .hint-sticker img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .q-text {
      font-size: clamp(1.2rem, 3.5vw, 2.5rem);
      font-weight: 500;
      color: #ffffff;
      line-height: 1.2;
      margin: 0;
    }

    .blank {
      display: inline-block;
      min-width: 80px;
      border-bottom: 3px dashed #ffffff;
      font-weight: 700;
      padding: 0 5px;
    }

    .blank.correct {
      border-color: #033446;
      color: #033446;
    }

    .blank.wrong {
      border-color: #dc3545;
      color: #dc3545;
      animation: shake .4s;
    }

    /* 3. RESPONSIVE OPTIONS */
    .letter-box {
      background: #ffffffcc;
      padding: 12px;
      border-radius: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      max-width: 90%;
    }

    .part {
      padding: 8px 16px;
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 700;
      background: white;
      border-radius: 12px;
      border: 3px solid white;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    /* 4. NAVIGATION BELOW */
    .nav-container {
      display: flex;
      gap: 20px;
      min-height: 50px;
      margin-top: 5px;
    }

    .nav-btn {
      font-size: 18px;
      font-weight: 700;
      padding: 10px 25px;
      border-radius: 40px;
      border: 3px solid white;
      cursor: pointer;
      color: white;
      display: none;
    }

    #nextBtn {
      background: #4cc9f0;
    }

    #prevBtn {
      background: #ff758c;
    }

    /* ANIMATIONS & OVERLAYS */
    .smiley {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(.4);
      font-size: clamp(80px, 15vw, 150px);
      opacity: 0;
      transition: .45s cubic-bezier(.17, .89, .32, 1.49);
      pointer-events: none;
      z-index: 2000;
    }

    .smiley.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1500;
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      animation: splash 1s ease-out forwards;
    }

    @keyframes splash {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 1;
      }

      100% {
        transform: translate(var(--tx), var(--ty)) rotate(var(--rot));
        opacity: 0;
      }
    }

    @keyframes shake {
      25% {
        transform: translateX(-6px);
      }

      75% {
        transform: translateX(6px);
      }
    }

    .final-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 4000;
    }

    .final-card {
      background: white;
      padding: 30px;
      border-radius: 30px;
      text-align: center;
      width: 80%;
      max-width: 400px;
    }

    /* =========================
   SAME UI LIKE LAPTOP (SCALED)
========================= */
@media screen and (min-width: 1225px) and (max-width: 1440px) {

  .app {
    max-width: 1100px;
    gap: 15px;
  }

  .q-text {
    font-size: rem;
  }

  .hint-sticker {
    width: 200px;
    height: 200px;
    
  }

  .part {
    font-size: 27px;
    padding: 20px 24px;
    
  }

  .nav-btn {
    font-size: 18px;
    padding: 12px 25px;
  }

}
@media screen and (min-width: 1441px) and (max-width: 1920px) {

  .app {
    max-width: 1300px;
    gap: 20px;
  }

  .q-text {
    font-size: 2.8rem;
  }

  .hint-sticker {
    width: 90px;
    height: 90px;
  }

  .part {
    font-size: 24px;
    padding: 12px 22px;
  }

  .letter-box {
    gap: 14px;
    padding: 18px;
  }

  .nav-btn {
    font-size: 20px;
    padding: 14px 30px;
  }

}
@media screen and (min-width: 1921px) {

  .app {
    max-width: 1500px;
    gap: 25px;
  }

  .q-text {
    font-size: 3.2rem;
  }

  .hint-sticker {
    width: 110px;
    height: 110px;
  }

  .part {
    font-size: 28px;
    padding: 14px 26px;
  }

  .letter-box {
    gap: 18px;
    padding: 22px;
  }

  .nav-btn {
    font-size: 22px;
    padding: 16px 35px;
  }

}


    /* FINAL CARD */
    .final-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .final-card {
      background: #C2F4FF;
      padding: clamp(20px, 5vw, 50px);
      border-radius: 40px;
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    .final-card h1 {
      margin: 0 0 15px;
      font-size: clamp(24px, 5vw, 36px);
    }

    .final-card button {
      padding: 12px 30px;
      border-radius: 40px;
      border: none;
      background: #4cc9f0;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
    }


  </style>
</head>

<body>
  <div class="app">
    <div class="header">
  <div class="q-number" id="qNumber"></div>
  <button class="read-btn" onclick="readQuestion()">🔊</button>
</div>
    <div id="quiz" style="width: 100%;"></div>
    <div class="nav-container">
      <button id="prevBtn" class="nav-btn">◀ PREV</button>
      <button id="nextBtn" class="nav-btn">NEXT ▶</button>
    </div>
    <div id="smiley" class="smiley"></div>
    <div id="confetti" class="confetti"></div>
  </div>

  <script>
   const quiz = [
  { text: "Carrot is a _____.", answer: "root", parts: ["ot", "ru", "ro", "to"], hint: "../uploads/carrot1.png" },
  { text: "_____ has many seeds.", answer: "watermelon", parts: ["wa", "ter", "mel", "on", "lon"], hint: "../uploads/Watermelon.png" },
  { text: "Wheat is a _____.", answer: "cereal", parts: ["ce", "re", "al", "la", "cer"], hint: "../uploads/cereal.png" },
  { text: "Green grams are _____.", answer: "pulses", parts: ["ses", "pu", "pul", "les"], hint: "../uploads/gg.jpg" },
  { text: "Pepper is a _____.", answer: "spice", parts: ["spi", "ce", "si", "pe"], hint: "../uploads/pepper1.png" }
];

const quizBox = document.getElementById("quiz");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");
const smiley = document.getElementById("smiley");
const confettiBox = document.getElementById("confetti");

let current = 0, built = "", audioCtx = null;
const answered = Array(quiz.length).fill(false);

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

// INDIAN ENGLISH READING LOGIC
function readQuestion() {
  const textToRead = quiz[current].text.replace("_____", "blank");
  const utterance = new SpeechSynthesisUtterance(textToRead);
  const voices = window.speechSynthesis.getVoices();
  const indianVoice = voices.find(v => v.lang === 'en-IN' || v.name.includes('India'));
  if (indianVoice) utterance.voice = indianVoice;
  utterance.rate = 0.9;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utterance);
}
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

function playZzzSound() {
  const c = ensureAudio(), t = c.currentTime, o = c.createOscillator(), g = c.createGain();
  o.type = "square"; o.frequency.value = 180;
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(.12, t + .01); g.gain.exponentialRampToValueAtTime(.0001, t + .35);
  o.connect(g); g.connect(c.destination); o.start(t); o.stop(t + .35);
}

function successSound() {
  const c = ensureAudio(), t = c.currentTime, g = c.createGain();
  g.gain.setValueAtTime(.0001, t); g.gain.linearRampToValueAtTime(.18, t + .02); g.gain.exponentialRampToValueAtTime(.0001, t + .65);
  g.connect(c.destination);
  [660, 880, 1100, 1320].forEach((f, i) => { const o = c.createOscillator(); o.frequency.value = f; o.connect(g); o.start(t + i * .02); o.stop(t + .65); });
}

function confetti() {
  confettiBox.innerHTML = "";
  const colors = ["#f778a1", "#4cc9f0", "#ffaa00", "#2ed573", "#ff4fd8"];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement("div");
    p.className = "confetti-piece";
    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * 150;
    p.style.setProperty('--tx', (Math.cos(angle) * dist) + 'px');
    p.style.setProperty('--ty', (Math.sin(angle) * dist) + 'px');
    p.style.setProperty('--rot', (Math.random() * 360) + 'deg');
    p.style.background = colors[Math.random() * colors.length | 0];
    confettiBox.appendChild(p);
  }
  setTimeout(() => confettiBox.innerHTML = "", 1200);
}

function showSmiley(e) {
  smiley.textContent = e;
  smiley.classList.add("show");
  setTimeout(() => smiley.classList.remove("show"), 1200);
}

function render() {
  built = "";
  nextBtn.style.display = "none";
  prevBtn.style.display = current > 0 ? "block" : "none";
  const q = quiz[current];
document.getElementById("qNumber").textContent =
  `Question ${current + 1} of ${quiz.length}`;
  quizBox.innerHTML = `
    <div style="display:flex; flex-direction:column; align-items:center;">
     
      <div class="question-row">
        <div class="q-text">${q.text.replace("_____", "<span class='blank' id='blank'></span>")}</div>
        <div class="hint-sticker"><img src="${q.hint}" alt="Hint"></div>
      </div>
      <div class="letter-box" id="letterBox">${q.parts.map(p => `<div class="part" data-part="${p}">${p}</div>`).join("")}</div>
    </div>
  `;

  const blank = document.getElementById("blank");
  const letterBox = document.getElementById("letterBox");

  // If question is already answered, disable all parts
  if (answered[current]) {
    blank.textContent = q.answer;
    blank.classList.add("correct");
    document.querySelectorAll(".part").forEach(p => {
      p.classList.add("used", "disabled");
      p.style.pointerEvents = "none";
      p.style.opacity = "0.5";
      p.style.cursor = "not-allowed";
    });
    nextBtn.style.display = "block";
    return;
  }

  // Add click handlers for parts
  document.querySelectorAll(".part").forEach(part => {
    part.onclick = () => {
      // Don't allow clicking if already answered or if part is already used
      if (answered[current]) return;
      if (part.classList.contains("used")) return;
      
      ensureAudio();
      built += part.textContent;
      blank.textContent = built;
      part.classList.add("used");
      part.style.pointerEvents = "none";
      part.style.opacity = "0.6";
      
      if (built.length >= q.answer.length) {
        if (built === q.answer) {
          blank.classList.add("correct");
          answered[current] = true;
          showSmiley("😄");
          confetti();
          successSound();
          
          // Disable all remaining parts
          document.querySelectorAll(".part").forEach(p => {
            if (!p.classList.contains("used")) {
              p.classList.add("disabled");
              p.style.pointerEvents = "none";
              p.style.opacity = "0.5";
            }
          });
          
          if (current === quiz.length - 1) {
            setTimeout(finishQuiz, 1200);
          } else {
            nextBtn.style.display = "block";
          }
        } else {
          blank.classList.add("wrong");
          showSmiley("😭");
          playZzzSound();
          
          // Reset after wrong answer
          setTimeout(() => {
            // Reset built string
            built = "";
            blank.textContent = "";
            blank.classList.remove("wrong");
            
            // Reset all parts (make them clickable again)
            document.querySelectorAll(".part").forEach(p => {
              p.classList.remove("used");
              p.style.pointerEvents = "auto";
              p.style.opacity = "1";
            });
          }, 700);
        }
      }
    };
  });
}

nextBtn.onclick = () => { 
  window.speechSynthesis.cancel(); 
  if (current < quiz.length - 1) {
    current++; 
    render();
  }
};

prevBtn.onclick = () => { 
  window.speechSynthesis.cancel(); 
  if (current > 0) { 
    current--; 
    render(); 
  } 
};

function finishQuiz() {
  confetti();
  successSound();
  const d = document.createElement("div");
  d.className = "final-overlay";
  d.innerHTML = ` <div class="final-card">
          <h1>🏆 QUIZ COMPLETED!</h1>
          <p>Great Job!</p>
          <button onclick="location.reload()">PLAY AGAIN</button>
        </div>`;
  document.body.appendChild(d);
}

// Add read button functionality
const readBtn = document.getElementById("readBtn");
if (readBtn) {
  readBtn.onclick = readQuestion;
}

render();
  </script>
</body>

</html>
