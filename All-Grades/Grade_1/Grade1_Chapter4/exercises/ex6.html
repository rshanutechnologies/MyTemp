<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Plant Parts – Wooden Shatter Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --pink: #ff758c; --blue: #4cc9f0;
  --wood: #8b4513;
}

/* 1. FLEXBOX VIEWPORT LOGIC - PREVENTS SCROLLING */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

body{
  font-family:"Livvic",sans-serif;
  background:url(./uploads/bg4.png) center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
}

.app{
  width:100%;
  max-width:900px;
  height: 100vh;
  padding: 15px;
  display: flex;
  flex-direction: column;
  justify-content: space-evenly; /* Distributes items to fit screen height */
  align-items: center;
  box-sizing: border-box;
}

/* 2. HEADER AREA */
.header-top {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  flex-shrink: 0;
}

.read-btn {
  background: white;
  border: 2px solid var(--blue);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  /* visibility: hidden; */
  display: none;
}

.q-number { font-weight: 700;   color: #f3f5f5;; font-size: 16px; margin: 0; text-transform: uppercase; }

.q-text {
  font-size: clamp(1.2rem, 3.5vw, 2.5rem);
   color: #f3f5f5;
  font-weight: 600;
  margin: 10px 0;
  line-height: 1.2;
}

/* 3. INTERACTIVE CONTENT */
.hint-container { 
  margin: 0; 
  flex-shrink: 1; 
  min-height: 0; 
}

.big-hint-img {
  max-height: 25vh; /* Responsive image sizing */
  width: auto;
  object-fit: contain;
  filter: drop-shadow(0 8px 12px rgba(0,0,0,.1));
}

.options-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap; /* Allows boards to stack on mobile */
  gap: 15px;
  width: 100%;
  padding: 10px 0;
}

.board {
  width: clamp(140px, 25vw, 180px);
  height: clamp(60px, 8vh, 80px);
  background: #a0522d;
  border: 4px solid #5d2e17;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: clamp(16px, 2vw, 22px);
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 8px 0 #5d2e17;
  transition: .1s;
}

.board:hover:not(.correct) { background: #b25e33; transform: translateY(-2px); }

/* Shatter Splinters */
.splinter { position: absolute; background: #8b4513; width: 10px; height: 5px; pointer-events: none; animation: shatter-fly .6s ease-out forwards; z-index: 1000; }
@keyframes shatter-fly { to { transform: translate(var(--dx), var(--dy)) rotate(var(--dr)); opacity: 0; } }

.shake { animation: shake-anim .2s; }
@keyframes shake-anim { 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

.board.correct { background: #8ac926!important; border-color: #558b00!important; box-shadow: 0 8px 0 #558b00!important; pointer-events: none; }

/* 4. FOOTER CONTROLS */
.controls {
  display: flex;
      justify-content: center;
      gap: 20px;
      width: 100%;
      margin-top: 20px;
      min-height: 60px;
}

.nav-btn {
  /* flex: 1; */
  font-size: 18px;
      font-weight: 700;
      padding: 12px 25px;
      border-radius: 50px;
      border: 4px solid white;
      cursor: pointer;
      color: white;
      transition: 0.3s;
}

#prevBtn { background: var(--pink); }
#nextBtn { background: var(--blue); }
.nav-btn:disabled { opacity: .3; cursor: not-allowed; }

#smiley {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(.4);
  font-size: 150px;
  opacity: 0;
  transition: .4s;
  pointer-events: none;
  z-index: 2000;
}
#smiley.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

/* SPLASH CONFETTI CSS */
#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
.confetti-piece {
  position: absolute;
  width: 12px;
  height: 12px;
  left: 50%;
  top: 50%;
  border-radius: 2px;
  animation: splash-anim 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

@keyframes splash-anim {
  0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(1) rotate(var(--tr)); opacity: 0; }
}

.final-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; justify-content: center; align-items: center; z-index: 3000; }
.final-card { background: white; padding: 30px; border-radius: 40px; text-align: center; width: 85%; max-width: 400px; }
@media (max-width:800px) {
        .q-text{
          font-size: 27px !important;
          font-weight: 400;
        }
      }
@media (max-width:480px){

  /* OPTIONS GRID → 2 PER ROW */
  .options-container{
    display:grid;
    grid-template-columns: 1fr ; /* 2 per row */
    gap:10px;
    justify-items:center;
   
  }

  /* SMALL OPTION BOX */
  .board{
    width:100%;
    max-width:130px;
    height:20px;

    font-size:14px;
    padding:6px;

    border-width:3px;
    box-shadow: 0 5px 0 #5d2e17;
  }

  /* QUESTION TEXT SMALL */
  .q-text{
    font-size:18px;
    text-align:center;
  }

  /* IMAGE SMALL */
  .big-hint-img{
    max-height:18vh;

  }

  /* BUTTONS SMALL */
  .nav-btn{
    font-size:14px;
    padding:10px 0;
    height: 50px;
    width: 100px;
    
  }

}

@media screen and (min-width: 1025px) and (max-width: 1440px) {

  .app {
    max-width: 1000px;
    padding: 20px;
  }

  .q-text {
    font-size: 2.2rem;
  }

  .big-hint-img {
    max-height: 260px;
  }

  .board {
    width: 170px;
    height: 75px;
    font-size: 20px;
  }

  .controls {
    max-width: 450px;
  }

  .nav-btn {
    font-size: 18px;
    padding: 14px 0;
    height: 70px;
    width: 150px !important;
  }

}

@media screen and (min-width: 1441px) and (max-width: 1920px) {

  .app {
    max-width: 1200px;
    padding: 25px;
  }

  .q-text {
    font-size: 2.8rem;
  }

  .big-hint-img {
    max-height: 320px;
  }

  .board {
    width: 200px;
    height: 90px;
    font-size: 24px;
  }

  .options-container {
    gap: 20px;
  }

  .controls {
    max-width: 500px;
  }

 
  .nav-btn {
    font-size: 20px;
    padding: 14px 0;
    height: 70px;
    width: 150px !important;
  }
}

@media screen and (min-width: 1921px) {

  .app {
    max-width: 1400px;
    padding: 30px;
  }

  .q-text {
    font-size: 3.2rem;
  }

  .big-hint-img {
    max-height: 380px;
  }

  .board {
    width: 230px;
    height: 100px;
    font-size: 28px;
  }

  .options-container {
    gap: 25px;
  }

  .controls {
    max-width: 550px;
  }

  
  .nav-btn {
     font-size: 22px;
    padding: 18px 0;
    height: 70px;
    width: 150px !important;
  }

}

    /* FINAL CARD */
    .final-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .final-card {
      background: #C2F4FF;
      padding: clamp(20px, 5vw, 50px);
      border-radius: 40px;
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    .final-card h1 {
      margin: 0 0 15px;
      font-size: clamp(24px, 5vw, 36px);
    }

    .final-card button {
      padding: 12px 30px;
      border-radius: 40px;
      border: none;
      background: #4cc9f0;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
    }



</style>
</head>

<body>

<div class="app">
  <div class="header-top">
    <div class="q-number" id="qNum"></div>
    <button class="read-btn" onclick="readQuestion()">🔊</button>
  </div>
  
  <div class="q-text" id="qText"></div>

  <div class="hint-container">
    <img id="hintImg" class="big-hint-img">
  </div>

  <div id="optionsRow" class="options-container"></div>

  <div class="controls">
    <button id="prevBtn" class="nav-btn">◀ PREV</button>
    <button id="nextBtn" class="nav-btn" disabled>NEXT ▶</button>
  </div>
</div>

<div id="smiley"></div>
<div id="confetti"></div>

<script>
const quiz=[
 {q:"A cereal that we eat:",a:"Wheat",opts:["Wheat","Carrot","Rose"],img:"../uploads/Cerealak.png"},
 {q:"A root that we eat:",a:"Beetroot",opts:["Cabbage","Beetroot","Apple"],img:"../uploads/RootUnder.png"},
 {q:"A leaf that we eat:",a:"Spinach",opts:["Spinach","Mango","Cauliflower"],img:"../uploads/leafakk.png"},
 {q:"A seed that we eat:",a:"Coriander",opts:["Broccoli","Coriander","Banana"],img:"../uploads/corianderimg.png"},
 {q:"A flower that we eat:",a:"Broccoli",opts:["Onion","Potato","Broccoli"],img:"../uploads/Flowerrrak.png"}
];

let i=0,solved=false,audioCtx=null;
const answered=Array(quiz.length).fill(false);

const qNum=document.getElementById("qNum"),
qText=document.getElementById("qText"),
hintImg=document.getElementById("hintImg"),
optionsRow=document.getElementById("optionsRow"),
nextBtn=document.getElementById("nextBtn"),
prevBtn=document.getElementById("prevBtn"),
smiley=document.getElementById("smiley"),
confettiEl=document.getElementById("confetti");

function getAudio(){
 if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
 if(audioCtx.state==="suspended")audioCtx.resume();
}

function readQuestion() {
  const utterance = new SpeechSynthesisUtterance(quiz[i].q);
  const voices = window.speechSynthesis.getVoices();
  const indianVoice = voices.find(v => v.lang === 'en-IN' || v.name.includes('India'));
  if (indianVoice) utterance.voice = indianVoice;
  utterance.rate = 0.9;
  window.speechSynthesis.cancel(); 
  window.speechSynthesis.speak(utterance);
}

function playWin(){
 getAudio();
 const t=audioCtx.currentTime,g=audioCtx.createGain();
 g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.8);
 g.connect(audioCtx.destination);
 [523,659,783,1046].forEach((f,x)=>{const o=audioCtx.createOscillator();o.frequency.value=f;o.connect(g);o.start(t+x*.08);o.stop(t+.8);});
}

function playZzz(){
 getAudio();
 const t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
 o.type="sawtooth";o.frequency.setValueAtTime(110,t);o.frequency.linearRampToValueAtTime(40,t+.5);
 g.gain.setValueAtTime(.12,t);g.gain.linearRampToValueAtTime(.001,t+.5);
 o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(t+.5);
}

function shatterEffect(el){
 const r=el.getBoundingClientRect();
 for(let k=0;k<12;k++){
  const s=document.createElement("div");s.className="splinter";
  s.style.left=r.left+r.width/2+"px";s.style.top=r.top+r.height/2+"px";
  s.style.setProperty("--dx",(Math.random()-.5)*400+"px");
  s.style.setProperty("--dy",(Math.random()-.5)*400+"px");
  s.style.setProperty("--dr",Math.random()*720+"deg");
  document.body.appendChild(s);setTimeout(()=>s.remove(),600);
 }
 el.style.visibility="hidden";
}

function handleChoice(el,c){
 if(solved||answered[i])return;

 if(c===quiz[i].a){
  solved=true;answered[i]=true;
  el.classList.add("correct");
  fx("win");
  if(i===quiz.length-1)setTimeout(finish,1800);
  else nextBtn.disabled=false;
 }else{
  el.classList.add("shake");
  fx("sad");
  setTimeout(()=>{shatterEffect(el);el.classList.remove("shake")},200);
 }
}

function fx(t){
 if(t==="win"){smiley.textContent="😊";smiley.classList.add("show");playWin();confetti();setTimeout(()=>smiley.classList.remove("show"),1500);}
 else{smiley.textContent="😢";smiley.classList.add("show");playZzz();setTimeout(()=>smiley.classList.remove("show"),800);}
}

/* NEW SPLASH CONFETTI LOGIC */
function confetti(){
 confettiEl.innerHTML="";
 const colors=["#ff595e","#ffca3a","#8ac926","#1982c4","#ff758c"];
 for(let j=0;j<100;j++){
  const p=document.createElement("div");
  p.className="confetti-piece";
  p.style.background=colors[Math.random()*colors.length|0];
  
  // Calculate splash trajectory
  const angle = Math.random() * Math.PI * 2;
  const distance = 100 + Math.random() * 400;
  const tx = Math.cos(angle) * distance;
  const ty = Math.sin(angle) * distance;
  
  p.style.setProperty("--tx", tx + "px");
  p.style.setProperty("--ty", ty + "px");
  p.style.setProperty("--tr", (Math.random() * 720) + "deg");
  
  confettiEl.appendChild(p);
  setTimeout(()=>p.remove(),1500);
 }
}

function render(){
 solved=answered[i];
 qNum.textContent=`Question ${i+1} of ${quiz.length}`;
 qText.textContent=quiz[i].q;
 hintImg.src=quiz[i].img;
 nextBtn.disabled=!answered[i];
 prevBtn.disabled=i===0;
 optionsRow.innerHTML="";
 quiz[i].opts.forEach(o=>{
  const b=document.createElement("div");b.className="board";b.textContent=o;
  if(answered[i]&&o===quiz[i].a)b.classList.add("correct");
  b.onclick=()=>handleChoice(b,o);
  optionsRow.appendChild(b);
 });
}

nextBtn.onclick=()=>{window.speechSynthesis.cancel(); i++;render();}
prevBtn.onclick=()=>{window.speechSynthesis.cancel(); if(i>0){i--;render();}}

function finish(){
 window.speechSynthesis.cancel();
 playWin();
 confetti();
 const d=document.createElement("div");
 d.className="final-overlay";
 d.innerHTML=` <div class="final-card">
          <h1>🏆 QUIZ COMPLETED!</h1>
          <p>Great Job!</p>
          <button onclick="location.reload()">PLAY AGAIN</button>
        </div>`;
 document.body.appendChild(d);
}

window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
render();
</script>
</body>
</html>
