<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IV Chapter Quiz</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📘</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Reset and Core Layout */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
  margin: 0;
  padding: 0;
  font-family: 'Livvic', sans-serif;
  display: flex;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url(./uploads/bg4.png) center/cover no-repeat;
  filter: blur(10px) brightness(1.8);
  z-index: -2;
}

body::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255, 250, 250, 0.4); /* pastel overlay */
  z-index: -1;
}

    /* Sidebar - Vertical on Desktop */
    .sidebar {
      width: clamp(250px, 25vw, 320px);
      height: 100%;
      padding: 15px;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.1); /* pastel overlay */
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .l-name {
      text-align: center;
      margin: 10px 0 20px 0;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      color: #f5f7fa;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* Menu Container - Flexbox Logic */
    .menu-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1; /* Takes remaining space */
      justify-content: center; /* Centers buttons vertically */
    }

    .menu-btn {
      display: flex;
      align-items: center;
      padding: clamp(10px, 1.5vh, 18px) 15px;
      border: none;
      border-radius: 15px;
      font-family: 'Livvic';
      font-size: clamp(0.9rem, 1.2vw, 1.1rem);
      font-weight: 600;
      color: #1F3C5B;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      width: 100%;
      height: auto;
    }

    .sticker-icon {
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      margin-right: 12px;
      flex-shrink: 0;
    }

    /* Button Variations */
    .btn-1 { background: #e4c7e2; border: 2px solid #FFB37A; }
    .btn-2 { background: #CFE8B3; border: 2px solid #b8da91; }
    .btn-3 { background: #FFD84D; border: 2px solid #f0cc41; }
    .btn-4 { background: #86BCD5; border: 2px solid #75abbf; }
    .btn-5 { background: #FFE6A7; border: 2px solid #f2da9d; }
    .btn-6 { background: #B8B5FF; border: 2px solid #a39ffc; }

    .menu-btn:hover { transform: scale(1.03); }
    .menu-btn.active { 
      transform: scale(0.98);
      outline: 4px solid #f778a1;
      filter: brightness(1.1);
    }

    /* Content Area */
    .content {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .iframe-wrapper {
      width: 100%;
      height: 100%;
      padding: 10px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
      background: transparent;
    }

    /* Mobile Responsive - Horizontal Layout */
    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        padding: 8px;
        flex-direction: column;
        border-bottom: 2px solid rgba(255,255,255,0.1);
      }

      .l-name {
        margin: 5px 0;
        font-size: 1.1rem;
      }

      .menu-container {
        flex-direction: row;
        flex-wrap: wrap; /* Allows buttons to fit on smaller mobiles without scrolling */
        gap: 6px;
        justify-content: center;
      }

      .menu-btn {
        flex: 1 1 calc(33.33% - 10px); /* 3 buttons per row on tablet */
        padding: 8px 10px;
        font-size: 0.8rem;
        border-radius: 10px;
        justify-content: center;
      }

      .sticker-icon {
        font-size: 1.1rem;
        margin-right: 5px;
      }
    }

    @media (max-width: 500px) {
      .menu-btn {
        flex: 1 1 calc(50% - 10px); /* 2 buttons per row on phone */
        font-size: 0.75rem;
      }
      .l-name { display: none; } /* Hide title on very small screens to save space */
    }

   /* =========================
   DESKTOP / MONITOR (1025px – 1440px)
========================= */
@media screen and (min-width: 1025px) and (max-width: 1440px) {

  .sidebar {
    width: 280px;
    padding: 18px;
  }

  .l-name {
    font-size: 1.6rem;
  }

  .menu-container {
    gap: 8px;
  }

  .menu-btn {
    font-size: 1rem;
    padding: 14px 16px;
  }

  .sticker-icon {
    font-size: 1.5rem;
  }

  .iframe-wrapper {
    padding: 15px;
  }

}


/* =========================
   LARGE MONITOR (1441px – 1920px)
========================= */
@media screen and (min-width: 1441px) and (max-width: 1920px) {

  .sidebar {
    width: 380px;
    padding: 30px;
  }

  .l-name {
    font-size: 1.9rem;
  }

  .menu-container {
    gap: 20px;
  }

  .menu-btn {
    font-size: 1.4rem;
    padding: 18px 20px;
  }

  .sticker-icon {
    font-size: 1.7rem;
  }

  .iframe-wrapper {
    padding: 20px;
  }

}


/* =========================
   EXTRA LARGE / 4K (1921px+)
========================= */
@media screen and (min-width: 1921px) {

  .sidebar {
    width: 360px;
    padding: 30px;
  }

  .l-name {
    font-size: 2.2rem;
  }

  .menu-container {
    gap: 18px;
  }

  .menu-btn {
    font-size: 1.2rem;
    padding: 18px 20px;
  }

  .sticker-icon {
    font-size: 2rem;
  }

  .iframe-wrapper {
    padding: 25px;
  }

}
  </style>
</head>

<body>

  <div class="sidebar">
    <h2 class="l-name">Chapter 4 Quiz</h2>

    <div class="menu-container">
      <button class="menu-btn btn-1" data-file="exercises/ex1.html">
        <span class="sticker-icon">✅</span> Pick Correct
      </button>

      <button class="menu-btn btn-2" data-file="exercises/ex2.html">
        <span class="sticker-icon">📝</span> Fill Blanks
      </button>

      <button class="menu-btn btn-3" data-file="exercises/ex3.html">
        <span class="sticker-icon">🔍</span> True/False
      </button>

      <button class="menu-btn btn-4" data-file="exercises/ex4.html">
        <span class="sticker-icon">💡</span> Matching
      </button>

      <button class="menu-btn btn-5" data-file="exercises/ex5.html">
        <span class="sticker-icon">🔗</span> One Word
      </button>

      <button class="menu-btn btn-6" data-file="exercises/ex6.html">
        <span class="sticker-icon">🌟</span> One Example
      </button>
    </div>
  </div>

  <div class="content">
    <div class="iframe-wrapper">
      <iframe id="quizFrame" src=""></iframe>
    </div>
  </div>

  <script>
    const iframe = document.getElementById('quizFrame');
    const buttons = document.querySelectorAll('.menu-btn');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const file = btn.getAttribute('data-file');
        openQuiz(file, btn);
      });
    });

    function openQuiz(file, btn) {
      iframe.src = file;
      buttons.forEach(b => b.classList.remove('active'));
      if (btn) {
        btn.classList.add('active');
      } else {
        const match = Array.from(buttons).find(b => b.getAttribute('data-file') === file);
        if (match) match.classList.add('active');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const defaultFile = 'exercises/ex1.html';
      openQuiz(defaultFile);
    });
  </script>

</body>
</html>
