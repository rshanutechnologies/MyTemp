<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Body Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:"Livvic", sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  background: radial-gradient(circle at top left, #ffe8c7, #f0f7ff);
  overflow-y: hidden;
  
}

/* ================= LAYOUT ================= */
.wrapper{
  display:flex;
  width:100%;
  min-height:100vh;
}

/* ================= LEFT PANEL ================= */
.nav-area{
  width:360px;
  padding:40px 25px;
  display:flex;
  flex-direction:column;
}

.nav-btn{
  width:80%;
  height:90px;
  display:flex;
  align-items:center;
  gap:18px;
  padding:0 22px;
  margin-bottom:18px;
  border-radius:20px;
  font-size:18px;
  font-weight:600;
  color:#2f4f4f;
  cursor:pointer;
  background:#f1f7ff;
  box-shadow:0 6px 15px rgba(0,0,0,.1);
  transition:.3s ease;
}

.nav-btn:hover{
  transform:translateY(-3px);
  /* box-shadow:0 12px 24px rgba(0,0,0,.25); */
}

.nav-btn.active{
  color:#fff;
  outline:3px solid rgba(171, 147, 255, 0.15);
}

.choose.active{ background:#ff4d6d; }
.fill.active{ background:#219ebc; }
.truefalse.active{ background:#06d6a0; }
.match.active{ background:#ffb703; }
.oneword.active{ background:#f72585; }
.label.active{ background:#7209b7; }

/* ================= QUIZ FRAME ================= */
.quiz-frame{
  flex:1;
  display:flex;
  position:relative;
}

iframe{
  flex:1;
  border:none;
}

/* ================= MOBILE TOGGLE ================= */
.mobile-toggle{
  display:none;
}

/* ================= MOBILE RESPONSIVE ================= */
@media(max-width:1108px){

  body{
    flex-direction:column;
     background: radial-gradient(circle at top left, #ffe8c7, #f0f7ff);
  }

  .nav-area{
    width:100%;
    padding:25px 20px;
  }

 .quiz-frame{
  display:flex;   /* SHOW MCQ FIRST */
  position:fixed;
  inset:0;
  /* background:#fff; */
  z-index:1;
}
  .quiz-frame.active{
    display:flex;
  }
  .nav-area{
  display:none;   /* HIDE MENU FIRST */
}
.nav-area.active{
  display:flex;
  position:fixed;
  inset:0;
  /* background:#fff; */
  z-index:2000;
  flex-direction:column;
  padding:25px 20px;
}

  .mobile-toggle{
    display:flex;
    position:fixed;
    top:15px;
    right:15px;
    background:#00cfff;
    color:#fff;
    font-size:22px;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
    z-index:1001;
    box-shadow:0 6px 18px rgba(0,0,0,.25);
    transition:.2s ease;
  }

  .mobile-toggle:active{
    transform:scale(0.9);
  }

}
/* ========================================= */
/* 💻 DESKTOP – LEFT NAV 20% SMALLER */
/* ========================================= */

@media (min-width: 1108px){

  .nav-area{
    width:288px;   /* 🔥 360px -20% */
    
   
  }
  .nav-btn{
  /* width:80%; */
  height:50px;
  display:flex;
  align-items:center;
  gap:18px;
  padding:0 22px;
  margin-bottom:18px;
  border-radius:20px;
  font-size:18px;
  font-weight:600;
  color:#2f4f4f;
  cursor:pointer;
  background:#f1f7ff;
  box-shadow:0 6px 15px rgba(0,0,0,.1);
  transition:.3s ease;
}

}


@media (min-width:1280px) and (max-width:1679px){

  .nav-area{
    width:300px;       /* smaller */
    padding:40px 20px;
    gap:6px !important;
  }

  .nav-btn{
    width:100%;
    height:65px;       /* smaller height */

    display:flex;
    align-items:center;
    gap:14px;

    padding:0 20px;
    margin-bottom:12px;

    border-radius:18px;

    font-size:18px;    /* smaller text */
    font-weight:500;

    background:#ffffff;
    box-shadow:0 6px 18px rgba(0,0,0,0.10);

    transition:0.3s ease;
  }

  .nav-btn i{
    font-size:20px;    /* smaller icon */
  }

  .nav-btn:hover{
    transform:translateY(-2px);
  }

  .nav-btn.active{
    color:#fff;
    transform:scale(1.02);
  }

  .choose.active{ background:#ff4d6d; }
  .fill.active{ background:#219ebc; }
  .truefalse.active{ background:#06d6a0; }
  .match.active{ background:#ffb703; }
  .oneword.active{ background:#f72585; }
  .label.active{ background:#7209b7; }

}
/* ========================================= */
/* 💻 1280px NAV – BIG BOX STYLE (PREMIUM) */
/* ========================================= */

@media (min-width:1680px){

  /* ===== NAV AREA ===== */
  .nav-area{
    width:360px;
    padding:60px 30px;
    gap:10px !important;                 /* 🔥 SPACE BETWEEN BUTTONS */
  }

  /* ===== NAV BUTTON ===== */
  .nav-btn{
    width:100%;               /* 🔥 FULL BOX */
    height:90px;              /* 🔥 BIGGER THAN BEFORE */
    
    display:flex;
    align-items:center;
    gap:20px;

    padding:0 28px;
    margin-bottom:20px;

    border-radius:24px;

    font-size:24px;
    font-weight:500;

    background:#ffffff;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);

    transition: all 0.3s ease;
  }

  /* ICON BIG */
  .nav-btn i{
    font-size:26px;
  }

  /* HOVER EFFECT */
  .nav-btn:hover{
    transform:translateY(-4px) scale(1.02);
    box-shadow:0 16px 35px rgba(0,0,0,0.18);
  }

  /* ACTIVE STATE (VERY IMPORTANT LOOK) */
  .nav-btn.active{
    color:#fff;
    transform:scale(1.03);
    box-shadow:0 12px 30px rgba(0,0,0,0.2);
  }

  /* KEEP YOUR COLORS BUT STRONGER */
  .choose.active{ background:#ff4d6d; }
  .fill.active{ background:#219ebc; }
  .truefalse.active{ background:#06d6a0; }
  .match.active{ background:#ffb703; }
  .oneword.active{ background:#f72585; }
  .label.active{ background:#7209b7; }

}

@media (min-width: 850px) and (max-width: 1100px){

  
  /* NAV AREA */
  .nav-area{
    width:260px;
    padding:30px 20px;
    /* background-color: yellow !important; */
  }

  /* BUTTONS */
  .nav-btn{
    width:100%;
    height:60px;
    font-size:16px;
    padding:0 18px;
    border-radius:16px;
    gap:12px;
    margin-bottom:14px;
  }

  .nav-btn i{
    font-size:18px;
  }

  /* MAIN AREA */
  .quiz-frame{
    padding:20px;
  }

}
</style>
</head>

<body>

<div class="wrapper">

  <div class="nav-area">

    <div class="nav-btn choose active" onclick="loadQuiz('exercises/mcq.html', this)">
      <i class="fa-solid fa-list-check"></i> Choose Options
    </div>

    <div class="nav-btn fill" onclick="loadQuiz('exercises/FTB.html', this)">
      <i class="fa-solid fa-pen-to-square"></i> Fill in Blanks
    </div>

    <div class="nav-btn truefalse" onclick="loadQuiz('exercises/true_false.html', this)">
      <i class="fa-solid fa-check-circle"></i> True / False
    </div>

    <div class="nav-btn match" onclick="loadQuiz('exercises/matching.html', this)">
      <i class="fa-solid fa-link"></i> Matching
    </div>

    <div class="nav-btn oneword" onclick="loadQuiz('exercises/two_example.html', this)">
      <i class="fa-solid fa-lightbulb"></i> One Word
    </div>

    <div class="nav-btn label" onclick="loadQuiz('exercises/label.html', this)">
      <i class="fa-solid fa-tags"></i> Label Type
    </div>

  </div>

  <div class="quiz-frame" id="quizFrameWrapper">

    <!-- MOBILE BACK TOGGLE -->
  <div class="mobile-toggle" id="toggleBtn">
  <i class="fa-solid fa-bars"></i>
</div>

   <iframe id="quizFrame" src="exercises/mcq.html"></iframe>

  </div>

</div>

<script>
  const quizWrapper = document.getElementById("quizFrameWrapper");
const toggleBtn = document.getElementById("toggleBtn");
const nav = document.querySelector(".nav-area");

function loadQuiz(page, element){

  document.getElementById("quizFrame").src = page;

  document.querySelectorAll(".nav-btn")
    .forEach(btn=>btn.classList.remove("active"));

  element.classList.add("active");

  if(window.innerWidth <= 1108){
    nav.classList.remove("active");
    quizWrapper.style.display = "flex";
  }
}

/* TOGGLE MENU */
toggleBtn.addEventListener("click", ()=>{

  if(nav.classList.contains("active")){
    nav.classList.remove("active");
    quizWrapper.style.display = "flex";
  } else {
    nav.classList.add("active");
    quizWrapper.style.display = "none";
  }

});
</script>

</body>
</html>
