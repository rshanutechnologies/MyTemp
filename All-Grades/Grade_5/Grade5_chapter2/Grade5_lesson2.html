<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Adventure Zone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Livvic";
}

body{
  min-height:100vh;
  margin:0;
  display:flex;

  background-image: url("./assets/images/L2bgg.png");
  background-size: cover;        /* ✅ Makes image full screen */
  background-position: center;   /* ✅ Center the image */
  background-repeat: no-repeat;  /* ✅ Prevent repeat */
  /* background-attachment: fixed;  */

  overflow:hidden;
}

/* ===== SIDE NAV ===== */
.side-nav{
width:280px;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding-top:25px;
gap:18px;
position:fixed;
left:0;
top:0;
}

/* ===== TITLE ===== */
.nav-title{
font-size:26px;
font-weight:700;
color:#0284c7;
margin-bottom:10px;
}

/* ===== IMAGE ===== */
.side-image{
width:120px;
margin-bottom:20px;
}

/* ===== SIMPLE NAV BUTTON ===== */
.nav-btn{
width:220px;
padding:14px 18px;
border-radius:10px;
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
text-align:center;
transition:0.2s ease;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

/* DIFFERENT COLORS */
.nav-btn:nth-child(3){
background:#ff6b6b;
}

.nav-btn:nth-child(4){
background:#4dabf7;
}

.nav-btn:nth-child(5){
background:#51cf66;
}

.nav-btn:nth-child(6){
background:#f59f00;
}

/* HOVER */
.nav-btn:hover{
transform:scale(1.05);
}

/* ACTIVE */
.nav-btn.active{
outline:3px solid white;
}

/* ===== CONTENT ===== */
.content{
margin-left:280px;
flex:1;
height:100vh;
}

iframe{
width:100%;
height:100%;
border:none;
pointer-events:auto;
position:relative;
z-index:999;
}

.mobile-toggle{
display:none;
position:fixed;
top:15px;
right:15px;
background:#00cfff;
color:#fff;
font-size:22px;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
z-index:999999;   /* HIGH */
}


/* ===== MOBILE ===== */
@media(max-width:1108px){

body{
flex-direction:column;

}

.content{
display:block;   /* ✅ SHOW MCQ FIRST */
position:fixed;
inset:0;
z-index:1;
margin-left:0;
}


.content.active{
display:block;
}


.side-nav{
display:none;   /* hide first */
}

.side-nav.active{
display:flex;
position:fixed;
inset:0;
/* background:#fff; */
z-index:2000;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:30px;
}

.mobile-toggle{
display:block !important;
}



.nav-btn{
width:90%;
}

}

/* MOBILE TOGGLE */

.mobile-toggle.show{
display:block ;
}

@media (min-width: 1380px){

  /* ✅ SIDE NAV BIGGER */
  .side-nav{
    width: 380px;
    padding-top: 40px;
    gap: 8px;
  }

  /* ✅ TITLE BIGGER */
  .nav-title{
    font-size: 32px;
  }

  /* ✅ IMAGE BIGGER */
  .side-image{
    width: 180px;
    margin-bottom: 25px;
    height: 150px !important;
  }

  /* ✅ NAV BUTTON BIGGER */
  .nav-btn{
    width: 280px;
    height: 90px;
    padding: 18px 24px;
    font-size: 20px;
    border-radius: 14px;
    display: flex;
    justify-content: center !important;
    align-items: center !important;
  }

}

</style>
</head>

<body>

<div class="mobile-toggle" id="toggleBtn" onclick="goBack()">☰</div>

<div class="side-nav">

<div class="nav-title">Animal Quiz</div>

<img src="./assets/images/FrindelyAnimal.png" class="side-image" alt="Animal Image">

<div class="nav-btn active" onclick="loadPage(this,'./exercises/mcq.html')">
📝 Choose Option
</div>

<div class="nav-btn" onclick="loadPage(this,'./exercises/FTB.html')">
✍ Fill & Blanks
</div>

<div class="nav-btn" onclick="loadPage(this,'./exercises/true_false.html')">
✔ True / False
</div>

<div class="nav-btn" onclick="loadPage(this,'./exercises/matching.html')">
🔗 Matching
</div>

</div>

<div class="content">
<iframe id="contentFrame" src="./exercises/mcq.html"></iframe>
</div>

<script>

function loadPage(btn,page){

document.getElementById("contentFrame").src = page;

document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
btn.classList.add("active");

if(window.innerWidth <= 1108){
document.querySelector(".side-nav").classList.remove("active");
document.querySelector(".content").style.display = "block";
}
}

function goBack(){
const nav = document.querySelector(".side-nav");
const content = document.querySelector(".content");

if(nav.classList.contains("active")){
  nav.classList.remove("active");
  content.style.display = "block";
} else {
  nav.classList.add("active");
  content.style.display = "none";
}
}

</script>

</body>
</html>
