<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fill in the Blanks</title>

    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="../assets/CSS/FTB.css">
</head>

<body>

    <div class="app">

        <div class="home" onclick="location.href='../index.html'">🏠 Home</div>

        <!-- HEADER -->
        <div class="header">
            <div class="title">Fill in the Blanks</div>
            <div class="progress">
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <div class="question" id="question"></div>

            <div class="image-panel">
                <img id="image">
            </div>

            <div class="qa">

                <div class="answer-area">
                    <input id="answer" placeholder="Type  answer here...">
                    <button id="checkBtn" disabled>Check </button>
                </div>
            </div>

        </div>

        <!-- NAV -->
         <div class="nav-wrapper">
        <button class="nav-btn prev" id="prevBtn" disabled>← Prev</button>
        <button class="nav-btn next" id="nextBtn" disabled>Next →</button>
          </div>
    </div>

    <!-- CORRECT / WRONG POPUP -->
    <div id="answerPopup" class="popup">
        <div class="popup-content">
            <div class="popup-icon" id="popupIcon"></div>
            <h3 id="popupTitle"></h3>
            <p id="popupMsg"></p>
        </div>
    </div>

    <!-- FINAL POPUP -->
    <div id="finalPopup""> <div class=" finalpopup-box">
        <h2 class="final-heading">🎉 Congratulations!</h2>
        <p id="finalScore"></p>
        <div id="stars"></div><br> <button onclick="location.reload()" class="playAgain-btn"> Play Again </button>
    </div>
    </div>
  
    <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
    <script src="../assets/JavaScript/FTB.js"></script>

</body>

</html>
