<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 2: Animals</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon"
href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Livvic',sans-serif;
}

body{
display:flex;
height:100vh;
overflow:hidden;
/* background:#b4f0d6; */

  
/* background:url("./assets/images/BGM.png") center/cover no-repeat; */
  background: url("./assets/images/BGM.png") no-repeat center center;
  background-size: cover;
}

/* ================= TOGGLE BUTTON ================= */

.menu-toggle{
display:none;
position:fixed;
top:12px;
right:12px;
z-index:1001;
background:#1F3C5B;
color:white;
border:none;
font-size:22px;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

/* ================= SIDEBAR ================= */

.sidebar{
width:300px;
/* background:#b4f0d6; */
background: transparent;
display:flex;
justify-content: center;
align-items: center;
flex-direction:column;
padding:25px 20px;
transition:0.35s ease;
z-index:1000;
}

.brand{
text-align:center;
margin-bottom:30px;
font-size:clamp(18pt,4vw,30pt);
color:#1F3C5B;
font-weight:600;
}

.sidebar ul{
list-style:none;
display:flex;
flex-direction:column;
gap:18px;
}

/* ================= ✏️ PENCIL BUTTON ================= */
/* ================= CLEAN NAV BUTTON ================= */
/* ================= UNIQUE SOFT SHAPE NAV ================= */
.sidebar ul li a{
display:flex;
align-items:center;
gap:14px;
padding:16px 22px;
text-decoration:none;
color:#445566;
font-size:clamp(12pt,2vw,17pt);
font-weight:500;

/* 🛸 more stretched UFO shape */
border-radius:70% 30% 60% 40% / 40% 60% 40% 60%;

/* ✨ strong tilt */
transform:rotate(-4deg);

/* soft pastel */
background:#f5f8ff;

/* floating shadow */
box-shadow:
0 12px 22px rgba(0,0,0,0.08),
inset 0 1px 0 rgba(255,255,255,0.7);

transition:all .3s ease;
}

/* hover = straighten + lift */
.sidebar ul li a:hover{
transform:rotate(0deg) translateX(8px) scale(1.05);
box-shadow:0 16px 28px rgba(0,0,0,0.12);
}

/* active = slight press */

/* 🌸 DIFFERENT SOFT COLORS (default state) */
.sidebar ul li:nth-child(1) a{background:#FFE4E1;} /* soft pink */
.sidebar ul li:nth-child(2) a{background:#FFE4E1;} /* soft green */
.sidebar ul li:nth-child(3) a{background:#FFE4E1;} /* soft yellow */
.sidebar ul li:nth-child(4) a{background:#FFE4E1;} /* soft blue */

/* 🌿 HOVER (gentle lift + straighten) */
.sidebar ul li a:hover{
transform:rotate(0deg) translateX(6px) scale(1.03);
box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

/* ✨ ACTIVE (slightly stronger pastel, not dark) */
.sidebar ul li:nth-child(1) a.active{background:#f8caca;}  /* dusty pink */
.sidebar ul li:nth-child(2) a.active{background:#cde8f6;}  /* soft blue */
.sidebar ul li:nth-child(3) a.active{background:#f6e3a3;}  /* muted yellow */
.sidebar ul li:nth-child(4) a.active{background:#cdebdc;}  /* soft green */

/* active feel */
.sidebar ul li a.active{
/* transform:rotate(0deg) scale(1.02); */
box-shadow:0 8px 18px rgba(0,0,0,0.1);
outline: 3px solid white;
}


/* ================= CONTENT ================= */

.content{
flex:1;
height:100%;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* ================= TABLET ================= */

@media (max-width:1024px){

.sidebar{
width:240px;
}

.sidebar ul li a{
font-size:14pt;
}

}

/* ================= MOBILE ================= */

@media (max-width:1100px){

.menu-toggle{
display:block;
}

/* sidebar hidden */
.sidebar{
position:fixed;
left:-260px;
top:0;
height:100%;
width:260px;
box-shadow:4px 0 20px rgba(0,0,0,.2);
/* background:#b4f0d6; */
  background: url("./assets/images/BGM.png") no-repeat center center;
  background-size: cover;

}

/* open state */
.sidebar.open{
left:0;
}

body{
flex-direction:column;
}

.brand{
margin-top:40px;
}

/* remove pencil tip on mobile */
.sidebar ul li a::before,
.sidebar ul li a::after{
display:none;
}

}

/* ===================================== */
/* ===== 1280px PURE SIZE UPGRADE ===== */
/* ===================================== */

@media (min-width: 1380px) {

  /* SIDEBAR */
  .sidebar {
    width: 360px;
    padding: 40px 30px;
   
  }

  /* BRAND TITLE */
  .brand {
    font-size: 36px;
    margin-bottom: 40px;
  }

  /* NAV LINKS */
  .sidebar ul {
    gap: 26px;
  }

  .sidebar ul li a {
    padding: 22px 28px;
    font-size: 28px;
    gap: 18px;
    border-radius: 70% 30% 60% 40% / 40% 60% 40% 60%;
     height: 90px !important;              /* fixed height */
  padding: 0 22px;           /* remove vertical padding */
  display: flex;
  align-items: center;
  }
  

  /* ICON (EMOJI) */
  .sidebar ul li a .sticker {
    font-size: 28px;
  }

  /* HOVER (keep same feel, just slightly stronger) */
  .sidebar ul li a:hover {
    transform: rotate(0deg) translateX(10px) scale(1.05);
  }

 

  /* MENU BUTTON */
  .menu-toggle {
    font-size: 28px;
    padding: 10px 16px;
   
  }

}
</style>
</head>

<body>

<button class="menu-toggle">☰</button>

<nav class="sidebar">
<div class="brand">Body Quiz</div>

<ul>
<li><a href="exercises/mcq.html" target="quiz-frame"><span class="sticker">🐶</span>Correct Option</a></li>
<li><a href="exercises/fillblanks.html" target="quiz-frame"><span class="sticker">🦜</span>Fill The Blanks</a></li>
<li><a href="exercises/matching.html" target="quiz-frame"><span class="sticker">🐹</span>Matching</a></li>
<li><a href="exercises/true_false.html" target="quiz-frame"><span class="sticker">🐱</span>True or False</a></li>
</ul>
</nav>

<main class="content">
<iframe name="quiz-frame" src="exercises/mcq.html"></iframe>
</main>

<script>

const toggleBtn=document.querySelector('.menu-toggle');
const sidebar=document.querySelector('.sidebar');

toggleBtn.addEventListener('click',()=>{
sidebar.classList.toggle('open');
});

/* active button logic */
const links=document.querySelectorAll('.sidebar a');

links[0].classList.add('active');

links.forEach(link=>{
link.addEventListener('click',e=>{
links.forEach(l=>l.classList.remove('active'));
e.currentTarget.classList.add('active');

/* auto close on mobile */
if(window.innerWidth<=1100){
sidebar.classList.remove('open');
}
});
});

</script>

</body>
</html>
