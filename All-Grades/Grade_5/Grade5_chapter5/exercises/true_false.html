<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>True / False Quiz</title>

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/CSS/true_false.css">
 
</head>

<body>

<div class="quiz-card">
 <button class="home" onclick="location.href='../index.html'">🏠 Home</button>
  <div class="header">
            <span> True / False  </span>
            <div class="progress" id="progress"></div>
        </div>

  <div class="question" id="question"></div>
<div class="q-drag-layout">

  <!-- LEFT: QUESTION IMAGE -->
  <img id="questionImg" class="question-img" />

  <!-- RIGHT: DROP ZONE -->
  <div class="drop-box" id="dropBox">
    Drop Answer Here
  </div>

</div>



  <div class="tf-buttons">
    <button class="true" id="trueBtn"> 👍 TRUE</button>
    <button class="false" id="falseBtn">FALSE 👎</button>
  </div>

  <div class="nav">
    <button class="prev" id="prevBtn" disabled>← Prev</button>
    <button class="next" id="nextBtn" disabled>Next →</button>
  </div>

</div>

<!-- ANSWER POPUP (Correct / Wrong) -->
<div id="answerPopup" class="popup">
  <div class="popup-content">
    <div class="popup-icon" id="popupIcon"></div>
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
  </div>
</div>

<!-- FINAL SCORE POPUP -->
<div id="finalPopup">
  <div class="finalpopup-box">
    <h2 class="final-heading">🎉 Congratulations!</h2>
    <p id="finalScore"></p>
    <div id="stars"></div><br>
    <button onclick="restart()" class="playAgain-btn">
      Play Again
    </button>
  </div>
</div>
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
<script src="../assets/JavaScript/true_false.js"></script>

</body>
</html>
