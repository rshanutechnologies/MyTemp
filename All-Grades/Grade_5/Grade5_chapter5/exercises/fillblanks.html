<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fill in the Blanks</title>

   
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="../assets/CSS/fillblanks.css">
</head>

<body>

    <div class="main">
        <div class="header">
           <span> Fill & Blanks </span>
           <div class="progress" id="progress"></div>
       </div>
          <button class="home" onclick="location.href='../index.html'">🏠 Home</button>

        <div class="q-indicator" id="indicator"></div>

        <div class="card">

            <div class="question" id="question"></div>

<div class="image-box">
                <img id="image">
            </div>

            <div class="letters" id="letters"></div>

            

            <div class="action-row nav">
                <button class="prev" id="prevBtn" disabled>← Prev</button>
                <button class="submit" id="checkBtn" disabled>✔ Submit</button>
                <button class="next" id="nextBtn" disabled>Next →</button>
            </div>

        </div>
    </div>

    <!-- CORRECT / WRONG POPUP -->
   
  <!-- 🔔 POPUP -->
<!-- ANSWER POPUP (Correct / Wrong) -->
<div id="answerPopup" class="popup">
  <div class="popup-content">
    <div class="popup-icon" id="popupIcon"></div>
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
  </div>
</div>

<!-- FINAL SCORE POPUP -->
<div id="finalPopup">
  <div class="finalpopup-box">
    <h2 class="final-heading">🎉 Congratulations!</h2>
    <p id="finalScore"></p>
    <div id="stars"></div><br>
    <button onclick="restart()" class="playAgain-btn">
      Play Again
    </button>
  </div>
</div>


<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
    <script src="../assets/JavaScript/fillblanks.js"></script>
</body>
</html>
