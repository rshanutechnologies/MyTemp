<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Body Quiz Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Livvic", sans-serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      /* background: url('./assets/images/bg2.png'); */
      background: linear-gradient(180deg, #e9fbf4, #dff7ee) !important;
      /* background-color: #FFF1EB !important; */
      background-size: 100% 100%;
      
    }

    /* ===== NAVIGATION AREA ===== */
    .top-index {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 100px;
      padding: 15px 0px;
      /* background: rgba(255, 255, 255, 0.575); */
      /* background: rgba(235, 255, 247, 0.692); */
      background: transparent !important;
    }

    /* ===== BUTTON BASE ===== */
    .index-btn {
      width: 160px;
      height: 60px;
      border: none;
      background: none;
      cursor: pointer;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: .35s ease;
    }

    /* SVG */
    .body-svg {
      width: 100px;
      height: 85px;
      fill: #fbcfe8;
      transition: .35s ease;
    }

    /* SVG colors */
    .index-btn:nth-of-type(1) .body-svg {
      fill: #ff9fba;
    }

    .index-btn:nth-of-type(2) .body-svg {
      fill: #7ccfff;
    }

    .index-btn:nth-of-type(3) .body-svg {
      fill: #ff006a;
    }

    .index-btn:nth-of-type(4) .body-svg {
      fill: #ffc107;
    }

    /* Hover SVG */
    .index-btn:hover .body-svg {
      transform: scale(1.30);
    }


    /* ===== TEXT STYLE ONLY ===== */
    /* .nav-text{
  width: 100%;      
  display:inline-block;
  padding:4px 10px;
  border-radius:12px;
  border:2px solid #ff9ac6;
  font-size:18px;
  font-weight:400;
  color:#2f3a4a;
  transition:all .3s ease;
  height: 100px;
  text-align: center;
  width: 180px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: 600;
} */

    .nav-text {
      width: 200px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 20px;
      font-weight: 600;
      color: #2f3a4a;
      border: 3px solid transparent;
      box-shadow:
        inset 0 2px 4px rgba(255, 255, 255, .85),
        inset 0 -4px 6px rgba(0, 0, 0, .08),
        0 8px 10px rgba(0, 0, 0, .18);
      transition: all .3s ease;
    }

    /* Different text background colors */
    .index-btn:nth-of-type(1) .nav-text {
      background: #ffb6d5;
    }

    .index-btn:nth-of-type(2) .nav-text {
      background: #a7f3d0;
    }

    .index-btn:nth-of-type(3) .nav-text {
      background: #fde68a;
    }

    .index-btn:nth-of-type(4) .nav-text {
      background: #c4b5fd;
    }

    /* Hover text */
    /* .index-btn:hover .nav-text{
  transform:translateY(-2px);
} */

    .index-btn:hover {
      transform: translateY(-2px);
      /* box-shadow:
        inset 0 3px 6px rgb(223, 221, 221),
        inset 0 -6px 8px rgba(0, 0, 0, .12),
        0 16px 16px rgba(0, 0, 0, .15); */
    }

    /* Active text style */
    .index-btn.active .nav-text {
      border-color: #fff;
      background-color: rgb(198, 255, 193);
    }

    /* Active SVG zoom effect */
    .index-btn.active .body-svg {
      transform: scale(1.4);

      transition: transform .3s ease;
    }


    /* ===== CONTENT ===== */
    .content {
      flex: 1;
      width: 100%;
      /* margin-top: -5%; */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      /* background:white; */
      /* background: rgba(235, 255, 247, 0.692) !important; */
    }

    .left-structure {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-right: 40px;
      margin-top: -1%;
    }

    .structure-title {
      font-size: 30px;
      font-weight: 700;
      color: #2f3a4a;
      margin-bottom: 10px;
      margin-top: 2%;
      margin-left: 15%;
    }

    .structure-img {
      width: 120px;
    }

    /* ===================================== */
    /* =========== MOBILE RESPONSIVE ======= */
    /* ===================================== */

    .mobile-toggle {
      display: none;
    }

    @media (max-width:900px) {


      body{
           background: url('./assets/images/bg2.png');
      background-size: 100% 100%;
      }
      /* Keep desktop-style navigation */
      .top-index {
        gap: 32px;
        /* reduce huge gap */
        padding: 12px 10px;
        flex-wrap: nowrap;
      }

      /* Make all buttons equal width */
      .index-btn {
        width: 170px;
        /* uniform width */
        height: 60px;
      }

      /* Make text pill consistent */
      .nav-text {
        width: 170px;
        height: 70px;
        font-size: 16px;
        padding: 8px 10px;
      }

      /* Reduce hover jump */
      .index-btn:hover .nav-text {
        transform: translateY(-1px);
      }

      /* Slightly reduce SVG size if used later */
      .body-svg {
        width: 80px;
        height: 70px;
      }

      /* Content stays full */
      .content {
        width: 100%;
        height: 100%;
      }
        .top-index {
        background: radial-gradient(circle at top, #fff5fb, #ffe6f5) !important;
        }
    }

    @media (max-width:1100px) {

      html,
      body {
        overflow: hidden !important;
        
      }

      body {
        /* background: linear-gradient(135deg, #fff5fb, #ffe6f5) !important; */
           background: url('./assets/images/bg2.png');
      background-size: 100% 100%;
      }

      /* SHOW TOGGLE BUTTON */
      .mobile-toggle {
        display: block;
        position: fixed;
        top: 15px;
        right: 15px;
        z-index: 1000;
        background: #00cfff;
        color: #fff;
        font-size: 22px;
        border: none;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 22px;
        cursor: pointer;
      }

      /* NAVIGATION PANEL */
      .top-index {
        position: fixed;
        top: 0;
        right: -100%;
        width: 75%;
        height: 100vh;
        background: radial-gradient(circle at top, #fff5fb, #ffe6f5);
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        gap: 25px;
        padding-top: 80px;
        margin-left: 0;
        box-shadow: -5px 0 20px rgba(0, 0, 0, .2);
        transition: .4s ease;
        z-index: 999;
      }

      .top-index.active {
        right: 0;
      }

      /* Hide image + title in panel */
      /* .structure-title,
  .left-structure{
    display:none;
  } */

      /* Adjust buttons */
      .index-btn {
        width: 100%;
        max-width: 200px;
        height: 60px;
        flex-direction: row;
        justify-content: flex-start;
        padding-left: 20px;
        gap: 20px;
      }

      .nav-text {
        width: 100%;
        height: 100%;
        justify-content: center;
        font-size: 16px;
      }

      .body-svg {
        width: 60px;
        height: 60px;
      }

      /* Content full screen */
      .content {
        height: 100vh;
      }

      /* TITLE STYLE */
      .structure-title {
        font-size: 26px;
        font-weight: 700;
        margin: 10px 0;
        margin-left: 0;
        text-align: center;
      }

      /* IMAGE STYLE */
      .left-structure {
        margin: 0;
        align-items: center;
      }

      .structure-img {
        width: 110px;
        margin-bottom: 10px;
      }

    }

    /* ===================================== */
/* ===== 1280px PURE SIZE UPGRADE ===== */
/* ===================================== */

@media (min-width: 1280px) {

  /* TOP NAV BAR */
  .top-index {
    gap: 140px;
    padding: 20px 0;
  }

  /* BUTTON WRAPPER */
  .index-btn {
    width: 200px;
    height: 80px;
    gap: 25px;
  }

  /* SVG */
  .body-svg {
    width: 120px;
    height: 100px;
  }

  /* TEXT BUTTON */
  .nav-text {
    width:300px;
    height: 180px !important;
    font-size: 30px;
    border-radius: 24px;
  }

  /* HOVER SCALE (KEEP SAME STYLE JUST SMOOTH) */
  .index-btn:hover .body-svg {
    transform: scale(1.35);
  }

  /* ACTIVE */
  .index-btn.active .body-svg {
    transform: scale(1.45);
  }

 

 

  /* STRUCTURE TITLE (if used later) */
  .structure-title {
    font-size: 40px;
  }

  .structure-img {
    width: 160px;
  }

}
  </style>
</head>

<body>
  <button class="mobile-toggle" id="menuToggle">☰</button>
  <div class="top-index">

    <!-- <div class="structure-title">Body Quiz</div> -->
    <!-- <div class="left-structure">
    <img src="./assets/images/CuteBaby.png" alt="Human Body" class="structure-img">
  </div> -->

    <!-- BUTTONS -->
    <button class="index-btn active" data-file="exercises/mcq.html">
      <!-- <svg viewBox="0 0 100 200" class="body-svg">
      <circle cx="50" cy="20" r="15"/>
      <rect x="35" y="40" width="30" height="70" rx="15"/>

    <button class="index-btn" data-file="exercises/fillblanks.html">
      <!-- <svg viewBox="0 0 100 200" class="body-svg">
      <circle cx="50" cy="20" r="15"/>
      <rect x="35" y="40" width="30" height="70" rx="15"/>
      <rect x="20" y="50" width="15" height="60" rx="8"/>
      <rect x="65" y="50" width="15" height="60" rx="8"/>
      <rect x="40" y="110" width="10" height="70" rx="6"/>

    </svg> -->
      <span class="nav-text"> ✍️ Fill the Blanks</span>
    </button>

    <button class="index-btn" data-file="exercises/true_false.html">
      <!-- <svg viewBox="0 0 100 200" class="body-svg">
      <circle cx="50" cy="20" r="15"/>
      <rect x="35" y="40" width="30" height="70" rx="15"/>
      <rect x="20" y="50" width="15" height="60" rx="8"/>
      <rect x="65" y="50" width="15" height="60" rx="8"/>

      <rect x="50" y="110" width="10" height="70" rx="6"/>
    </svg> -->
      <span class="nav-text">⚖️ True / False</span>
    </button>

    <button class="index-btn" data-file="exercises/matching.html">
      <!-- <svg viewBox="0 0 100 200" class="body-svg">
      <circle cx="50" cy="20" r="15"/>
      <rect x="35" y="40" width="30" height="70" rx="15"/>
      <rect x="20" y="50" width="15" height="60" rx="8"/>
      <rect x="65" y="50" width="15" height="60" rx="8"/>
      <rect x="40" y="110" width="10" height="70" rx="6"/>
      <rect x="50" y="110" width="10" height="70" rx="6"/>
    </svg> -->
      <span class="nav-text">🧩 Matching</span>
    </button>

  </div>

  <div class="content">
    <iframe id="quizFrame"></iframe>
  </div>

  <script>
    const iframe = document.getElementById("quizFrame");
    const buttons = document.querySelectorAll(".index-btn");

    iframe.src = buttons[0].dataset.file;

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        iframe.src = btn.dataset.file;
      });
    });

    const toggle = document.getElementById("menuToggle");
    const menu = document.querySelector(".top-index");

    toggle.addEventListener("click", () => {
      menu.classList.toggle("active");
    });

    /* Close menu when clicking a button */
    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        menu.classList.remove("active");
      });
    });
  </script>

</body>

</html>
