<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plant Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/CSS/two_example.css">
</head>

<body>

<div class="quiz">
   <div class="home" onclick="location.href='../index.html'">🏠 Home</div>
   <div class="quiz-title">Plant Quiz </div> 
  <!-- QUESTION -->
  <div class="question" id="question"></div>
   <img
    id="questionImg"
    src=""
    alt="Question image"
    style="
      width:200px;
      height:200px;
      object-fit:contain;
      margin:2px auto;
      display:block;
    "
  />
  <!-- ✅ REQUIRED INPUT (ADDED) -->
  <div style="margin:10px 0;">
    <input
      id="answerInput"
      type="text"
      placeholder="Type your answer..."
      style="
        width:60%;
        height:52px;
        font-size:22px;
        padding:10px 16px;
        border-radius:14px;
        border:2px solid #ccc;
        text-align:center;
      "
    />
  </div>

  <!-- ✅ REQUIRED SUBMIT BUTTON (ADDED) -->
  <button
    id="submitBtn">
    ✓ Submit
  </button>

  <!-- NAV -->
  <div class="nav">
    <button class="prev" id="prev" disabled>← Prev</button>
    <button class="next" id="next" disabled>Next →</button>
  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box" id="popupText"></div>
</div>
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
<script src="../assets/JavaScript/two_example.js"></script>
</body>
</html>
