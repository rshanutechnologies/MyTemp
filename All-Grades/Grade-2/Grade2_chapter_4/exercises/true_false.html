<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Plant True / False Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/True_false.css">
</head>

<body>

  <button class="home-btn">True / False</button>

  <div class="quiz">
    <div class="progress" id="progress"></div>
    <div class="question" id="question"></div>

    <div class="jungle" id="stage">
      <img id="questionImg" class="animal-img" src="images/plant.png">
    </div>

    <div class="controls">
      <button class="btn false" onclick="answer(false)">False</button>
      <button class="btn true" onclick="answer(true)">True</button>
    </div>

    <div class="nav">
      <button class="prev" id="prev" disabled>← Prev</button>
      <button class="next" id="next" disabled>Next →</button>
    </div>
  </div>

  <div class="monkey" id="monkey"></div>

  <div class="popup hidden" id="popup">
    <div class="popup-box">
      <div class="popup-emoji" id="popupEmoji">👍</div>
      <h3 id="popupTitle"></h3>
      <p id="popupText"></p>
      <button class="restart hidden" id="restart">Play Again</button>

    </div>
  </div>
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
  <script src="../assets/js/True_false.js"></script>
</body>

</html>
