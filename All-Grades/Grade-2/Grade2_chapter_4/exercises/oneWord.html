<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plant One Word Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/oneWord.css">
</head>

<body>

<!-- <button class="home-btn" onclick="window.parent.closeQuiz()">🏠 Home</button> -->
  <div class="home-btn">Give One Word Answer</div>
<div class="quiz-container">
  <div class="progress" id="progress"></div>
  <!-- <div class="header">Give One Word Answer</div> -->
  <div class="question-box">
  <div id="questionText"></div>
  <img id="questionImg" class="question-img">
</div>

  <div class="options" id="options"></div>

  <div class="nav">
    <button class="prev btn" id="prev">← Prev</button>
    <button class="next btn" id="next" disabled>Next →</button>
  </div>
</div>

<div class="popup hidden" id="popup">
  <div class="popup-box">
    <div class="popup-emoji" id="popupEmoji">👍</div>
    <h3 id="popupTitle"></h3>
    <p id="popupText"></p>
    <button class="restart hidden" id="restart">Play Again</button>
    
  </div>
</div>
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
<script src="../assets/js/oneWord.js"></script>

</body>
</html>
