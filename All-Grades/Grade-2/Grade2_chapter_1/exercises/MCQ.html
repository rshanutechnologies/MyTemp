<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Template - 5 Questions</title>

  <!-- ✅ Livvic Font -->
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700;900&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="../assets/css/MCQ.css">

  
</head>

<body>
  <div class="container">

    <!-- ✅ Question Card -->
    <div class="question-card">
      <h1 class="question-text" id="questionText">Loading...</h1>
      <div class="img">
      <img class="question-image" id="questionImage" src="" alt="question" />
      </div>
    </div>

    <!-- ✅ Options -->
    <div class="options" id="optionsWrap"></div>

    <!-- ✅ Navigation -->
     <div class="nav">
            <button id="prevBtn">◀ Prev</button>
            <button id="nextBtn">Next ▶</button>
        </div>

    <!-- ✅ Progress -->
    <div class="progress" id="progressText"></div>
  </div>

  <!-- ✅ YOUR POPUP HTML CODE -->
  <!-- <div class="popup" id="popup">
    <div class="popup-box" id="popupText"></div>
  </div> -->


   <div id="answer-popup" class="popup">
        <div class="popup-content">
            <div class="popup-icon" id="popup-icon"></div>
            <h3 id="popup-title"></h3>
            <p id="popup-message"></p>
        </div>
    </div>
    <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
    <audio id="wrongSound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
<script src="../assets/js/MCQ.js"></script>

</body>
</html>
